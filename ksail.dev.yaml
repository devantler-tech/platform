# Dev Talos + Hetzner cluster.
# See docs/TEMPLATING.md for the fields a fork of this repo needs to edit.
---
apiVersion: ksail.io/v1alpha1
kind: Cluster
metadata:
  name: dev
spec:
  cluster:
    distributionConfig: talos
    connection:
      context: admin@dev
      timeout: 10m
    distribution: Talos
    provider: Hetzner
    cni: Cilium
    gitOpsEngine: Flux
    # Match the existing cluster state so 'ksail cluster update' does not
    # attempt to uninstall components that are managed in-cluster via Flux.
    certManager: Enabled
    metricsServer: Enabled
    policyEngine: Kyverno
    talos:
      controlPlanes: 3
      workers: 2
      # Hetzner Talos ISO (x86_64). Override to 122629 for ARM.
      iso: 122630
    localRegistry:
      registry: "devantler:${GHCR_TOKEN}@ghcr.io/devantler-tech/platform/manifests"
  provider:
    hetzner:
      controlPlaneServerType: cx23
      workerServerType: cx23
      location: fsn1
      networkCidr: 10.0.0.0/16
      placementGroupStrategy: Spread
      fallbackLocations:
        - nbg1
        - hel1
      placementGroupFallbackToNone: true
  workload:
    sourceDirectory: k8s
    kustomizationFile: clusters/dev
    tag: latest
