# Dev Talos + Hetzner cluster.
# See docs/TEMPLATING.md for the fields a fork of this repo needs to edit.
---
apiVersion: ksail.io/v1alpha1
kind: Cluster
metadata:
  name: dev
spec:
  cluster:
    distributionConfig: talos
    connection:
      context: admin@dev
      timeout: 10m
    distribution: Talos
    provider: Hetzner
    cni: Cilium
    gitOpsEngine: Flux
    # These components are managed in-cluster by Flux (HelmReleases under
    # k8s/bases/infrastructure/controllers/). Tell ksail not to install
    # them so there are not two different install paths for the same
    # release, and so ksail bootstrap does not race Flux — in particular,
    # ksail installing metrics-server before Flux has a chance to install
    # kubelet-serving-cert-approver leaves the kubelet serving CSRs
    # pending and causes metrics-server to TLS-fail against kubelet.
    certManager: Disabled
    metricsServer: Default
    policyEngine: None
    talos:
      controlPlanes: 3
      workers: 2
      # Pin Talos to match the ISO so 'ksail cluster update' doesn't attempt
      # an unwanted in-place upgrade to ksail's default version.
      version: v1.11.2
      # Hetzner Talos ISO (x86_64). Override to 122629 for ARM.
      iso: 122630
    localRegistry:
      registry: "devantler:${GHCR_TOKEN}@ghcr.io/devantler-tech/platform/manifests"
  provider:
    hetzner:
      controlPlaneServerType: cx23
      workerServerType: cx23
      location: fsn1
      networkCidr: 10.0.0.0/16
      placementGroupStrategy: Spread
      fallbackLocations:
        - nbg1
        - hel1
      placementGroupFallbackToNone: true
  workload:
    sourceDirectory: k8s
    kustomizationFile: clusters/dev
    tag: latest
