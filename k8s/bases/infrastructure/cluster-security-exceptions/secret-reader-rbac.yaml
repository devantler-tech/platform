        name: system:controller:token-cleaner
    # Kubescape operator/scanner
      - apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: kubescape
      - apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: operator
      - apiGroup: rbac.authorization.k8s.io
        kind: Role
        name: operator
    # Other platform controllers (flagger, reloader, ksail-operator, OpenBao)
      - apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: flagger
      - apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: ksail-operator
      - apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
