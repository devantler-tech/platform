---
# Exempt controllers and middleware that legitimately need broad RBAC.
# Infrastructure controllers (Flux, Kyverno, cert-manager, CNPG, Velero,
# KEDA, Coroot, KubeVirt, CDI, Longhorn) and platform middleware
# (headlamp cluster dashboard, homepage service discovery, fleetdm device
# management, dex identity, oauth2-proxy auth, opencost cost monitoring,
# reloader config watcher) all require cluster-wide read or read/write
# access to function correctly.
apiVersion: kubescape.io/v1beta1
kind: ClusterSecurityException
metadata:
  name: controller-rbac
spec:
  reason: >-
    Infrastructure controllers and platform middleware require broad RBAC
    to manage their target resources cluster-wide. This includes GitOps
    (Flux), policy engines (Kyverno), certificate managers (cert-manager),
    database operators (CNPG), backup controllers (Velero), autoscalers
    (KEDA), observability (Coroot/opencost), virtualisation (KubeVirt,
    CDI), storage (Longhorn), cluster dashboards (headlamp), service
    discovery (homepage), device management (fleetdm), identity (dex),
    auth proxies (oauth2-proxy), and config watchers (reloader).
  posture:
    - controlID: C-0053
      action: ignore
    - controlID: C-0007
      action: ignore
    - controlID: C-0037
      action: ignore
    - controlID: C-0031
      action: ignore
    - controlID: C-0002
      action: ignore
    - controlID: C-0063
      action: ignore
    - controlID: C-0035
      action: ignore
    # NOTE: RBAC controls are NOT suppressed by this namespaceSelector — Kubescape
    # keys them on the Role/ClusterRole/binding object, so a namespace match never
    # applies (proven: the namespaced velero-server Role kept failing despite
    # `velero` being listed below). They are handled by an explicit kind+name
    # `match.resources` in a sibling CR instead:
    #   - C-0187 (wildcard RBAC, CIS-5.1.3)      → wildcard-rbac.yaml
    #   - C-0015 (list Kubernetes secrets)        → secret-reader-rbac.yaml
    # Headlamp is fixed at the root (SA scoped to read-only cluster-reader); Flux
    # and Velero are exempted by-design in wildcard-rbac.yaml.
    # The other RBAC controls still listed here (C-0053, C-0007, C-0037, C-0031,
    # C-0002, C-0063, C-0035, C-0188) have the same namespaceSelector limitation and
    # should migrate to kind+name matching too — tracked separately.
    - controlID: C-0188
      action: ignore
  match:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - flux-system
            - kyverno
            - cert-manager
            - cnpg-system
            - velero
            - keda
            - observability
            - kubescape
            - vertical-pod-autoscaler
            - kubevirt
            - cdi
            - longhorn-system
            - external-dns
            - oauth2-proxy
            - headlamp
            - kubelet-serving-cert-approver
            - opencost
            - reloader
            - dex
            - fleetdm
            - homepage
