# Aggregate ClusterRole that extends the scoped `tenant-edit` ClusterRole with
# limited Cilium network-policy verbs, so a self-service tenant can create
# additive CiliumNetworkPolicy allow-lists in its namespace without receiving
# write access to platform-maintained policies.
#
# The Kyverno-generated `default-deny` and `allow-dns` CiliumNetworkPolicies,
# plus platform-owned tenant allow-lists, are part of the namespace security
# boundary. Tenants may create additional policies, but they must not be able to
# update, patch, or delete existing policies such as `default-deny`.
#
# This role is intentionally NOT aggregated into the built-in `edit` role.
# Grants only the NAMESPACED `ciliumnetworkpolicies` — never the cluster-scoped
# `ciliumclusterwidenetworkpolicies`, which remain platform territory.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cilium-tenant-edit
  labels:
    devantler.tech/aggregate-to-tenant-edit: "true"
rules:
  - apiGroups: ["cilium.io"]
    resources:
      - ciliumnetworkpolicies
    verbs:
      - get
      - list
      - watch
      - create
