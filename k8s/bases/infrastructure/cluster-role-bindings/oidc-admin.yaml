# ClusterRoleBinding that grants cluster-admin to users authenticated
# via Dex OIDC who are members of the devantler-tech GitHub org.
# The group name matches the OIDC groups claim from Dex's GitHub connector.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: ned@devantler.tech
