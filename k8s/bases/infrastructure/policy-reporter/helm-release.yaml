apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: policy-reporter
  namespace: policy-reporter
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  # Kyverno (infrastructure-controllers layer) installs the wgpolicyk8s.io
  # PolicyReport/ClusterPolicyReport CRDs this app watches; the infrastructure
  # layer already waits for infrastructure-controllers, and this dependsOn makes
  # the ordering explicit so the core never starts before Kyverno is Ready.
  dependsOn:
    - name: kyverno
      namespace: kyverno
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: policy-reporter
      version: 3.8.1
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
  # https://github.com/kyverno/policy-reporter/blob/3.7.4/charts/policy-reporter/values.yaml
  values:
    # The UI reaches the core over its REST API; it is off by default and the UI
    # is useless without it. The chart auto-wires the UI's default cluster to
    # http://policy-reporter:8080 (+ the kyverno plugin) so no clusters config is
    # needed here.
    rest:
      enabled: true

    # Expose Prometheus policy-result metrics on :8080/metrics for Coroot's
    # node-agent to scrape. `simple` mode keeps label cardinality bounded. No
    # prometheus-operator here, so the ServiceMonitor sub-chart stays disabled
    # (see monitoring below) -- same as opencost.
    metrics:
      enabled: true
      mode: simple

    # HA floor (#2572): two replicas per component, like every other
    # single-point-of-failure workload under validate-replica-floor. The chart
    # auto-enables core leader election at replicaCount > 1, so only the leader
    # pushes results to targets while both replicas serve the REST API.
    replicaCount: 2

    # Drain-safe PDB pattern (#1880/#1882): the chart's default minAvailable: 1
    # would block the last voluntary eviction at 2 replicas; maxUnavailable: 1
    # keeps one pod up through a drain without wedging it. The two are mutually
    # exclusive, so minAvailable must be explicitly nulled.
    podDisruptionBudget:
      minAvailable: null
      maxUnavailable: 1

    # Prefer spreading across hostnames without hard-failing scheduling.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: policy-reporter

    # Explicit cold-start floor; auto-vpa right-sizes at steady state. CPU limit
    # intentionally unset (compressible) per the house pattern.
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        memory: 256Mi

    ui:
      enabled: true
      # Stateless web frontend; no leader election needed (#2572).
      replicaCount: 2
      podDisruptionBudget:
        minAvailable: null
        maxUnavailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: policy-reporter-ui
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          memory: 128Mi

    plugin:
      kyverno:
        # Surfaces Kyverno policy details, sources and (optionally) exceptions in
        # the UI; the UI auto-discovers it at http://policy-reporter-kyverno-plugin:8080.
        enabled: true
        # Read-only API for the UI: blockReports stays disabled, so the plugin
        # processes no reports (the chart auto-disables its leader election) and
        # scaling it cannot duplicate work (#2572).
        replicaCount: 2
        podDisruptionBudget:
          minAvailable: null
          maxUnavailable: 1
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: policy-reporter-kyverno-plugin
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi

    # No prometheus-operator in the cluster, so skip the ServiceMonitor the
    # monitoring sub-chart would create (matches opencost's metrics wiring).
    monitoring:
      enabled: false
