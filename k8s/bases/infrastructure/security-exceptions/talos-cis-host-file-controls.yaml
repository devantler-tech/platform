---
# Talos manages the Kubernetes control-plane PKI and component kubeconfigs
# INTERNALLY — certificates via trustd, static-pod manifests generated in-memory —
# so it deliberately does NOT use the kubeadm on-disk layout under /etc/kubernetes
# that the CIS "control plane node configuration files" controls inspect. Sidero
# documents the entire CIS section 1.1 file permission/ownership family
# (1.1.13-1.1.19) as FALSE POSITIVES on Talos, with no machine-config knob to
# satisfy them ("architectural by design" — there is no file at those paths to own):
#   https://docs.siderolabs.com/talos/v1.12/security/talos-default-hardening-and-cis-compliance
# These map to Kubescape host-scanner controls C-0104..C-0110. We ignore them so the
# in-cluster posture dashboard stops alerting on findings that cannot (and should
# not) be remediated without abandoning Talos's PKI model.
#
# NOTE — intentionally NO `match:` block. These are HOST-SCANNER findings against the
# control-plane node, not a namespaced object, so the `match.namespaceSelector`
# pattern used by every other exception in this directory would NOT match them
# (and `match.resources` requires a concrete kind we cannot statically pin for
# host-sensor results). Per the ClusterSecurityException CRD `match` is optional;
# omitting it applies the posture ignore cluster-wide. That is correct and
# collateral-free here because C-0104..C-0110 ONLY ever evaluate control-plane host
# files — there is no namespaced resource for which they could be a true positive.
apiVersion: kubescape.io/v1beta1
kind: ClusterSecurityException
metadata:
  name: talos-cis-host-file-controls
spec:
  reason: >-
    Talos Linux manages control-plane PKI (via trustd) and component kubeconfigs
    internally and does not use the kubeadm /etc/kubernetes file layout these CIS
    controls inspect. Sidero documents the CIS 1.1.13-1.1.19 control-plane file
    permission/ownership checks as false positives on Talos, with no configuration
    able to satisfy them. Ignored to keep the in-cluster posture dashboard signal
    clean.
  posture:
    # CIS 1.1.13 — admin.conf file permissions
    - controlID: C-0104
      action: ignore
    # CIS 1.1.14 — admin.conf file ownership (root:root)
    - controlID: C-0105
      action: ignore
    # CIS 1.1.15 — scheduler.conf file permissions
    - controlID: C-0106
      action: ignore
    # CIS 1.1.16 — scheduler.conf file ownership (root:root)
    - controlID: C-0107
      action: ignore
    # CIS 1.1.17 — controller-manager.conf file permissions
    - controlID: C-0108
      action: ignore
    # CIS 1.1.18 — controller-manager.conf file ownership (root:root)
    - controlID: C-0109
      action: ignore
    # CIS 1.1.19 — Kubernetes PKI directory and file ownership (root:root)
    - controlID: C-0110
      action: ignore
