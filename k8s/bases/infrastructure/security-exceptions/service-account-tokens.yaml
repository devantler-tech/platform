---
# Exempt service account token auto-mount controls for infrastructure
# namespaces. Controllers that manage cluster resources (Flux, Kyverno,
# cert-manager, KEDA, VPA, etc.) genuinely need API tokens.
# App namespaces are NOT excepted — their SA automount is disabled via
# HelmRelease values or postRenderer patches instead.
apiVersion: kubescape.io/v1beta1
kind: ClusterSecurityException
metadata:
  name: service-account-tokens
spec:
  reason: >-
    Infrastructure controllers need Kubernetes API access via SA tokens.
    App namespaces have automount disabled at the source via HelmRelease
    values. The platform uses RBAC to restrict what each SA can do.
  posture:
    - controlID: C-0261
      action: ignore
    - controlID: C-0207
      action: ignore
    - controlID: C-0012
      action: ignore
    - controlID: C-0255
      action: ignore
    - controlID: C-0034
      action: ignore
    - controlID: C-0190
      action: ignore
  match:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - kube-system
            - kube-public
            - kube-node-lease
            - flux-system
            - kyverno
            - cert-manager
            - cnpg-system
            - velero
            - keda
            - monitoring
            - kubescape
            - vertical-pod-autoscaler
            - kubevirt
            - cdi
            - longhorn-system
            - kubelet-serving-cert-approver
            - external-dns
            - reloader
            - opencost
            - dex
            - fleetdm
            - homepage
            - headlamp
            - oauth2-proxy
