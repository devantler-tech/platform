---
# Exempt service account token auto-mount controls for infrastructure
# and middleware namespaces. Controllers and platform middleware that
# manage cluster resources (Flux, Kyverno, cert-manager, KEDA, VPA,
# headlamp dashboard, homepage service discovery, fleetdm device
# management, etc.) genuinely need API tokens to function.
apiVersion: kubescape.io/v1beta1
kind: ClusterSecurityException
metadata:
  name: service-account-tokens
spec:
  reason: >-
    Infrastructure controllers and platform middleware need Kubernetes
    API access via SA tokens. This includes GitOps controllers, policy
    engines, certificate managers, autoscalers, monitoring, cluster
    dashboards (headlamp), service discovery (homepage), device
    management (fleetdm), identity providers (dex), auth proxies
    (oauth2-proxy), and config watchers (reloader). The platform uses
    RBAC to restrict what each SA can do.
  posture:
    - controlID: C-0261
      action: ignore
    - controlID: C-0207
      action: ignore
    - controlID: C-0012
      action: ignore
    - controlID: C-0255
      action: ignore
    - controlID: C-0034
      action: ignore
    - controlID: C-0190
      action: ignore
  match:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - kube-system
            - kube-public
            - kube-node-lease
            - flux-system
            - kyverno
            - cert-manager
            - cnpg-system
            - velero
            - keda
            - observability
            - kubescape
            - vertical-pod-autoscaler
            - kubevirt
            - cdi
            - longhorn-system
            - kubelet-serving-cert-approver
            - external-dns
            - reloader
            - opencost
            - dex
            - fleetdm
            - homepage
            - headlamp
            - oauth2-proxy
            # Controllers / middleware and dashboards added since this list was
            # last updated, same accepted pattern as the entries above (verified
            # failing C-0261 / C-0207 / C-0255 in the cluster Kubescape operator):
            # external-secrets (the operator that syncs OpenBao -> Secrets, so it
            # genuinely needs secret access), crossplane & ksail-operator
            # (cluster-state reconcilers), flagger (progressive-delivery
            # controller), and crossview (read-only Crossplane dashboard, like
            # headlamp). RBAC still scopes what each SA can do.
            - external-secrets
            - crossplane-system
            - ksail-operator
            - flagger-system
            - crossview
