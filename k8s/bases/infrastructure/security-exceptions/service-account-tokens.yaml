---
# Exempt service account token auto-mount controls cluster-wide.
# Disabling SA token mounting breaks controllers that need Kubernetes API
# access (Flux, Kyverno, KEDA, cert-manager, VPA, etc.). The platform
# uses RBAC to restrict what each SA can do rather than removing tokens.
apiVersion: kubescape.io/v1beta1
kind: ClusterSecurityException
metadata:
  name: service-account-tokens
spec:
  reason: >-
    Disabling SA token auto-mount breaks all controllers that need Kubernetes
    API access. The platform uses RBAC to restrict SA permissions rather than
    removing token mounts entirely.
  posture:
    - controlID: C-0261
      action: ignore
    - controlID: C-0207
      action: ignore
    - controlID: C-0012
      action: ignore
    - controlID: C-0255
      action: ignore
    - controlID: C-0034
      action: ignore
    - controlID: C-0190
      action: ignore
