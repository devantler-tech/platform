---
# Exempt health probe controls for infrastructure and middleware namespaces.
# Many controllers, sidecars, and init containers do not expose health
# endpoints. Adding probes to upstream charts is impractical and they
# typically have their own readiness mechanisms (leader election, watch
# loops). App namespaces (headlamp, homepage) are included because their
# charts deploy init containers and sidecars that lack probe endpoints,
# while main application containers have probes configured.
apiVersion: kubescape.io/v1beta1
kind: ClusterSecurityException
metadata:
  name: health-probes
spec:
  reason: >-
    Infrastructure controllers, middleware, sidecars, and init containers
    often lack health probe endpoints. Upstream charts manage availability
    through leader election and watch mechanisms. App namespaces are
    included for their init containers and sidecars, not main containers.
  posture:
    - controlID: C-0018
      action: ignore
    - controlID: C-0056
      action: ignore
  match:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - flux-system
            - kyverno
            - cert-manager
            - cnpg-system
            - velero
            - keda
            - observability
            - kubescape
            - vertical-pod-autoscaler
            - longhorn-system
            - kube-system
            - reloader
            - external-dns
            - kubelet-serving-cert-approver
            - opencost
            - headlamp
            - kubevirt
            - cdi
            - dex
            - oauth2-proxy
            - homepage
            # Controller namespaces added since this list was last updated whose
            # workloads genuinely lack probe endpoints (verified failing C-0018 /
            # C-0056 in the cluster Kubescape operator): the external-secrets
            # operator/webhook/cert-controller and the Crossplane control-plane
            # (core, rbac-manager, provider pods). crossview / ksail-operator /
            # flagger DO configure probes, so they are deliberately NOT listed.
            - external-secrets
            - crossplane-system
