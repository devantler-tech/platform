# Expose the OpenCost UI behind oauth2-proxy SSO (same forward-auth
# pattern as the Coroot UI). OpenCost serves its UI on port 9090.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opencost
  namespace: opencost
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: OpenCost
    gethomepage.dev/description: Kubernetes cost allocation and FinOps.
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: opencost.png
    # Status dot: Homepage derives health from the readiness of pods matching
    # `gethomepage.dev/pod-selector`. With no selector it defaults to
    # `app.kubernetes.io/name=<route-name>`, i.e. `app.kubernetes.io/name=opencost`,
    # which the OpenCost chart used to satisfy directly. But OpenCost is now a
    # Flagger Canary (infrastructure/flagger/canary-opencost.yaml): the running
    # pods belong to the generated `opencost-primary` Deployment, and Flagger's
    # default --selector-labels (app,name,app.kubernetes.io/name) rewrites
    # `app.kubernetes.io/name` to `opencost-primary` on it — so the default
    # selector matches zero pods and the card renders offline even though OpenCost
    # is healthy (it never scales to zero). Key on the stable
    # `app.kubernetes.io/instance` label instead, which Flagger leaves intact on
    # both the primary and canary pods (same fix as the Umami canary).
    gethomepage.dev/pod-selector: app.kubernetes.io/instance=opencost
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - opencost.${domain}
  rules:
    # 1) Login dance — oauth2-proxy serves its own /oauth2/* endpoints directly,
    #    WITHOUT the ExternalAuth filter. The longer /oauth2 PathPrefix wins.
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: oauth2-proxy
          namespace: oauth2-proxy
          port: 80
    # 2) App traffic — GEP-1494 ExternalAuth filter delegates the per-request SSO
    #    check to oauth2-proxy /oauth2/auth (ext_authz, HTTP); on allow it routes
    #    STRAIGHT to the opencost Service (same namespace). The backendRef targets
    #    the apex Service Flagger's blue/green canary repoints — unchanged from
    #    the old auth-proxy upstream. SPIKE-PENDING (platform#1881): header sets +
    #    unauth redirect confirmed on the local spike before promotion.
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Auth-Request-Redirect
                value: https://opencost.${domain}/
        - type: ExternalAuth
          externalAuth:
            protocol: HTTP
            backendRef:
              name: oauth2-proxy
              namespace: oauth2-proxy
              port: 80
            http:
              path: /oauth2/auth
              allowedHeaders:
                - cookie
                - authorization
                - x-auth-request-redirect
              allowedResponseHeaders:
                - x-auth-request-user
                - x-auth-request-email
                - x-auth-request-groups
                - set-cookie
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: opencost
          port: 9090
