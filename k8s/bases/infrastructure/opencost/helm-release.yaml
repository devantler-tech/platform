apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  # LAYER PLACEMENT — this HelmRelease lives in the `infrastructure` Kustomization
  # (not `infrastructure-controllers`). OpenCost FTL-exits on boot if it cannot
  # reach Coroot's bundled Prometheus at coroot-prometheus.observability.svc:9090, which
  # the operator only builds from the Coroot CR in the `infrastructure` layer.
  # Keeping OpenCost in `infrastructure-controllers` is a hard deadlock: that
  # layer health-checks OpenCost (never Ready without the Prometheus) while the CR
  # that produces the Prometheus can't apply until the layer goes Ready.
  # The dependsOn below only gates *install start* on the operator HelmRelease
  # being Ready (the operator pod up) — it does NOT wait for the operator to have
  # built coroot-prometheus, so it is not sufficient on its own; the layer move is.
  dependsOn:
    - name: coroot-operator
      namespace: observability
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: opencost
      version: 2.5.25
      sourceRef:
        kind: HelmRepository
        name: opencost
  postRenderers:
    # Zero-downtime, gate-clean rollout. The chart's default RollingUpdate
    # (maxUnavailable: 1) kills an old pod the instant the new one is created;
    # kubelet then fires one last readiness probe ~1s after Cilium tears down
    # the dead pod's route, emitting `Unhealthy: …:9003/healthz: connect: no
    # route to host`. That one-shot teardown warning trips the merge-queue
    # deploy gate (.github/actions/check-event-warnings) even though it is
    # harmless. Two mitigations:
    #   1. maxUnavailable: 0 — surge the new pod to Ready before the old is
    #      terminated (matches the homepage/headlamp convention).
    #   2. preStop.sleep — keep the opencost container serving :9003 for 15s
    #      after it is marked for deletion, so kubelet's probes during drain
    #      land on a live endpoint instead of a torn-down route. Native sleep
    #      action (GA since k8s 1.30; cluster is 1.32) — no shell needed in the
    #      distroless image.
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: opencost
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: opencost
              spec:
                strategy:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 1
                    maxUnavailable: 0
                template:
                  spec:
                    # Spread the replicas across nodes so a single node failure
                    # never takes the whole cost API/UI down (Coroot flags
                    # opencost-primary as "single instance — not resilient to
                    # node failure"). Flagger copies this pod template verbatim
                    # onto opencost-primary, so the constraint lands on the live
                    # (primary) Deployment. ScheduleAnyway (soft): a 2-node
                    # window must never block the pod from scheduling.
                    #
                    # Select on app.kubernetes.io/instance ONLY (like the PDB):
                    # Flagger's default --selector-labels rewrites
                    # app.kubernetes.io/name to "opencost-primary" on the primary
                    # pods, so a selector pinning name=opencost would fail to
                    # match the primary's own replicas and the spread would no-op.
                    # instance=opencost stays intact on both source and primary.
                    topologySpreadConstraints:
                      - maxSkew: 1
                        topologyKey: kubernetes.io/hostname
                        whenUnsatisfiable: ScheduleAnyway
                        labelSelector:
                          matchLabels:
                            app.kubernetes.io/instance: opencost
                    containers:
                      - name: opencost
                        lifecycle:
                          preStop:
                            sleep:
                              seconds: 15
  # https://github.com/opencost/opencost-helm-chart/blob/main/charts/opencost/values.yaml
  #
  # Lightweight FinOps cost allocation. Points at Coroot's bundled Prometheus
  # (the metrics TSDB the operator deploys) and uses custom pricing derived
  # from Hetzner Cloud CX33 rates (€6.49/month for 4 vCPU / 8 GB / 80 GB).
  values:
    opencost:
      prometheus:
        internal:
          enabled: false
        external:
          enabled: true
          url: "http://coroot-prometheus.observability.svc.cluster.local:9090"

      # Hetzner Cloud custom pricing — CX33 monthly cap decomposed into
      # per-resource-unit USD costs. CX33 spec verified live with
      # `kubectl get nodes`: 4 vCPU, 7916176 KiB RAM (8 GB nominal), 80 GB NVMe.
      # Price source: Hetzner Cloud Pricing API (2026-05, location fsn1, net
      # of VAT — gross is +25% but VAT is reclaimable / location-dependent and
      # tracking it in OpenCost would conflate compute cost with tax overhead):
      #   curl -H "Authorization: Bearer $HCLOUD_TOKEN" \
      #        https://api.hetzner.cloud/v1/pricing
      #     CX33 cap = €6.49 / server / month   (hourly €0.0104)
      #     Volumes  = €0.0572 / GB / month
      #     Egress   = €1.00 / TB overage  (€0.001 / GB; 20 TiB incl. per server)
      # FX: ECB EUR→USD reference rate 2026-05-27 = 1.1637.
      #
      # IMPORTANT: OpenCost interprets CPU / spotCPU / RAM / spotRAM / GPU / storage
      # in the costModel ConfigMap as USD PER MONTH and divides by HoursPerMonth=730
      # to get an hourly rate (opencost providerconfig.go:188, customprovider.go:95).
      # Network egress fields are passed through as-is (USD per GB transferred).
      #
      # Derivation:
      #   €6.49/server/month × 1.1637 = $7.5524/server/month
      #   50/50 CPU-RAM split (Hetzner does not publish a breakdown — convention):
      #     CPU: $7.5524 × 0.5 / 4 vCPU ≈ $0.9441 / vCPU-month
      #     RAM: $7.5524 × 0.5 / 8 GB   ≈ $0.4720 / GB-month
      #   Volume: €0.0572 × 1.1637 ≈ $0.0666 / GB-month
      #   Egress: €0.001  × 1.1637 ≈ $0.001164 / GB
      #
      # End-to-end sanity check (1 vCPU for 1 hour):
      #   ConfigMap CPU = 0.9441 → OpenCost / 730 = $0.001293 / vCPU-hour
      #   Real cost     = (€6.49 × 0.5 / 4 vCPU / 730 hr) × 1.1637
      #                 =  €0.001112 × 1.1637 = $0.001294 / vCPU-hour ✓
      # https://www.opencost.io/docs/configuration/on-prem#custom-pricing-using-the-opencost-helm-chart
      customPricing:
        enabled: true
        createConfigmap: true
        provider: custom
        costModel:
          description: "Hetzner Cloud CX33 — 4 vCPU / 8 GB / 80 GB NVMe (50/50 CPU-RAM split, USD/month net of VAT)"
          CPU: 0.9441
          spotCPU: 0
          RAM: 0.4720
          spotRAM: 0
          GPU: 0
          storage: 0.0666
          # Egress: passed through as USD per GB transferred; CX33 includes
          # 20 TiB/month free, overage ≈ €1.00/TB = $0.001164/GB.
          zoneNetworkEgress: 0.001164
          regionNetworkEgress: 0.001164
          internetNetworkEgress: 0.001164

      exporter:
        # Run 2 replicas for node-failure resilience (Coroot flagged
        # opencost-primary as a single instance). OpenCost is a stateless cost
        # allocator: its source of truth is Coroot's external Prometheus
        # (prometheus.external below) and the customPricing ConfigMap — each
        # replica independently queries Prometheus and holds only re-derivable
        # in-memory aggregation, with no leader election, local ETL writer or
        # sticky UI state, so >=2 behind the Service is safe.
        #
        # This is a Flagger canary WITHOUT an autoscalerRef (unlike homepage /
        # umami, whose replicas come from KEDA). With no autoscaler, Flagger
        # sizes opencost-primary from the canary target's spec.replicas, so the
        # HA replica count must be pinned HERE on the chart (it is what Flagger
        # reads). Flagger then scales the canary *source* to 0 between rollouts;
        # the platform-wide drift-detection component ignores Deployment
        # /spec/replicas (k8s/bases/components/helmrelease-drift-detection), so
        # Flux never fights that scale-to-0. Pair with the drain-safe PDB
        # (maxUnavailable: 1) + topologySpreadConstraints (postRenderer above).
        replicas: ${opencost_replicas:=2}
        resources:
          requests:
            cpu: 10m
            # Observed steady-state ~75Mi (kubectl top). Request 128Mi so the
            # scheduler reserves real baseline and the pod isn't first to be
            # evicted under node memory pressure.
            memory: 128Mi
          # 256Mi OOM-killed when Headlamp issued the 14d allocation queries —
          # the cost-model engine holds the full window in memory while
          # aggregating. 512Mi gives ~4× headroom over the request and is
          # still well under the chart's 1Gi default.
          limits:
            memory: 512Mi

      ui:
        enabled: true
        securityContext:
          # C-0017 EXCEPTION (Kubescape immutable container filesystem): the
          # opencost-ui entrypoint runs `sed -i` in-place over every *.js under
          # /var/www on EACH start (injecting BASE_URL=/model + footer/aggregation
          # placeholders) — unpredictable writes into the baked-in app-asset dir,
          # so the root FS cannot be immutable. /var/www also cannot be an emptyDir:
          # the image bakes assets via `COPY --from=builder /opt/standard /var/www`
          # and the entrypoint never repopulates an empty mount → the UI would 404.
          # The main `opencost` container DOES run readOnlyRootFilesystem:true; only
          # this nginx-based UI keeps the exception. Revisit once the entrypoint
          # stops mutating /var/www in place (upstream opencost/opencost#2655).
          readOnlyRootFilesystem: false
        resources:
          requests:
            cpu: 10m
            memory: 55Mi
          limits:
            memory: 128Mi

      # The prometheus-operator ServiceMonitor CRD no longer exists (it left
      # with kube-prometheus-stack). OpenCost still computes cost from Coroot's
      # Prometheus; its own /metrics are observed by Coroot's node-agent.
      metrics:
        serviceMonitor:
          enabled: false
