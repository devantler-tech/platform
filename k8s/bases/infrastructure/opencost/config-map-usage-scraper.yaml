apiVersion: v1
kind: ConfigMap
metadata:
  name: opencost-usage-scraper
  namespace: opencost
data:
  prometheus.yml: |
    global:
      scrape_interval: 1m
      scrape_timeout: 10s

    remote_write:
      - url: http://coroot-prometheus.observability.svc.cluster.local:9090/api/v1/write

    scrape_configs:
      - job_name: kubernetes-cadvisor
        honor_labels: true
        scheme: https
        authorization:
          credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels:
              - __meta_kubernetes_node_name
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
          - source_labels:
              - __meta_kubernetes_node_name
            target_label: node
        metric_relabel_configs:
          # OpenCost already receives kube-state metrics from Coroot's cluster
          # agent. Keep only the missing usage signals, avoiding a second copy
          # of kube-state or the full high-cardinality cAdvisor surface.
          - source_labels:
              - __name__
            regex: container_(cpu_usage_seconds_total|memory_working_set_bytes)
            action: keep
          - source_labels:
              - container
            regex: ^$|^POD$
            action: drop
