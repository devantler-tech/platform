# TODO: Upstream `enforce-flux-best-practices.yaml` to Kyverno policies repository.
#
# Validates that every Flux Kustomization and HelmRelease in the cluster
# follows the recommended settings from the Flux docs:
#   https://fluxcd.io/flux/components/kustomize/kustomizations/#recommended-settings
#   https://fluxcd.io/flux/components/helm/helmreleases/
#
# Runs in Enforce mode â€” non-compliant resources are denied at admission (and
# at Flux's server-side dry-run), so new Flux resources must declare all the
# recommended fields up front.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: enforce-flux-best-practices
  annotations:
    policies.kyverno.io/title: Enforce Flux Best Practices
    policies.kyverno.io/category: Flux, Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Kustomization, HelmRelease
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Validates that Flux Kustomization and HelmRelease resources declare the
      reliability-critical fields recommended by the Flux documentation:
      `interval`, `timeout`, `retryInterval`, garbage collection (`prune`),
      health gating (`wait`), and Helm install/upgrade remediation. Catches
      misconfigured resources at admission instead of waiting for a runtime
      failure.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: kustomization-recommended-settings
      match:
        any:
          - resources:
              kinds:
                - kustomize.toolkit.fluxcd.io/v1/Kustomization
      exclude:
        any:
          # The bootstrap flux-system Kustomization is created and managed by
          # `flux bootstrap` / ksail and not by GitOps from this repo, so we
          # cannot set the recommended fields on it. Exclude it from the policy.
          - resources:
              namespaces:
                - flux-system
              names:
                - flux-system
          # The over-provisioning buffer Kustomization is the one sanctioned
          # `wait: false` exception: its pause pods are EXPECTED to sit Pending
          # whenever the Cluster Autoscaler is at maxNodesTotal, so health-
          # gating it (kstatus reports the ReplicaSet as InProgress forever)
          # would hold the whole deploy pipeline red â€” which is exactly what
          # happened while it lived in the `wait: true` infrastructure layer.
          # See k8s/clusters/prod/overprovisioning-flux-kustomization.yaml.
          - resources:
              namespaces:
                - flux-system
              names:
                - infrastructure-overprovisioning
          # The tenant custom-domain TLS Kustomization is the other sanctioned
          # `wait: false` exception: the simply-credentials ExternalSecret stays
          # InProgress until the maintainer seeds the tenant credential in
          # OpenBao, and the ascoachingogvaner-dk Certificate stays InProgress
          # until ACME DNS01 issuance completes â€” health-gating either held the
          # infrastructure â†’ apps pipeline red for hours (2026-06-16). See
          # k8s/clusters/prod/tenant-domains-flux-kustomization.yaml.
          - resources:
              namespaces:
                - flux-system
              names:
                - infrastructure-tenant-domains
      validate:
        message: >-
          Flux Kustomization must set the recommended reliability fields:
          `spec.interval`, `spec.timeout`, `spec.retryInterval`,
          `spec.prune: true` (garbage collection), `spec.wait: true`
          (health-gated reconciliation), and `spec.sourceRef`.
          See https://fluxcd.io/flux/components/kustomize/kustomizations/#recommended-settings.
        pattern:
          spec:
            interval: "?*"
            timeout: "?*"
            retryInterval: "?*"
            prune: true
            wait: true
            sourceRef:
              kind: "?*"
              name: "?*"
    - name: helmrelease-recommended-settings
      match:
        any:
          - resources:
              kinds:
                # v2 only: the v2beta1/v2beta2 APIs were removed from the
                # cluster (Flux â‰Ą 2.6 serves only helm.toolkit.fluxcd.io/v2).
                # Matching the dead versions makes Kyverno's GVKâ†’GVR lookup
                # fail on every admission review and background scan
                # ("unable to convert GVK to GVR ... resource not found").
                - helm.toolkit.fluxcd.io/v2/HelmRelease
      validate:
        message: >-
          Flux HelmRelease must set the recommended reliability fields:
          `spec.interval`, `spec.timeout`, install + upgrade remediation
          retries, and `spec.upgrade.remediation.remediateLastFailure: true`.
          See https://fluxcd.io/flux/components/helm/helmreleases/.
        pattern:
          spec:
            interval: "?*"
            timeout: "?*"
            install:
              remediation:
                retries: ">=1 | -1"
            upgrade:
              remediation:
                retries: ">=1 | -1"
                remediateLastFailure: true
