# Confines self-service tenants to their OWN namespaced SecretStore and blocks
# any reference to the shared cluster-scoped ClusterSecretStore.
#
# Why: tenants are granted edit on ExternalSecret/PushSecret/SecretStore (see
# cluster-roles/external-secrets-tenant-edit.yaml) so they can manage their own
# OpenBao-backed secrets. Referencing a ClusterSecretStore needs no RBAC on the
# store object, and the shared ClusterSecretStore/openbao authenticates as the
# `external-secrets` SA/role (broad infra + seed-write policies). Without this
# guard a tenant could point an ExternalSecret/PushSecret at the shared store
# and read/write OpenBao keys outside its own apps/<tenant>/* prefix — a
# privilege-escalation path. A tenant must instead create its own namespaced
# SecretStore authenticating via a tenant-scoped Vault role.
#
# Scope: only ksail-generated tenant namespaces (labelled
# app.kubernetes.io/managed-by: ksail) — currently ascoachingogvaner and
# wedding-app, plus any future tenant — so platform/infra namespaces that
# legitimately use the ClusterSecretStore (actual-budget, fleetdm, openbao,
# cert-manager, external-dns, flux-system, velero, …) are unaffected.
#
# Platform carve-out: the deny targets only resources applied by a TENANT —
# i.e. by the impersonated tenant ServiceAccount (the tenant's deploy/
# Kustomization sets spec.serviceAccountName: <tenant>). Resources the PLATFORM
# ships inside a tenant's registration dir (k8s/bases/apps/<tenant>/) are
# reconciled by the apps-layer Flux Kustomization, which sets NO
# serviceAccountName and therefore applies as flux-system's own
# kustomize-controller SA — excluded below. This lets the platform place a
# trusted `ghcr-auth` ExternalSecret (backed by the shared ClusterSecretStore,
# reading only apps/<tenant>/ghcr/auth) in a tenant namespace for the image-pull
# credential, while a tenant still cannot point its OWN ExternalSecret/PushSecret
# at the ClusterSecretStore. The discriminator is the applying identity, which a
# tenant cannot forge (it cannot make flux-system's SA apply its manifests).
# Because the exclusion matches on request.userInfo, the policy is
# admission-only (background: false); every escalation is a create/update that
# passes through admission, so enforcement is unaffected.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-tenant-secret-stores
  annotations:
    policies.kyverno.io/title: Restrict Tenant SecretStores
    policies.kyverno.io/category: Security, External Secrets
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: ExternalSecret, PushSecret
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Blocks tenant-applied ExternalSecret and PushSecret resources in ksail
      tenant namespaces from referencing the cluster-scoped ClusterSecretStore
      (top-level store ref or per-entry sourceRef overrides). Tenants must use
      their own namespaced SecretStore, which authenticates via a tenant-scoped
      Vault role limited to secret/data/apps/<tenant>/*, preserving per-tenant
      isolation. Platform-authored resources (applied by flux-system's
      kustomize-controller) are excluded, so the platform-managed `ghcr-auth`
      pull-secret ExternalSecret may still use the shared ClusterSecretStore.
spec:
  validationFailureAction: Enforce
  # Admission-only: the exclude blocks match on request.userInfo (the applying
  # ServiceAccount), which is unavailable during background scans. Every
  # escalation path is a create/update that passes through admission, so
  # enforcement is fully preserved.
  background: false
  rules:
    - name: externalsecret-no-clustersecretstore
      match:
        any:
          - resources:
              kinds:
                - ExternalSecret
              namespaceSelector:
                matchLabels:
                  app.kubernetes.io/managed-by: ksail
      # Exclude platform-authored resources: the tenant registration dir is
      # reconciled by the apps-layer Flux Kustomization as flux-system's own
      # kustomize-controller SA (no impersonation). A tenant's deploy/ artifact
      # is applied as its impersonated tenant SA, so it stays subject to the deny.
      exclude:
        any:
          - subjects:
              - kind: ServiceAccount
                name: kustomize-controller
                namespace: flux-system
      validate:
        message: >-
          Tenant ExternalSecrets must reference a namespaced SecretStore
          (kind: SecretStore), not the shared ClusterSecretStore. Create a
          SecretStore in this namespace that authenticates via your
          tenant-scoped Vault role.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.secretStoreRef.kind || '' }}"
                operator: Equals
                value: ClusterSecretStore
              - key: "{{ request.object.spec.data[].sourceRef.storeRef.kind || `[]` }}"
                operator: AnyIn
                value:
                  - ClusterSecretStore
              - key: "{{ request.object.spec.dataFrom[].sourceRef.storeRef.kind || `[]` }}"
                operator: AnyIn
                value:
                  - ClusterSecretStore
    - name: pushsecret-no-clustersecretstore
      match:
        any:
          - resources:
              kinds:
                - PushSecret
              namespaceSelector:
                matchLabels:
                  app.kubernetes.io/managed-by: ksail
      # Same platform carve-out as the ExternalSecret rule above.
      exclude:
        any:
          - subjects:
              - kind: ServiceAccount
                name: kustomize-controller
                namespace: flux-system
      validate:
        message: >-
          Tenant PushSecrets must reference a namespaced SecretStore
          (kind: SecretStore), not the shared ClusterSecretStore. Create a
          SecretStore in this namespace that authenticates via your
          tenant-scoped Vault role.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.secretStoreRefs[].kind || `[]` }}"
                operator: AnyIn
                value:
                  - ClusterSecretStore
