# Upstream: https://github.com/kyverno/policies/blob/main/best-practices/add-ns-quota/add-ns-quota.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-ns-quota
  annotations:
    policies.kyverno.io/title: Add Quota
    policies.kyverno.io/category: Multi-Tenancy, Best Practices
    policies.kyverno.io/subject: ResourceQuota, LimitRange
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Generates ResourceQuota and LimitRange resources when a new
      Namespace is created. Prevents any single namespace from
      consuming the entire cluster.
spec:
  rules:
    - name: generate-resourcequota
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
      generate:
        generateExisting: true
        apiVersion: v1
        kind: ResourceQuota
        name: default-resourcequota
        synchronize: true
        namespace: "{{request.object.metadata.name}}"
        data:
          spec:
            hard:
              requests.cpu: "4"
              requests.memory: 16Gi
              limits.cpu: "4"
              limits.memory: 16Gi
    - name: generate-limitrange
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
      generate:
        generateExisting: true
        apiVersion: v1
        kind: LimitRange
        name: default-limitrange
        synchronize: true
        namespace: "{{request.object.metadata.name}}"
        data:
          spec:
            limits:
              - default:
                  cpu: 500m
                  memory: 1Gi
                defaultRequest:
                  cpu: 200m
                  memory: 256Mi
                type: Container
