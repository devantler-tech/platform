# Generates a default-deny CiliumNetworkPolicy, a DNS-allow policy,
# and a standard NetworkPolicy default-deny in every namespace. The
# CiliumNetworkPolicy is the enforcing policy; the standard
# NetworkPolicy satisfies Kubescape C-0054 compliance scanning.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-default-deny
  annotations:
    policies.kyverno.io/title: Default Deny Network Policy
    policies.kyverno.io/category: Networking, Best Practices
    policies.kyverno.io/subject: CiliumNetworkPolicy, NetworkPolicy
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Generates a CiliumNetworkPolicy that activates Cilium's whitelist
      mode for all endpoints in a namespace (effectively deny-all), plus
      a companion policy that allows DNS egress to kube-dns so pods can
      still resolve names. Also generates a standard NetworkPolicy
      default-deny for Kubescape compliance (C-0054).
spec:
  rules:
    - name: generate-default-deny
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
      generate:
        generateExisting: true
        apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        name: default-deny
        synchronize: true
        namespace: "{{request.object.metadata.name}}"
        data:
          spec:
            endpointSelector: {}
    - name: generate-allow-dns
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
      generate:
        generateExisting: true
        apiVersion: cilium.io/v2
        kind: CiliumNetworkPolicy
        name: allow-dns
        synchronize: true
        namespace: "{{request.object.metadata.name}}"
        data:
          spec:
            endpointSelector: {}
            egress:
              - toEndpoints:
                  - matchLabels:
                      k8s:io.kubernetes.pod.namespace: kube-system
                      k8s-app: kube-dns
                toPorts:
                  - ports:
                      - port: "53"
                        protocol: UDP
                      - port: "53"
                        protocol: TCP
    - name: generate-standard-default-deny
      match:
        any:
          - resources:
              kinds:
                - Namespace
      exclude:
        any:
          - resources:
              names:
                - kube-system
                - kube-public
                - kube-node-lease
      generate:
        generateExisting: true
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        name: default-deny
        synchronize: true
        namespace: "{{request.object.metadata.name}}"
        data:
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
              - Egress
