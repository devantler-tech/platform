# Mutates pods to apply security best-practices that kubescape checks:
# - seccompProfile: RuntimeDefault (C-0055 Linux hardening) — pod + container
# - allowPrivilegeEscalation: false (C-0016)
# - readOnlyRootFilesystem: true (C-0017)
# - drop ALL capabilities (C-0055)
# - runAsNonRoot: true (C-0013) — pod + container
# - runAsGroup: 1000 (C-0013 non-root group) — pod level only
#
# runAsGroup is injected at the POD level (not the container level): kubescape's
# C-0013 "non-root-containers" rule requires a non-zero runAsGroup, and a pod-level
# value satisfies it without overriding any container-level value a chart may set
# (the earlier concern was specifically about clobbering container inheritance).
# It sets the process primary GID only — runAsUser and fsGroup are deliberately NOT
# injected, so image-baked UIDs and volume ownership are left untouched. Verified
# with kubescape: pod-level runAsGroup alone flips C-0013 to pass with no fsGroup
# or runAsUser, and every PVC-mounting workload in scope already self-sets fsGroup,
# so no volume is chowned. The one caveat is images with NO baked-in UID (e.g.
# tofu-controller's tf-runner, which expects runAsUser from its runnerPodTemplate):
# a pod-level runAsGroup with no runAsUser yields the OCI user string ":1000", which
# containerd rejects ("user group \"1000\" is specified without user") so the sandbox
# never starts. The add-pod-security-context rule therefore excludes tofu-controller
# runner pods — they self-harden via their runnerPodTemplate (runAsNonRoot + seccomp)
# and the container-level rule still applies.
#
# Uses +(key) to never overwrite values explicitly set by Helm charts.
# Excluded namespaces require elevated privileges by design.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-security-context
  annotations:
    policies.kyverno.io/title: Security Context Defaults
    policies.kyverno.io/category: Pod Security, Best Practices
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      Mutates all pods to set security best-practice defaults using
      conditional anchors so explicit chart values are never overwritten.
spec:
  rules:
    - name: add-pod-security-context
      match:
        any:
          - resources:
              kinds:
                - Pod
              # CREATE only. Without this, Kyverno also mutates pod UPDATEs;
              # pod spec is immutable, so for any pod created while the
              # policy/webhook wasn't active yet (fresh-cluster bring-up
              # ordering) EVERY later update — including OpenBao's
              # service-registration label patches — is rejected with
              # HTTP 422 "pod updates may not change fields other than
              # image...". That froze openbao-active at zero endpoints and
              # broke every system test from 2026-06-10 (#1990 probe output).
              operations:
                - CREATE
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - longhorn-system
                - local-path-storage
                - kubescape
                - kubevirt
                - cdi
                - observability
                - velero
                - chaos-mesh
          # tofu-controller runner pods ship no image-baked UID, so a pod-level
          # runAsGroup with no runAsUser breaks containerd sandbox creation (see
          # the header comment). They are hardened by their own runnerPodTemplate
          # and the add-container-security-context rule, so exclude them from the
          # pod-level runAsGroup injection only.
          - resources:
              selector:
                matchLabels:
                  app.kubernetes.io/created-by: tofu-controller
      mutate:
        patchStrategicMerge:
          spec:
            securityContext:
              +(seccompProfile):
                type: RuntimeDefault
              +(runAsNonRoot): true
              +(runAsGroup): 1000
    - name: add-container-security-context
      match:
        any:
          - resources:
              kinds:
                - Pod
              # CREATE only — same immutability rationale as above.
              operations:
                - CREATE
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - flux-system
                - longhorn-system
                - local-path-storage
                - kubescape
                - kubevirt
                - cdi
                - observability
                - velero
                - chaos-mesh
      mutate:
        foreach:
          - list: "request.object.spec.containers"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{element.name}}"
                    securityContext:
                      +(allowPrivilegeEscalation): false
                      +(readOnlyRootFilesystem): true
                      +(runAsNonRoot): true
                      +(capabilities):
                        drop:
                          - ALL
                      +(seccompProfile):
                        type: RuntimeDefault
          - list: "request.object.spec.initContainers[]"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{element.name}}"
                    securityContext:
                      +(allowPrivilegeEscalation): false
                      +(readOnlyRootFilesystem): true
                      +(runAsNonRoot): true
                      +(capabilities):
                        drop:
                          - ALL
                      +(seccompProfile):
                        type: RuntimeDefault
