---
# First-party APP images (wedding-app, ascoachingogvaner, …) — signed by the
# shared publish-app.yaml workflow (in actions, or reusable-workflows before it
# was archived into actions), the same identity their Flux OCIRepository verify
# blocks pin. The match EXCLUDES ksail images:
# a matched image is verified by this policy's attestor before the CEL
# expression runs, so letting ksail images match here would fail them
# against the wrong identity.
apiVersion: policies.kyverno.io/v1
kind: ImageValidatingPolicy
metadata:
  name: verify-app-images
  annotations:
    policies.kyverno.io/title: Verify First-Party App Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Requires keyless cosign signatures from a devantler-tech release
      pipeline on all non-ksail ghcr.io/devantler-tech/* container images
      at Pod admission — the shared publish-app workflow for app images,
      and a Crossplane provider repo's own publish-provider-package
      workflow for provider-upjet-* packages (each class verified ONLY
      against its own identity). Third-party images admit unverified.
spec:
  failurePolicy: Fail
  validationActions: [Deny]
  evaluation:
    admission:
      enabled: true
    background:
      enabled: false
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE]
        resources: [pods]
  matchImageReferences:
    # The expression variable for image references is `ref`.
    - expression: >-
        ref.startsWith('ghcr.io/devantler-tech/') &&
        !ref.startsWith('ghcr.io/devantler-tech/ksail')
  credentials:
    secrets: [ghcr-auth]
  validationConfigurations:
    required: true
    verifyDigest: false
    mutateDigest: false
  attestors:
    - name: publishapp
      cosign:
        keyless:
          # The publish-app workflow moved from reusable-workflows into the
          # actions monorepo (reusable-workflows is being archived); both
          # identities are accepted during the transition via ONE identity
          # whose subjectRegExp alternates the repo — the same shape as the
          # tenants' Flux OCIRepository verify blocks. Do NOT list a second
          # identity entry instead: the IVPOL engine verifies cosign v3
          # bundles through sigstore-go, which rejects more than one identity
          # per verification ("unsupported: multiple identities are not
          # supported at this time" — sigstore/cosign pkg/cosign/verify.go),
          # so a second entry fail-closes EVERY image this attestor gates
          # (observed live 2026-07-04: wedding-app v1.14.1 denied at
          # admission for hours, wedging the whole merge queue). Narrow the
          # alternation to actions-only once every first-party app image in
          # prod ships actions-signed.
          identities:
            - issuer: https://token.actions.githubusercontent.com
              subjectRegExp: ^https://github\.com/devantler-tech/(actions|reusable-workflows)/\.github/workflows/publish-app\.yaml@.+$
    # Crossplane provider packages (provider-upjet-*): the crossplane-contrib
    # reusable publish workflow they use cannot sign, so each provider repo
    # attaches the keyless signature in its own publish-provider-package.yml
    # follow-up job (provider-upjet-unifi#12), which is the workflow identity
    # Fulcio certifies. Their package-runtime Deployments run the package
    # image itself, so without this identity every devantler-tech provider
    # pod is denied at admission (observed on prod 2026-07-02:
    # provider-upjet-unifi stuck 0/1, the whole UniFi Crossplane migration
    # stalled). Kept as a SEPARATE attestor, verified only against
    # provider-upjet-* images in the validations below — folding it into
    # publishapp would let a provider-workflow signature satisfy
    # verification for ANY app image (identities within one attestor are
    # OR'd per image).
    - name: publishprovider
      cosign:
        keyless:
          identities:
            - issuer: https://token.actions.githubusercontent.com
              subjectRegExp: ^https://github\.com/devantler-tech/provider-upjet-[a-z0-9-]+/\.github/workflows/publish-provider-package\.yml@.+$
  validations:
    - expression: >-
        (images.containers + images.initContainers + images.ephemeralContainers)
        .filter(image, image.startsWith('ghcr.io/devantler-tech/') && !image.startsWith('ghcr.io/devantler-tech/ksail') && !image.startsWith('ghcr.io/devantler-tech/provider-upjet-'))
        .map(image, verifyImageSignatures(image, [attestors.publishapp]))
        .all(e, e > 0)
      message: >-
        first-party app image is not signed by the publish-app release
        pipeline (keyless cosign, actions/reusable-workflows publish-app.yaml
        identity)
    - expression: >-
        (images.containers + images.initContainers + images.ephemeralContainers)
        .filter(image, image.startsWith('ghcr.io/devantler-tech/provider-upjet-'))
        .map(image, verifyImageSignatures(image, [attestors.publishprovider]))
        .all(e, e > 0)
      message: >-
        provider-upjet package image is not signed by its repo's
        publish-provider-package workflow (keyless cosign)
