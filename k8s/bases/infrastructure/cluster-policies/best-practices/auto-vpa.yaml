# TODO: Upstream `auto-vpa.yaml` to Kyverno policies repository.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: auto-vpa
  annotations:
    policies.kyverno.io/title: Auto VPA
    policies.kyverno.io/category: Autoscaling
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: Deployment,StatefulSet,DaemonSet
    policies.kyverno.io/description: >-
      Generates a VerticalPodAutoscaler for every Deployment, StatefulSet,
      and DaemonSet outside kube-system. VPA controls both CPU and memory
      to ensure workloads do not over-request resources. KEDA-managed
      workloads use HTTP request rate (not CPU) for horizontal scaling,
      so VPA CPU management does not conflict.
spec:
  rules:
    - name: generate-vpa-for-deployment
      match:
        resources:
          kinds:
            - Deployment
      exclude:
        resources:
          namespaces:
            - kube-system
      generate:
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "{{request.object.metadata.name}}"
        namespace: "{{request.object.metadata.namespace}}"
        synchronize: true
        data:
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: Deployment
              name: "{{request.object.metadata.name}}"
            updatePolicy:
              updateMode: "Auto"
              minReplicas: 1
            resourcePolicy:
              containerPolicies:
                - containerName: "*"
                  controlledResources: ["cpu", "memory"]
                  minAllowed:
                    cpu: "50m"
                    memory: "128Mi"
    - name: generate-vpa-for-statefulset
      match:
        resources:
          kinds:
            - StatefulSet
      exclude:
        resources:
          namespaces:
            - kube-system
      generate:
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "{{request.object.metadata.name}}"
        namespace: "{{request.object.metadata.namespace}}"
        synchronize: true
        data:
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: StatefulSet
              name: "{{request.object.metadata.name}}"
            updatePolicy:
              updateMode: "Auto"
              minReplicas: 1
            resourcePolicy:
              containerPolicies:
                - containerName: "*"
                  controlledResources: ["cpu", "memory"]
                  minAllowed:
                    cpu: "50m"
                    memory: "128Mi"
    - name: generate-vpa-for-daemonset
      match:
        resources:
          kinds:
            - DaemonSet
      exclude:
        resources:
          namespaces:
            - kube-system
      generate:
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "{{request.object.metadata.name}}"
        namespace: "{{request.object.metadata.namespace}}"
        synchronize: true
        data:
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: DaemonSet
              name: "{{request.object.metadata.name}}"
            updatePolicy:
              updateMode: "Auto"
              minReplicas: 1
            resourcePolicy:
              containerPolicies:
                - containerName: "*"
                  controlledResources: ["cpu", "memory"]
                  minAllowed:
                    cpu: "50m"
                    memory: "128Mi"
