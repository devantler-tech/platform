# TODO: Upstream `auto-vpa.yaml` to Kyverno policies repository.
#
# kube-system is intentionally NOT excluded: its controllers (cilium,
# cilium-envoy, spire-agent, coredns, metrics-server, hubble, hcloud
# ccm/csi, tetragon, cluster-autoscaler) carry ~10Gi of hand-tuned request
# floors that VPA can right-size to observed usage instead. Static
# control-plane pods (kube-apiserver/etcd/scheduler/controller-manager) are
# bare Pods, not Deployment/StatefulSet/DaemonSet, so they never match.
#
# IN-PLACE RESIZE (no eviction) is active. InPlacePodVerticalScaling went GA
# in k8s 1.35 (KEP-1287) and prod runs v1.35.5; VPA is 1.6 (its own
# InPlaceOrRecreate gate has defaulted on since 1.5) and the rules below set
# updateMode InPlaceOrRecreate, so VPA right-sizes pods in place instead of
# evicting them. spire-server (StatefulSet) uses updateMode Initial and is
# never evicted regardless.
#
# (Historical: on k8s < 1.33 the gate was alpha/off and InPlaceOrRecreate
# fell back to Recreate -- VPA applied a recommendation by EVICTING the pod,
# a one-time per-node datapath blip for the kube-system DaemonSets
# (cilium / spire-agent). That round is in the past now prod is well past
# 1.33.)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: auto-vpa
  annotations:
    policies.kyverno.io/title: Auto VPA
    policies.kyverno.io/category: Autoscaling
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: Deployment,StatefulSet,DaemonSet
    policies.kyverno.io/description: >-
      Generates a VerticalPodAutoscaler for every Deployment, StatefulSet,
      and DaemonSet in every namespace, including kube-system, so the
      cluster's control-plane add-ons and datapath controllers are
      right-sized to observed usage too. VPA controls both CPU and memory
      to ensure workloads do not over-request resources. KEDA-managed
      workloads use HTTP request rate (not CPU) for horizontal scaling,
      so VPA CPU management does not conflict.
spec:
  rules:
    - name: generate-vpa-for-deployment
      match:
        resources:
          kinds:
            - Deployment
      generate:
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "{{request.object.metadata.name}}"
        namespace: "{{request.object.metadata.namespace}}"
        synchronize: true
        data:
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: Deployment
              name: "{{request.object.metadata.name}}"
            updatePolicy:
              updateMode: "InPlaceOrRecreate"
              minReplicas: 1
            resourcePolicy:
              containerPolicies:
                - containerName: "*"
                  controlledResources: ["cpu", "memory"]
                  # RequestsAndLimits (not RequestsOnly): VPA also scales each
                  # container's limit in proportion to the request it sets,
                  # preserving the authored limit:request ratio. Under
                  # RequestsOnly the limit stayed fixed, so any workload whose
                  # VPA target outgrew its static memory limit was capped below
                  # its known need and OOMKilled (e.g. a metrics/log store whose
                  # target outgrew its static limit). The request is bounded by maxAllowed
                  # below; CPU limits only loosen (less throttling, no OOM).
                  controlledValues: RequestsAndLimits
                  minAllowed:
                    # CPU floor lowered 50m->15m: live data showed 87 containers
                    # pinned at the 50m floor using avg 4.4m — VPA was floored,
                    # not the workloads. CPU is compressible; 15m covers observed
                    # usage with margin and frees ~3 cores of reserved-unused
                    # requests. Memory floor kept at 64Mi (memory runs ~89% hot).
                    cpu: "15m"
                    memory: "64Mi"
                  # Upper bound: stops a leaking/runaway workload from having
                  # its request pushed to an unschedulable size or silently
                  # forcing an autoscaler node. 3 CPU / 6Gi still fits a cx33
                  # worker (the largest node type). Tune against live VPA
                  # recommendations (kubectl get vpa -A).
                  maxAllowed:
                    cpu: "3"
                    memory: "6Gi"
    - name: generate-vpa-for-statefulset
      match:
        resources:
          kinds:
            - StatefulSet
      generate:
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "{{request.object.metadata.name}}"
        namespace: "{{request.object.metadata.namespace}}"
        synchronize: true
        data:
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: StatefulSet
              name: "{{request.object.metadata.name}}"
            updatePolicy:
              # StatefulSets here are singletons backed by ReadWriteOnce hcloud
              # volumes. Evicting such a pod to apply a recommendation reschedules
              # it before the old VolumeAttachment releases, causing a Multi-Attach
              # error and an outage (this took down fleetdm-mysql + the fleet API).
              # "Initial" still right-sizes pods at creation but never evicts a
              # running stateful pod, so recommendations land on the next natural
              # restart (rollout, node maintenance) instead of mid-flight.
              updateMode: "Initial"
            resourcePolicy:
              containerPolicies:
                - containerName: "*"
                  controlledResources: ["cpu", "memory"]
                  # RequestsAndLimits (not RequestsOnly): VPA also scales each
                  # container's limit in proportion to the request it sets,
                  # preserving the authored limit:request ratio. Under
                  # RequestsOnly the limit stayed fixed, so any workload whose
                  # VPA target outgrew its static memory limit was capped below
                  # its known need and OOMKilled (e.g. a metrics/log store whose
                  # target outgrew its static limit). The request is bounded by maxAllowed
                  # below; CPU limits only loosen (less throttling, no OOM).
                  controlledValues: RequestsAndLimits
                  minAllowed:
                    # CPU floor lowered 50m->15m: live data showed 87 containers
                    # pinned at the 50m floor using avg 4.4m — VPA was floored,
                    # not the workloads. CPU is compressible; 15m covers observed
                    # usage with margin and frees ~3 cores of reserved-unused
                    # requests. Memory floor kept at 64Mi (memory runs ~89% hot).
                    cpu: "15m"
                    memory: "64Mi"
                  # Upper bound: stops a leaking/runaway workload from having
                  # its request pushed to an unschedulable size or silently
                  # forcing an autoscaler node. 3 CPU / 6Gi still fits a cx33
                  # worker (the largest node type). Tune against live VPA
                  # recommendations (kubectl get vpa -A).
                  maxAllowed:
                    cpu: "3"
                    memory: "6Gi"
    - name: generate-vpa-for-daemonset
      match:
        resources:
          kinds:
            - DaemonSet
      generate:
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "{{request.object.metadata.name}}"
        namespace: "{{request.object.metadata.namespace}}"
        synchronize: true
        data:
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: DaemonSet
              name: "{{request.object.metadata.name}}"
            updatePolicy:
              updateMode: "InPlaceOrRecreate"
              minReplicas: 1
            resourcePolicy:
              containerPolicies:
                - containerName: "*"
                  controlledResources: ["cpu", "memory"]
                  # RequestsAndLimits (not RequestsOnly): VPA also scales each
                  # container's limit in proportion to the request it sets,
                  # preserving the authored limit:request ratio. Under
                  # RequestsOnly the limit stayed fixed, so any workload whose
                  # VPA target outgrew its static memory limit was capped below
                  # its known need and OOMKilled (e.g. a metrics/log store whose
                  # target outgrew its static limit). The request is bounded by maxAllowed
                  # below; CPU limits only loosen (less throttling, no OOM).
                  controlledValues: RequestsAndLimits
                  minAllowed:
                    # CPU floor lowered 50m->15m: live data showed 87 containers
                    # pinned at the 50m floor using avg 4.4m — VPA was floored,
                    # not the workloads. CPU is compressible; 15m covers observed
                    # usage with margin and frees ~3 cores of reserved-unused
                    # requests. Memory floor kept at 64Mi (memory runs ~89% hot).
                    cpu: "15m"
                    memory: "64Mi"
                  # Lower upper bound than Deployments/StatefulSets: a DaemonSet
                  # pod must schedule on EVERY node, including autoscale-cx23
                  # workers (2 vCPU / 4 GB). Bound it to fit a cx23 next to
                  # the other per-node agents; this still covers the heaviest
                  # auto-VPA'd DaemonSet observed (kubescape node-agent ~0.7Gi).
                  maxAllowed:
                    cpu: "1"
                    memory: "1Gi"
