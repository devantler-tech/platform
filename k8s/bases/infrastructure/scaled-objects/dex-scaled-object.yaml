apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: dex
  namespace: dex
spec:
  scaleTargetRef:
    name: dex
  minReplicaCount: 1
  maxReplicaCount: ${dex_max_replicas:=4}
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
