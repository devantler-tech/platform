---
# RBAC for the vault-config Job's store-keys init container.
# Allows creating/updating the openbao-unseal Secret after auto-initialization.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-config
  namespace: openbao
rules:
  # create cannot be restricted by resourceNames; scoped by namespace
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "update", "patch"]
    resourceNames: ["openbao-unseal"]
