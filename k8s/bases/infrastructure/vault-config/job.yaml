# Idempotent Job that initializes and configures OpenBao:
#
# Init containers:
#   1. vault-init  — waits for OpenBao, auto-initializes if needed, unseals
#                    EVERY raft pod individually (per-pod headless DNS — the
#                    round-robin `openbao` Service must never be used for
#                    init/unseal: consecutive requests land on different pods,
#                    which is exactly the "double-init split-brain" and
#                    "unseal-before-join" risk pair called out in
#                    docs/dr/openbao-raft-ha-migration.md)
#   2. store-keys  — persists unseal key + root token in a K8s Secret
#
# Main container (vault-config):
#   1. Enables KV v2 secrets engine
#   2. Enables Kubernetes auth method
#   3. Configures Kubernetes auth (in-cluster auto-discovery for CA + token reviewer)
#   4. Creates least-privilege policies
#   5. Creates auth roles mapping ServiceAccounts to policies
#   6. Configures OIDC auth (Dex) for human admin access
#   7. Configures the Database secrets engine for fleetdm MySQL rotation
#
# The file audit device is declared in the openbao HelmRelease config
# (declarative-only — OpenBao rejects runtime audit enables via API),
# so no runtime step is needed here for auditing.
#
# On fresh install the init containers auto-initialize the vault and create
# the openbao-unseal Secret. On Velero restore the Secret and PVC are both
# restored, so the postStart hook on the server pod already unseals — the
# init containers detect this and skip initialization.
#
# Safe to re-run — every step checks state before writing.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-config
  namespace: openbao
  annotations:
    # Force-recreate this Job when its spec drifts from the desired state.
    # Jobs are immutable, so without this Flux cannot reapply spec changes.
    # The Job script itself is idempotent — each command checks state first.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  # Auto-delete the Job (and its pods) 10 minutes after completion. Without
  # this, the `kustomize.toolkit.fluxcd.io/force: enabled` annotation above
  # makes Flux delete-and-recreate the Job on any spec change, orphaning the
  # previous Job's pods (they keep their original ownerReference UID, which
  # no longer matches anything, so the GC controller never reaps them).
  ttlSecondsAfterFinished: 600
  # Higher backoffLimit because openbao bootstrap can take 20-40 min on
  # cold CI runners — too low and the Job hits BackoffLimitExceeded before
  # openbao is fully ready, even though the script is idempotent and
  # would succeed on a later retry.
  backoffLimit: 30
  # Bound total Job runtime so a permanently-stuck pod doesn't run forever.
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app: vault-config
    spec:
      serviceAccountName: vault-config
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
        - name: unseal-keys
          secret:
            secretName: openbao-unseal
            optional: true
        - name: shared
          emptyDir:
            medium: Memory
        - name: oidc-secrets
          secret:
            secretName: vault-config-oidc
            optional: true
      initContainers:
        # --- 1. Auto-init + unseal ---
        - name: vault-init
          image: quay.io/openbao/openbao:2.5.3@sha256:fdc6da21ca6963560c32336fd7feb9cf2d5e52668f1a1647205a4b41171f0806
          # No BAO_ADDR env: the script addresses each pod explicitly through
          # the openbao-internal headless Service (publishNotReadyAddresses:
          # true, so per-pod DNS resolves even before readiness).
          volumeMounts:
            - name: unseal-keys
              mountPath: /openbao/unseal
              readOnly: true
            - name: shared
              mountPath: /shared
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          command:
            - /bin/sh
            - -ec
            - |
              # `openbao_replicas` is replaced by Flux post-build substitution
              # (same variable the HelmRelease uses); shell never sees it.
              REPLICAS="${openbao_replicas:=1}"
              LAST=$((REPLICAS - 1))

              addr() { echo "http://openbao-$1.openbao-internal:8200"; }
              pod_status() { BAO_ADDR="$(addr "$1")" bao status -format=json 2>/dev/null || true; }

              echo "Waiting for openbao-0 to be reachable..."
              until pod_status 0 | grep -q '"initialized"'; do
                echo "  ...openbao-0 not reachable yet"
                sleep 3
              done
              echo "openbao-0 is reachable."

              # Initialize EXACTLY ONCE, on openbao-0, and only when NO pod
              # reports an existing cluster. A fresh openbao-0 can report
              # initialized:false while peers already hold raft data (it
              # retry_joins only once a leader is unsealed) — initializing it
              # then would split-brain the cluster.
              ANY_INITIALIZED=false
              for i in $(seq 0 $LAST); do
                if pod_status "$i" | grep -q '"initialized": true'; then
                  ANY_INITIALIZED=true
                fi
              done

              if [ "$ANY_INITIALIZED" = "false" ]; then
                # Data-loss guard: keys in openbao-unseal mean a cluster was
                # initialized before. If on top of that NO pod reports an
                # initialized barrier, the raft data is missing or unreadable —
                # auto-initializing here would silently bring up an EMPTY vault
                # and overwrite the previous unseal key + root token (exactly
                # how the 2026-06-10 incident destroyed the whole KV store).
                # Fail loudly instead and make the operator acknowledge the
                # data loss explicitly before a fresh init is allowed.
                if [ -f /openbao/unseal/unseal-key ]; then
                  echo "ERROR: no pod reports an initialized vault, but the openbao-unseal"
                  echo "Secret still holds keys from a previously initialized cluster."
                  echo "Refusing to auto-initialize: that would create an empty vault and"
                  echo "overwrite the old keys, making any surviving data unrecoverable."
                  echo ""
                  echo "Recover the data first (Velero restore / reattach the old data"
                  echo "PVCs) and re-run this Job. If the data loss is confirmed and a"
                  echo "fresh vault is intended, acknowledge it explicitly with:"
                  echo "  kubectl delete secret openbao-unseal -n openbao"
                  echo "and let the next Job run initialize from scratch."
                  exit 1
                fi
                echo "No initialized pod found — running bao operator init on openbao-0..."
                INIT_OUTPUT=$(BAO_ADDR="$(addr 0)" bao operator init -key-shares=1 -key-threshold=1)

                UNSEAL_KEY=$(echo "$INIT_OUTPUT" | grep "Unseal Key 1:" | sed 's/.*: //')
                ROOT_TOKEN=$(echo "$INIT_OUTPUT" | grep "Initial Root Token:" | sed 's/.*: //')

                if [ -z "$UNSEAL_KEY" ] || [ -z "$ROOT_TOKEN" ]; then
                  echo "ERROR: failed to parse init output (unseal key or root token missing)."
                  echo "Refusing to print raw output because it may contain secret material."
                  exit 1
                fi

                printf '%s' "$UNSEAL_KEY" > /shared/unseal-key
                printf '%s' "$ROOT_TOKEN" > /shared/root-token
                touch /shared/newly-initialized
                echo "Vault initialized on openbao-0."
              else
                echo "Vault is already initialized."

                # Copy keys from the mounted Secret (Velero restore or previous init)
                if [ -f /openbao/unseal/unseal-key ] && [ -f /openbao/unseal/root-token ]; then
                  cat /openbao/unseal/unseal-key > /shared/unseal-key
                  cat /openbao/unseal/root-token > /shared/root-token
                elif [ -f /openbao/unseal/unseal-key ]; then
                  echo "WARNING: unseal-key present but root-token missing from openbao-unseal Secret."
                  echo "Restore the Secret from Velero backup or delete it and re-initialize."
                  cat /openbao/unseal/unseal-key > /shared/unseal-key
                fi
              fi

              if [ ! -f /shared/unseal-key ]; then
                echo "ERROR: vault is initialized but no unseal key is available."
                echo "Restore the openbao-unseal Secret from Velero backup or re-initialize."
                exit 1
              fi
              UNSEAL_KEY=$(cat /shared/unseal-key)

              # Unseal EVERY pod individually. Followers join the raft cluster
              # via retry_join only after a leader is unsealed, so loop until
              # all pods are unsealed or attempts run out. A wrong-key unseal
              # attempt fails harmlessly (logged) and never mutates state.
              ATTEMPTS=36
              while [ $ATTEMPTS -gt 0 ]; do
                ALL_UNSEALED=true
                for i in $(seq 0 $LAST); do
                  STATUS=$(pod_status "$i")
                  if echo "$STATUS" | grep -q '"sealed": false'; then
                    continue
                  fi
                  ALL_UNSEALED=false
                  if echo "$STATUS" | grep -q '"sealed": true'; then
                    echo "Unsealing openbao-$i..."
                    BAO_ADDR="$(addr "$i")" bao operator unseal "$UNSEAL_KEY" >/dev/null \
                      || echo "WARNING: unseal of openbao-$i failed (not joined yet, or key mismatch)"
                  else
                    echo "openbao-$i not reachable yet"
                  fi
                done
                if [ "$ALL_UNSEALED" = "true" ]; then
                  echo "All $REPLICAS pod(s) unsealed."
                  break
                fi
                ATTEMPTS=$((ATTEMPTS - 1))
                sleep 5
              done

              # Job succeeds if at least one pod is unsealed (the active
              # Service then has an endpoint); stragglers are logged above and
              # re-tried on every reconcile re-run of this Job.
              UNSEALED_ANY=false
              for i in $(seq 0 $LAST); do
                if pod_status "$i" | grep -q '"sealed": false'; then
                  UNSEALED_ANY=true
                fi
              done
              if [ "$UNSEALED_ANY" = "false" ]; then
                echo "ERROR: no pod could be unsealed — the stored key may not match this cluster."
                echo "See docs/dr/openbao-raft-ha-migration.md for recovery."
                exit 1
              fi
              echo "Unseal phase complete."
        # --- 2. Persist credentials in K8s Secret (only on fresh init) ---
        - name: store-keys
          image: alpine/k8s:1.36.1@sha256:692239d739589247c4a791205ed9619c28ae85a21286e19a6211c04a62c56668
          volumeMounts:
            - name: shared
              mountPath: /shared
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          command:
            - /bin/sh
            - -ec
            - |
              if [ -f /shared/newly-initialized ]; then
                echo "Storing vault credentials in openbao-unseal Secret..."
                kubectl create secret generic openbao-unseal \
                  --namespace=openbao \
                  --from-file=unseal-key=/shared/unseal-key \
                  --from-file=root-token=/shared/root-token \
                  --dry-run=client -o yaml | kubectl apply -f -
                echo "Secret openbao-unseal created."
              else
                echo "Vault was already initialized — no new keys to store."
              fi
      containers:
        - name: vault-config
          image: quay.io/openbao/openbao:2.5.3@sha256:fdc6da21ca6963560c32336fd7feb9cf2d5e52668f1a1647205a4b41171f0806
          env:
            - name: BAO_ADDR
              # openbao-active = unsealed Raft leader only. Configuration
              # writes must not round-robin onto sealed-but-Ready standbys
              # (503 "Vault is sealed").
              value: http://openbao-active.openbao.svc.cluster.local:8200
          volumeMounts:
            - name: shared
              mountPath: /shared
              readOnly: true
            - name: oidc-secrets
              mountPath: /vault-config/oidc
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          command:
            - /bin/sh
            - -ec
            - |
              set -e

              ROOT_TOKEN=$(cat /shared/root-token 2>/dev/null || true)
              if [ -z "$ROOT_TOKEN" ]; then
                echo "ERROR: root-token not available."
                echo "The vault-init container should have populated /shared/root-token."
                exit 1
              fi
              export BAO_TOKEN="$ROOT_TOKEN"

              # Wait for OpenBao to be unsealed
              echo "Waiting for OpenBao to be ready..."
              until bao status -format=json 2>/dev/null | grep -q '"sealed": false'; do
                echo "  ...waiting (sealed or unavailable)"
                sleep 5
              done
              echo "OpenBao is unsealed and ready."

              # --- 1. Enable KV v2 secrets engine ---
              if ! bao secrets list -format=json | grep -q '"secret/"'; then
                echo "Enabling KV v2 secrets engine at secret/..."
                bao secrets enable -path=secret -version=2 kv
              else
                echo "KV v2 already enabled at secret/."
              fi

              # --- 2. Enable Kubernetes auth ---
              if ! bao auth list -format=json | grep -q '"kubernetes/"'; then
                echo "Enabling Kubernetes auth method..."
                bao auth enable kubernetes
              else
                echo "Kubernetes auth already enabled."
              fi

              # --- 3. Configure Kubernetes auth ---
              # OpenBao auto-discovers the cluster CA and SA token when running
              # in-cluster, so only kubernetes_host is required.
              echo "Configuring Kubernetes auth..."
              bao write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc.cluster.local:443"

              # --- 4. Create policies ---
              echo "Writing vault policies..."

              bao policy write infra-backup-readonly - <<'POLICY'
              path "secret/data/infrastructure/backup/*" {
                capabilities = ["read"]
              }
              POLICY

              bao policy write infra-dns-readonly - <<'POLICY'
              path "secret/data/infrastructure/dns/*" {
                capabilities = ["read"]
              }
              POLICY

              bao policy write infra-monitoring-readonly - <<'POLICY'
              path "secret/data/infrastructure/monitoring/*" {
                capabilities = ["read"]
              }
              POLICY

              bao policy write infra-hcloud-readonly - <<'POLICY'
              path "secret/data/infrastructure/hcloud/*" {
                capabilities = ["read"]
              }
              POLICY

              bao policy write infra-tls-readonly - <<'POLICY'
              path "secret/data/infrastructure/tls/*" {
                capabilities = ["read"]
              }
              POLICY

              # Read the shared GHCR image-pull credential. Consumed by the
              # platform-authored `ghcr-auth` ExternalSecrets in the tenant
              # namespaces via the `external-secrets` ClusterSecretStore role, so
              # tenants get their pull secret from OpenBao instead of a per-tenant
              # SOPS file. Platform-side, not a tenant secret: those ExternalSecrets
              # are reconciled by flux-system, never by a tenant ServiceAccount.
              bao policy write infra-ghcr-readonly - <<'POLICY'
              path "secret/data/infrastructure/ghcr/*" {
                capabilities = ["read"]
              }
              POLICY

              bao policy write app-fleetdm-readonly - <<'POLICY'
              path "secret/data/apps/fleetdm/*" {
                capabilities = ["read"]
              }
              POLICY

              # Read the OpenBao-rotated MySQL credential for the fleet app user
              # (Database secrets engine static role). Consumed by ESO via the
              # VaultDynamicSecret generator in the fleetdm namespace.
              bao policy write app-fleetdm-db-readonly - <<'POLICY'
              path "database/static-creds/fleet" {
                capabilities = ["read"]
              }
              POLICY

              # Read the OpenBao-rotated PostgreSQL credential for the umami app
              # user (Database secrets engine static role). Consumed by ESO via
              # the VaultDynamicSecret generator in the umami namespace.
              bao policy write app-umami-db-readonly - <<'POLICY'
              path "database/static-creds/umami" {
                capabilities = ["read"]
              }
              POLICY

              bao policy write app-wedding-readonly - <<'POLICY'
              path "secret/data/apps/wedding-app/*" {
                capabilities = ["read"]
              }
              POLICY

              # Tenant-scoped policy for wedding-app's OWN namespaced SecretStore
              # (k8s/bases/apps/wedding-app/secretstore.yaml) and the ExternalSecret
              # the tenant ships in its deploy/ artifact. Read + seed-write, confined
              # to secret/{data,metadata}/apps/wedding-app/* so the tenant can both
              # seed (generator/PushSecret) and read its own app secrets and can
              # never reach infra or another tenant's path. Bound via the dedicated
              # `wedding-app` Kubernetes auth role below — NOT the broad shared
              # `external-secrets` role used by the ClusterSecretStore.
              bao policy write app-wedding-app - <<'POLICY'
              path "secret/data/apps/wedding-app/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/apps/wedding-app/*" {
                capabilities = ["create", "update", "read"]
              }
              POLICY

              bao policy write app-umami-readonly - <<'POLICY'
              path "secret/data/apps/umami/*" {
                capabilities = ["read"]
              }
              POLICY

              bao policy write infra-oidc-readonly - <<'POLICY'
              path "secret/data/infrastructure/oidc/*" {
                capabilities = ["read"]
              }
              POLICY

              bao policy write vault-snapshot-readonly - <<'POLICY'
              path "sys/health" {
                capabilities = ["read"]
              }
              POLICY

              bao policy write vault-admin - <<'POLICY'
              path "*" {
                capabilities = ["create", "read", "update", "delete", "list", "sudo"]
              }
              POLICY

              bao policy write vault-seed-write - <<'POLICY'
              # Write access for seeding vault from PushSecrets.
              # Paths must be at least as specific as the read-only policies
              # because Vault ACL uses most-specific-path-wins resolution.
              path "secret/data/infrastructure/backup/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/infrastructure/dns/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/infrastructure/monitoring/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/infrastructure/hcloud/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/infrastructure/tls/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/infrastructure/oidc/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/infrastructure/git/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/infrastructure/ghcr/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/apps/fleetdm/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/apps/wedding-app/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/apps/umami/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/data/flux/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/infrastructure/backup/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/infrastructure/dns/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/infrastructure/monitoring/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/infrastructure/hcloud/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/infrastructure/tls/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/infrastructure/oidc/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/infrastructure/git/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/infrastructure/ghcr/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/apps/fleetdm/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/apps/wedding-app/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/apps/umami/*" {
                capabilities = ["create", "update", "read"]
              }
              path "secret/metadata/flux/*" {
                capabilities = ["create", "update", "read"]
              }
              POLICY

              # --- 5. Create auth roles ---
              echo "Writing Kubernetes auth roles..."

              # ESO needs broad read access for ExternalSecrets + write for PushSecrets.
              # This role is bound to the ESO controller's own SA via the
              # `openbao` ClusterSecretStore and covers KV-engine reads only.
              # The fleetdm MySQL Database-engine static credential is handled
              # by a separate, narrowly scoped role below — keep
              # app-fleetdm-db-readonly off this bundle.
              bao write auth/kubernetes/role/external-secrets \
                bound_service_account_names=external-secrets \
                bound_service_account_namespaces=external-secrets \
                policies=infra-backup-readonly,infra-dns-readonly,infra-monitoring-readonly,infra-hcloud-readonly,infra-tls-readonly,infra-ghcr-readonly,app-fleetdm-readonly,app-wedding-readonly,app-umami-readonly,infra-oidc-readonly,vault-seed-write \
                ttl=1h

              # Dedicated role for the fleetdm VaultDynamicSecret generator.
              # The generator authenticates with the `external-secrets` SA in
              # the fleetdm namespace (the generator's own namespace — ESO
              # silently ignores serviceAccountRef.namespace for generators,
              # see ESO #4629). Scoped to the database static-creds read only.
              bao write auth/kubernetes/role/fleetdm-mysql-rotated \
                bound_service_account_names=external-secrets \
                bound_service_account_namespaces=fleetdm \
                policies=app-fleetdm-db-readonly \
                ttl=1h

              # Dedicated role for the umami VaultDynamicSecret generator (the
              # `external-secrets` SA in the umami namespace — same ESO #4629
              # constraint as fleetdm). Scoped to the umami DB static-creds read.
              bao write auth/kubernetes/role/umami-db-rotated \
                bound_service_account_names=external-secrets \
                bound_service_account_namespaces=umami \
                policies=app-umami-db-readonly \
                ttl=1h

              # Dedicated tenant role for wedding-app. Authenticates the tenant's
              # own `wedding-app` ServiceAccount (used by its namespaced
              # SecretStore + deploy/ ExternalSecret) and carries ONLY the
              # path-scoped `app-wedding-app` policy — never the broad
              # `external-secrets` bundle — so the tenant is confined to
              # secret/{data,metadata}/apps/wedding-app/*. This is what lets
              # wedding-app source its app secrets from OpenBao via a namespaced
              # store instead of SOPS, with per-tenant Vault isolation.
              bao write auth/kubernetes/role/wedding-app \
                bound_service_account_names=wedding-app \
                bound_service_account_namespaces=wedding-app \
                policies=app-wedding-app \
                ttl=1h

              # Snapshot CronJob needs health check read
              bao write auth/kubernetes/role/vault-snapshot \
                bound_service_account_names=vault-snapshot \
                bound_service_account_namespaces=openbao \
                policies=vault-snapshot-readonly \
                ttl=15m

              # --- 6. Enable OIDC auth (Dex) ---
              if ! bao auth list -format=json | grep -q '"oidc/"'; then
                echo "Enabling OIDC auth method..."
                bao auth enable oidc
              else
                echo "OIDC auth already enabled."
              fi

              DEX_SECRET=$(cat /vault-config/oidc/dex-client-secret 2>/dev/null || echo "")
              if [ -n "$DEX_SECRET" ]; then
                # Dex lives in the 'infrastructure' Flux layer and isn't
                # reachable when this Job first runs from
                # 'infrastructure-controllers'. The OIDC config write
                # validates the discovery URL, so it will 400 until Dex is
                # up. Treat that as expected on first pass — Flux will
                # recreate this Job on the next reconcile once Dex is
                # ready (force annotation), and the block will succeed.
                echo "Configuring OIDC auth with Dex..."
                if bao write auth/oidc/config \
                  oidc_discovery_url="https://dex.${domain}" \
                  oidc_client_id="public-client" \
                  oidc_client_secret="$DEX_SECRET" \
                  default_role="admin"; then

                  bao write auth/oidc/role/admin \
                    bound_audiences="public-client" \
                    allowed_redirect_uris="https://vault.${domain}/ui/vault/auth/oidc/oidc/callback,http://localhost:8250/oidc/callback" \
                    user_claim="email" \
                    groups_claim="groups" \
                    oidc_scopes="openid,email,profile,groups" \
                    policies="vault-admin" \
                    ttl=8h

                  # Make OIDC the default auth method on the login page
                  bao auth tune -listing-visibility=unauth oidc/
                  echo "OIDC auth configured."
                else
                  echo "OIDC discovery URL not yet reachable (Dex not ready) -- skipping."
                  echo "It will be configured on the next vault-config reconciliation."
                fi
              else
                echo "OIDC secret not yet available -- skipping OIDC configuration."
                echo "It will be configured on the next vault-config reconciliation."
              fi

              # NOTE: the file audit device used to be enabled here at
              # runtime. OpenBao rejects that path -- `bao audit enable`
              # returns "cannot enable audit device via API; use
              # declarative, config-based audit device management
              # instead". The audit device is now declared in the
              # openbao HelmRelease's standalone.config HCL, alongside
              # listener and storage:
              #
              #   audit "file" {
              #     type    = "file"
              #     path    = "file/"
              #     options = {
              #       file_path = "/openbao/audit/audit.log"
              #     }
              #   }
              #
              # See https://openbao.org/docs/configuration/audit for the
              # full shape (both `type` and `path` are required). No
              # runtime step is needed for OpenBao to start auditing.

              # --- 7. Database secrets engine: fleetdm MySQL static-role rotation ---
              # OpenBao owns and periodically rotates the 'fleet' MySQL user's
              # password; ESO reads the current value via the VaultDynamicSecret
              # generator in the fleetdm namespace.
              if ! bao secrets list -format=json | grep -q '"database/"'; then
                echo "Enabling database secrets engine..."
                bao secrets enable database
              else
                echo "Database secrets engine already enabled."
              fi

              # OpenBao needs MySQL admin (root) creds to manage the fleet user;
              # the root password is seeded into KV by the fleetdm PushSecret.
              FLEET_DB_ROOT=$(bao kv get -mount=secret -field=mysql-root-password apps/fleetdm/mysql 2>/dev/null || echo "")
              if [ -n "$FLEET_DB_ROOT" ]; then
                # Writing the connection validates connectivity, so this 400s
                # until fleetdm-mysql is up (apps layer). Treat that as expected
                # on early passes -- Flux recreates this Job (force annotation)
                # and the block succeeds once MySQL is reachable.
                echo "Configuring fleetdm MySQL database connection..."
                if bao write database/config/fleetdm-mysql \
                  plugin_name=mysql-database-plugin \
                  allowed_roles="fleet" \
                  connection_url="{{username}}:{{password}}@tcp(fleetdm-mysql.fleetdm.svc.cluster.local:3306)/" \
                  username="root" \
                  password="$FLEET_DB_ROOT" 2>/dev/null; then

                  # Create the static role only if absent: creation triggers an
                  # initial rotation of the 'fleet' user's password (the fleetdm
                  # ExternalSecret + Reloader then pick it up). Guarding avoids
                  # re-rotating on every idempotent Job re-run. App user only,
                  # never root.
                  if ! bao read database/static-roles/fleet >/dev/null 2>&1; then
                    # Default rotation: 168h (7 days). Was 2160h (90 days)
                    # which gave a leaked credential a 90-day half-life.
                    # 7 days matches HashiCorp's documented sweet spot for
                    # interactive workloads (long enough that cache misses
                    # are rare, short enough that a leak is bounded).
                    # Overridable via the fleetdm_mysql_rotation_period
                    # cluster variable for fork operators with different
                    # constraints.
                    bao write database/static-roles/fleet \
                      db_name=fleetdm-mysql \
                      username="fleet" \
                      rotation_period="${fleetdm_mysql_rotation_period:=168h}"
                    echo "fleetdm MySQL static role created."
                  else
                    echo "fleetdm MySQL static role already exists."
                  fi
                else
                  echo "fleetdm MySQL not reachable yet -- skipping DB role config."
                  echo "It will be configured on the next vault-config reconciliation."
                fi
              else
                echo "fleetdm MySQL root credential not in KV yet -- skipping DB role config."
              fi

              # --- 8. Database secrets engine: umami PostgreSQL static-role rotation ---
              # OpenBao owns and rotates the 'umami' PostgreSQL user's password on
              # a 7-day static-role schedule; ESO reads the current value via the
              # VaultDynamicSecret generator in the umami namespace. The connection
              # admin is the CNPG-managed postgres superuser (stable, not rotated),
              # whose password is synced into KV by the umami db-superuser PushSecret.
              UMAMI_DB_SUPER=$(bao kv get -mount=secret -field=postgres-password apps/umami/db 2>/dev/null || echo "")
              if [ -n "$UMAMI_DB_SUPER" ]; then
                # Writing the connection validates connectivity, so this fails
                # until umami-db (CNPG, apps layer) is up. Treat that as expected
                # on early passes -- Flux recreates this Job (force annotation)
                # and the block succeeds once PostgreSQL is reachable.
                echo "Configuring umami PostgreSQL database connection..."
                if bao write database/config/umami-postgres \
                  plugin_name=postgresql-database-plugin \
                  allowed_roles="umami" \
                  connection_url="postgresql://{{username}}:{{password}}@umami-db-rw.umami.svc.cluster.local:5432/umami?sslmode=require" \
                  username="postgres" \
                  password="$UMAMI_DB_SUPER" 2>/dev/null; then

                  # Create the static role only if absent: creation triggers an
                  # initial rotation of the 'umami' user's password (the umami
                  # ExternalSecret then picks it up). Guarding avoids re-rotating
                  # on every idempotent Job re-run. App user only, never superuser.
                  if ! bao read database/static-roles/umami >/dev/null 2>&1; then
                    bao write database/static-roles/umami \
                      db_name=umami-postgres \
                      username="umami" \
                      rotation_period="${umami_db_rotation_period:=168h}"
                    echo "umami PostgreSQL static role created."
                  else
                    echo "umami PostgreSQL static role already exists."
                  fi
                else
                  echo "umami PostgreSQL not reachable yet -- skipping DB role config."
                  echo "It will be configured on the next vault-config reconciliation."
                fi
              else
                echo "umami PostgreSQL superuser credential not in KV yet -- skipping DB role config."
              fi

              echo "Vault configuration complete."
