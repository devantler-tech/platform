# The Coroot custom resource the operator reconciles into the full stack.
# Community Edition, self-hosted. Defaults are deliberately minimal so the
# install is feature-complete out of the box; the hetzner overlay patch adds
# persistent (hcloud) storage and prod notification wiring.
#
# LAYER PLACEMENT — DO NOT move this back next to the operator HelmRelease in
# `infrastructure/controllers/coroot/`. The operator chart ships the `Coroot`
# CRD, so a CR of that kind cannot live in the same Flux Kustomization as the
# operator: kustomize-controller server-side dry-runs the whole set at once,
# the CR fails with `no matches for kind "Coroot" in version "coroot.com/v1"`,
# and the entire `infrastructure-controllers` Kustomization aborts — which also
# blocks the operator that would have installed the CRD (a hard deadlock). This
# CR therefore lives in the `infrastructure` Kustomization, which `dependsOn`
# (and `wait: true`s for) `infrastructure-controllers`, so the operator is
# installed and the CRD is established before this resource is applied.
apiVersion: coroot.com/v1
kind: Coroot
metadata:
  name: coroot
  namespace: observability
spec:
  # Restart the Coroot server when its Postgres credential rotates. The server
  # reads the coroot-db password from the CNPG-managed `coroot-db-app` Secret via
  # a `secretKeyRef` env var (PG_PASSWORD) — env vars are resolved once at pod
  # start and never refreshed. CNPG regenerates that Secret whenever the coroot-db
  # cluster is (re)created (e.g. during node-churn recovery), so a long-running
  # server keeps presenting the OLD password and falls into a "password
  # authentication failed for user coroot" loop until it is manually restarted
  # (observed 2026-06-19, observability blind for hours). Reloader (deployed
  # cluster-wide, `--reload-strategy=annotations`) watches the named Secret and
  # rolls the server's pods on change; the annotation goes on the pod template via
  # podAnnotations, matching the platform's existing convention (auth-proxy,
  # oauth2-proxy, coredns).
  podAnnotations:
    secret.reloader.stakater.com/reload: coroot-db-app

  # COMPONENT IMAGE PINS. The operator does NOT bake a fixed tag into its
  # components: when an image is left unset it lists `ghcr.io/coroot/<component>`
  # on every reconcile and picks the highest semver tag (falling back to
  # `:latest` only if that listing fails), so the running coroot / node-agent /
  # cluster-agent versions FLOAT — non-deterministic and impossible to track for
  # CVEs, which is exactly how stale reachable base-image CVEs accrued (platform
  # #2149: coroot images flagged on `:latest`). Pinning each component's `.name`
  # to an explicit `registry/component:tag` ref short-circuits the operator's
  # auto-resolution (it early-returns on a non-empty `image.name`). NB the
  # ImageSpec has only a `name` field (full ref incl. tag) — there is NO separate
  # `tag`/`repository` subfield, and a bare string under `image:` is silently
  # ignored; the value MUST be `image.name`. CRITICAL: Coroot publishes its
  # container tags as BARE semver (`1.22.2`), NOT the `v`-prefixed GitHub
  # *release* tag (`v1.22.2`); a `v`-prefixed ref 404s on ghcr → ErrImagePull →
  # the operator's StatefulSet/DaemonSet rollout wedges and stalls the
  # infrastructure Kustomization health check. Always pin the bare tag. The
  # three pins below are kept
  # Renovate-trackable by a dedicated regex customManager in
  # `.github/renovate.json` (the built-in kubernetes manager only reads a bare
  # `image:` string, not this `image.name` mapping). There is no spec.version
  # field; the operator HelmRelease itself also stays Flux/Renovate-pinned.
  communityEdition:
    image:
      name: ghcr.io/coroot/coroot:1.22.2

  # CE has no native OIDC/SSO (Enterprise only), so the UI is fronted by the
  # existing oauth2-proxy (Dex) via httproute.yaml — exactly how Prometheus /
  # Alertmanager were exposed. Every request that clears the proxy is treated
  # as Admin, mirroring the old single-operator "everyone -> Grafana Admin".
  authAnonymousRole: Admin

  # Metric resolution. The operator default is 15s; 30s halves the bundled
  # Prometheus ingest, the node-agent scrape volume, and Coroot's continuous
  # query load on a memory-constrained cluster, while staying at the
  # conventional Prometheus scrape interval. Coupled setting: the Flagger
  # canary metric windows (canary*.yaml `metrics[].interval`) are sized to
  # keep >=4 samples per rate() window (Prometheus best practice), so they
  # must be >= 4x this value — currently 2m. Don't raise this without
  # widening those windows.
  metricsRefreshInterval: 30s
  cacheTTL: 30d

  # The Coroot app's own state (users, custom dashboards, UI-configured
  # integrations). Small; className comes from the hetzner overlay (hcloud).
  storage:
    size: 2Gi

  # Bundled Prometheus = the metrics TSDB. Kept as a real Prometheus (we do
  # NOT set storeMetricsInClickhouse) precisely so OpenCost can still query it
  # at http://coroot-prometheus.observability.svc.cluster.local:9090.
  #
  # SINGLE-INSTANCE BY DESIGN: the Coroot CRD's `prometheus` block exposes only
  # affinity/image/nodeSelector/outOfOrderTimeWindow/podAnnotations/resources/
  # retention/storage/tolerations — there is NO replicas/HA field (verified
  # against the coroot-operator v1.9.5 CRD). The bundled Prometheus is a
  # single-writer local-TSDB instance by design (HA Prometheus needs two
  # independent scrapers + dedup at query time, which the operator does not
  # model), so it is an operator-fixed singleton, not something we can scale.
  # Durability instead of HA: its PVC is hcloud-backed (hetzner overlay) and
  # Velero backs the observability namespace up daily.
  prometheus:
    retention: 7d
    storage:
      size: 10Gi

  # ClickHouse stores logs, traces and continuous profiles. Run it with
  # redundancy so a single node loss doesn't take the telemetry store down or
  # lose data (Coroot's own risk view flagged every component as "single
  # instance / all instances on one node"):
  #   - shards: 1 — one shard is enough data volume for this cluster; we want
  #     replication, not horizontal partitioning, so the shard count stays 1.
  #   - replicas: 2 — two replicas *within* the shard, so the data is mirrored
  #     and survives losing the node hosting either replica (ReplicatedMergeTree
  #     via Keeper). This is the replica/shard field the operator exposes
  #     (`spec.clickhouse.replicas`).
  #   - keeper.replicas: 3 — ClickHouse Keeper is a Raft cluster; it needs an
  #     ODD quorum to tolerate a failure. 1 keeper is a SPOF and 2 is INVALID
  #     (no majority on a split), so the minimum fault-tolerant size is 3
  #     (tolerates 1 keeper down). Field: `spec.clickhouse.keeper.replicas`.
  # Hard pod anti-affinity (one replica per node) makes the redundancy real —
  # without it the operator can schedule both ClickHouse replicas, or a keeper
  # majority, onto one node and a single node loss still takes quorum/data with
  # it. All nodes are in one Hetzner zone (fsn1), so the spread key is the node
  # hostname. The operator exposes only `affinity` (no topologySpreadConstraints
  # field), so anti-affinity is the available placement knob.
  clickhouse:
    shards: 1
    replicas: 2
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/part-of: coroot
                app.kubernetes.io/component: clickhouse
            topologyKey: kubernetes.io/hostname
    keeper:
      replicas: 3
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/part-of: coroot
                  app.kubernetes.io/component: clickhouse-keeper
              topologyKey: kubernetes.io/hostname
    storage:
      size: 10Gi
  logsTTL: 3d
  tracesTTL: 3d
  profilesTTL: 3d

  # eBPF node-agent runs on every node, including the tainted control planes.
  # platform-critical so per-node telemetry survives node memory pressure
  # (the operator only exposes priorityClassName on the node-agent, not on the
  # bundled Prometheus/ClickHouse).
  nodeAgent:
    # Pinned (see the COMPONENT IMAGE PINS note at the top of spec).
    image:
      name: ghcr.io/coroot/coroot-node-agent:1.33.3
    priorityClassName: platform-critical
    tolerations:
      - operator: Exists

  # cluster-agent is left at its default (enabled) — it provides the
  # kube-state-metrics-equivalent cluster inventory, replacing the standalone
  # kube-state-metrics from the prometheus stack.
  #
  # SINGLE-INSTANCE BY DESIGN: the Coroot CRD's `clusterAgent` block exposes only
  # affinity/env/image/kubeStateMetrics/nodeSelector/podAnnotations/resources/
  # tolerations — there is NO replicas/HA field (verified against the
  # coroot-operator v1.9.5 CRD). It is a singleton collector (one cluster-wide
  # inventory snapshot pushed to the Coroot server); a second instance would just
  # duplicate that push. So, like the bundled Prometheus, it is an operator-fixed
  # singleton, not something we can scale. A brief gap only delays inventory
  # refresh, not user-facing telemetry. The genuinely scalable pieces are the
  # server (replicas: 2, hetzner overlay), ClickHouse (2) and Keeper (3).
  # It stays at its default (enabled); only the image is pinned here (see the
  # COMPONENT IMAGE PINS note at the top of spec).
  clusterAgent:
    image:
      name: ghcr.io/coroot/coroot-cluster-agent:1.7.1
