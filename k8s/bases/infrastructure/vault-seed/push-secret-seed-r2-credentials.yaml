# PushSecrets seed OpenBao from SOPS-decrypted K8s Secrets.
# These push externally-sourced credentials that cannot be randomly generated.
# Randomly-generatable secrets are handled by the external-secret-generated-*
# and push-secret-push-* files.
#
# SOPS seeds BOOTSTRAP-CRITICAL values only. Upstream credentials whose
# consumers can safely wait (non-bootstrap workloads) are NOT seeded here —
# an operator writes them to OpenBao once, and they persist via the raft
# snapshot mirror (vault-backup/):
#   bao kv put secret/infrastructure/dns/cloudflare api_token=<token>
#   bao kv put secret/apps/fleetdm/license license-key=<key>
# On a from-zero rebuild WITHOUT a vault restore, cert-manager DNS01,
# external-dns, and fleetdm stay pending until those writes happen — see
# docs/dr/runbook.md scenario 4.
#
# refreshInterval 1h (not "0" = push-once): the source Secrets are durable
# (SOPS-decrypted by Flux, or generated in-cluster) and authoritative, so a
# periodic re-push is always a no-op while OpenBao is healthy — and it is
# what re-seeds the KV store automatically after OpenBao data loss. With
# push-once semantics the 2026-06-10 vault re-initialization left every
# consumer ExternalSecret in SecretSyncedError ("Secret does not exist")
# with no self-healing path.
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-r2-credentials
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      # R2 backup credentials are per-environment and live in the
      # cluster-scoped secret (variables-cluster) only. They are
      # bootstrap-critical: on a rebuild they are what makes Velero's
      # BackupStorageLocation available before any restore can run, so they
      # cannot themselves be user-fed via OpenBao.
      name: variables-cluster
  data:
    - match:
        secretKey: r2_access_key_id
        remoteRef:
          remoteKey: infrastructure/backup/r2
          property: access_key_id
    - match:
        secretKey: r2_secret_access_key
        remoteRef:
          remoteKey: infrastructure/backup/r2
          property: secret_access_key
