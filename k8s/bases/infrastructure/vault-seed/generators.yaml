# crossview's bundled-Postgres password. symbols:0 keeps it safe to pass as
# POSTGRES_PASSWORD / in the app's DB connection without escaping.
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: crossview-db-password
  namespace: openbao
spec:
  length: 32
  digits: 8
  symbols: 0
  noUpper: false
  allowRepeat: true
---
# crossview's app session signing key (SESSION_SECRET).
apiVersion: generators.external-secrets.io/v1alpha1
