---
# Shared GHCR image-pull credential
# ---------------------------------
# Seeds the org-level GHCR pull credential (a docker config JSON) into OpenBao at
# infrastructure/ghcr/auth so the platform-authored `ghcr-auth` ExternalSecrets in
# the tenant namespaces (k8s/bases/apps/<tenant>/ghcr-auth-externalsecret.yaml)
# materialise the `ghcr-auth` pull Secret from OpenBao instead of a per-tenant
# SOPS file. Read back via the `external-secrets` ClusterSecretStore role
# (infra-ghcr-readonly) — a platform secret, not a tenant secret. Source key
# `ghcr_dockerconfigjson` lives in variables-base-secret.enc.yaml (shared,
# cluster-independent — the same org token both clusters use) and holds the full
# `{"auths":{"ghcr.io":{...}}}` document. Re-pushed hourly, so a rotated
# token (or a re-initialized vault) converges without manual re-apply.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-ghcr
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-base
  data:
    - match:
        secretKey: ghcr_dockerconfigjson
        remoteRef:
          remoteKey: infrastructure/ghcr/auth
          property: dockerconfigjson
---
# OIDC client/cookie secrets — single source of truth is the SOPS bootstrap
# secret (variables-cluster), NOT a generator. Dex's staticClients and
# oauth2-proxy consume these very values via Flux post-build substitution
# (${dex_client_secret} / ${flux_web_client_secret} /
# ${oauth2_proxy_cookie_secret}), while headlamp / actual-budget / the
# OpenBao OIDC auth method read them back from these vault paths. When the
# vault copy was generated independently (the pre-2026-06-10 design), the
# two copies could never match — dex rejected every vault-sourced client
# secret. Seeding from the same SOPS key makes both sides identical.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-dex-client-secret
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-cluster
  data:
    - match:
        secretKey: dex_client_secret
        remoteRef:
          remoteKey: infrastructure/oidc/dex
          property: client-secret
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
