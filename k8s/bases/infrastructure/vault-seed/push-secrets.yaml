# PushSecret resources seed OpenBao from existing SOPS-decrypted K8s Secrets.
# These are the bridge during migration: SOPS Secrets exist in the cluster,
# PushSecrets copy their values into OpenBao KV v2, then ExternalSecrets
# read them back from OpenBao into target namespaces.
#
# After migration is validated, these PushSecrets can be removed and secrets
# managed directly in OpenBao.
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-r2-credentials
  namespace: flux-system
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-base
  data:
    - match:
        secretKey: r2_access_key_id
        remoteRef:
          remoteKey: infrastructure/backup/r2
          property: access_key_id
    - match:
        secretKey: r2_secret_access_key
        remoteRef:
          remoteKey: infrastructure/backup/r2
          property: secret_access_key
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-cloudflare
  namespace: flux-system
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-base
  data:
    - match:
        secretKey: cloudflare_api_token
        remoteRef:
          remoteKey: infrastructure/dns/cloudflare
          property: api_token
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-alertmanager
  namespace: flux-system
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-cluster
  data:
    - match:
        secretKey: alertmanager_webhook_url
        remoteRef:
          remoteKey: infrastructure/monitoring/alertmanager
          property: webhook_url
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-fleetdm
  namespace: flux-system
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-cluster
  data:
    - match:
        secretKey: fleetdm_mysql_root_password
        remoteRef:
          remoteKey: apps/fleetdm/mysql
          property: mysql-root-password
    - match:
        secretKey: fleetdm_mysql_replication_password
        remoteRef:
          remoteKey: apps/fleetdm/mysql
          property: mysql-replication-password
    - match:
        secretKey: fleetdm_mysql_password
        remoteRef:
          remoteKey: apps/fleetdm/mysql
          property: mysql-password
    - match:
        secretKey: fleetdm_redis_password
        remoteRef:
          remoteKey: apps/fleetdm/redis
          property: redis-password
    - match:
        secretKey: fleetdm_license_key
        remoteRef:
          remoteKey: apps/fleetdm/license
          property: license-key
