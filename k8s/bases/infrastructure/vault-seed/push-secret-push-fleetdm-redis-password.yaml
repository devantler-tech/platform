---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-fleetdm-redis-password
  namespace: openbao
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: generated-fleetdm-redis-password
  data:
    - match:
        secretKey: password
        remoteRef:
          remoteKey: apps/fleetdm/redis
          property: redis-password
