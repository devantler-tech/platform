---
# crossview app session signing key — generate once, cache, mirror to OpenBao.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: generated-crossview-session-secret
  namespace: openbao
spec:
  refreshInterval: "0"
  target:
    name: generated-crossview-session-secret
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: crossview-session-secret
