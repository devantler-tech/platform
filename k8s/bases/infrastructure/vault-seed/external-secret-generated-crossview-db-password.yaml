---
# crossview bundled-Postgres password — generate once, cache, mirror to OpenBao.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: generated-crossview-db-password
  namespace: openbao
spec:
  refreshInterval: "0"
  target:
    name: generated-crossview-db-password
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: crossview-db-password
