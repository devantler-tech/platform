---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-crossview-session-secret
  namespace: openbao
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: generated-crossview-session-secret
  data:
    - match:
        secretKey: password
        remoteRef:
          remoteKey: apps/crossview/app
          property: session-secret
