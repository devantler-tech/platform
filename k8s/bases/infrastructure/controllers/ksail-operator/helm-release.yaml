---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ksail-operator
  namespace: ksail-operator
  labels:
    # The chart ships the `Cluster` CRD (clusters.ksail.io); let Flux manage it.
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m0s
  timeout: 10m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: ksail-operator
      version: 7.175.3
      sourceRef:
        kind: HelmRepository
        name: ksail-operator
  # https://github.com/devantler-tech/ksail/tree/main/charts/ksail-operator
  #
  # The operator reconciles `Cluster` resources (ksail.io/v1alpha1) and serves
  # the embedded web UI + REST API on the same port (api.bindPort). All product
  # features are enabled: operator, REST API, web UI and native OIDC auth.
  values:
    # Clean resource names (Service/Deployment "ksail-operator" instead of the
    # default "<release>-ksail-operator").
    fullnameOverride: ksail-operator
    operator:
      # Run HA matching the rest of the operator tier (Coroot flagged the sole
      # replica "single instance - not resilient to node failure"). The chart
      # ships operator.leaderElection: true by default, which renders
      # `--leader-elect` on the manager container and a leader-election Lease, so
      # 2 replicas = one active reconciler + a warm standby that takes over on a
      # node drain/failure -- not double-reconciliation. Drain safety comes from
      # the standalone maxUnavailable: 1 PDB (pod-disruption-budget.yaml) plus the
      # topologySpreadConstraints injected via the post-renderer below (the chart
      # exposes neither a PDB nor a topologySpread value). leaderElection stays on
      # (chart default) -- do not disable it while replicas > 1.
      replicas: ${ksail_operator_replicas:=2}
      # Image tag comes from the chart default (v<appVersion>, per ksail #5168,
      # first shipped in chart 7.41.2) -> ghcr.io/devantler-tech/ksail:v7.41.2,
      # which is cosign-signed (ksail #5165) so prod Talos image verification
      # (platform #1889) accepts it. chart.spec.version above drives the version.
      # dockerSocket stays disabled: it mounts the host /var/run/docker.sock,
      # which is privileged and does not exist on Talos nodes (containerd, no
      # Docker) -- enabling it would crash-loop the pod.
      dockerSocket:
        enabled: false
    api:
      # REST API + embedded web UI (consumed same-origin by the SPA).
      bindPort: 8080
    ui:
      # GitOps-enforced platform: the UI is read-only (enforced server-side via
      # the API) so the Git repository stays the single source of truth. OIDC,
      # UI and API remain fully enabled -- only write actions are locked.
      readOnly: true
    # Native OIDC is intentionally NOT enabled in the base -- it is layered on
    # in the hetzner (prod) overlay (see ksail-operator/patches/). The operator
    # performs *eager, fatal* OIDC discovery at startup: the issuer
    # (https://dex.${domain}) must be resolvable AND TLS-trusted from inside the
    # cluster, or the manager fails to start and the pod crash-loops. On
    # local/CI the *.platform.lan names resolve only via the host's /etc/hosts
    # (not in-cluster CoreDNS), so discovery would fail there. On prod,
    # dex.platform.devantler.tech resolves via public DNS (netpol allows egress
    # 443), so OIDC runs there. (auth.oidc.enabled defaults to false.)
    rbac:
      # Use the chart's least-privilege ClusterRole; clusterAdmin (a full
      # cluster-admin wildcard) stays off -- it is a privilege-escalation
      # opt-in, not a product feature.
      clusterAdmin: false

  # Pin a numeric runAsUser so the kubelet can verify the container is non-root.
  # The ksail image declares a NAMED user (`USER nonroot:nonroot`; that account
  # is UID/GID 65532 in the image's /etc/passwd). The platform's
  # add-security-context Kyverno policy injects `runAsNonRoot: true` on the pod
  # and container, but no numeric runAsUser, and the chart ships no
  # securityContext of its own. With runAsNonRoot set and only a *named* image
  # user, the kubelet cannot prove the user is non-root -- "container has
  # runAsNonRoot and image has non-numeric user (nonroot), cannot verify user is
  # non-root" -- so the container never starts (CreateContainerConfigError). The
  # chart exposes no securityContext value, so set the UID via a post-renderer.
  # add-security-context uses +(...) add-anchors, so it layers
  # runAsNonRoot/seccomp/drop-caps on top without clobbering this runAsUser.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: ksail-operator
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ksail-operator
              spec:
                template:
                  spec:
                    securityContext:
                      runAsUser: 65532
                      runAsGroup: 65532
                    # Spread the 2 HA replicas across nodes so a single node
                    # failure cannot take out both. ScheduleAnyway (soft) so a
                    # single-node local/CI cluster still schedules both pods --
                    # matching the velero/reloader spread posture. The chart has
                    # no topologySpread value, so it is injected here.
                    topologySpreadConstraints:
                      - maxSkew: 1
                        topologyKey: kubernetes.io/hostname
                        whenUnsatisfiable: ScheduleAnyway
                        labelSelector:
                          matchLabels:
                            app.kubernetes.io/name: ksail-operator
                            app.kubernetes.io/instance: ksail-operator
                            app.kubernetes.io/component: operator
                    containers:
                      - name: operator
                        securityContext:
                          runAsUser: 65532
