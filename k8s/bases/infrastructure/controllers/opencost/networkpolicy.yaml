apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-opencost
  namespace: opencost
spec:
  endpointSelector: {}
  ingress:
    # Metrics scraping from monitoring
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9003"
              protocol: TCP
            - port: "9090"
              protocol: TCP
    # Headlamp's OpenCost plugin queries the cost API/UI through the
    # kube-apiserver service proxy (/api/v1/namespaces/opencost/services/
    # opencost:http-ui/proxy/...), so the request reaches OpenCost from the
    # kube-apiserver (hostNetwork on control plane nodes).
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "9003"
              protocol: TCP
            - port: "9090"
              protocol: TCP
  egress:
    # Kube API
    - toEntities:
        - kube-apiserver
    # Prometheus for cost data
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
