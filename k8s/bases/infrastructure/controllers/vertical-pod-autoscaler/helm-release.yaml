apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vertical-pod-autoscaler
  namespace: vertical-pod-autoscaler
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  test:
    enable: false
  chart:
    spec:
      chart: vpa
      version: 4.11.0
      sourceRef:
        kind: HelmRepository
        name: vertical-pod-autoscaler
  # https://github.com/FairwindsOps/charts/blob/master/stable/vpa/values.yaml
  values:
    recommender:
      replicaCount: ${vpa_recommender_replicas:=1}
      # HA: leader election runs replicas active/standby -- only one recommender
      # is active at a time, standbys take over on failure. Without it, multiple
      # recommenders produce racy recommendations. VPA 1.6.0 supports
      # --leader-elect (extraArgs is a map -> --leader-elect=true).
      extraArgs:
        leader-elect: true
      podDisruptionBudget:
        # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 never
        # deadlocks a node drain regardless of replica count, and at the
        # prod 2-replica floor it keeps one recommender up through a drain.
        maxUnavailable: 1
      podSecurityContext:
        runAsUser: 65534
        runAsGroup: 65534
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    updater:
      enabled: true
      replicaCount: ${vpa_updater_replicas:=1}
      # HA: leader election runs replicas active/standby -- only one updater is
      # active at a time, standbys take over on failure. Without it, multiple
      # updaters would double-evict pods. VPA 1.6.0 supports --leader-elect.
      extraArgs:
        leader-elect: true
      podDisruptionBudget:
        # Drain-safe PDB pattern (#1880/#1882) -- see the recommender block.
        maxUnavailable: 1
      podSecurityContext:
        runAsUser: 65534
        runAsGroup: 65534
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    admissionController:
      replicaCount: ${vpa_admission_replicas:=2}
      podSecurityContext:
        runAsUser: 65534
        runAsGroup: 65534
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
      podDisruptionBudget:
        # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 never
        # deadlocks a node drain regardless of replica count.
        maxUnavailable: 1
  # Coroot flagged the 2-replica admission controller and updater as co-located
  # on a single node (not resilient to node failure). The FairwindsOps vpa chart
  # (v4.11.0) exposes NO topologySpreadConstraints / affinity values for these
  # components, so the soft spread is injected with a post-render Kustomize patch
  # on each Deployment (same mechanism flagger uses above). maxSkew: 1 +
  # ScheduleAnyway prefers separate nodes without ever blocking scheduling. The
  # recommender is left untouched here (not flagged by Coroot). Selectors come
  # from the chart's Deployment .spec.selector.matchLabels.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: vertical-pod-autoscaler-vpa-admission-controller
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: vertical-pod-autoscaler-vpa-admission-controller
              spec:
                template:
                  spec:
                    topologySpreadConstraints:
                      - maxSkew: 1
                        topologyKey: kubernetes.io/hostname
                        whenUnsatisfiable: ScheduleAnyway
                        labelSelector:
                          matchLabels:
                            app.kubernetes.io/component: admission-controller
                            app.kubernetes.io/name: vpa
                            app.kubernetes.io/instance: vertical-pod-autoscaler
          - target:
              kind: Deployment
              name: vertical-pod-autoscaler-vpa-updater
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: vertical-pod-autoscaler-vpa-updater
              spec:
                template:
                  spec:
                    topologySpreadConstraints:
                      - maxSkew: 1
                        topologyKey: kubernetes.io/hostname
                        whenUnsatisfiable: ScheduleAnyway
                        labelSelector:
                          matchLabels:
                            app.kubernetes.io/component: updater
                            app.kubernetes.io/name: vpa
                            app.kubernetes.io/instance: vertical-pod-autoscaler
