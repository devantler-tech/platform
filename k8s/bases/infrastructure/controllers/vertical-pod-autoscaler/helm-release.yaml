apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vertical-pod-autoscaler
  namespace: vertical-pod-autoscaler
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  chart:
    spec:
      chart: vpa
      version: 4.10.2
      sourceRef:
        kind: HelmRepository
        name: vertical-pod-autoscaler
  # https://github.com/FairwindsOps/charts/blob/master/stable/vpa/values.yaml
  values:
    updater:
      enabled: true
      # TODO: Remove extraArgs when VPA supports InPlaceOrRecreate by default (GA in VPA 1.6.0+)
      extraArgs:
        feature-gates: InPlaceOrRecreate=true
    admissionController:
      # TODO: Remove extraArgs when VPA supports InPlaceOrRecreate by default (GA in VPA 1.6.0+)
      extraArgs:
        feature-gates: InPlaceOrRecreate=true
