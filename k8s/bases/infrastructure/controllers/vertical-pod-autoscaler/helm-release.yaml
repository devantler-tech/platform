apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vertical-pod-autoscaler
  namespace: vertical-pod-autoscaler
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  test:
    enable: false
  chart:
    spec:
      chart: vpa
      version: 4.11.0
      sourceRef:
        kind: HelmRepository
        name: vertical-pod-autoscaler
  # https://github.com/FairwindsOps/charts/blob/master/stable/vpa/values.yaml
  values:
    recommender:
      replicaCount: ${vpa_recommender_replicas:=1}
      # HA: leader election runs replicas active/standby -- only one recommender
      # is active at a time, standbys take over on failure. Without it, multiple
      # recommenders produce racy recommendations. VPA 1.6.0 supports
      # --leader-elect (extraArgs is a map -> --leader-elect=true).
      extraArgs:
        leader-elect: true
      podDisruptionBudget:
        # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 never
        # deadlocks a node drain regardless of replica count, and at the
        # prod 2-replica floor it keeps one recommender up through a drain.
        maxUnavailable: 1
      podSecurityContext:
        runAsUser: 65534
        runAsGroup: 65534
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    updater:
      enabled: true
      replicaCount: ${vpa_updater_replicas:=1}
      # HA: leader election runs replicas active/standby -- only one updater is
      # active at a time, standbys take over on failure. Without it, multiple
      # updaters would double-evict pods. VPA 1.6.0 supports --leader-elect.
      extraArgs:
        leader-elect: true
      podDisruptionBudget:
        # Drain-safe PDB pattern (#1880/#1882) -- see the recommender block.
        maxUnavailable: 1
      podSecurityContext:
        runAsUser: 65534
        runAsGroup: 65534
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    admissionController:
      replicaCount: ${vpa_admission_replicas:=2}
      podSecurityContext:
        runAsUser: 65534
        runAsGroup: 65534
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
      podDisruptionBudget:
        # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 never
        # deadlocks a node drain regardless of replica count.
        maxUnavailable: 1
