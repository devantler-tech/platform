apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: openbao
      version: 0.28.3
      sourceRef:
        kind: HelmRepository
        name: openbao
  # https://github.com/openbao/openbao-helm/blob/main/values.yaml
  values:
    server:
      enabled: true
      replicas: ${openbao_replicas:=1}
      # Mount the unseal key Secret (created by the vault-config Job on first
      # init, restored by Velero on cluster rebuild) so the postStart hook
      # can auto-unseal the server after every pod restart.
      volumes:
        - name: unseal-keys
          secret:
            secretName: openbao-unseal
            optional: true
        - name: tmp
          emptyDir: {}
      volumeMounts:
        - name: unseal-keys
          mountPath: /openbao/unseal
          readOnly: true
        - name: tmp
          mountPath: /tmp
      postStart:
        - /bin/sh
        - -ec
        - |
          export BAO_ADDR="${BAO_ADDR:-http://127.0.0.1:8200}"
          sleep 5
          UNSEAL_KEY=$(cat /openbao/unseal/unseal-key 2>/dev/null || true)
          if [ -n "$UNSEAL_KEY" ] && [ "$UNSEAL_KEY" != "REPLACE_AFTER_INIT" ]; then
            until bao status -format=json 2>/dev/null | grep -q '"sealed":'; do
              sleep 2
            done
            if bao status -format=json 2>/dev/null | grep -q '"sealed": true'; then
              bao operator unseal "$UNSEAL_KEY" || true
            fi
          fi
      dataStorage:
        enabled: true
        size: ${openbao_storage_size:=1Gi}
      auditStorage:
        enabled: true
        # 10Gi (up from the chart default 1Gi). The file audit backend
        # does not rotate, and OpenBao FAILS CLOSED on audit-write
        # errors (every API request blocks once the volume is full).
        # 10Gi gives multi-year headroom for this cluster's request
        # volume (~700 KB/day from current ESO + vault-snapshot
        # traffic). Once the observability stack lands, promtail will
        # ship the stream off-PVC and the size will become irrelevant.
        # Until then, monitor 'kubelet_volume_stats_available_bytes'
        # on the openbao-audit-* PVC and rotate manually via
        #   kubectl -n openbao exec openbao-0 -- sh -c \
        #     'mv /openbao/audit/audit.log /openbao/audit/audit.log.$(date -u +%Y%m%dT%H%M%SZ) && \
        #      kill -HUP 1'
        # (OpenBao reopens its audit FD on SIGHUP, so the move +
        #  signal pattern is safe.)
        size: ${openbao_audit_storage_size:=10Gi}
      standalone:
        enabled: true
        config: |
          ui = true

          # mlock prevents secret material from being paged to swap, but
          # requires the IPC_LOCK Linux capability. On clusters where
          # IPC_LOCK is not granted (PSS 'restricted'), this would block
          # the server from starting. Disable it; we rely on
          # node-level swap-off and PSS 'baseline' on the namespace
          # instead.
          disable_mlock = true

          listener "tcp" {
            address     = "0.0.0.0:8200"
            tls_disable = 1
          }

          storage "file" {
            path = "/openbao/data"
          }

          # Declarative file audit device on the auditStorage PV. OpenBao
          # blocks runtime audit enables: `bao audit enable file …`
          # returns "cannot enable audit device via API; use declarative,
          # config-based audit device management instead", so the device
          # MUST be declared here in HCL. The mount path /openbao/audit
          # is the chart's auditStorage default. Every API request is
          # written to /openbao/audit/audit.log as one JSON record per
          # line; tail it from the openbao pod today, ship via promtail
          # once the observability stack lands.
          #
          # HCL shape (per https://openbao.org/docs/configuration/audit):
          #   audit "<arbitrary identifier>" {
          #     type = "<device>"
          #     options = { ... }
          #   }
          # The label is just a stable name for the device (used in the
          # API path /sys/audit/<label>), not the backend type.
          audit "file" {
            type = "file"
            options = {
              file_path = "/openbao/audit/audit.log"
            }
          }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
              app.kubernetes.io/instance: openbao
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          memory: 256Mi
    injector:
      enabled: false
    ui:
      enabled: true
