apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: openbao
      version: 0.28.4
      sourceRef:
        kind: HelmRepository
        name: openbao
  # https://github.com/openbao/openbao-helm/blob/main/values.yaml
  values:
    server:
      enabled: true
      replicas: ${openbao_replicas:=1}
      # The chart's default readinessProbe is `exec: bao status`, which
      # returns exit code 2 on a sealed server -- so the Pod stays NotReady
      # until something unseals it. On a fresh cluster that "something" is
      # the vault-config Job in the downstream `infrastructure` Flux layer,
      # which can't run until this HelmRelease (in `infrastructure-controllers`)
      # is Ready. The install therefore deadlocks: Helm waits up to `timeout`,
      # `install.remediation.retries: -1` uninstalls + reinstalls, repeat --
      # cold-cluster bootstrap historically took 20-40 min waiting for that
      # race to resolve (see vault-config Job comment + PR #1636 system-test
      # failure).
      #
      # Switching to the HTTP health probe with `sealedcode=204` and
      # `uninitcode=204` makes a sealed-but-running server Ready immediately.
      # The chart template renders the httpGet branch as soon as `path` is
      # set (server-statefulset.yaml: `{{- if .Values.server.readinessProbe.path }}`)
      # and `openbao.scheme` returns "http" when `global.tlsDisable: true`
      # (chart default; matches the `tls_disable = 1` listener below).
      # The HashiCorp Vault chart uses the same pattern for the same reason.
      readinessProbe:
        path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
      # Mount the unseal key Secret (created by the vault-config Job on first
      # init, restored by Velero on cluster rebuild) so the postStart hook
      # can auto-unseal the server after every pod restart.
      volumes:
        - name: unseal-keys
          secret:
            secretName: openbao-unseal
            optional: true
        - name: tmp
          emptyDir: {}
      volumeMounts:
        - name: unseal-keys
          mountPath: /openbao/unseal
          readOnly: true
        - name: tmp
          mountPath: /tmp
      # The hook retries for ~2 min and always exits 0. The previous one-shot
      # version raced the server: it waited for ONE `bao status` to answer,
      # then a SINGLE transient failure of the next status call (or an unseal
      # against a raft follower that had not joined yet) was swallowed by
      # `|| true` and the pod stayed sealed until manual intervention
      # (2026-06-10: openbao-1/2 rescheduled mid-cutover and never unsealed).
      # An uninitialized server exits immediately — on cold bootstrap the
      # vault-config Job owns init and unseals every pod afterwards.
      postStart:
        - /bin/sh
        - -ec
        - |
          export BAO_ADDR="http://127.0.0.1:8200"
          UNSEAL_KEY=$(cat /openbao/unseal/unseal-key 2>/dev/null || true)
          if [ -n "$UNSEAL_KEY" ] && [ "$UNSEAL_KEY" != "REPLACE_AFTER_INIT" ]; then
            ATTEMPTS=24
            while [ $ATTEMPTS -gt 0 ]; do
              STATUS=$(bao status -format=json 2>/dev/null || true)
              if echo "$STATUS" | grep -q '"sealed": false'; then
                exit 0
              fi
              if echo "$STATUS" | grep -q '"initialized": false'; then
                # Fresh node, pre-init/pre-raft-join: the vault-config Job
                # inits (openbao-0 only) and unseals every pod.
                exit 0
              fi
              if echo "$STATUS" | grep -q '"sealed": true'; then
                bao operator unseal "$UNSEAL_KEY" || true
              fi
              ATTEMPTS=$((ATTEMPTS - 1))
              sleep 5
            done
          fi
          # Never fail the hook: a sealed pod stays Ready by design
          # (readinessProbe sealedcode=204) and the vault-config Job is the
          # fallback unsealer.
          exit 0
      dataStorage:
        enabled: true
        size: ${openbao_storage_size:=1Gi}
      auditStorage:
        enabled: true
        # Chart default. The file audit backend does not rotate, and
        # OpenBao FAILS CLOSED on audit-write errors (every API request
        # blocks once the volume is full). At this cluster's request
        # volume (~700 KB/day from current ESO + vault-snapshot
        # traffic) 1Gi gives ~3-4 years of headroom, but the failure
        # mode is silent until the cluster halts -- monitor
        # 'kubelet_volume_stats_available_bytes' on the openbao-audit-*
        # PVC.
        #
        # NB: bumping this size in-place is rejected by Kubernetes
        # because spec.volumeClaimTemplates is immutable on an
        # existing StatefulSet. The supported resize path is to leave
        # the chart value alone and expand the PVC directly:
        #
        #   kubectl -n openbao patch pvc audit-openbao-0 \
        #     --type=merge -p '{"spec":{"resources":{"requests":{"storage":"10Gi"}}}}'
        #
        # CSI providers with allowVolumeExpansion: true (Hetzner CSI,
        # most cloud drivers) honour this online. Once the
        # observability stack lands, promtail will ship the stream
        # off-PVC and the size question goes away.
        size: 1Gi
      # HA via Integrated Storage (Raft). standalone and ha are mutually
      # exclusive, so standalone MUST be disabled. The file -> raft cutover is a
      # one-time, deliberately disruptive switch (the storage backend changes);
      # see docs/dr/openbao-raft-ha-migration.md for the init/unseal/join flow
      # and the network prerequisite. Safe here only because nothing critical is
      # stored yet -- the cluster fresh-inits an empty raft via the vault-config
      # Job, then re-seeds from vault-config/vault-seed.
      standalone:
        enabled: false
      ha:
        enabled: true
        replicas: ${openbao_replicas:=1}
        raft:
          enabled: true
          # setNodeId sets BAO_RAFT_NODE_ID to the pod name (openbao-0/1/2).
          setNodeId: true
          config: |
            ui = true

            # mlock prevents secret material from being paged to swap, but
            # requires the IPC_LOCK Linux capability. On clusters where
            # IPC_LOCK is not granted (PSS 'restricted'), this would block
            # the server from starting. Disable it; we rely on
            # node-level swap-off and PSS 'baseline' on the namespace
            # instead.
            disable_mlock = true

            listener "tcp" {
              address         = "0.0.0.0:8200"
              # Raft peers gossip on the cluster port (8201). The openbao
              # CiliumNetworkPolicy opens 8201 pod-to-pod (cilium-network-policy.yaml).
              cluster_address = "0.0.0.0:8201"
              tls_disable     = 1
            }

            storage "raft" {
              path = "/openbao/data"
              # Auto-join: each follower discovers the cluster via the headless
              # service (openbao-internal) and joins the elected leader, so no
              # manual `bao operator raft join` is needed.
              retry_join { leader_api_addr = "http://openbao-0.openbao-internal:8200" }
              retry_join { leader_api_addr = "http://openbao-1.openbao-internal:8200" }
              retry_join { leader_api_addr = "http://openbao-2.openbao-internal:8200" }
            }

            service_registration "kubernetes" {}

            # Declarative file audit device on the auditStorage PV. OpenBao
            # blocks runtime audit enables (`bao audit enable` returns "use
            # declarative, config-based audit device management instead"), so the
            # device MUST be declared in HCL. Each raft node writes its own
            # /openbao/audit/audit.log -- monitor ALL openbao-audit-* PVCs, since
            # the file backend fails closed when its volume fills.
            audit "file" {
              type    = "file"
              path    = "file/"
              options = {
                file_path = "/openbao/audit/audit.log"
              }
            }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
              app.kubernetes.io/instance: openbao
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          memory: 256Mi
    injector:
      enabled: false
    ui:
      enabled: true
