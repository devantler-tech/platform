apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openbao
  namespace: openbao
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: OpenBao
    gethomepage.dev/description: Self-hosted secrets vault.
    gethomepage.dev/group: Security
    gethomepage.dev/icon: https://raw.githubusercontent.com/openbao/openbao/main/ui/public/favicon.svg
    gethomepage.dev/href: https://vault.${domain}
    gethomepage.dev/pod-selector: app.kubernetes.io/name=openbao
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - vault.${domain}
  rules:
    - filters:
        # Gate the public OpenBao UI/API route behind oauth2-proxy so
        # unauthenticated Internet traffic cannot generate unbounded audit
        # records on the fail-closed file audit PVC. After SSO, auth-proxy
        # forwards vault.${domain} to the active OpenBao Service.
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Auth-Request-Redirect
                value: https://vault.${domain}/
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: oauth2-proxy
          namespace: oauth2-proxy
          port: 80
