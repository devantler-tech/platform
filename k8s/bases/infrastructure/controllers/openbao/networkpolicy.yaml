apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-openbao
  namespace: openbao
spec:
  endpointSelector: {}
  ingress:
    # Allow same-namespace clients (vault-config Jobs, UI) and
    # cross-namespace clients (ESO from external-secrets namespace)
    - fromEndpoints:
        - {}
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: external-secrets
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    # Raft peer traffic (HA mode)
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: openbao
      toPorts:
        - ports:
            - port: "8201"
              protocol: TCP
  egress:
    # Kube API for Kubernetes auth token review
    - toEntities:
        - kube-apiserver
    # OIDC provider (Dex) — accessed via HTTPS external URL for
    # discovery and token exchange during user login
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Raft peer traffic (HA mode)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: openbao
      toPorts:
        - ports:
            - port: "8201"
              protocol: TCP
