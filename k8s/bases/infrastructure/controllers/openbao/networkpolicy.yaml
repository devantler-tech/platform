apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-openbao
  namespace: openbao
spec:
  endpointSelector: {}
  ingress:
    # Raft peering: the 3 openbao pods form the Integrated Storage cluster and
    # gossip on the cluster port (8201) — but the retry_join bootstrap
    # challenge goes to the LEADER'S API PORT (8200, the leader_api_addr in
    # the HCL), and standbys also forward client requests there. With only
    # 8201 open, followers with empty data dirs could never join: every
    # retry_join died with `dial tcp <leader>:8200: i/o timeout`, leaving
    # openbao-1/2 sealed and uninitialized forever (observed live during the
    # 2026-06-10 incident). Allow openbao -> openbao on BOTH ports.
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: openbao
            k8s:io.kubernetes.pod.namespace: openbao
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
            - port: "8201"
              protocol: TCP
    # Allow same-namespace clients (vault-config Jobs, UI),
    # cross-namespace clients (ESO from external-secrets namespace),
    # and Cilium Gateway envoy proxies for external ingress
    - fromEndpoints:
        - matchLabels:
            app: vault-config
            k8s:io.kubernetes.pod.namespace: openbao
        - matchLabels:
            app: vault-snapshot
            k8s:io.kubernetes.pod.namespace: openbao
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: external-secrets
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    # Cilium Gateway / Ingress traffic (envoy runs with hostNetwork,
    # so label-based matching doesn't work — use ingress + host entities)
    - fromEntities:
        - ingress
        - host
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
  egress:
    # Raft peering, mirror of the ingress rule above: the presence of ANY
    # egress rule puts these pods in default-deny egress, so without an
    # explicit openbao -> openbao allow the join/gossip SYN is dropped at
    # the SOURCE pod even though ingress on the peer permits it.
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: openbao
            k8s:io.kubernetes.pod.namespace: openbao
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
            - port: "8201"
              protocol: TCP
    # Kube API for Kubernetes auth token review
    - toEntities:
        - kube-apiserver
    # OIDC provider (Dex) — accessed via HTTPS external URL for
    # discovery and token exchange during user login
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # FleetDM MySQL — the Database secrets engine connects to MySQL to
    # validate database/config/fleetdm-mysql and to rotate the 'fleet'
    # user's password (the mysql-database-plugin runs in-process inside
    # the OpenBao server pod, so the egress originates from this namespace).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: fleetdm
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
    # Umami PostgreSQL — same pattern: the Database secrets engine connects to
    # the CNPG cluster to validate database/config/umami-postgres and rotate the
    # 'umami' static role (postgresql-database-plugin runs in-process here).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: umami
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP

