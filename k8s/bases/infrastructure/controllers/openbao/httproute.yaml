apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openbao
  namespace: openbao
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: OpenBao
    gethomepage.dev/description: Self-hosted secrets vault.
    gethomepage.dev/group: Security
    gethomepage.dev/icon: https://raw.githubusercontent.com/openbao/openbao/main/ui/public/favicon.svg
    gethomepage.dev/href: https://vault.${domain}
    gethomepage.dev/pod-selector: app.kubernetes.io/name=openbao
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - vault.${domain}
  rules:
    - backendRefs:
        # openbao-active routes only to the unsealed Raft leader. The chart's
        # openbao-ui Service selects every server pod, including sealed-but-Ready
        # standbys (readinessProbe sealedcode=204), so the UI would round-robin
        # onto a sealed node. Trade-off: with NO active node (all sealed, DR),
        # the UI is unreachable — recovery is CLI-driven anyway
        # (docs/dr/openbao-raft-ha-migration.md).
        - name: openbao-active
          port: 8200
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
