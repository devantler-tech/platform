---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-oauth2-proxy-backends
  namespace: oauth2-proxy
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: homepage
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: flux-system
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: kube-system
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: observability
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: opencost
    # Hetzner-only: the Longhorn UI HTTPRoute (longhorn-system) backends to the
    # oauth2-proxy Service for SSO. Inert on local/CI where longhorn-system has
    # no HTTPRoute.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: longhorn-system
    # Hetzner-only: the Crossview dashboard HTTPRoute (crossview ns) backends to
    # the oauth2-proxy Service for SSO. Inert on local/CI where crossview has no
    # HTTPRoute.
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: crossview
  to:
    - group: ""
      kind: Service
      name: oauth2-proxy
