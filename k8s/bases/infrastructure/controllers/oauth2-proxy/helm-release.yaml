---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
  labels:
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: oauth2-proxy
      version: 10.7.0
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
  # https://github.com/oauth2-proxy/manifests/blob/main/helm/oauth2-proxy/values.yaml
  values:
    deploymentAnnotations:
      configmap.reloader.stakater.com/reload: oauth2-proxy
    replicaCount: ${oauth2_proxy_replicas:=2}
    serviceAccount:
      # oauth2-proxy authenticates against Dex and proxies to in-cluster HTTP
      # upstreams (auth-proxy) — it never calls the Kubernetes API, and its
      # ServiceAccount has zero Role/ClusterRole bindings. Don't mount an API
      # token it can't use: a mounted-but-unused token is pure attack surface
      # (Kubescape C-0261/C-0034/C-0190). The chart applies this to both the SA
      # and the pod template.
      automountServiceAccountToken: false
    podDisruptionBudget:
      enabled: true
      # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 never deadlocks
      # a node drain regardless of replica count (minAvailable: 1 would the
      # moment oauth2_proxy_replicas dropped to 1).
      minAvailable: null
      maxUnavailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: oauth2-proxy
            app.kubernetes.io/instance: oauth2-proxy
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    config:
      # oauth2-proxy authenticates against Dex (the cluster's single OIDC
      # IdP) using the shared confidential 'public-client'. Dex federates to
      # GitHub, so the GitHub app credentials now live only on Dex's
      # connector (github_app_client_id/secret) -- not here.
      clientID: "public-client"
      clientSecret: "${dex_client_secret}"
      cookieSecret: "${oauth2_proxy_cookie_secret}"
      configFile: |-
        provider = "oidc"
        oidc_issuer_url = "https://dex.${domain}"
        # Split the OIDC endpoints so this works on every cluster: the
        # browser-facing authorize endpoint stays the public Dex URL (the
        # browser resolves dex.${domain} via the host /etc/hosts locally,
        # public DNS in prod), while the server-side token + JWKS calls use
        # the in-cluster Dex Service the pod can always resolve. This also
        # disables eager discovery (skip_oidc_discovery) -- otherwise
        # oauth2-proxy blocks at startup fetching .well-known from
        # dex.${domain}, which the pod cannot resolve on the docker/local
        # cluster (dex.platform.lan exists only in the host's /etc/hosts), and
        # crash-loops so the Flux HelmRelease never goes Ready. ID tokens
        # still carry iss=https://dex.${domain}, so issuer validation matches.
        skip_oidc_discovery = true
        login_url = "https://dex.${domain}/auth"
        redeem_url = "http://dex.dex.svc.cluster.local:5556/token"
        oidc_jwks_url = "http://dex.dex.svc.cluster.local:5556/keys"
        # Request the groups scope so Dex returns the user's GitHub teams as
        # group claims (its github connector uses teamNameField: slug), then
        # gate on the 'platform' team -- preserving the stricter team
        # restriction the github provider enforced. NOTE: OIDC mode has no
        # per-user bypass (the old github_users escape hatch is gone), so the
        # authenticating user MUST be a member of devantler-tech/platform.
        # Drop allowed_groups for an org-only gate (Dex's connector already
        # restricts to the devantler-tech org).
        scope = "openid email profile groups"
        allowed_groups = ["devantler-tech:platform"]
        # email_domains = ["*"] is intentional: GitHub (via Dex) does not
        # always return a public email, and the real gate is now
        # allowed_groups -- so don't additionally gate on the email domain.
        email_domains = ["*"]
        # Pin the session-cookie flags explicitly rather than relying on
        # oauth2-proxy defaults: HTTPS-only, no JavaScript access, and Lax
        # (Strict would break the IdP redirect back from Dex/GitHub).
        cookie_secure = true
        cookie_httponly = true
        cookie_samesite = "lax"
        # Per-request CSRF cookies. The platform front page (homepage, served at
        # the apex ${domain}) fires several unauthenticated requests at once on a
        # cold visit -- the HTML document plus the /favicon.ico and
        # /apple-touch-icon*.png the browser probes -- and each independently
        # triggers an OAuth login. With the default single shared CSRF cookie
        # (_oauth2_proxy_csrf) the last flow to start overwrites the document
        # flow's cookie, so when the document's /oauth2/callback returns its
        # nonce is gone and oauth2-proxy rejects it with "CSRF token mismatch"
        # (HTTP 403): the dashboard fails to load on the first visit and only a
        # reload -- assets now cached, no competing flow -- succeeds. Naming the
        # CSRF cookie per request (the state nonce is embedded in the cookie name)
        # lets the concurrent flows coexist, so the document flow's callback
        # always finds its own token. Fixes "homepage often doesn't start on
        # first visit".
        cookie_csrf_per_request = true
        cookie_domains=[".${domain}"]
        whitelist_domains = ["${domain}", ".${domain}"]
        redirect_url = "https://oauth2-proxy.${domain}/oauth2/callback"
        upstreams = [ "http://auth-proxy.oauth2-proxy.svc.cluster.local:80" ]
        # upstream_timeout — max time to await upstream response headers
        # (default 30s). Kept generous (90s) so a slow first render from one of
        # the heavy dashboards behind auth-proxy (Coroot, OpenCost, Hubble,
        # Longhorn, Crossview) doesn't surface as a 504. Kept under Cloudflare's
        # ~100s edge timeout so oauth2-proxy answers first.
        upstream_timeout = "90s"
        # Button-less flow: with skip_provider_button + Dex skipApprovalScreen
        # + a single Dex connector, app -> oauth2-proxy -> Dex -> GitHub -> back
        # needs no extra clicks.
        skip_provider_button = true
        reverse_proxy = true
    ingress:
      enabled: false

