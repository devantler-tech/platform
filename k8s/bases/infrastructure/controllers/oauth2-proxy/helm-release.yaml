---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
  labels:
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  chart:
    spec:
      chart: oauth2-proxy
      version: 10.4.3
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
  # https://github.com/oauth2-proxy/manifests/blob/main/helm/oauth2-proxy/values.yaml
  values:
    deploymentAnnotations:
      configmap.reloader.stakater.com/reload: oauth2-proxy
    replicaCount: ${oauth2_proxy_replicas:=2}
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
      maxUnavailable: null
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: oauth2-proxy
            app.kubernetes.io/instance: oauth2-proxy
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    config:
      clientID: "${github_app_client_id}"
      clientSecret: "${github_app_client_secret}"
      cookieSecret: "${oauth2_proxy_cookie_secret}"
      configFile: |-
        provider = "github"
        github_users = ["devantler"]
        email_domains = [ "*" ]
        cookie_domains=[".${domain}"]
        whitelist_domains = ["${domain}", ".${domain}"]
        redirect_url = "https://oauth2-proxy.${domain}/oauth2/callback"
        upstreams = [ "http://auth-proxy.oauth2-proxy.svc.cluster.local:80" ]
        skip_provider_button = true
        reverse_proxy = true
    ingress:
      enabled: false

