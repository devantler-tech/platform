apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
spec:
  scaleTargetRef:
    name: oauth2-proxy
  minReplicaCount: 1
  maxReplicaCount: ${oauth2_proxy_max_replicas:=4}
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
