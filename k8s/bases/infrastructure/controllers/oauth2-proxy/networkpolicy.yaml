apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-oauth2-proxy
  namespace: oauth2-proxy
spec:
  endpointSelector:
    matchLabels:
      app: oauth2-proxy
  ingress:
    # Gateway ingress (HTTPRoute -> oauth2-proxy)
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "4180"
              protocol: TCP
  egress:
    # Auth-proxy upstream (forward authenticated traffic to host-routing proxy)
    - toEndpoints:
        - matchLabels:
            app: auth-proxy
            k8s:io.kubernetes.pod.namespace: oauth2-proxy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Dex for OIDC
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: dex
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
    # GitHub OAuth
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Kube API
    - toEntities:
        - kube-apiserver
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
