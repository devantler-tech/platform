---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-proxy
  namespace: oauth2-proxy
  annotations:
    # Disable Coroot's latency SLO for this proxy (availability SLO stays).
    # auth-proxy fans out to the KEDA-interceptor-fronted scale-to-zero UIs,
    # so its inbound latency SLI is dominated by intentional cold-start holds
    # (the interceptor parks the request until the target wakes — 10s+),
    # which at ~600 requests/day makes the default 99%-under-500ms SLO a
    # permanent false-critical. Warm-path health is still covered by the
    # availability SLO here and by the per-app SLOs behind the proxy.
    coroot.com/slo-latency-objective: 0%
spec:
  replicas: ${auth_proxy_replicas:=2}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: auth-proxy
  template:
    metadata:
      labels:
        app: auth-proxy
      annotations:
        configmap.reloader.stakater.com/reload: auth-proxy-config
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: auth-proxy
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: traefik
          image: docker.io/library/traefik:v3.7@sha256:d6858791f9e74df44ca4014166647c41cdc2abd3bf2a71b832ca4e1c6a91b257
          args:
            - --configFile=/etc/traefik/traefik.yaml
          ports:
            - containerPort: 8080
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/traefik
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      volumes:
        - name: config
          configMap:
            name: auth-proxy-config
