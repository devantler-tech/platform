# TODO: Remove auth-proxy when Cilium supports native forward auth (https://github.com/cilium/cilium/issues/23797)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-proxy
  namespace: oauth2-proxy
spec:
  replicas: ${auth_proxy_replicas:=2}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: auth-proxy
  template:
    metadata:
      labels:
        app: auth-proxy
      annotations:
        configmap.reloader.stakater.com/reload: auth-proxy-config
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: auth-proxy
      containers:
        - name: traefik
          image: docker.io/library/traefik:v3.6
          args:
            - --configFile=/etc/traefik/traefik.yaml
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/traefik
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      volumes:
        - name: config
          configMap:
            name: auth-proxy-config
