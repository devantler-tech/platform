---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-auth-proxy
  namespace: oauth2-proxy
spec:
  endpointSelector:
    matchLabels:
      app: auth-proxy
  ingress:
    # Authenticated traffic from oauth2-proxy
    - fromEndpoints:
        - matchLabels:
            app: oauth2-proxy
            k8s:io.kubernetes.pod.namespace: oauth2-proxy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # Homepage upstream
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homepage
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Hubble UI upstream via KEDA HTTP add-on interceptor (scale-to-zero).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: keda
            app.kubernetes.io/component: interceptor
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Coroot UI upstream (metrics/logs/traces/profiles/alerts).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # OpenCost UI upstream.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: opencost
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # Longhorn UI upstream (Hetzner-only). longhorn-frontend forwards to the
    # longhorn-ui pod on container port 8000; inert on local/CI where the
    # longhorn-system namespace is absent.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: longhorn-system
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Crossview upstream (Crossplane resource dashboard). The crossview-service
    # (port 80) forwards to the crossview pod on container port 3001, and Cilium
    # enforces egress on that backend pod port. Like the other dashboards it
    # exposes infrastructure state, so it is only reachable post-SSO via
    # auth-proxy. Inert on local/CI where the crossview namespace is absent.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: crossview
      toPorts:
        - ports:
            - port: "3001"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
