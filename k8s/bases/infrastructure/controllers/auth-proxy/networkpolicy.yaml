# TODO: Remove auth-proxy when Cilium supports native forward auth (https://github.com/cilium/cilium/issues/23797)
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-auth-proxy
  namespace: oauth2-proxy
spec:
  endpointSelector:
    matchLabels:
      app: auth-proxy
  ingress:
    # Authenticated traffic from oauth2-proxy
    - fromEndpoints:
        - matchLabels:
            app: oauth2-proxy
            k8s:io.kubernetes.pod.namespace: oauth2-proxy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # Homepage upstream
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homepage
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Hubble UI upstream (kube-system)
    - toEndpoints:
        - matchLabels:
            k8s-app: hubble-ui
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
