---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-proxy-config
  namespace: oauth2-proxy
data:
  traefik.yaml: |
    entryPoints:
      web:
        address: ":8080"
    providers:
      file:
        filename: /etc/traefik/dynamic.yaml
    log:
      level: INFO
  dynamic.yaml: |
    http:
      routers:
        homepage:
          rule: "Host(`${domain}`)"
          entryPoints: ["web"]
          service: homepage
        hubble:
          rule: "Host(`hubble.${domain}`)"
          entryPoints: ["web"]
          service: hubble-ui
        coroot:
          rule: "Host(`coroot.${domain}`)"
          entryPoints: ["web"]
          service: coroot
        opencost:
          rule: "Host(`opencost.${domain}`)"
          entryPoints: ["web"]
          service: opencost
      services:
        homepage:
          loadBalancer:
            servers:
              - url: "http://homepage.homepage.svc.cluster.local:80"
        hubble-ui:
          loadBalancer:
            servers:
              - url: "http://keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local:8080"
        coroot:
          loadBalancer:
            servers:
              - url: "http://coroot-coroot.coroot.svc.cluster.local:8080"
        opencost:
          loadBalancer:
            servers:
              - url: "http://opencost.opencost.svc.cluster.local:9090"
