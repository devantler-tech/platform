---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-proxy-config
  namespace: oauth2-proxy
data:
  traefik.yaml: |
    entryPoints:
      web:
        address: ":8080"
    providers:
      file:
        filename: /etc/traefik/dynamic.yaml
    log:
      level: INFO
  dynamic.yaml: |
    http:
      routers:
        homepage:
          rule: "Host(`${domain}`)"
          entryPoints: ["web"]
          service: homepage
        hubble:
          rule: "Host(`hubble.${domain}`)"
          entryPoints: ["web"]
          service: hubble-ui
        coroot:
          rule: "Host(`observability.${domain}`)"
          entryPoints: ["web"]
          service: coroot
        opencost:
          rule: "Host(`opencost.${domain}`)"
          entryPoints: ["web"]
          service: opencost
        # Hetzner-only: Longhorn is deployed solely on prod. On local/CI the
        # backend (longhorn-frontend.longhorn-system) does not exist, but this
        # router is inert there -- no HTTPRoute sends longhorn.${domain} to
        # oauth2-proxy, so it is never matched (matches how base policies
        # already scope the prod-only longhorn-system namespace).
        longhorn:
          rule: "Host(`longhorn.${domain}`)"
          entryPoints: ["web"]
          service: longhorn
      services:
        homepage:
          loadBalancer:
            servers:
              - url: "http://homepage.homepage.svc.cluster.local:80"
        hubble-ui:
          loadBalancer:
            servers:
              - url: "http://keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local:8080"
        coroot:
          loadBalancer:
            servers:
              - url: "http://coroot-coroot.observability.svc.cluster.local:8080"
        opencost:
          loadBalancer:
            servers:
              - url: "http://opencost.opencost.svc.cluster.local:9090"
        # Longhorn UI is KEDA HTTP scale-to-zero (like hubble-ui above), so this
        # forwards to the KEDA interceptor rather than longhorn-frontend
        # directly. The interceptor matches the Host (longhorn.${domain}, see
        # the longhorn-ui HTTPScaledObject), scales longhorn-ui 0->1, then
        # proxies to longhorn-frontend. Hetzner-only and inert on local.
        longhorn:
          loadBalancer:
            servers:
              - url: "http://keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local:8080"
