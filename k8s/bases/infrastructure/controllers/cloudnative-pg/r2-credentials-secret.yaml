# Reusable Barman/R2 credentials for any CloudNativePG `Cluster` resource
# that wants to ship base backups + WAL archives to R2. Reference from a
# Cluster spec like:
#
#   spec:
#     backup:
#       barmanObjectStore:
#         destinationPath: s3://${r2_bucket}/${r2_prefix_cnpg}/<cluster-name>
#         endpointURL: ${r2_endpoint}
#         s3Credentials:
#           accessKeyId:
#             name: cnpg-r2-credentials
#             key: ACCESS_KEY_ID
#           secretAccessKey:
#             name: cnpg-r2-credentials
#             key: SECRET_ACCESS_KEY
#         wal:
#           compression: gzip
#         data:
#           compression: gzip
#       retentionPolicy: "14d"
#
# The shared R2 bucket + per-consumer prefix come from the variables-base
# ConfigMap (PR #3); a Cluster YAML can substitute them via Flux postBuild.
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-r2-credentials
  namespace: cnpg-system
type: Opaque
stringData:
  ACCESS_KEY_ID: ${r2_access_key_id}
  SECRET_ACCESS_KEY: ${r2_secret_access_key}
