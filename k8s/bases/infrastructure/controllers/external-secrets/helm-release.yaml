apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: external-secrets
      version: 2.6.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
  # https://github.com/external-secrets/external-secrets/blob/main/deploy/charts/external-secrets/values.yaml
  values:
    installCRDs: true
    replicaCount: ${external_secrets_replicas:=1}
    # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 never deadlocks a
    # node drain regardless of replica count. The chart defaults the PDB shape
    # to minAvailable: 1 (the shape validate-pdb-drain-safe flags); `null`
    # removes that key at Helm value coalescing so the template renders only
    # maxUnavailable. Same for the webhook and cert-controller below -- the
    # webhook serves the CRD conversion + validation path, so losing every
    # replica at once breaks ExternalSecret admission cluster-wide.
    podDisruptionBudget:
      enabled: true
      minAvailable: null
      maxUnavailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: external-secrets
            app.kubernetes.io/instance: external-secrets
    webhook:
      replicaCount: ${external_secrets_replicas:=1}
      podDisruptionBudget:
        enabled: true
        minAvailable: null
        maxUnavailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: external-secrets-webhook
    certController:
      replicaCount: ${external_secrets_replicas:=1}
      podDisruptionBudget:
        enabled: true
        minAvailable: null
        maxUnavailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: external-secrets-cert-controller
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
