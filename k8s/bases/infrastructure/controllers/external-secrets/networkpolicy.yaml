apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-external-secrets
  namespace: external-secrets
spec:
  endpointSelector: {}
  ingress:
    # Kube API server calls the validating webhook
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "10250"
              protocol: TCP
    # Intra-namespace communication (cert-controller → webhook)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: external-secrets
  egress:
    # Kube API for watching ExternalSecret CRs and managing Secrets
    - toEntities:
        - kube-apiserver
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # OpenBao API for secret retrieval
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: openbao
            app.kubernetes.io/name: openbao
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
