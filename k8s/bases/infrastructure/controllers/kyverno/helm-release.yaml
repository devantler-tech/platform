apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: kyverno
      version: 3.8.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
  # https://github.com/kyverno/kyverno/blob/main/charts/kyverno/values.yaml
  values:
    # Restricted PSS baseline: kyverno's mutation policies exclude the kyverno namespace,
    # so we must set pod-level seccompProfile + runAsNonRoot via chart values.
    admissionController:
      replicas: ${kyverno_admission_replicas:=2}
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      rbac:
        clusterRole:
          extraResources:
            # The auto-vpa ClusterPolicy generates VPA objects for every
            # Deployment / StatefulSet.  Kyverno needs RBAC on the target
            # resource type for generate rules to work.
            - apiGroups:
                - autoscaling.k8s.io
              resources:
                - verticalpodautoscalers
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            # The add-default-deny ClusterPolicy generates CiliumNetworkPolicy
            # objects in every namespace.
            - apiGroups:
                - cilium.io
              resources:
                - ciliumnetworkpolicies
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
      podDisruptionBudget:
        enabled: true
        # Stays minAvailable: 1: ksail bootstrap-installs kyverno (ksail.yaml
        # policyEngine: Kyverno) with its default minAvailable PDB before Flux,
        # and the chart itself refuses to render both fields. Drain-safe at the
        # 2-replica admission floor. Exempt from validate-pdb-drain-safe.
        minAvailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: admission-controller
              app.kubernetes.io/instance: kyverno
    backgroundController:
      replicas: ${kyverno_background_replicas:=1}
      # The chart auto-enables this controller's PDB whenever replicas > 1 and
      # defaults it to minAvailable: 1 -- the exact shape validate-pdb-drain-safe
      # flags. Pin the drain-safe house pattern (#1880/#1882) instead. The
      # explicit `minAvailable: null` is REQUIRED: Helm deep-merges these values
      # onto the chart defaults, so setting only maxUnavailable leaves the
      # default minAvailable: 1 in place and the chart's kyverno.pdb.spec helper
      # hard-fails the whole upgrade ("Cannot set both .minAvailable and
      # .maxUnavailable"); null deletes the default key at value coalescing.
      # At the local/CI default of 1 replica the chart renders no PDB at all.
      podDisruptionBudget:
        minAvailable: null
        maxUnavailable: 1
      # Coroot flagged the 2-replica background controller as co-located on a
      # single node (not resilient to node failure). Soft spread (same idiom as
      # admissionController above) lands the replicas on different nodes when
      # possible; ScheduleAnyway never blocks scheduling.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: background-controller
              app.kubernetes.io/instance: kyverno
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      rbac:
        clusterRole:
          extraResources:
            - apiGroups:
                - autoscaling.k8s.io
              resources:
                - verticalpodautoscalers
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - cilium.io
              resources:
                - ciliumnetworkpolicies
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            # disable-default-sa-automount mutates existing `default` SAs
            # in every namespace.
            - apiGroups:
                - ""
              resources:
                - serviceaccounts
              verbs:
                - get
                - list
                - watch
                - update
                - patch
    reportsController:
      replicas: ${kyverno_reports_replicas:=1}
      # The chart auto-enables this PDB whenever replicas > 1, defaulting to
      # minAvailable: 1. Flip it to the drain-safe house pattern
      # (maxUnavailable: 1, #1880/#1882); minAvailable must be nulled because
      # the chart refuses to render both fields. Unlike the admission
      # controller's PDB, this one is not ksail-bootstrap-owned, so there is
      # no server-side-apply conflict.
      podDisruptionBudget:
        minAvailable: null
        maxUnavailable: 1
      # Coroot flagged the 2-replica reports controller as co-located on a
      # single node. Soft spread (admissionController idiom) prefers a second
      # node; ScheduleAnyway never blocks scheduling.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: reports-controller
              app.kubernetes.io/instance: kyverno
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    cleanupController:
      replicas: ${kyverno_cleanup_replicas:=1}
      # Same drain-safe PDB flip as the reportsController above.
      podDisruptionBudget:
        minAvailable: null
        maxUnavailable: 1
      # Coroot flagged the 2-replica cleanup controller as co-located on a
      # single node. Soft spread (admissionController idiom) prefers a second
      # node; ScheduleAnyway never blocks scheduling.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: cleanup-controller
              app.kubernetes.io/instance: kyverno
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    crds:
      migration:
        # The kyverno-migrate-resources post-upgrade hook job sets seccompProfile
        # only at the container level; our require-seccomp-profile ClusterPolicy
        # checks pod-level securityContext, so set it here too (chart default is {})
        # to keep the hook pod compliant and stop background-scan PolicyViolations.
        podSecurityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
