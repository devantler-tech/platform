apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 15m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: kyverno
      version: 3.8.0
      sourceRef:
        kind: HelmRepository
        name: kyverno
  # https://github.com/kyverno/kyverno/blob/main/charts/kyverno/values.yaml
  values:
    admissionController:
      replicas: ${kyverno_admission_replicas:=2}
      rbac:
        clusterRole:
          extraResources:
            # The auto-vpa ClusterPolicy generates VPA objects for every
            # Deployment / StatefulSet.  Kyverno needs RBAC on the target
            # resource type for generate rules to work.
            - apiGroups:
                - autoscaling.k8s.io
              resources:
                - verticalpodautoscalers
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: admission-controller
              app.kubernetes.io/instance: kyverno
    backgroundController:
      rbac:
        clusterRole:
          extraResources:
            - apiGroups:
                - autoscaling.k8s.io
              resources:
                - verticalpodautoscalers
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
