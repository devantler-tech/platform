apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: kyverno
      version: 3.8.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
  # https://github.com/kyverno/kyverno/blob/main/charts/kyverno/values.yaml
  values:
    # --- reports-controller memory growth (Coroot "memory leak") --------------
    # The reports-controller's memory scales with the number of (Cluster)PolicyReports
    # it holds and aggregates. The slow, unbounded growth Coroot flags is the
    # background scanner emitting one report per live resource for EVERY resource
    # in the cluster -- because the chart ships `--skipResourceFilters=true`
    # (features.backgroundScan.skipResourceFilters), so background scan IGNORES
    # config.resourceFilters and reports on everything, including extremely
    # high-churn ephemeral objects (leader-election Leases renewing every few
    # seconds across cilium/flux/kyverno/cert-manager/KEDA/flagger/cnpg/operators,
    # plus the controller's own report kinds). See kyverno/kyverno#13335 / #11746.
    #
    # Fix (root cause, not a limit bump): make background scan HONOR the resource
    # filters, then exclude the highest-churn kinds. This is safe for enforcement
    # because skipResourceFilters only affects BACKGROUND SCAN reporting --
    # ADMISSION-time validation (pod-security, etc.) is unaffected, and we do NOT
    # filter Pod/Deployment/etc., so those still get background-scan reports.
    #
    # For the reports/background controllers, cut report VOLUME (the root-cause
    # lever for the slow growth here) rather than bumping a limit. NB: Kyverno
    # controllers are NOT VPA-managed -- Kyverno excludes its own namespace from
    # auto-vpa to avoid an eviction deadlock -- so the admission controller is
    # given an explicit limit below (see the admissionController.resources block
    # and the OOM incident it documents); the chart default proved too low.
    features:
      backgroundScan:
        # Honor config.resourceFilters during background scans (chart default is
        # true = filters skipped = report-per-resource for everything). With this
        # false, the chart's default filters (Event, ReplicaSet, Node,
        # EphemeralReport, kube-system/public/node-lease, ...) plus the additions
        # below actually suppress background-scan reports for those kinds.
        skipResourceFilters: false
    config:
      # Additive (chart `concat`s this onto its ~80-entry default resourceFilters
      # -- nothing default is lost, and it stays correct across chart upgrades).
      # Exclude high-churn kinds that have ZERO matching policy in this repo, so
      # nothing is lost by skipping them in background scan:
      resourceFiltersInclude:
        # Leader-election leases churn every few seconds cluster-wide -- the
        # dominant driver of the slow report growth.
        - "[Lease,*,*]"
        # The reports-controller's own output/intermediate report kinds: stop it
        # background-scanning (and re-reacting to) the reports it writes.
        - "[PolicyReport,*,*]"
        - "[ClusterPolicyReport,*,*]"
        - "[AdmissionReport,*,*]"
        - "[ClusterAdmissionReport,*,*]"
        - "[BackgroundScanReport,*,*]"
        - "[ClusterBackgroundScanReport,*,*]"
      # Subtractive (chart drops these entries from its default resourceFilters).
      # Resource filters match on the KIND STRING alone -- no API group -- so the
      # default `[Node,*,*]` entry also swallowed Longhorn's nodes.longhorn.io
      # "Node" CRs and silently disabled BOTH halves of the autoscale-node
      # storage drain (restrict-storage-to-baseline-workers admission rule +
      # drain-autoscale-node-storage retrofit): the background controller
      # enumerated the autoscale Node CRs and tried to create retrofit URs, but
      # rejected every one at engine/internal/match.go with "configuration
      # resource filters doesn't match resource" (observed live 2026-07-02 at
      # -v=4; #2392). Dropping the entry is safe: no policy in this repo matches
      # core v1 Nodes (the longhorn policies match group-qualified
      # longhorn.io/v1beta2/Node, names autoscale-*), so neither the admission
      # webhooks nor background-scan reports gain any core-Node volume, and the
      # subresource filter `[Node/?*,*,*]` is untouched.
      resourceFiltersExclude:
        - "[Node,*,*]"
    # Restricted PSS baseline: kyverno's mutation policies exclude the kyverno namespace,
    # so we must set pod-level seccompProfile + runAsNonRoot via chart values.
    admissionController:
      replicas: ${kyverno_admission_replicas:=2}
      container:
        # Raise the global webhook timeout from the chart/Kyverno default 10s to
        # the maximum allowed 30s. The fail-closed image-verification policies
        # (verify-app-images / verify-ksail-images, both failurePolicy: Fail) do a
        # keyless cosign verification at Pod admission that reaches ghcr.io + the
        # Sigstore TUF CDN; a COLD verify (a first-seen image digest, e.g. a fresh
        # app release) under load can exceed 10s and return
        # "context deadline exceeded", which — because the webhook is fail-closed —
        # DENIES a legitimate first-party pod. During a deploy-prod merge_group run
        # that stalls the `apps` health check and evicts the whole merge queue
        # (observed 2026-07-04: wedding-app RS FailedCreate x19 over ~4h; #2431).
        # This is the ONLY working lever in Kyverno v1.18.1: a PER-POLICY
        # spec.webhookConfiguration.timeoutSeconds is intentionally NOT set on the
        # IVPOLs because it switches Kyverno to finegrained per-policy webhooks,
        # which are broken for multiple IVPOLs in v1.18.1 (see the note in
        # cluster-policies/best-practices/verify-ksail-images.yaml). The image
        # verification result cache (imageVerifyCacheEnabled, default on, TTL 60m)
        # already fast-paths REPEAT admissions of an already-verified digest; this
        # only widens the window for the first COLD verify to complete. Security
        # posture is unchanged: still fail-closed, just given time to succeed.
        extraArgs:
          webhookTimeout: 30
      # Explicit resources = the COLD-START FLOOR. Kyverno's global resourceFilters
      # exclude ns/kyverno from auto-vpa, so the admission controller was long left
      # on the chart-default limits.memory: 384Mi, which OOMKilled (exit 137) under
      # image-verification + policy-evaluation load; because the
      # verify-image-signatures webhooks are failurePolicy: Fail, the dead
      # controller then rejected every Pod/Deployment/Job CREATE cluster-wide (e.g.
      # ksail-operator FailedCreate -> stuck HelmRelease upgrade) until it
      # recovered. It is now ALSO VPA-managed via a static VPA in
      # providers/hetzner/infrastructure/vertical-pod-autoscalers/ (auto-vpa still can't reach
      # this namespace), which right-sizes it at steady state; these values remain
      # as the safe baseline a fresh pod starts on before VPA has a recommendation
      # (the 1Gi memory limit keeps that window well above the 384Mi OOM
      # threshold). Eviction is no longer a deadlock risk: the VPA resizes IN PLACE
      # (no eviction), and with replicas: 2 + the PDB a Recreate fallback or an OOM
      # only ever takes one replica, so the admission path stays up. Limit stays
      # far under auto-vpa's 6Gi maxAllowed ceiling.
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      rbac:
        clusterRole:
          extraResources:
            # The auto-vpa ClusterPolicy generates VPA objects for every
            # Deployment / StatefulSet.  Kyverno needs RBAC on the target
            # resource type for generate rules to work.
            - apiGroups:
                - autoscaling.k8s.io
              resources:
                - verticalpodautoscalers
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            # The add-default-deny ClusterPolicy generates CiliumNetworkPolicy
            # objects in every namespace.
            - apiGroups:
                - cilium.io
              resources:
                - ciliumnetworkpolicies
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
      podDisruptionBudget:
        enabled: true
        # Stays minAvailable: 1: ksail bootstrap-installs kyverno (ksail.yaml
        # policyEngine: Kyverno) with its default minAvailable PDB before Flux,
        # and the chart itself refuses to render both fields. Drain-safe at the
        # 2-replica admission floor. Exempt from validate-pdb-drain-safe.
        minAvailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: admission-controller
              app.kubernetes.io/instance: kyverno
    backgroundController:
      replicas: ${kyverno_background_replicas:=1}
      # The chart auto-enables this controller's PDB whenever replicas > 1 and
      # defaults it to minAvailable: 1 -- the exact shape validate-pdb-drain-safe
      # flags. Pin the drain-safe house pattern (#1880/#1882) instead. The
      # explicit `minAvailable: null` is REQUIRED: Helm deep-merges these values
      # onto the chart defaults, so setting only maxUnavailable leaves the
      # default minAvailable: 1 in place and the chart's kyverno.pdb.spec helper
      # hard-fails the whole upgrade ("Cannot set both .minAvailable and
      # .maxUnavailable"); null deletes the default key at value coalescing.
      # At the local/CI default of 1 replica the chart renders no PDB at all.
      podDisruptionBudget:
        minAvailable: null
        maxUnavailable: 1
      # Coroot flagged the 2-replica background controller as co-located on a
      # single node (not resilient to node failure). Soft spread (same idiom as
      # admissionController above) lands the replicas on different nodes when
      # possible; ScheduleAnyway never blocks scheduling.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: background-controller
              app.kubernetes.io/instance: kyverno
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      rbac:
        clusterRole:
          extraResources:
            - apiGroups:
                - autoscaling.k8s.io
              resources:
                - verticalpodautoscalers
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - cilium.io
              resources:
                - ciliumnetworkpolicies
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            # disable-default-sa-automount mutates existing `default` SAs
            # in every namespace.
            - apiGroups:
                - ""
              resources:
                - serviceaccounts
              verbs:
                - get
                - list
                - watch
                - update
                - patch
    reportsController:
      replicas: ${kyverno_reports_replicas:=1}
      # The chart auto-enables this PDB whenever replicas > 1, defaulting to
      # minAvailable: 1. Flip it to the drain-safe house pattern
      # (maxUnavailable: 1, #1880/#1882); minAvailable must be nulled because
      # the chart refuses to render both fields. Unlike the admission
      # controller's PDB, this one is not ksail-bootstrap-owned, so there is
      # no server-side-apply conflict.
      podDisruptionBudget:
        minAvailable: null
        maxUnavailable: 1
      # Coroot flagged the 2-replica reports controller as co-located on a
      # single node. Soft spread (admissionController idiom) prefers a second
      # node; ScheduleAnyway never blocks scheduling.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: reports-controller
              app.kubernetes.io/instance: kyverno
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    cleanupController:
      replicas: ${kyverno_cleanup_replicas:=1}
      # Same drain-safe PDB flip as the reportsController above.
      podDisruptionBudget:
        minAvailable: null
        maxUnavailable: 1
      # Coroot flagged the 2-replica cleanup controller as co-located on a
      # single node. Soft spread (admissionController idiom) prefers a second
      # node; ScheduleAnyway never blocks scheduling.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: cleanup-controller
              app.kubernetes.io/instance: kyverno
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    crds:
      migration:
        # The kyverno-migrate-resources post-upgrade hook job sets seccompProfile
        # only at the container level; our require-seccomp-profile ClusterPolicy
        # checks pod-level securityContext, so set it here too (chart default is {})
        # to keep the hook pod compliant and stop background-scan PolicyViolations.
        podSecurityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
