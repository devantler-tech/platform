apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda-http-add-on
  namespace: keda
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  dependsOn:
    - name: keda
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: keda-add-ons-http
      version: 0.14.0
      sourceRef:
        kind: HelmRepository
        name: keda
  # https://github.com/kedacore/charts/blob/main/http-add-on/values.yaml
  values:
    crds:
      install: true
    podSecurityContext:
      fsGroup: 1000
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      supplementalGroups: [1000]
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsGroup: 1000
      privileged: false
      capabilities:
        drop: [ALL]
      seccompProfile:
        type: RuntimeDefault
    scaler:
      replicas: ${keda_scaler_replicas:=1}
    interceptor:
      replicas:
        min: ${keda_interceptor_min_replicas:=1}
        max: 3
