apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  # ServiceMonitor (monitoring.serviceMonitor) needs the Prometheus
  # operator CRDs, and Loki shares the monitoring namespace with it.
  dependsOn:
    - name: kube-prometheus-stack
      namespace: monitoring
  interval: 5m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: loki
      version: 6.55.0
      sourceRef:
        kind: HelmRepository
        name: grafana
  # https://github.com/grafana/loki/blob/main/production/helm/loki/values.yaml
  #
  # Single-binary Loki: the smallest production-viable topology. No object
  # store, caches, gateway, or canary -- logs land on a local volume with
  # 7-day retention, which is plenty for post-incident debugging at this
  # scale. Durability comes from the hetzner overlay (hcloud PVC) +
  # Velero's daily backup of the monitoring namespace to R2; the base
  # stays ephemeral for local/CI. Grafana queries it as a datasource and
  # Alloy ships pod logs into it.
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        retention_period: 168h
        volume_enabled: true
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
    singleBinary:
      replicas: 1
      persistence:
        # The chart's `persistence.enabled: false` means no volume at /var/loki
        # at all (not an emptyDir) and Loki crashes writing chunks under the
        # default read-only root filesystem. Use a small PVC against the
        # cluster's default storage class instead -- local-path on the docker
        # provider, overridden to hcloud / 10Gi by the hetzner overlay.
        enabled: true
        size: 5Gi
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
    # Single-binary mode only -- zero out the scalable-topology targets.
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    # Trim everything optional to keep the footprint small.
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false
    gateway:
      enabled: false
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      serviceMonitor:
        enabled: true
