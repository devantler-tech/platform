apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  chart:
    spec:
      chart: trust-manager
      version: 0.22.0
      sourceRef:
        kind: HelmRepository
        name: cert-manager
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  # https://artifacthub.io/packages/helm/cert-manager/trust-manager
  values:
    crds:
      enabled: true
    podDisruptionBudget:
      enabled: true
    replicaCount: ${trust_manager_replicas:=2}
