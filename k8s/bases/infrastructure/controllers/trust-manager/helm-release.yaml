apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trust-manager
  namespace: cert-manager
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  dependsOn:
    - name: cert-manager
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: trust-manager
      version: v0.24.0
      sourceRef:
        kind: HelmRepository
        name: cert-manager
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  # https://artifacthub.io/packages/helm/cert-manager/trust-manager
  values:
    crds:
      enabled: true
    podDisruptionBudget:
      enabled: true
      # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 keeps the node
      # drainable at any replica count. trust_manager_replicas is "1" in prod,
      # so minAvailable: 1 permitted zero voluntary evictions and made its node
      # undrainable. (The chart's default minAvailable: 1 only renders when
      # both keys are absent, so setting maxUnavailable alone suppresses it.)
      maxUnavailable: 1
    replicaCount: ${trust_manager_replicas:=2}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: trust-manager
            app.kubernetes.io/instance: trust-manager
