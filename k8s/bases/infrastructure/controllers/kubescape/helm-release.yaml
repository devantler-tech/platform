apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubescape
  namespace: kubescape
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: kubescape-operator
      version: 1.40.2
      sourceRef:
        kind: HelmRepository
        name: kubescape
  # https://github.com/kubescape/helm-charts/blob/main/charts/kubescape-operator/values.yaml
  values:
    # HA: the kubescape-operator chart is single-replica by design — Coroot
    # flags operator/kubescape/kubevuln/storage as "single instance - not
    # resilient to node failure", but the chart provides NO safe way to run
    # them HA, so they are deliberately left at one replica (chart v1.40.2):
    #
    #   * operator, kubescape (scanner), storage — the Deployment templates
    #     HARDCODE `replicas: 1` with no value to override it, and the chart
    #     ships NO leader-election anywhere. Two operators/scanners would
    #     double-trigger every scan (cf. the velero/VPA/flagger HA comments in
    #     this tree: we only scale components that leader-elect). Making these
    #     HA would require forking the chart — out of scope and unsafe.
    #   * storage is additionally a singleton by ARCHITECTURE: it is an
    #     aggregated APIServer backed by a ReadWriteOnce PVC
    #     (kubescape-storage, persistence.size.backingStorage below) with a
    #     `Recreate` rollout — a single-writer store, not a stateless replica
    #     set. A second replica would fail to multi-attach the RWO volume.
    #   * kubevuln is the ONLY component exposing `kubevuln.replicaCount`, but
    #     its Deployment ships `strategy: type: Recreate` and mounts RWO PVCs
    #     when grypeDb/tmpDir persistence is enabled — i.e. the chart itself
    #     forbids concurrent replicas. With no leader election, two kubevuln
    #     pods would duplicate every image scan. So it stays at 1 too.
    #
    # Upstream's guidance for larger clusters is to raise RESOURCES, not add
    # replicas (helm-charts README). Revisit if the chart adds leader election
    # / multi-replica support for any of these components.
    clusterName: ${cluster_name}
    capabilities:
      configurationScan: enable
      # Chart default (disable) — deliberately NOT enabled on this air-gapped
      # install. With continuousScan enabled the operator's continuous-scanning
      # service fires a `kubescapeScan` command per watched-resource event, and
      # that request path never carries `scanV1.keepLocal` (upstream's offline
      # fix, helm-charts#862, only patched the scheduler CronJob request body —
      # see kubescapeScheduler.requestBody below). Offline, every such scan runs
      # Submit-mode, dies at cloud account-ID generation ("chmod
      # /home/nonroot/.kubescape: read-only file system"), persists NO
      # workloadconfigurationscan CRs, and the ~1-per-36s retry flood keeps the
      # scan queue permanently backlogged — starving the daily keepLocal
      # scheduler scan that DOES work (observed live 2026-07-04, issue #2463).
      # Posture freshness offline = the daily scheduler scan. Re-enable only if
      # upstream propagates keepLocal into the continuous-scan command path.
      continuousScan: disable
      vulnerabilityScan: enable
      runtimeDetection: enable
      # Enables Kubescape's risk-acceptance feature, so the operator/kubevuln process
      # the in-cluster SecurityException / ClusterSecurityException CRDs
      # (k8s/bases/infrastructure/cluster-security-exceptions/) and emit posture-exception
      # match events (kubescape#2291). IMPORTANT: this flag alone does NOT make POSTURE
      # exceptions apply — that needs THREE more things the chart (<= 1.40.2) does not give us:
      #   (1) the posture scanner reads those CRDs via a CRD exceptions getter that only
      #       exists in kubescape image >= v4.0.9 (kubescape#2291/#2322); chart 1.40.2 still
      #       pins the scanner to v4.0.8 → see the `kubescape.image.tag` override below;
      #   (2) that getter must LIST the CRDs at the apiVersion the chart serves — v4.0.9
      #       hard-coded kubescape.io/v1 while the chart's CRDs serve ONLY v1beta1, so its
      #       List() 404s and (being the secondary/merged source) is silently swallowed →
      #       still zero exceptions. kubescape#2366 (image >= v4.0.10) switches the getter to
      #       v1beta1, so the override below is at v4.0.10 for this reason; and
      #   (3) the scanner ServiceAccount needs RBAC to `list` those CRDs, which NO chart
      #       version grants it (only operator/kubevuln get it) → see `cluster-role.yaml`
      #       + `cluster-role-binding.yaml`.
      # Missing any one of the three → the scanner silently loads zero exceptions (its merged
      # getter swallows the missing/forbidden/wrong-version CRD source and falls back to the
      # offline = empty primary), so the dashboard reads "excluding 0 controls" even though
      # the CRs are deployed and schema-valid. Exemptions stay a LAST RESORT behind real
      # fixes — keep the cluster-security-exceptions set minimal and irreducible.
      riskAcceptance: enable
      # Run posture/config scanning OFFLINE (air-gapped). This cluster has no
      # ARMO SaaS account, but the chart defaults to submit-mode: the scanner
      # POSTs each posture report to report.armo.cloud and treats the submit as
      # a terminal step. With no account that submit fails ("400 missing account
      # id"), which ABORTS the scan before results are written — so NO
      # config-scan CRs (workloadconfigurationscansummaries /
      # configurationscansummaries) ever persist and the cluster compliance
      # score stays 0. Offline mode skips the cloud submit and persists results
      # straight to the in-cluster storage component (storage:true,
      # keepLocal:true are already set), restoring posture scanning + findings.
      # Vulnerability scanning (kubevuln) is unaffected — it never gated on the
      # cloud submit.
      #
      # IMPORTANT: capabilities.kubescapeOffline ALONE does NOT keep the posture
      # SCAN local on chart 1.40.2. This flag only (a) toggles the scanner's
      # config.json mountPath and (b) sets clusterData.keepLocal — neither of
      # which reaches the scanner's per-scan Submit path. The scanner still
      # resolves a cloud report URL (api.armosec.io) and, with an empty account,
      # forces Submit=true, so every scheduled scan tries to generate+write an
      # account ID to /home/nonroot/.kubescape/config.json. On chart 1.40.2 that
      # path is an emptyDir subPath the kubelet materialises as a DIRECTORY (an
      # upstream mount bug), so the write fails "is a directory" and the scan
      # ABORTS before persisting fresh WorkloadConfigurationScan CRs — freezing
      # the Kubescape dashboard on stale results (surfaced under scanner v4.0.9,
      # which treats the account-ID write as terminal). Upstream fixes this by
      # injecting scanV1.keepLocal:true into the scan-scheduler request body for
      # offline installs (helm-charts#857 / PR #862, merged, UNRELEASED — chart
      # is still 1.40.2). We apply that same fix now via the request-body
      # override below; keepLocal makes the scanner run local-only (Submit=false,
      # no cloud call, no account-ID write, no config.json touch), so the scan
      # completes and persists CRs each run — and the config.json mount bug is
      # never reached. Drop the override once the chart releases the fix past
      # 1.40.2.
      kubescapeOffline: enable
    hostScanner:
      enabled: true
    nodeAgent:
      image:
        # Chart 1.40.2 pins node-agent v0.3.119, whose vendored inspektor-gadget
        # has a data race in GadgetPubSub.Publish -- under container churn the
        # DaemonSet dies with "fatal error: concurrent map writes" (observed
        # crashlooping every prod node, 15/8/3 restarts, during the 06-20..06-23
        # load). node-agent v0.3.128 fixed it by bumping the inspektor-gadget pin
        # (kubescape/node-agent#825); this pin also carries the later v0.3.132
        # (eBPF deadlock + OOM under load) and v0.3.136 (send-on-closed-channel
        # panic on SIGTERM/rolling restart) crash fixes. The chart's node-agent
        # default still lags the node-agent release train (kubevuln is already at
        # v0.3.142 in the same chart), so override it here; drop this once the
        # chart default catches up past v0.3.128.
        tag: v0.3.142
      config:
        hostSensor:
          enabled: true
      # Authored memory sizing — REQUIRED. DaemonSet VPAs are CPU-only (see
      # cluster-policies/best-practices/auto-vpa.yaml: VPA sized every node's
      # agent to the busiest node's peak — 523Mi/node × every node — which
      # ratcheted the cluster-autoscaler on 2026-06-30), so memory must be
      # authored here. Observed live range is 261–436Mi/node; request ≈
      # typical usage, limit covers scan-time spikes with headroom (the
      # kubescape LimitRange default limit is only 512Mi — too tight for scan
      # bursts). CPU request is the VPA floor; VPA still right-sizes CPU.
      resources:
        requests:
          cpu: 50m
          memory: 320Mi
        limits:
          memory: 1Gi
    kubescape:
      image:
        # The posture scanner applies the SecurityException / ClusterSecurityException CRDs
        # via its CRD exceptions getter (added in kubescape v4.0.9, kubescape#2291 + #2322).
        # Chart 1.40.2 pins the scanner to v4.0.8, which has NO such getter, so posture
        # exceptions are silently ignored no matter how the CRs are authored or what RBAC
        # exists. But v4.0.9's getter hard-coded the CRD apiVersion to kubescape.io/v1 while
        # the chart serves ONLY kubescape.io/v1beta1 — so its List() 404s and, as the
        # secondary/merged source, is silently swallowed → still ZERO exceptions applied
        # (dashboard "excluding 0 controls"). kubescape#2366 (first shipped in image v4.0.10)
        # switches the getter to v1beta1, so v4.0.10 is the first scanner that actually reads
        # our CRs offline. Paired with `cluster-role.yaml` + `cluster-role-binding.yaml`,
        # which grant the scanner SA the `list` RBAC the getter needs (the chart never grants
        # it). The merged getter still swallows a missing-RBAC/CRD source, so this bump cannot
        # break scans on its own. Drop this override + the reader RBAC once the chart bumps
        # the scanner to >= v4.0.10 AND grants it the securityexceptions RBAC. (Same
        # component-image-ahead-of-chart pattern as the nodeAgent override above.)
        tag: v4.0.10
    # Force the scheduled posture scan to run LOCAL-ONLY. Chart 1.40.2 renders
    # the scan-scheduler ConfigMap request-body verbatim from this value, and
    # the scanner maps scanV1.keepLocal -> scanInfo.Local, which forces
    # Submit=false (no cloud submit, no account-ID generation, no config.json
    # write). This is what actually unblocks in-cluster persistence under
    # kubescapeOffline (see the long note on capabilities.kubescapeOffline
    # above) and it mirrors upstream helm-charts PR #862 exactly. The rest of
    # this block reproduces the chart 1.40.2 default request-body unchanged
    # (this value fully replaces the default, so it must be complete). Drop the
    # whole override once the chart releases the offline keepLocal fix past
    # 1.40.2.
    kubescapeScheduler:
      requestBody:
        commands:
          - CommandName: "kubescapeScan"
            args:
              scanV1:
                keepLocal: true
    # Hetzner CSI provisions a minimum 10Gi volume; match the PVC request
    # to avoid Helm upgrade failures from PVC shrink rejection.
    persistence:
      size:
        backingStorage: 10Gi
    # Chart defaults are grossly overprovisioned for small clusters.
    # Align with VPA recommendations.
    kubevuln:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
