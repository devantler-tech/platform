apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubescape
  namespace: kubescape
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: kubescape-operator
      version: 1.40.2
      sourceRef:
        kind: HelmRepository
        name: kubescape
  # https://github.com/kubescape/helm-charts/blob/main/charts/kubescape-operator/values.yaml
  values:
    # HA: the kubescape-operator chart is single-replica by design — Coroot
    # flags operator/kubescape/kubevuln/storage as "single instance - not
    # resilient to node failure", but the chart provides NO safe way to run
    # them HA, so they are deliberately left at one replica (chart v1.40.2):
    #
    #   * operator, kubescape (scanner), storage — the Deployment templates
    #     HARDCODE `replicas: 1` with no value to override it, and the chart
    #     ships NO leader-election anywhere. Two operators/scanners would
    #     double-trigger every scan (cf. the velero/VPA/flagger HA comments in
    #     this tree: we only scale components that leader-elect). Making these
    #     HA would require forking the chart — out of scope and unsafe.
    #   * storage is additionally a singleton by ARCHITECTURE: it is an
    #     aggregated APIServer backed by a ReadWriteOnce PVC
    #     (kubescape-storage, persistence.size.backingStorage below) with a
    #     `Recreate` rollout — a single-writer store, not a stateless replica
    #     set. A second replica would fail to multi-attach the RWO volume.
    #   * kubevuln is the ONLY component exposing `kubevuln.replicaCount`, but
    #     its Deployment ships `strategy: type: Recreate` and mounts RWO PVCs
    #     when grypeDb/tmpDir persistence is enabled — i.e. the chart itself
    #     forbids concurrent replicas. With no leader election, two kubevuln
    #     pods would duplicate every image scan. So it stays at 1 too.
    #
    # Upstream's guidance for larger clusters is to raise RESOURCES, not add
    # replicas (helm-charts README). Revisit if the chart adds leader election
    # / multi-replica support for any of these components.
    clusterName: ${cluster_name}
    capabilities:
      configurationScan: enable
      continuousScan: enable
      vulnerabilityScan: enable
      runtimeDetection: enable
      # Apply the in-cluster SecurityException / ClusterSecurityException CRDs
      # (k8s/bases/infrastructure/security-exceptions/) to posture results. The
      # chart gates the operator/kubevuln/scanner RBAC for those CRDs behind this
      # capability (chart default `disable`), so while it is off the scanner loads
      # zero exceptions and the dashboard reads "excluding 0 controls" even though
      # the CRs are deployed and schema-valid. Enabling it creates the RBAC and
      # activates the CRD exception getter (namespaceSelector.matchExpressions is
      # resolved against live namespaces). Exemptions stay a LAST RESORT behind
      # real fixes — keep the security-exceptions set minimal and irreducible.
      riskAcceptance: enable
      # Run posture/config scanning OFFLINE (air-gapped). This cluster has no
      # ARMO SaaS account, but the chart defaults to submit-mode: the scanner
      # POSTs each posture report to report.armo.cloud and treats the submit as
      # a terminal step. With no account that submit fails ("400 missing account
      # id"), which ABORTS the scan before results are written — so NO
      # config-scan CRs (workloadconfigurationscansummaries /
      # configurationscansummaries) ever persist and the cluster compliance
      # score stays 0. Offline mode skips the cloud submit and persists results
      # straight to the in-cluster storage component (storage:true,
      # keepLocal:true are already set), restoring posture scanning + findings.
      # Vulnerability scanning (kubevuln) is unaffected — it never gated on the
      # cloud submit.
      kubescapeOffline: enable
    hostScanner:
      enabled: true
    nodeAgent:
      image:
        # Chart 1.40.2 pins node-agent v0.3.119, whose vendored inspektor-gadget
        # has a data race in GadgetPubSub.Publish -- under container churn the
        # DaemonSet dies with "fatal error: concurrent map writes" (observed
        # crashlooping every prod node, 15/8/3 restarts, during the 06-20..06-23
        # load). node-agent v0.3.128 fixed it by bumping the inspektor-gadget pin
        # (kubescape/node-agent#825); this pin also carries the later v0.3.132
        # (eBPF deadlock + OOM under load) and v0.3.136 (send-on-closed-channel
        # panic on SIGTERM/rolling restart) crash fixes. The chart's node-agent
        # default still lags the node-agent release train (kubevuln is already at
        # v0.3.142 in the same chart), so override it here; drop this once the
        # chart default catches up past v0.3.128.
        tag: v0.3.142
      config:
        hostSensor:
          enabled: true
    # Hetzner CSI provisions a minimum 10Gi volume; match the PVC request
    # to avoid Helm upgrade failures from PVC shrink rejection.
    persistence:
      size:
        backingStorage: 10Gi
    # Chart defaults are grossly overprovisioned for small clusters.
    # Align with VPA recommendations.
    kubevuln:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
