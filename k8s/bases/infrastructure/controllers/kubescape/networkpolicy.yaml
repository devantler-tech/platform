apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kubescape
  namespace: kubescape
spec:
  endpointSelector: {}
  ingress:
    # Webhook from kube-apiserver
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Intra-namespace communication
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kubescape
  egress:
    # Kube API for scanning
    - toEntities:
        - kube-apiserver
    # Kubescape cloud backend
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Intra-namespace communication
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kubescape
