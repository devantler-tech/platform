            "designatorType": "Attributes",
            "attributes": {
              "namespace": "^(flux-system|kyverno|cert-manager|cnpg-system|velero|keda|observability|kubescape|vertical-pod-autoscaler|kubevirt|cdi|longhorn-system|external-dns|oauth2-proxy|headlamp|kubelet-serving-cert-approver|opencost|reloader|dex|fleetdm|homepage)$"
            }
          }
        ],
        "posturePolicies": [
          {
            "controlID": "^C-0053$"
          },
          {
            "controlID": "^C-0015$"
          },
          {
            "controlID": "^C-0007$"
          },
          {
            "controlID": "^C-0037$"
          },
          {
            "controlID": "^C-0031$"
          },
          {
            "controlID": "^C-0063$"
          },
          {
            "controlID": "^C-0035$"
          },
          {
            "controlID": "^C-0188$"
          }
        ]
      },
      {
        "name": "exec-into-container-rbac",
        "policyType": "postureExceptionPolicy",
        "actions": [
          "alertOnly"
        ],
        "reason": "Infra controllers (Velero, CloudNativePG, Flux kustomize-/helm-controller and flux-operator) legitimately hold pods/exec by design; matched by kind+name on the RBAC binding so C-0002 still catches new exec grants. Tenant SAs are scoped at the root instead, not excepted here.",
        "resources": [
          {
            "designatorType": "Attributes",
            "attributes": {
              "kind": "^RoleBinding$",
              "name": "^velero-server$"
            }
          },
          {
            "designatorType": "Attributes",
            "attributes": {
              "kind": "^Role$",
              "name": "^velero-server$"
            }
          },
          {
            "designatorType": "Attributes",
            "attributes": {
              "kind": "^ClusterRoleBinding$",
