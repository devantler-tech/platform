apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-coroot
  namespace: observability
spec:
  endpointSelector: {}
  ingress:
    # Intra-namespace: Coroot UI <-> bundled Prometheus <-> ClickHouse <->
    # cluster-agent, plus the heartbeat CronJob probing Prometheus.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
    # The eBPF node-agent runs with host networking on every node, so its
    # telemetry push appears as the host / remote-node entity rather than a
    # observability-namespace endpoint. It pushes everything (metrics, logs, traces,
    # profiles) to the Coroot app's /v1/* endpoints on :8080 only — it does not
    # reach Prometheus or ClickHouse directly (the app fans those out
    # intra-namespace), so this is scoped to :8080 for least privilege.
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # auth-proxy (oauth2-proxy SSO) reaches the Coroot UI after authentication.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: oauth2-proxy
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # OpenCost queries the bundled Prometheus for cost allocation.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: opencost
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # Flagger queries the bundled Prometheus for canary SLO metrics
    # (request-success-rate / latency derived from the node-agent's
    # container_http_inbound_requests_* series).
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flagger-system
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
  egress:
    # Kube API for the cluster-agent's service discovery / kube-state inventory.
    - toEntities:
        - kube-apiserver
    # Reach scrape targets across namespaces and the nodes themselves.
    - toEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: Exists
    - toEntities:
        - host
        - remote-node
    # External HTTPS, pinned by FQDN instead of world:443 so a compromised
    # pod cannot exfiltrate telemetry to arbitrary external services:
    # - hooks.slack.com — Coroot incident notifications (Slack webhook)
    # - hc-ping.com     — the coroot-heartbeat CronJob's dead-man's-switch
    #                     ping (${alertmanager_heartbeat_url})
    # - coroot.com      — Coroot version checks / usage statistics
    - toFQDNs:
        - matchName: "hooks.slack.com"
        - matchName: "hc-ping.com"
        - matchName: "coroot.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution. rules.dns engages Cilium's L7 DNS proxy so the toFQDNs
    # allow-list above can be enforced; matchPattern "*" leaves resolution
    # itself unrestricted (the FQDN list constrains where traffic may go).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
