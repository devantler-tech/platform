# Expose the Coroot UI behind oauth2-proxy SSO. Coroot CE has no native OIDC, so
# SSO is enforced at the gateway: the GEP-1494 ExternalAuth filter (below) runs
# the per-request auth check against oauth2-proxy and routes straight to the
# Coroot Service. The Coroot app serves its UI on port 8080.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: coroot
  namespace: observability
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Coroot
    gethomepage.dev/description: Metrics, logs, traces, profiling and alerts.
    gethomepage.dev/group: Observability
    # Status dot: Homepage derives a service's health from the readiness of pods
    # matching `gethomepage.dev/pod-selector`. With no selector it defaults to
    # `app.kubernetes.io/name=<gethomepage.dev/app|route-name>`, i.e.
    # `app.kubernetes.io/name=coroot`. But the coroot-operator labels the app pod
    # `app.kubernetes.io/component=coroot` (+ `part-of=coroot`) and sets NO
    # `app.kubernetes.io/name` label — so the default selector matches zero pods
    # and the card renders offline even though Coroot is healthy. Target the app
    # pod explicitly (same reason the Cilium route pins `k8s-app=hubble-ui` and
    # FleetDM pins `app=fleet`).
    gethomepage.dev/pod-selector: app.kubernetes.io/part-of=coroot,app.kubernetes.io/component=coroot
    # Coroot isn't in the dashboard-icons / selfh.st / simple-icons sets Homepage
    # resolves, so `coroot.png` 404s and the card renders blank. Point at Coroot's
    # upstream brand SVG instead — the same upstream-URL pattern this repo already
    # uses for the Cilium and OpenBao routes. Homepage fetches icons client-side,
    # so the cluster egress NetworkPolicy doesn't block it.
    gethomepage.dev/icon: https://raw.githubusercontent.com/coroot/coroot/main/front/public/icon.svg
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - observability.${domain}
  rules:
    # 1) Login dance — oauth2-proxy serves its own /oauth2/* endpoints directly,
    #    WITHOUT the ExternalAuth filter. The longer /oauth2 PathPrefix wins.
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: oauth2-proxy
          namespace: oauth2-proxy
          port: 80
    # 2) App traffic — GEP-1494 ExternalAuth filter delegates the per-request SSO
    #    check to oauth2-proxy /oauth2/auth (ext_authz, HTTP); on allow it routes
    #    STRAIGHT to the coroot-coroot Service (same namespace). Replaces the old
    #    oauth2-proxy → auth-proxy hop. SPIKE-PENDING (platform#1881): header sets
    #    + unauth redirect confirmed on the local spike before promotion.
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Auth-Request-Redirect
                value: https://observability.${domain}/
        - type: ExternalAuth
          externalAuth:
            protocol: HTTP
            backendRef:
              name: oauth2-proxy
              namespace: oauth2-proxy
              port: 80
            http:
              path: /oauth2/auth
              allowedHeaders:
                - cookie
                - authorization
                - x-auth-request-redirect
              allowedResponseHeaders:
                - x-auth-request-user
                - x-auth-request-email
                - x-auth-request-groups
                - set-cookie
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: coroot-coroot
          port: 8080
