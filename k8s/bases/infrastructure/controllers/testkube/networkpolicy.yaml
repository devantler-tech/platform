apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-testkube
  namespace: testkube
spec:
  endpointSelector: {}
  ingress:
    # Webhook from kube-apiserver (hostNetwork on control plane nodes)
    - fromEntities:
        - kube-apiserver
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
    # Intra-namespace (API server, operator, workers, dashboard)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: testkube
  egress:
    # Kube API for test execution and CRD management
    - toEntities:
        - kube-apiserver
    # Intra-namespace (API server, operator, workers)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: testkube
    # Anonymous telemetry (Segment) only — no Test/TestWorkflow resources are
    # defined yet, so nothing else leaves the cluster. Pinned by FQDN instead
    # of world:443 so a compromised pod cannot exfiltrate to arbitrary
    # external services. When test workflows that fetch external artifacts
    # are added, extend this list with their hosts.
    - toFQDNs:
        - matchName: "api.segment.io"
        - matchPattern: "*.testkube.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution. rules.dns engages Cilium's L7 DNS proxy so the toFQDNs
    # allow-list above can be enforced; matchPattern "*" leaves resolution
    # itself unrestricted (the FQDN list constrains where traffic may go).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
