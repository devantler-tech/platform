apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  chart:
    spec:
      chart: keda
      version: 2.20.0
      sourceRef:
        kind: HelmRepository
        name: keda
  # https://github.com/kedacore/charts/blob/main/keda/values.yaml
  values:
    crds:
      install: true
    operator:
      replicaCount: ${keda_operator_replicas:=1}
    webhooks:
      replicaCount: ${keda_webhooks_replicas:=1}
    # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 never deadlocks a
    # node drain regardless of replica count. The webhooks PDB matters most:
    # keda-admission-webhooks validates every ScaledObject/TriggerAuthentication
    # admission, and the operator drives all scale-from-zero decisions.
    podDisruptionBudget:
      operator:
        maxUnavailable: 1
      metricServer:
        maxUnavailable: 1
      webhooks:
        maxUnavailable: 1
