apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-keda
  namespace: keda
spec:
  endpointSelector: {}
  ingress:
    # Gateway ingress to interceptor proxy
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Webhook from kube-apiserver
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Metrics scraping
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
  egress:
    # Kube API for watching scalers
    - toEntities:
        - kube-apiserver
    # Reach backend services in any namespace
    - toEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: Exists
