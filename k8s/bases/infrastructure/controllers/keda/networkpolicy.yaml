apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-keda
  namespace: keda
spec:
  endpointSelector: {}
  ingress:
    # Webhook from kube-apiserver (hostNetwork on control plane nodes)
    - fromEntities:
        - kube-apiserver
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
    # Intra-namespace communication (operator ↔ metrics-apiserver, etc.)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: keda
  egress:
    # Kube API for watching scalers
    - toEntities:
        - kube-apiserver
    # Intra-namespace (operator ↔ metrics-apiserver, etc.)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: keda
    # KEDA operator -> Coroot's bundled Prometheus, for ScaledObject prometheus
    # triggers (request-rate horizontal scaling of the Flagger-managed apps,
    # homepage/umami). Same endpoint Flagger and OpenCost query; Coroot's
    # netpol allows this namespace in on :9090.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: observability
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
