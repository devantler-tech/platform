apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger-loadtester
  namespace: flagger-system
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: loadtester
      version: 0.37.0
      sourceRef:
        kind: HelmRepository
        name: flagger
  # https://github.com/fluxcd/flagger/blob/main/charts/loadtester/values.yaml
  #
  # The load-tester is the webhook target Flagger calls during a canary to run
  # acceptance (smoke) tests and generate load so Coroot has request traffic to
  # measure. No app is onboarded yet (foundation only); see
  # docs/progressive-delivery.md for the per-app onboarding recipe.
  values:
    # Restricted PSA — the chart ships hardening disabled by default, so set it
    # explicitly at both the pod and container level.
    securityContext:
      enabled: true
      context:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
    podSecurityContext:
      enabled: true
      context:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
