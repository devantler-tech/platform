apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger
  namespace: flagger-system
  labels:
    # The chart ships the Canary / MetricTemplate / AlertProvider CRDs (gated by
    # `crd.create`); let Flux manage them. The helm-release-install-crds Kyverno
    # policy turns this label into install/upgrade `crds: CreateReplace`.
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  # Flagger queries Coroot's bundled Prometheus for canary SLO metrics, so the
  # operator that stands that stack up should reconcile first (mirrors opencost,
  # which depends on the same Prometheus). Flagger does not need Prometheus at
  # install time — only while a Canary is being analysed.
  dependsOn:
    - name: coroot-operator
      namespace: observability
  interval: 10m
  timeout: 10m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  chart:
    spec:
      chart: flagger
      version: 1.43.0
      sourceRef:
        kind: HelmRepository
        name: flagger
  # https://github.com/fluxcd/flagger/blob/main/charts/flagger/values.yaml
  values:
    # Gateway API provider — Flagger owns each onboarded app's HTTPRoute and
    # shifts traffic by rewriting backendRef weights (Cilium honours them).
    meshProvider: gatewayapi:v1

    # HA: Flagger elects a single leader to drive canaries; the other replicas
    # are warm standbys. leaderElection.enabled MUST stay true before replicas >
    # 1, or every replica double-drives each canary. require-replica-floor policy.
    #
    # The replica count MUST be set as leaderElection.replicaCount: this chart has
    # NO top-level `replicaCount` (its values.yaml exposes the count only under
    # leaderElection), so a top-level replicaCount is silently dropped by Helm and
    # the Deployment renders replicas: 1. That is why flagger ran a single replica
    # in prod despite flagger_replicas being "2" -- the HA gap require-replica-floor
    # (#1882) kept flagging. Wiring flagger_replicas to leaderElection.replicaCount
    # makes the value actually take effect.
    leaderElection:
      enabled: true
      replicaCount: ${flagger_replicas:=1}

    # Reuse Coroot's bundled Prometheus (the metrics TSDB the coroot-operator
    # deploys, the same endpoint OpenCost queries). Coroot's eBPF node-agent
    # exports server-side HTTP metrics — container_http_inbound_requests_total
    # and ..._duration_seconds_total — which the MetricTemplates in the
    # `infrastructure` layer turn into request-success-rate / latency SLOs.
    metricsServer: http://coroot-prometheus.observability.svc.cluster.local:9090
    prometheus:
      install: false

    # CRDs (Canary, MetricTemplate, AlertProvider) ship in the chart's `crds/`
    # directory and are managed by Flux via `install/upgrade.crds: CreateReplace`
    # (the helm.toolkit.fluxcd.io/crds label above). Leave the chart's own
    # `crd.create` at its default (false) so the CRDs are not also rendered as
    # templates — defining them twice in one release would conflict.

    # Restricted PSA — fully specified container securityContext so the pod is
    # compliant at admission (no dependency on the Kyverno mutating webhook on a
    # cold bootstrap).
    securityContext:
      enabled: true
      context:
        runAsNonRoot: true
        runAsUser: 10001
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi

  # Keep the flagger Deployment on a RollingUpdate strategy. Two chart cases,
  # one patch:
  #   * leaderElection OFF: the chart hardcodes `strategy.type: Recreate`, which
  #     conflicts under server-side apply with the live Deployment's API-defaulted
  #     rollingUpdate block ("rollingUpdate may not be specified when strategy
  #     type is 'Recreate'"), wedging every upgrade -- the original #1922 incident.
  #   * leaderElection ON (our HA config, replicaCount > 1): the chart renders NO
  #     `spec.strategy` block at all (defaults to RollingUpdate), so a
  #     `replace /spec/strategy/type` op fails with "doc is missing path:
  #     /spec/strategy/type" and the install fails.
  # A single `op: add /spec/strategy` of the full object covers both: JSON-Patch
  # `add` CREATES the block when the chart omits it (leaderElection on) and
  # REPLACES it when the chart sets Recreate (off). Setting the rollingUpdate
  # params explicitly (the Kubernetes defaults) keeps the applied object matching
  # the live one so drift detection (which does not ignore /spec/strategy) sees
  # no diff. Leader election makes the brief pod overlap a rolling update allows
  # safe.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: flagger
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 25%
                    maxUnavailable: 25%
