apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-velero
  namespace: velero
spec:
  endpointSelector: {}
  egress:
    # Kube API for backup operations
    - toEntities:
        - kube-apiserver
    # S3-compatible backup target (Cloudflare R2 in prod; the pattern matches
    # any R2 account host without committing the account id). Pinned by FQDN
    # instead of world:443 so a compromised pod cannot exfiltrate backups to
    # arbitrary external services. Local/CI uses the in-cluster MinIO rule
    # below instead.
    - toFQDNs:
        - matchPattern: "*.r2.cloudflarestorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # In-cluster MinIO for local/CI backup target
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: minio
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # DNS resolution. rules.dns engages Cilium's L7 DNS proxy so the toFQDNs
    # allow-list above can be enforced; matchPattern "*" leaves resolution
    # itself unrestricted (the FQDN list constrains where traffic may go).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
