apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  chart:
    spec:
      chart: velero
      version: 12.1.0
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  timeout: 15m
  # https://github.com/vmware-tanzu/helm-charts/blob/main/charts/velero/values.yaml
  values:
    # Disable the bundled `velero install --crds-only` upgrade hook. The chart
    # ships its CRDs under crds/, and this HelmRelease already sets
    # install.crds/upgrade.crds: CreateReplace, so Flux manages the velero CRDs
    # directly. The redundant hook Job (velero-upgrade-crds) repeatedly hung
    # during cluster recovery and wedged the whole infrastructure-controllers
    # reconcile (2026-06-07 incident: upgrade/rollback thrash, then a stuck
    # pre-upgrade hook). Removing it lets velero reconcile cleanly via Flux while
    # CRDs stay managed by CreateReplace.
    upgradeCRDs: false
    image:
      repository: velero/velero
    initContainers:
      - name: velero-plugin-for-aws
        # PINNED at v1.14.0 — do NOT bump until a release is explicitly verified
        # to include the R2 tagging fix. The AWS SDK update in v1.14.1
        # serializes the always-set-but-empty PutObject Tagging field as a
        # literal empty `x-amz-tagging` header, and Cloudflare R2 rejects any
        # tagging header with `501 NotImplemented` — every backup then fails
        # at the final metadata upload
        # ("error putting object .../velero-backup.json").
        # Upstream fix (skip the header when no tags are configured) is open
        # but unreleased: velero-io/velero-plugin-for-aws#299 / #303.
        # v1.14.2 was deployed on 2026-07-04 without that fix and broke every
        # nightly backup, so Renovate is hard-pinned too. Safe to relax only
        # after a release ships one of those PRs and succeeds against R2.
        image: velero/velero-plugin-for-aws:v1.14.0
        imagePullPolicy: IfNotPresent
        # Non-root hardening for the plugin-copy initContainer (Kubescape
        # C-0013). It only copies the AWS plugin binary into the shared
        # `plugins` emptyDir, so it needs neither root nor a writable root FS —
        # readOnlyRootFilesystem is safe here (unlike the main server below).
        # UID 65532 matches this image's baked nonroot user.
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
          - mountPath: /target
            name: plugins

    # Non-root securityContext for the velero SERVER (Kubescape C-0013 non-root
    # containers, plus C-0016 no-privilege-escalation and C-0055 drop-ALL).
    # The velero namespace is excluded from the cluster-wide
    # add-security-context Kyverno mutation (its node-agent DaemonSet needs
    # host access), so the server Deployment must declare its own — pod- and
    # container-level runAsNonRoot + runAsUser:65532 is exactly what C-0013
    # inspects on the rendered Deployment template.
    #
    # readOnlyRootFilesystem is deliberately LEFT FALSE on the server: velero
    # writes to the ROOT filesystem at /tmp — /tmp/credentials/<ns>, /tmp/udmrepo
    # (Kopia config when $HOME is unset) and the go-plugin unix socket — and the
    # chart mounts no emptyDir at /tmp, so a read-only root would break every
    # backup. C-0017 stays covered by the velero infrastructure-privileged /
    # pod-security-mutations ClusterSecurityException. (The plugin-copy
    # initContainer above CAN use readOnlyRootFilesystem:true.)
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      fsGroup: 65532
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

    # Mount our SOPS-derived R2 credentials secret instead of the chart's
    # generated one. The chart only consults it; it never writes to it.
    credentials:
      useSecret: true
      existingSecret: velero-r2-credentials

    # Cloudflare R2 backup target. Bucket + endpoint come from the shared
    # variables-base ConfigMap; prefix is reused per consumer (PR #3).
    configuration:
      # The server and its generated repository-maintenance Jobs run as UID
      # 65532. That image user has no passwd-backed home, so Kopia otherwise
      # resolves its config directory to root-owned /udmrepo and maintenance
      # fails with permission denied. Repository-maintenance Jobs inherit the
      # deployment environment; point HOME at the existing writable /scratch
      # emptyDir so both paths use /scratch/udmrepo without weakening non-root.
      extraEnvVars:
        - name: HOME
          value: /scratch
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: ${r2_bucket}
          prefix: ${r2_prefix_velero}
          default: true
          config:
            region: ${r2_region}
            s3ForcePathStyle: "true"
            s3Url: ${r2_endpoint}
            checksumAlgorithm: ""
      # Base / local-CI default: file-system backup via Kopia (the docker
      # local-path provider cannot take CSI snapshots). The hetzner overlay
      # adds a Velero Volume Policy that routes Longhorn-backed PVCs to CSI
      # snapshot + data mover; everything else — e.g. openbao on hcloud block
      # storage, which has no snapshot support — falls back to this FSB default.
      # defaultVolumesToFsBackup stays true precisely so it is the fail-safe for
      # any volume the policy does not match. Data lands in the same R2 BSL
      # either way, so backups stay portable for cross-provider restore.
      # volumeSnapshotLocation stays empty: with the data mover, CSI snapshot
      # data goes to the BackupStorageLocation, not a VolumeSnapshotLocation.
      volumeSnapshotLocation: []
      defaultVolumesToFsBackup: true
      uploaderType: kopia
      # Kopia repository maintenance cadence. Velero's built-in default is 1h,
      # so with one BackupRepository per backed-up namespace it spins up ~16
      # short-lived `*-kopia-maintain-job-*` pods every hour. That hourly churn
      # of fast-exiting Job containers is the dominant trigger for the kubescape
      # node-agent SBOM reap-race and the containerd "find container" NotFound
      # log noise. Kopia's own default maintenance interval is 24h, which is
      # ample for repo compaction/GC at this scale, so raise it to cut the churn
      # ~24x. (Applies to newly-created BackupRepositories; existing ones keep
      # their stored frequency until recreated.)
      defaultRepoMaintainFrequency: 24h
      features: ""

    # Velero runs a SINGLE replica — this is correct, not a gap, and is why
    # Coroot's "single instance - not resilient to node failure" flag is a
    # known false-positive for this workload (the velero namespace is also
    # exempt from the require-replica-floor Kyverno policy for the same reason).
    #
    # The Velero *server* has NO leader election and does NOT support running
    # multiple active replicas: two servers would both run the controller loops
    # and double-run / compete on the same backups & schedules. Upstream still
    # treats the server as single-instance (vmware-tanzu/velero#2694). At the
    # version this HelmRelease pins (chart 12.0.2 → Velero v1.18.1), the chart's
    # deployment.yaml additionally HARDCODES `replicas: 1` and never reads
    # `.Values.replicaCount`, so the count cannot be raised from values anyway —
    # `helm template --set replicaCount=2` still renders `replicas: 1`. (An
    # earlier comment here claimed the server was leader-elected; that was
    # incorrect — corrected to match the accurate rationale already in
    # k8s/clusters/prod/bootstrap/config-map.yaml and the
    # validate-replica-floor policy.)
    #
    # Resilience to node failure therefore comes from FAST RESCHEDULE, not a warm
    # standby: on a node loss the Deployment's sole pod is recreated on a healthy
    # node, and Velero resumes its controller loops from API/object-store state
    # (in-flight backups are retried; nothing is lost). No PriorityClass is added
    # — no other controller in this infrastructure tier uses one, so a lone
    # velero-only PriorityClass would be inconsistent for marginal benefit.
    #
    # Upgrade path: if a future Velero release adds server leader election (and
    # the chart exposes a real `replicaCount`), this can become true HA — scale
    # to ${velero_replicas} with a `maxUnavailable: 1` PDB and keep the spread
    # below. Until then `velero_replicas` stays 1 everywhere (the default here and
    # the prod override) and the value is effectively cosmetic given the hardcode.
    replicaCount: ${velero_replicas:=1}
    # Harmless at 1 replica (single pod trivially satisfies maxSkew); retained so
    # that if the chart ever honours replicaCount and the server gains leader
    # election, scaling up already spreads pods across nodes (kept per the
    # upgrade-path note above).
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: velero
            app.kubernetes.io/instance: velero
    # `Recreate` matches the chart default and is the right fit for a single
    # backup controller: a brief blip during an upgrade is acceptable and it
    # avoids needing a surge pod the CX23 prod nodes cannot host. (No PDB: with a
    # single replica a `minAvailable: 1` PDB would deadlock pod eviction during a
    # node drain.)
    strategy:
      type: Recreate

    # Node agent: DaemonSet, runs the Kopia uploader on every node that has
    # PVCs. Defaults are sane; just confirm rolling update.
    deployNodeAgent: true
    nodeAgent:
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
      # Explicit (tiny) resources for the per-volume VGDP micro-service pods —
      # see config-map.yaml for why the Kyverno-stamped 128Mi default
      # request gets them rejected on memory-saturated nodes.
      extraArgs:
        - --node-agent-configmap=node-agent-config
        # Memory-saturated cluster: the data-mover exposer pods that move
        # Longhorn CSI snapshots to R2 cannot all be scheduled within the
        # default 30m prepare window, so a chunk of each daily run's DataUploads
        # fail with "timeout on preparing data upload" (node never assigned) —
        # 4 of 7 on 2026-06-16, and every daily backup PartiallyFailed since
        # 06-10. The volume snapshots themselves complete; only the data-mover
        # prepare step starves. Widen the window so queued DataUploads wait for
        # a node slot to free as earlier ones finish, instead of timing out.
        # Off-peak daily backup (02:17), so a longer prepare window is free.
        - --data-mover-prepare-timeout=2h

    # Daily backup of every namespace that has PVCs. 14-day retention
    # matches the 24h RPO target. Long-term retention is handled by R2
    # object lock + lifecycle, not by Velero, so a corrupted controller
    # cannot accidentally delete history.
    schedules:
      daily-full:
        disabled: false
        schedule: "17 2 * * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: "336h"
          storageLocation: default
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
            - velero
          # snapshotMoveData makes Velero's data mover upload CSI snapshots to
          # the R2 BSL. No-op on base/local (no CSI — everything uses FSB);
          # active in prod, where the hetzner overlay sets features: EnableCSI
          # and a volume policy routes Longhorn PVCs to the snapshot path.
          snapshotMoveData: true
          defaultVolumesToFsBackup: true

    metrics:
      enabled: true

    # Velero's memory is extremely bursty: the server idles at ~55Mi but spikes to
    # ~770Mi for the ~3 minutes of the daily backup (VPA's observed upperBound was
    # 770Mi). The auto-vpa policy right-sizes the *request* to steady-state (~105Mi)
    # and, under RequestsAndLimits, scales the *limit* proportionally to the authored
    # limit:request ratio. At the previous 4:1 ratio (512Mi:128Mi) the effective limit
    # was only ~419Mi — below the backup peak — so the server was OOMKilled mid-backup
    # and the daily backup Failed three days running (2026-06-25..27).
    #
    # Fix without fighting VPA (auto-vpa's generate rule is immutable, so velero cannot
    # be excluded from it in place): widen the authored ratio to 16:1 (2Gi:128Mi). VPA
    # preserves the ratio, so the effective limit is always 16x the request it sets,
    # and it never sets the request below auto-vpa's 64Mi floor — so the limit is always
    # >= 1Gi (16 x 64Mi), clearing the 770Mi peak. At the ~105Mi steady-state target the
    # limit lands ~1.6Gi. (The live pod confirms VPA keeps the ratio: 4:1 authored ->
    # 419Mi:105Mi observed.) node-agent is unaffected — its own resources, not bursty.
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        memory: 2Gi
