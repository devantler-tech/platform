apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 5m
  chart:
    spec:
      chart: velero
      version: 12.0.1
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
      remediateLastFailure: true
  timeout: 15m
  # https://github.com/vmware-tanzu/helm-charts/blob/main/charts/velero/values.yaml
  values:
    # Disable the bundled `velero install --crds-only` upgrade hook. The chart
    # ships its CRDs under crds/, and this HelmRelease already sets
    # install.crds/upgrade.crds: CreateReplace, so Flux manages the velero CRDs
    # directly. The redundant hook Job (velero-upgrade-crds) repeatedly hung
    # during cluster recovery and wedged the whole infrastructure-controllers
    # reconcile (2026-06-07 incident: upgrade/rollback thrash, then a stuck
    # pre-upgrade hook). Removing it lets velero reconcile cleanly via Flux while
    # CRDs stay managed by CreateReplace.
    upgradeCRDs: false
    image:
      repository: velero/velero
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.14.1
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins

    # Mount our SOPS-derived R2 credentials secret instead of the chart's
    # generated one. The chart only consults it; it never writes to it.
    credentials:
      useSecret: true
      existingSecret: velero-r2-credentials

    # Cloudflare R2 backup target. Bucket + endpoint come from the shared
    # variables-base ConfigMap; prefix is reused per consumer (PR #3).
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: ${r2_bucket}
          prefix: ${r2_prefix_velero}
          default: true
          config:
            region: ${r2_region}
            s3ForcePathStyle: "true"
            s3Url: ${r2_endpoint}
            checksumAlgorithm: ""
      # Base / local-CI default: file-system backup via Kopia (the docker
      # local-path provider cannot take CSI snapshots). The hetzner overlay
      # adds a Velero Volume Policy that routes Longhorn-backed PVCs to CSI
      # snapshot + data mover; everything else — e.g. openbao on hcloud block
      # storage, which has no snapshot support — falls back to this FSB default.
      # defaultVolumesToFsBackup stays true precisely so it is the fail-safe for
      # any volume the policy does not match. Data lands in the same R2 BSL
      # either way, so backups stay portable for cross-provider restore.
      # volumeSnapshotLocation stays empty: with the data mover, CSI snapshot
      # data goes to the BackupStorageLocation, not a VolumeSnapshotLocation.
      volumeSnapshotLocation: []
      defaultVolumesToFsBackup: true
      uploaderType: kopia
      features: ""

    # Run Velero itself with HA primitives matching the rest of the
    # operator tier (PR #2b). Server is leader-elected so 2 replicas =
    # instant failover, not extra capacity.
    #
    # Intentionally no PodDisruptionBudget: velero uses leader election,
    # so pod-level PDB adds no availability; with replicaCount=1 on prod
    # (`velero_replicas=1`), a PDB with `minAvailable: 1` creates a
    # classic deadlock where a rolling upgrade cannot evict the sole
    # pod. `Recreate` strategy is a better fit: brief blip during an
    # upgrade is acceptable for a backup controller and avoids requiring
    # a surge pod that the CX23 prod nodes cannot host.
    replicaCount: ${velero_replicas:=2}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: velero
            app.kubernetes.io/instance: velero
    strategy:
      type: Recreate

    # Node agent: DaemonSet, runs the Kopia uploader on every node that has
    # PVCs. Defaults are sane; just confirm rolling update.
    deployNodeAgent: true
    nodeAgent:
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1

    # Daily backup of every namespace that has PVCs. 14-day retention
    # matches the 24h RPO target. Long-term retention is handled by R2
    # object lock + lifecycle, not by Velero, so a corrupted controller
    # cannot accidentally delete history.
    schedules:
      daily-full:
        disabled: false
        schedule: "17 2 * * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: "336h"
          storageLocation: default
          includedNamespaces:
            - "*"
          excludedNamespaces:
            - kube-system
            - velero
          # snapshotMoveData makes Velero's data mover upload CSI snapshots to
          # the R2 BSL. No-op on base/local (no CSI — everything uses FSB);
          # active in prod, where the hetzner overlay sets features: EnableCSI
          # and a volume policy routes Longhorn PVCs to the snapshot path.
          snapshotMoveData: true
          defaultVolumesToFsBackup: true

    metrics:
      enabled: true

    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        memory: 512Mi
