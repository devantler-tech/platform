---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  chart:
    spec:
      chart: cilium
      version: 1.19.4
      sourceRef:
        kind: HelmRepository
        name: cilium
  interval: 10m0s
  timeout: 10m
  # https://github.com/cilium/cilium/blob/main/install/kubernetes/cilium/values.yaml
  values:
    # Roll the agent DaemonSet whenever the cilium-config ConfigMap changes.
    # Cilium agents read their config ONLY at startup; without this, a Helm
    # values change updates the ConfigMap and nothing else — the fix is
    # "live" in Git and in the CM while every agent keeps running the old
    # config until its next unrelated restart. Bit hard on 2026-06-10:
    # #1944 (encryption-strict-egress-allow-remote-node-identities, the
    # cross-node black-hole fix) was merged 16h earlier and had taken effect
    # on ZERO nodes (all agents predated the merge), so the bug it fixed was
    # still dropping cross-node flows (KEDA scaler liveness kills, operator
    # -> scaler i/o timeouts). Agent restarts are designed to be
    # datapath-non-disruptive (eBPF state persists), and the DS rolls one
    # node at a time per updateStrategy.
    rollOutCiliumPods: true
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    k8sServiceHost: localhost
    k8sServicePort: 7445
    hubble:
      enabled: true
      tls:
        auto:
          # Use a CronJob (instead of helm) so cert renewal does not require
          # a Helm release upgrade.
          method: cronJob
      relay:
        enabled: true
        replicas: ${cilium_replicas:=2}
        rollOutPods: true
        podDisruptionBudget:
          enabled: true
          # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 never
          # deadlocks a node drain regardless of replica count. A PDB can't set
          # both fields, so minAvailable is nulled.
          minAvailable: null
          maxUnavailable: 1
      ui:
        enabled: true
        # KEDA HTTP add-on scales hubble-ui between 0 and 1 based on traffic.
        # The replica count here is the initial value at HelmRelease apply
        # time only — KEDA's HTTPScaledObject takes over immediately.
        replicas: ${hubble_ui_replicas:=1}
        rollOutPods: true
        # PDB intentionally disabled: incompatible with scale-to-zero managed by KEDA.
        podDisruptionBudget:
          enabled: false
    operator:
      replicas: ${cilium_replicas:=2}
      # Restart on cilium-config changes (same rationale as rollOutCiliumPods).
      rollOutPods: true
      # memory 256Mi -> 128Mi: live prod usage is 36-77Mi across both
      # replicas (2026-06-03). 128Mi keeps the operator in Burstable QoS
      # (request > 0 -- the BestEffort escape that matters) with ~1.7x
      # headroom over the observed peak. The operator runs on the
      # control-plane nodes, so this frees control-plane memory requests.
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
      podDisruptionBudget:
        enabled: true
        # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 never
        # deadlocks a node drain regardless of replica count. A PDB can't set
        # both fields, so minAvailable is nulled.
        minAvailable: null
        maxUnavailable: 1
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
    clustermesh:
      apiserver:
        replicas: ${cilium_replicas:=2}
    ipam:
      mode: kubernetes
    kubeProxyReplacement: true
    # ------------------------------------------------------------------
    # Resource requests for the agent DaemonSet and the standalone
    # cilium-envoy DaemonSet. These promote the pods out of BestEffort
    # QoS so they survive node memory pressure; an OOMKilled cilium-agent
    # leaves BPF state degraded and the node loses ClusterIP routing
    # (observed cascading into ~13 workload crash-loops on prod-worker-2,
    # 2026-05-28). Limits intentionally unset — Cilium recommends against
    # capping the agent (https://docs.cilium.io/en/stable/operations/performance/).
    # ------------------------------------------------------------------
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
    envoy:
      # Restart on config changes (same rationale as rollOutCiliumPods).
      rollOutPods: true
      resources:
        requests:
          cpu: 50m
          # memory 128Mi -> 64Mi: the standalone cilium-envoy DaemonSet uses
          # only 17-29Mi per node in live prod (2026-06-03). 64Mi keeps it in
          # Burstable QoS (still out of BestEffort, so it survives node memory
          # pressure -- the protection this block exists for) with >2x headroom
          # over peak, while freeing ~64Mi of reserved-unused request on every
          # node (~256Mi across the workers, which sat at 98-99% memory requests).
          memory: 64Mi
    # Transparent WireGuard encryption for pod-to-pod traffic.  KubeSpan
    # (Talos-layer WireGuard between nodes) is not enabled in this cluster,
    # so without this setting inter-node pod traffic would transit the
    # Hetzner private network in cleartext.
    # SPIRE mutual authentication below provides workload *identity*; this
    # block provides on-the-wire *encryption*. They are independent and
    # complementary.
    #
    # Requires the kernel WireGuard module (present in the Talos kernel
    # since 5.6) and kubeProxyReplacement=true (set above).
    # Disabled in the Docker provider overlay — local-only traffic never
    # leaves a single Docker container.
    encryption:
      enabled: true
      type: wireguard
      # nodeEncryption (host-to-host encryption, upstream beta) is OFF —
      # it silently BLACK-HOLES host-to-remote-node traffic in this
      # tunnel-routing topology. Diagnosed live 2026-06-10: node IPs sit in
      # the ipcache with encryptkey=255, host egress to them is steered into
      # the WireGuard datapath and never emerges (no 51871 datagrams on any
      # NIC, no drop events) — EXCEPT control planes, which the chart's
      # default node-encryption-opt-out-labels
      # (node-role.kubernetes.io/control-plane) exempts, hence the telltale
      # asymmetry: worker->CP host flows work, worker->worker are dead.
      # That killed cilium-health (4240) and, critically, the SPIRE
      # mesh-auth handshakes (4250) between all non-CP node pairs, so every
      # auth-gated pod flow between worker-class nodes black-holed once its
      # auth-cache entry expired (KEDA scaler liveness kills, ESO->OpenBao
      # 503s/timeouts, OpenBao raft joins). Active since the 06-06 agent
      # restart picked up #1804; #1944 addressed a different vector
      # (strict-mode plaintext drops) and did not fix this.
      #
      # Security posture: pod-to-pod traffic (the actual workload data)
      # stays WireGuard-encrypted and fail-closed via strictMode (hetzner
      # patch). Host-to-host traffic is cluster control-plane chatter that
      # is mTLS/TLS at the application layer anyway (SPIRE mesh-auth IS
      # mTLS, kubelet/apiserver are TLS). Re-evaluate once upstream
      # stabilizes node encryption under tunnel routing
      # (cilium/cilium#37919 and the encryption-wireguard known limitations).
      nodeEncryption: false
    authentication:
      enabled: true
      mutual:
        spire:
          enabled: true
          install:
            namespace: kube-system
            existingNamespace: true
            # Resource requests promote spire-server and spire-agent pods
            # out of BestEffort QoS. cilium-agent's SPIRE Delegate API
            # client relies on the per-node spire-agent admin socket — if
            # the agent is evicted/OOMKilled the cilium-agent on that
            # node stays stuck retrying "SPIRE admin socket does not
            # exist" and ClusterIP routing degrades alongside it.
            agent:
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
            # TODO: Remove workaround when SPIRE no longer fails to start (https://github.com/cilium/cilium/issues/40533)
            server:
              # spire-server is a single-replica StatefulSet backed by an
              # SQLite datastore on a ReadWriteOnce PVC (Cilium chart default).
              # Now that the hetzner require-mutual-auth policy enforces
              # pod-to-pod mTLS, this server sits in the data path: while it is
              # down, NEW identity pairs cannot authenticate. Established flows
              # ride through via cilium-agent's auth cache, and the
              # cilium-operator re-syncs entries from CiliumIdentities, so brief
              # restarts are tolerable.
              #
              # The datastore StorageClass is intentionally NOT set here. On
              # hetzner it is pinned to hcloud-csi by the prod overlay
              # (providers/hetzner/.../cilium/patches/spire-datastorage-patch.yaml)
              # — NOT the cluster-default longhorn. The reason is a circular
              # dependency: Longhorn's own control plane is pod-to-pod traffic
              # behind this very mTLS gate, so binding spire-server's PVC to
              # longhorn means that when SPIRE is down Longhorn cannot attach the
              # PVC, so SPIRE cannot start, so it stays down — a deadlock that
              # wedged all of prod during the 2026-06-06 Talos node roll. An
              # hcloud Cloud Volume attaches via the Hetzner API (not pod-to-pod)
              # and survives node death, breaking the cycle. See the overlay
              # patch for the full rationale and the one-time StatefulSet-recreate
              # step (volumeClaimTemplate is immutable).
              #
              # Do NOT make these tempting "HA" changes:
              #   * replicas > 1 — the SQLite + RWO datastore is single-writer;
              #     real HA needs an external SQL datastore (a much larger
              #     change, out of scope here).
              #   * a minAvailable PodDisruptionBudget — with one replica it
              #     only blocks node drains / autoscaler scale-down / Talos
              #     upgrades, without adding any availability.
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
              initContainers:
              - command:
                - /bin/sh
                - -c
                - |
                  chown -R 1000:1000 /run/spire/data
                  chown -R 1000:1000 /tmp/spire-server
                image: docker.io/library/busybox:1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
                imagePullPolicy: IfNotPresent
                name: chown
                securityContext:
                  runAsGroup: 0
                  runAsUser: 0
                volumeMounts:
                - mountPath: /run/spire/data
                  name: spire-data
                - mountPath: /tmp/spire-server/private
                  name: spire-server-socket
              # Pod-level security context. The chart injects a `cilium-init`
              # bootstrap container (with no securityContext of its own) into this
              # pod; it seeds the SPIRE registration entries for Cilium and must run
              # as 1000 to MATCH spire-server. cilium-init reaches spire-server's
              # admin socket via /proc/<pid>/root, which is ptrace-gated — the
              # caller's uid+gid must equal the target's. If cilium-init runs as root
              # (0) while spire-server runs as 1000 it is denied, hangs forever on
              # "Waiting for spire-server to start...", and never creates the entries.
              # SPIRE then issues no SVIDs, so the require-mutual-auth policy
              # black-holes pod-to-pod traffic cluster-wide (kustomize/helm-controller
              # can no longer reach source-controller — wedging every Flux
              # reconciliation). `server.securityContext` below sets only the
              # spire-server *container* and leaves cilium-init as root, so this
              # pod-level block is what actually fixes the bootstrap.
              # (cilium/cilium#40533)
              podSecurityContext:
                runAsGroup: 1000
                runAsUser: 1000
              securityContext:
                runAsGroup: 1000
                runAsUser: 1000
    gatewayAPI:
      enabled: true
      enableAlpn: true
