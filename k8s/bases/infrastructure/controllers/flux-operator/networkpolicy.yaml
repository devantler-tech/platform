apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-flux
  namespace: flux-system
spec:
  endpointSelector: {}
  ingress:
    # flux-operator-web UI: the cold-start path is Gateway -> KEDA interceptor
    # -> flux-operator-web:9080, so the client reaching :9080 is the interceptor
    # pod in the keda namespace, not the reserved "ingress" identity.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: keda
      toPorts:
        - ports:
            - port: "9080"
              protocol: TCP
    # Webhook notifications
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Intra-namespace (controller-to-controller communication)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flux-system
  egress:
    # Intra-namespace (controller-to-controller communication)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flux-system
    # Kube API
    - toEntities:
        - kube-apiserver
    # OCI registries, Dex OIDC (all via Cloudflare proxy)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
