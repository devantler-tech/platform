---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  chart:
    spec:
      chart: flux-operator
      version: 0.50.0
      sourceRef:
        kind: HelmRepository
        name: flux-operator
  interval: 10m0s
  timeout: 10m
  values:
    web:
      # The Flux Operator's bundled Status web UI is disabled: Flux is surfaced
      # in-cluster through Headlamp's `headlamp_flux` plugin (see
      # bases/apps/headlamp), so a standalone Flux dashboard is redundant. This
      # release is the operator/reconciler only and must stay running at all
      # times.
      enabled: false
