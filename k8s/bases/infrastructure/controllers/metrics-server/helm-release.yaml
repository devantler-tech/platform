apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
  labels:
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: metrics-server
      version: 3.13.0
      sourceRef:
        kind: HelmRepository
        name: metrics-server
  # https://github.com/kubernetes-sigs/metrics-server/blob/master/charts/metrics-server/values.yaml
  values:
    replicas: ${metrics_server_replicas:=2}
    podDisruptionBudget:
      enabled: true
      # Stays minAvailable: 1: ksail bootstrap-installs metrics-server (ksail.yaml
      # metricsServer: Enabled) with its default minAvailable PDB before Flux;
      # flipping to maxUnavailable conflicts at server-side apply ("minAvailable
      # and maxUnavailable cannot be both set"). Drain-safe at the 2-replica
      # floor. Exempt from validate-pdb-drain-safe.
      minAvailable: 1
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: metrics-server
            app.kubernetes.io/instance: metrics-server
