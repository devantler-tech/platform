apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: cert-manager
      version: v1.20.3
      sourceRef:
        kind: HelmRepository
        name: cert-manager
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  # https://github.com/cert-manager/cert-manager/blob/master/deploy/charts/cert-manager/values.yaml
  values:
    # DNS-01 self-check resolvers. Before asking the CA to validate, cert-manager
    # must itself observe the ACME `_acme-challenge` TXT record. By default it
    # resolves through the in-cluster chain (CoreDNS -> the node's upstream
    # resolver), which on this cluster does NOT observe freshly-created TXT
    # records in tenant zones: a www.ascoachingogvaner.dk challenge record that
    # was already live on all authoritative nameservers (ns1/2/3.simply.com) AND
    # on every public resolver (1.1.1.1/8.8.8.8/9.9.9.9) still failed
    # cert-manager's self check ("DNS record ... not yet propagated")
    # indefinitely, blocking ascoachingogvaner.dk issuance (apex took ~3h; www
    # never completed). The zone's 3600s SOA negative-cache (minimum) TTL makes
    # the in-cluster path pathologically slow/stale. Query public recursive
    # resolvers directly instead (reachable via the allow-cert-manager world:53
    # egress). This is cert-manager's documented remedy for unreliable
    # in-cluster self-check DNS; it affects only the self check, never the
    # authoritative CA-side validation, and is fully reversible.
    dns01RecursiveNameservers: "1.1.1.1:53,8.8.8.8:53,9.9.9.9:53"
    dns01RecursiveNameserversOnly: true
    # Restricted PSS baseline: add runAsNonRoot to container SCs (chart leaves it unset, which fails validate-container-security).
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
    replicaCount: ${cert_manager_replicas:=2}
    podDisruptionBudget:
      enabled: true
      # Stays minAvailable: 1 (NOT the maxUnavailable house pattern): ksail
      # bootstrap-installs cert-manager (ksail.yaml certManager: Enabled) with
      # its default minAvailable PDB BEFORE Flux, so flipping to maxUnavailable
      # makes Flux's server-side apply conflict with ksail's field manager
      # ("minAvailable and maxUnavailable cannot be both set"). Drain-safe at the
      # 2-replica floor (cert_manager_replicas: "2"). Exempt from validate-pdb-drain-safe.
      minAvailable: 1
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: cert-manager
            app.kubernetes.io/instance: cert-manager
    webhook:
      replicaCount: ${cert_manager_replicas:=2}
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
      podDisruptionBudget:
        enabled: true
        # Stays minAvailable: 1 -- ksail bootstrap-installs cert-manager before
        # Flux; flipping to maxUnavailable conflicts at server-side apply.
        # Drain-safe at the 2-replica floor. Exempt from validate-pdb-drain-safe.
        minAvailable: 1
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: webhook
              app.kubernetes.io/instance: cert-manager
    cainjector:
      replicaCount: ${cert_manager_replicas:=2}
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
      podDisruptionBudget:
        enabled: true
        # Stays minAvailable: 1 -- ksail bootstrap-installs cert-manager before
        # Flux; flipping to maxUnavailable conflicts at server-side apply.
        # Drain-safe at the 2-replica floor. Exempt from validate-pdb-drain-safe.
        minAvailable: 1
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: cainjector
              app.kubernetes.io/instance: cert-manager
    crds:
      enabled: true
