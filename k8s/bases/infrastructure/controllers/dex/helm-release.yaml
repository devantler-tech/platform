apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
  namespace: dex
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: dex
      version: 0.24.1
      sourceRef:
        kind: HelmRepository
        name: dex
  # https://github.com/dexidp/helm-charts/blob/master/charts/dex/values.yaml
  values:
    replicaCount: ${dex_replicas:=2}
    podSecurityContext:
      runAsUser: 65534
      runAsGroup: 65534
    securityContext:
      runAsUser: 65534
    podDisruptionBudget:
      enabled: true
      # Drain-safe PDB pattern (#1880/#1882): maxUnavailable: 1 never deadlocks
      # a node drain regardless of replica count (minAvailable: 1 would the
      # moment dex_replicas dropped to 1).
      maxUnavailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: dex
            app.kubernetes.io/instance: dex
    # Dex writes a temporary copy of its config at startup. The
    # add-security-context policy enforces readOnlyRootFilesystem, so
    # /tmp must be an emptyDir to avoid EPERM.
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    ingress:
      enabled: false
    # Gateway API HTTPRoute rendered by the chart (replaces the former hand-rolled
    # httproute.yaml): attaches to the shared `platform` Gateway (kube-system, https
    # listener) and sets the platform-wide HSTS header; the chart auto-injects the
    # backendRef to the dex Service (:5556). dex's httpRoute support is EXPERIMENTAL
    # upstream but renders a route equivalent to the previous hand-authored one
    # (verified with `helm template`). The explicit PathPrefix `/` match is the
    # chart's required form of the hand-rolled match-all rule.
    httpRoute:
      enabled: true
      parentRefs:
        - name: platform
          namespace: kube-system
          sectionName: https
      hostnames:
        - dex.${domain}
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          filters:
            - type: ResponseHeaderModifier
              responseHeaderModifier:
                set:
                  - name: Strict-Transport-Security
                    value: max-age=63072000; includeSubDomains; preload
    envVars:
      - name: CLIENT_ID
        value: ${github_app_client_id}
      - name: CLIENT_SECRET
        value: ${github_app_client_secret}
    config:
      issuer: https://dex.${domain}
      oauth2:
        skipApprovalScreen: true
      storage:
        type: kubernetes
        config:
          inCluster: true
      staticClients:
        - name: Public Client
          id: public-client
          secret: ${dex_client_secret}
          redirectURIs:
            - "https://oauth2-proxy.${domain}/oauth2/callback"
            # Per-host oauth2-proxy callbacks for the Gateway API ExternalAuth SSO
            # (platform#1881). With a RELATIVE oauth2-proxy redirect_url, the
            # callback lands on the originating app host, so each protected host
            # must be whitelisted here. longhorn is Hetzner-only; listing it in
            # this base manifest is inert where Longhorn isn't deployed.
            - "https://${domain}/oauth2/callback"
            - "https://hubble.${domain}/oauth2/callback"
            - "https://observability.${domain}/oauth2/callback"
            - "https://opencost.${domain}/oauth2/callback"
            - "https://longhorn.${domain}/oauth2/callback"
            - "https://backstage.${domain}/oauth2/callback"
            - "https://headlamp.${domain}/oidc-callback"
            - "https://budget.${domain}/oidc/callback"
            - "https://vault.${domain}/ui/vault/auth/oidc/oidc/callback"
            - "https://ksail.${domain}/api/v1/auth/callback"
            # crossview authenticates natively against Dex as this shared
            # confidential client (k8s/bases/apps/crossview/helm-release.yaml,
            # config.sso.oidc); its callback path is /api/auth/oidc/callback.
            - "https://crossview.${domain}/api/auth/oidc/callback"
          trustedPeers:
            - kubectl
        - name: kubectl
          id: kubectl
          public: true
          redirectURIs:
            - "http://localhost:8000"
      connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: $CLIENT_ID
            clientSecret: $CLIENT_SECRET
            redirectURI: https://dex.${domain}/callback
            # CLIENT_ID/CLIENT_SECRET come from envVars (Flux substitution).
            # Dex resolves $VAR references from process env at runtime.
            teamNameField: slug
            useLoginAsID: false
            orgs:
              - name: devantler-tech
