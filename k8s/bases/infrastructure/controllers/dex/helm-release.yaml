apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
  namespace: dex
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  chart:
    spec:
      chart: dex
      version: 0.24.0
      sourceRef:
        kind: HelmRepository
        name: dex
  # https://github.com/dexidp/helm-charts/blob/master/charts/dex/values.yaml
  values:
    replicaCount: ${dex_replicas:=2}
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: dex
            app.kubernetes.io/instance: dex
    ingress:
      enabled: false
    envVars:
      - name: CLIENT_ID
        value: ${github_app_client_id}
      - name: CLIENT_SECRET
        value: ${github_app_client_secret}
    config:
      issuer: https://dex.${domain}
      oauth2:
        skipApprovalScreen: true
      storage:
        type: kubernetes
        config:
          inCluster: true
      staticClients:
        - name: Public Client
          id: public-client
          secret: ${dex_client_secret}
          redirectURIs:
            - "https://oauth2-proxy.${domain}/oauth2/callback"
            - "https://headlamp.${domain}/oidc-callback"
          trustedPeers:
            - kubectl
        - name: kubectl
          id: kubectl
          public: true
          redirectURIs:
            - "http://localhost:8000"
        - name: Flux Web
          id: flux-web
          secret: ${flux_web_client_secret}
          redirectURIs:
            - "https://flux.${domain}/oauth2/callback"
      connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: $CLIENT_ID
            clientSecret: $CLIENT_SECRET
            redirectURI: https://dex.${domain}/callback
            teamNameField: slug
            useLoginAsID: false
            orgs:
              - name: devantler-tech
