# Tenant RGD (#1932) — the KRO ResourceGraphDefinition that expands a
# small typed `Tenant` declaration into the full platform-side control-plane
# skeleton every tenant otherwise hand-copies (namespace, Flux-impersonated SA +
# RoleBinding, cosign-verified OCIRepository, impersonating Kustomization,
# ghcr-auth ExternalSecret, default-deny NetworkPolicy), with optional
# external-dns RBAC and SOPS decryption behind `includeWhen` toggles.
#
# Onboarding a tenant becomes a ~5-line `Tenant` CR instead of a ~7-file copy:
#
#   apiVersion: kro.run/v1alpha1
#   kind: Tenant
#   metadata: { name: ascoachingogvaner }
#   spec:
#     name: ascoachingogvaner
#     externalDns: true
#
# The OCIRepository URL (oci://ghcr.io/devantler-tech/<name>/manifests) and the
# cosign OIDC subject (the shared publish-app reusable workflow) are platform
# invariants — every tenant publishes through the same pipeline — so they are
# templated/fixed here rather than re-declared per tenant. Add an override field
# only if a future tenant diverges from the convention.
#
# Lands in the `infrastructure` layer (which `dependsOn` infrastructure-controllers
# where the KRO controller installs the RGD CRD) — a CR of an RGD-defined kind
# cannot share a Flux Kustomization with the controller that installs its CRD.
# Pre-1.0 KRO (v1alpha1): keep render-diffable; the `Tenant` instances arrive in
# the local-first pilot (step 3 of #1932), not here.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: tenant.kro.run
  labels:
    app.kubernetes.io/managed-by: ksail
  annotations:
    # Exempt from Flux postBuild envsubst. The `infrastructure` Kustomization
    # runs variable substitution (substituteFrom variables-base/variables-cluster),
    # which would try to expand this RGD's KRO `${...}` CEL expressions as Flux
    # variables and fail ("envsubst error: variable substitution failed: missing
    # closing brace"). Every `${...}` below is a KRO expression resolved by the
    # kro controller at instance time — this resource needs no Flux variables —
    # so substitution is disabled for it wholesale.
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  schema:
    apiVersion: v1alpha1
    kind: Tenant
    # Nested types for the optional multi-tenancy guardrails (#2522). Each
    # carries its own `enabled` toggle rather than relying on CEL `has()`
    # presence-detection on the parent object — this mirrors the RGD's own
    # already-live `externalDns`/`sops` boolean-toggle pattern (and kro's own
    # documented convention, e.g. `schema.spec.ingress.enabled`) instead of an
    # unproven pattern, since KRO's structural-schema defaulting is guaranteed
    # to materialise a nested boolean default even when the tenant omits the
    # parent field entirely, but `has()` on a whole optional object is not
    # exercised anywhere else in this file.
    types:
      TenantResourceQuota:
        enabled: boolean | default=false
        # Total across all pods in the namespace (both request AND limit —
        # kept as one pair per field to keep the CR small; split into
        # separate requests/limits inputs only if a tenant needs the nuance).
        cpu: string | default="4"
        memory: string | default="4Gi"
        pods: string | default="20"
      TenantLimitRange:
        enabled: boolean | default=false
        # Per-container defaults applied to any Pod that does not set its own
        # requests/limits — the standard Kubernetes LimitRange `default` /
        # `defaultRequest` pair.
        defaultCPU: string | default="500m"
        defaultMemory: string | default="512Mi"
        defaultRequestCPU: string | default="100m"
        defaultRequestMemory: string | default="128Mi"
    spec:
      # Tenant name — used verbatim as the namespace, ServiceAccount,
      # OCIRepository/Kustomization name, and ghcr-auth target. Required.
      name: string
      # The tenant runs its own external-dns instance (e.g. ascoachingogvaner's
      # simply.com zone) and needs the privileged cross-namespace reads granted
      # by the tenant-external-dns ClusterRoles.
      externalDns: boolean | default=false
      # The tenant's Flux Kustomization decrypts SOPS-encrypted manifests from
      # its artifact (e.g. wedding-app). Requires a `sops-age` Secret in the
      # tenant namespace, applied separately — secret material is NEVER inlined
      # into a Tenant spec.
      sops: boolean | default=false
      # Standard multi-tenancy guardrails (#1932 follow-up #2522): a
      # namespace-wide ResourceQuota and a per-container default LimitRange.
      # Both default to `enabled: false` — no behaviour change for existing
      # tenants until a tenant opts in.
      resourceQuota: TenantResourceQuota
      limitRange: TenantLimitRange
  resources:
    # --- Core skeleton (always rendered) ---------------------------------
    - id: tenantNamespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.name}
          labels:
            app.kubernetes.io/managed-by: ksail
            pod-security.kubernetes.io/enforce: restricted
            pod-security.kubernetes.io/enforce-version: latest
    - id: serviceAccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: ${schema.spec.name}
          namespace: ${tenantNamespace.metadata.name}
          labels:
            app.kubernetes.io/managed-by: ksail
        automountServiceAccountToken: false
        imagePullSecrets:
          - name: ghcr-auth
    - id: roleBinding
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: ${schema.spec.name}
          namespace: ${tenantNamespace.metadata.name}
          labels:
            app.kubernetes.io/managed-by: ksail
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          # Scoped tenant namespace-admin role (aggregated from *-tenant-edit
          # pieces) — like the built-in `edit` but WITHOUT pods/exec, so tenants
          # do not trip Kubescape C-0002. See cluster-roles/tenant-edit.yaml.
          kind: ClusterRole
          name: tenant-edit
        subjects:
          - kind: ServiceAccount
            name: ${serviceAccount.metadata.name}
            namespace: ${tenantNamespace.metadata.name}
    # GHCR image-pull secret, sourced from OpenBao (not a SOPS Secret) via the
    # shared cluster-scoped `openbao` ClusterSecretStore reading the platform
    # path infrastructure/ghcr/auth. Reconciled platform-side (flux-system), so
    # the `restrict-tenant-secret-stores` Kyverno policy carve-out applies.
    # Produces the `ghcr-auth` dockerconfigjson the OCIRepository (secretRef) and
    # ServiceAccount (imagePullSecrets) consume.
    - id: ghcrAuth
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ghcr-auth
          namespace: ${tenantNamespace.metadata.name}
          labels:
            app.kubernetes.io/managed-by: ksail
        spec:
          refreshInterval: 1h
          secretStoreRef:
            name: openbao
            kind: ClusterSecretStore
          target:
            name: ghcr-auth
            creationPolicy: Owner
            template:
              engineVersion: v2
              type: kubernetes.io/dockerconfigjson
              data:
                .dockerconfigjson: "{{ .dockerconfigjson }}"
          data:
            - secretKey: dockerconfigjson
              remoteRef:
                key: infrastructure/ghcr/auth
                property: dockerconfigjson
    # Default-deny NetworkPolicy mirroring the runtime Kyverno-generated
    # CiliumNetworkPolicy, so the static Kubescape scan sees the namespace as
    # network-restricted (C-0054). Behaviourally redundant with the runtime
    # default-deny (per-workload allow CiliumNetworkPolicies still apply
    # additively), so it adds no new restriction at runtime.
    - id: defaultDeny
      template:
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: default-deny
          namespace: ${tenantNamespace.metadata.name}
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
            - Egress
    # --- Optional multi-tenancy guardrails (#2522) -------------------------
    # Namespace-wide ResourceQuota, gated on `resourceQuota.enabled` (default
    # false — omitted ⇒ no behaviour change for existing tenants). Combines
    # requests and limits into one value per resource so the CR stays small;
    # split into separate inputs only if a tenant needs the extra nuance.
    - id: resourceQuota
      includeWhen:
        - ${schema.spec.resourceQuota.enabled}
      template:
        apiVersion: v1
        kind: ResourceQuota
        metadata:
          name: ${schema.spec.name}
          namespace: ${tenantNamespace.metadata.name}
          labels:
            app.kubernetes.io/managed-by: ksail
        spec:
          hard:
            requests.cpu: ${schema.spec.resourceQuota.cpu}
            requests.memory: ${schema.spec.resourceQuota.memory}
            limits.cpu: ${schema.spec.resourceQuota.cpu}
            limits.memory: ${schema.spec.resourceQuota.memory}
            pods: ${schema.spec.resourceQuota.pods}
    # Per-container default requests/limits, gated on `limitRange.enabled`
    # (default false). Applies only to a Container that omits its own
    # requests/limits — an explicit workload spec always wins.
    - id: limitRange
      includeWhen:
        - ${schema.spec.limitRange.enabled}
      template:
        apiVersion: v1
        kind: LimitRange
        metadata:
          name: ${schema.spec.name}
          namespace: ${tenantNamespace.metadata.name}
          labels:
            app.kubernetes.io/managed-by: ksail
        spec:
          limits:
            - type: Container
              default:
                cpu: ${schema.spec.limitRange.defaultCPU}
                memory: ${schema.spec.limitRange.defaultMemory}
              defaultRequest:
                cpu: ${schema.spec.limitRange.defaultRequestCPU}
                memory: ${schema.spec.limitRange.defaultRequestMemory}
    - id: ociRepository
      template:
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: ${schema.spec.name}
          namespace: ${tenantNamespace.metadata.name}
          labels:
            app.kubernetes.io/managed-by: ksail
        spec:
          interval: 1m
          ref:
            semver: ">=1.0.0"
          url: oci://ghcr.io/devantler-tech/${schema.spec.name}/manifests
          secretRef:
            name: ghcr-auth
          verify:
            provider: cosign
            matchOIDCIdentity:
              # publish-app.yaml is moving from devantler-tech/reusable-workflows into
              # devantler-tech/actions (actions#425 consumer repoint); both repo
              # subjects are accepted via ONE regex-alternated entry — cosign's keyless
              # attestation verification rejects MULTIPLE identity entries outright
              # ("unsupported: multiple identities are not supported at this time").
              # Narrow the alternation to actions-only once the first actions-signed
              # artifact has been published and verified.
              - issuer: '^https://token\.actions\.githubusercontent\.com$'
                subject: '^https://github\.com/devantler-tech/(reusable-workflows|actions)/\.github/workflows/publish-app\.yaml@.+$'
    # --- Flux Kustomization (one of two variants by `sops`) ---------------
    # The impersonating Kustomization that reconciles the tenant's own artifact
    # under its namespaced SA (bound to the `tenant-edit` role). Two variants because the SOPS `decryption`
    # block is a field of the Kustomization spec (not a separable resource) and
    # must be present ONLY for SOPS tenants — a `decryption.secretRef: sops-age`
    # on a tenant with no `sops-age` Secret would wedge reconciliation.
    - id: kustomization
      includeWhen:
        - ${!schema.spec.sops}
      template:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: ${schema.spec.name}
          namespace: ${tenantNamespace.metadata.name}
          labels:
            app.kubernetes.io/managed-by: ksail
          annotations:
            ksail.devantler.tech/reconcile-exclude: "true"
        spec:
          interval: 1m
          timeout: 5m
          retryInterval: 2m
          path: .
          prune: true
          wait: true
          force: true
          serviceAccountName: ${serviceAccount.metadata.name}
          sourceRef:
            kind: OCIRepository
            name: ${ociRepository.metadata.name}
          targetNamespace: ${tenantNamespace.metadata.name}
    - id: kustomizationSops
      includeWhen:
        - ${schema.spec.sops}
      template:
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: ${schema.spec.name}
          namespace: ${tenantNamespace.metadata.name}
          labels:
            app.kubernetes.io/managed-by: ksail
          annotations:
            ksail.devantler.tech/reconcile-exclude: "true"
        spec:
          interval: 1m
          timeout: 5m
          retryInterval: 2m
          path: .
          prune: true
          wait: true
          force: true
          serviceAccountName: ${serviceAccount.metadata.name}
          sourceRef:
            kind: OCIRepository
            name: ${ociRepository.metadata.name}
          targetNamespace: ${tenantNamespace.metadata.name}
          decryption:
            provider: sops
            secretRef:
              name: sops-age
    # --- external-dns RBAC (only when the tenant runs external-dns) -------
    # Privileged cross-namespace reads a tenant's `tenant-edit` RoleBinding cannot
    # self-grant: HTTPRoutes (own namespace), the shared Gateway (kube-system),
    # and Namespaces (cluster-wide informer). Capabilities live in the
    # tenant-external-dns / tenant-external-dns-global ClusterRoles
    # (infrastructure/cluster-roles/). The tenant creates the `external-dns` SA
    # itself in its own artifact; only these bindings are platform territory.
    - id: externalDnsHttproutes
      includeWhen:
        - ${schema.spec.externalDns}
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: ${schema.spec.name}-external-dns
          namespace: ${tenantNamespace.metadata.name}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: tenant-external-dns
        subjects:
          - kind: ServiceAccount
            name: external-dns
            namespace: ${tenantNamespace.metadata.name}
    - id: externalDnsGateway
      includeWhen:
        - ${schema.spec.externalDns}
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: ${schema.spec.name}-external-dns
          namespace: kube-system
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: tenant-external-dns
        subjects:
          - kind: ServiceAccount
            name: external-dns
            namespace: ${tenantNamespace.metadata.name}
    - id: externalDnsNamespaces
      includeWhen:
        - ${schema.spec.externalDns}
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: ${schema.spec.name}-external-dns
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: tenant-external-dns-global
        subjects:
          - kind: ServiceAccount
            name: external-dns
            namespace: ${tenantNamespace.metadata.name}
