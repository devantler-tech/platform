# ExternalSecret CRs that replace standalone SOPS-substituted Secret files.
# Each creates a native K8s Secret in the target namespace from OpenBao.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-r2-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: velero-r2-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .access_key_id }}
          aws_secret_access_key={{ .secret_access_key }}
  data:
    - secretKey: access_key_id
      remoteRef:
        key: infrastructure/backup/r2
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: infrastructure/backup/r2
        property: secret_access_key
---
# GHCR pull credentials for Kyverno's image-verification policies
# (verify-image-signatures.yaml ImageValidatingPolicies): signature manifests
# of PRIVATE first-party images need authenticated GHCR reads. Same OpenBao
# path and shape as the per-app ghcr-auth pull secrets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-auth
  namespace: kyverno
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: ghcr-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: infrastructure/ghcr/auth
        property: dockerconfigjson
