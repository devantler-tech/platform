# Daily OpenBao raft snapshot to the vault-snapshots PVC (newest 14 kept),
# plus a health/seal-status check. Until 2026-06-10 this job ONLY did the
# health check despite its name — when the vault was wiped that day there
# was no snapshot to restore from. A raft snapshot pairs with the
# openbao-unseal Secret: restore via
#   bao operator raft snapshot restore <file>
# then unseal with the key that was current when the snapshot was taken
# (docs/dr/openbao-raft-ha-migration.md).
# Authenticates via Kubernetes auth (vault-snapshot role).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-snapshot
  namespace: openbao
spec:
  schedule: "30 3 * * *"
  # Pin the cron evaluation to UTC instead of inheriting kube-controller-manager's
  # local TZ: the 03:30 slot is sequenced between the velero-daily-full backup
  # (02:17 UTC) and the velero-backup-heartbeat check (07:00 UTC).
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      # Backstop for a hung run: the bao auth/status/snapshot-save calls have no
      # client-side timeout and can hang forever on a half-open connection, and
      # the PVC can wedge attaching — with concurrencyPolicy: Forbid a run that
      # never finishes would silently block every future daily snapshot. 30m is
      # ~10x a slow run including the OnFailure retries; on expiry the Job fails
      # and the next day's schedule gets a clean start.
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: vault-snapshot
        spec:
          serviceAccountName: vault-snapshot
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 100
            runAsGroup: 1000
            fsGroup: 1000
          volumes:
            - name: snapshots
              persistentVolumeClaim:
                claimName: vault-snapshots
          containers:
            - name: snapshot
              image: quay.io/openbao/openbao:2.5.3@sha256:fdc6da21ca6963560c32336fd7feb9cf2d5e52668f1a1647205a4b41171f0806
              env:
                # openbao-active = unsealed Raft leader only. Snapshots must be
                # taken from the leader — against the plain `openbao` Service
                # this round-robins across all pods and fails spuriously when
                # it lands on a sealed-but-Ready standby.
                - name: BAO_ADDR
                  value: http://openbao-active.openbao.svc.cluster.local:8200
              volumeMounts:
                - name: snapshots
                  mountPath: /snapshots
              command:
                - /bin/sh
                - -ec
                - |
                  # Authenticate via Kubernetes auth
                  JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
                  VAULT_TOKEN=$(bao write -field=token auth/kubernetes/login \
                    role=vault-snapshot \
                    jwt="$JWT")
                  export BAO_TOKEN="$VAULT_TOKEN"

                  # Check vault health and seal status
                  echo "Checking OpenBao health..."
                  STATUS=$(bao status -format=json)
                  echo "$STATUS"

                  if echo "$STATUS" | grep -q '"sealed": true'; then
                    echo "ERROR: Vault is sealed!"
                    exit 1
                  fi
                  echo "Vault is unsealed and healthy."

                  SNAP="/snapshots/openbao-$(date -u +%Y%m%d-%H%M%S).snap"
                  echo "Saving raft snapshot to $SNAP..."
                  bao operator raft snapshot save "$SNAP"
                  ls -l "$SNAP"

                  # Retention: keep the newest 14 snapshots
                  ls -1t /snapshots/openbao-*.snap 2>/dev/null | tail -n +15 | while read -r OLD; do
                    echo "Pruning $OLD"
                    rm -f "$OLD"
                  done
                  echo "Snapshot complete."
