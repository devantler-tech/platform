# One-shot initial snapshot at deploy time. Two jobs in one:
#
#   1. A baseline raft snapshot exists immediately after every vault-backup
#      change instead of waiting for the nightly 03:30 CronJob — after the
#      2026-06-10 KV wipe the gap between "snapshots configured" and "first
#      snapshot taken" was the whole exposure window.
#   2. It is the vault-snapshots PVC's first consumer. On clusters whose
#      default StorageClass uses volumeBindingMode: WaitForFirstConsumer
#      (the Talos+Docker CI cluster), a consumer-less PVC stays Pending,
#      kstatus reports it InProgress, and the wait-enabled `infrastructure`
#      Kustomization health-gates on it forever. Prod (longhorn, Immediate)
#      binds without this, but the base must work on both providers.
#
# Same retry pattern as the vault-config Job: the script fails until
# vault-config has created the vault-snapshot auth role and unsealed the
# vault, and OnFailure + backoffLimit keep retrying until then.
#
# Pod layout mirrors cronjob.yaml: snapshot as initContainer, off-cluster
# mirror as the main container — the baseline snapshot reaches the S3
# backup target immediately instead of waiting for the nightly mirror,
# which matters because the deploy-time baseline is often the ONLY
# snapshot during a change's first 24 hours.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-snapshot-init
  namespace: openbao
  annotations:
    # Jobs are immutable; let Flux delete-and-recreate on spec change.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 30
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app: vault-snapshot
    spec:
      serviceAccountName: vault-snapshot
      restartPolicy: OnFailure
      # The full restricted-PSS context is set explicitly (not left to the
      # add-security-context Kyverno mutation) so the pod stays hardened
      # even when created before the webhook is active on fresh bring-up.
      securityContext:
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: snapshots
          persistentVolumeClaim:
            claimName: vault-snapshots
        # R2 credentials synced by ESO (external-secret.yaml). Optional: on a
        # fresh cluster the mirror container skips with a log line until the
        # sync lands; the local snapshot is unaffected.
        - name: r2-credentials
          secret:
            secretName: vault-snapshot-r2
            optional: true
        - name: mc-config
          emptyDir: {}
      initContainers:
        - name: snapshot
          image: quay.io/openbao/openbao:2.5.3@sha256:fdc6da21ca6963560c32336fd7feb9cf2d5e52668f1a1647205a4b41171f0806
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              # kubescape C-0270/C-0271; generous for the raft snapshot step.
              cpu: 250m
              memory: 256Mi
          env:
            # openbao-active = unsealed Raft leader only (same rationale as
            # the CronJob in cronjob.yaml).
            - name: BAO_ADDR
              value: http://openbao-active.openbao.svc.cluster.local:8200
          volumeMounts:
            - name: snapshots
              mountPath: /snapshots
          command:
            - /bin/sh
            - -ec
            - |
              # Authenticate via Kubernetes auth
              JWT=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              VAULT_TOKEN=$(bao write -field=token auth/kubernetes/login \
                role=vault-snapshot \
                jwt="$JWT")
              export BAO_TOKEN="$VAULT_TOKEN"

              echo "Checking OpenBao health..."
              STATUS=$(bao status -format=json)
              echo "$STATUS"

              if echo "$STATUS" | grep -q '"sealed": true'; then
                echo "ERROR: Vault is sealed!"
                exit 1
              fi
              echo "Vault is unsealed and healthy."

              # Skip if the nightly CronJob already produced a snapshot today —
              # this job only guarantees a baseline exists.
              if ls /snapshots/openbao-"$(date -u +%Y%m%d)"-*.snap >/dev/null 2>&1; then
                echo "A snapshot from today already exists — nothing to do."
                exit 0
              fi

              SNAP="/snapshots/openbao-$(date -u +%Y%m%d-%H%M%S).snap"
              echo "Saving initial raft snapshot to $SNAP..."
              bao operator raft snapshot save "$SNAP"
              ls -l "$SNAP"
              echo "Initial snapshot complete."
      containers:
        - name: mirror
          image: quay.io/minio/mc:RELEASE.2025-04-08T15-39-49Z@sha256:7e3efb09c22c0882fbf341b9d99f61f94ae6c4c20a06f2f1a2b20ea8993d8952
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              # CPU limit for kubescape C-0270; generous for the mc mirror.
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: snapshots
              mountPath: /snapshots
              readOnly: true
            - name: r2-credentials
              mountPath: /r2
              readOnly: true
            - name: mc-config
              mountPath: /tmp/.mc
          command:
            - /bin/sh
            - -ec
            - |
              if [ ! -f /r2/access_key_id ]; then
                echo "vault-snapshot-r2 Secret not synced yet — skipping the"
                echo "off-cluster mirror. The local PVC snapshot above still ran."
                exit 0
              fi
              mc alias set backup "${r2_endpoint}" \
                "$(cat /r2/access_key_id)" "$(cat /r2/secret_access_key)"
              # Copy-only mirror (no --remove) + age-based prune, same
              # rationale as cronjob.yaml: an empty/recreated PVC can never
              # wipe the off-cluster history, and the prune only runs after a
              # successful upload in the same pod.
              mc mirror --overwrite /snapshots/ "backup/${r2_bucket}/openbao-snapshots/"
              mc rm --recursive --force --older-than 14d \
                "backup/${r2_bucket}/openbao-snapshots/" || true
              echo "Mirrored snapshots:"
              mc ls "backup/${r2_bucket}/openbao-snapshots/"
