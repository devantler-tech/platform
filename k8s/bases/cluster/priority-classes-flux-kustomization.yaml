---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: priority-classes
  namespace: flux-system
spec:
  interval: 60m
  timeout: 3m
  retryInterval: 2m
  # PriorityClasses must exist BEFORE any workload that references them.
  # kube-prometheus-stack (in infrastructure-controllers) sets
  # priorityClassName: platform-critical, and helm-controller rolls those pods
  # independently of when kustomize-controller applies the class — so only a
  # dedicated, depended-on Kustomization (wait: true) guarantees the class is
  # present first. Listing it inside controllers/ ordered the kustomize build,
  # not the Flux apply, so pods raced ahead with "no PriorityClass ... found".
  # Fixed path (not providers/__PROVIDER__/…) because the classes are identical
  # on every provider; clusters/* exclude this from the provider path-rewrite.
  path: bases/infrastructure/priority-classes
  sourceRef:
    kind: OCIRepository
    name: flux-system
  dependsOn:
    - name: variables
  wait: true
  prune: true
  force: true
