apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-crossview
  namespace: crossview
spec:
  endpointSelector: {}
  ingress:
    # Crossview has no public route; it is reached only through Headlamp's
    # crossview-headlamp plugin, which opens it via a Headlamp-managed
    # port-forward to this pod's :3001. That final hop is dialed by the kubelet
    # on the pod's node, so it arrives with the "host" identity (not a pod
    # identity) and is exempt from the SPIRE mutual-auth requirement — host has
    # no SVID, so authentication.mode must NOT be set here.
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "3001"
              protocol: TCP
    # Intra-namespace: app <-> bundled Postgres (and any Helm-test pods).
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: crossview
  egress:
    # Kube API — Crossview reads Crossplane CRDs, claims, composites, managed
    # resources, and providers.
    - toEntities:
        - kube-apiserver
    # Intra-namespace: app -> bundled Postgres (5432).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: crossview
    # DNS resolution (engages Cilium's L7 DNS proxy).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
