apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-crossview
  namespace: crossview
spec:
  endpointSelector: {}
  ingress:
    # Crossview has NO public route: the only entry point is the Headlamp
    # crossview-headlamp plugin's port-forward, whose final hop is dialed by the
    # kubelet on the pod's node, so it arrives with the "host" (or, cross-node,
    # "remote-node") identity. That identity carries no SPIFFE SVID and is exempt
    # from the cluster-wide require-mutual-auth policy — authentication.mode must
    # NOT be set here. (The port-forward reaches Crossview's own /login; without
    # a Dex session it cannot read cluster data.) Kubelet health probes reach the
    # pod via Cilium's implicit allow-localhost=auto path regardless.
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "3001"
              protocol: TCP
    # Intra-namespace: app <-> bundled Postgres (and any Helm-test pods).
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: crossview
  egress:
    # Kube API — Crossview reads Crossplane CRDs, claims, composites, managed
    # resources, and providers.
    - toEntities:
        - kube-apiserver
    # Dex OIDC server-side calls: the authorization-code -> token exchange and the
    # userinfo lookup (config.sso.oidc tokenURL / userInfoURL in helm-release.yaml)
    # go to the IN-CLUSTER Dex Service on :5556, which the pod can always resolve —
    # unlike the public dex.${domain} URL, which the browser (not this pod) hits
    # for the authorization redirect. Mirrors the oauth2-proxy egress.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: dex
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
    # Intra-namespace: app -> bundled Postgres (5432).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: crossview
    # DNS resolution (engages Cilium's L7 DNS proxy).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
