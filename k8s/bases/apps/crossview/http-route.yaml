# Route for Crossview at crossview.${domain} — a standalone, top-level dashboard
# reached directly in the browser and surfaced as a homepage tile (see the
# gethomepage.dev annotations below). Crossview is no longer embedded in Headlamp:
# the crossview-headlamp plugin framed it in an iframe, but its OIDC sign-in
# traverses Dex -> GitHub and github.com sends X-Frame-Options: deny, so the flow
# can never complete inside a frame. Served top-level, its native Dex OIDC works
# like every other platform app.
#
# Crossview authenticates itself via native Dex OIDC (helm-release.yaml), so this
# route goes STRAIGHT to crossview-service — there is no oauth2-proxy hop. The app
# gates its data routes (session middleware) and redirects unauthenticated users
# to its own /login, so the host is never an unauthenticated window into cluster
# state. The backendRef is same-namespace (crossview -> crossview-service), so no
# ReferenceGrant is needed.
#
# Prod/hetzner only in practice: this lives in bases/apps/crossview, but apps are
# opt-in on the local docker overlay, so the route renders only where Crossview
# is actually deployed.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crossview
  namespace: crossview
  annotations:
    # Homepage tile in the "Infrastructure as Code" group (between the Internal
    # Developer Platform and Kubernetes groups — see homepage config-map layout).
    # Homepage discovers this through its Gateway API HTTPRoute integration
    # (kubernetes.yaml gateway: true); the href derives from the route host and
    # the status dot from the app pod (pod-selector below).
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Crossview
    gethomepage.dev/description: Crossplane resource explorer.
    gethomepage.dev/group: Infrastructure as Code
    gethomepage.dev/icon: mdi-graph-outline
    gethomepage.dev/pod-selector: app.kubernetes.io/name=crossview,app.kubernetes.io/component=app
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - crossview.${domain}
  rules:
    - filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
              # Crossview is a standalone top-level app (no longer framed by
              # Headlamp), so deny cross-origin framing as clickjacking
              # protection. As CSP, frame-ancestors overrides X-Frame-Options in
              # modern browsers; 'self' still permits any same-origin sub-frame the
              # SPA may use while blocking every cross-origin embed.
              - name: Content-Security-Policy
                value: "frame-ancestors 'self'"
      backendRefs:
        - name: crossview-service
          port: 80
