apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossview
  namespace: crossview
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: crossview
      # 4.5.0 carries the upstream OIDC fix this deployment depends on: an empty
      # `issuer` now skips discovery entirely, so the explicit split-horizon
      # endpoints below are used verbatim (see config.sso.oidc).
      version: 4.5.0
      sourceRef:
        kind: HelmRepository
        name: crossview
  # Harden against Kubescape C-0017 (immutable container filesystem). The chart
  # exposes app/database.containerSecurityContext but NO extraVolumes/
  # extraVolumeMounts knob, and it hardcodes only /app/logs (app) and
  # /var/run/postgresql (postgres) as emptyDir volumes — so both the
  # readOnlyRootFilesystem flip AND the extra writable mounts postgres needs are
  # applied here as a post-render kustomize patch (strategic-merge merges the
  # named containers/volumes additively; every other securityContext field —
  # capabilities.drop, runAsUser, seccompProfile — is preserved).
  postRenderers:
    - kustomize:
        patches:
          # App (Go server) + wait-for-db init — flip root FS read-only. The
          # crossview binary is a static CGO-free Go server that writes NOTHING to
          # the filesystem at runtime (state lives in Postgres; sessions are a
          # signed cookie, no server-side session files), so no extra writable
          # mount is needed — the chart's hardcoded /app/logs emptyDir already
          # covers the one path it mounts. The wait-for-db init only runs
          # `psql -c "SELECT 1"` over TCP, so it is read-only-safe too.
          - target:
              kind: Deployment
              name: crossview
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: crossview
              spec:
                template:
                  spec:
                    initContainers:
                      - name: wait-for-db
                        securityContext:
                          readOnlyRootFilesystem: true
                    containers:
                      - name: crossview
                        securityContext:
                          readOnlyRootFilesystem: true
          # Bundled Postgres (postgres:18.4, persistence disabled → data dir is an
          # emptyDir). Flip the root FS read-only and add the writable mounts the
          # postgres entrypoint genuinely needs:
          #   /var/lib/postgresql  the image VOLUME. PG18 initdb writes the fresh
          #                        cluster to PGDATA=/var/lib/postgresql/18/docker;
          #                        with persistence off the chart mounts nothing
          #                        here, so it must be a writable emptyDir. This is
          #                        the ephemeral data dir — losing it on restart is
          #                        by design (SSO-fronted read-only dashboard).
          #   /tmp                 the entrypoint mktemp's the initdb pwfile here.
          # /var/run/postgresql (the socket dir) is already a chart emptyDir.
          - target:
              kind: Deployment
              name: crossview-postgres
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: crossview-postgres
              spec:
                template:
                  spec:
                    containers:
                      - name: postgres
                        securityContext:
                          readOnlyRootFilesystem: true
                        volumeMounts:
                          - name: postgres-data
                            mountPath: /var/lib/postgresql
                          - name: tmp
                            mountPath: /tmp
                    volumes:
                      - name: postgres-data
                        emptyDir:
                          sizeLimit: 2Gi
                      - name: tmp
                        emptyDir:
                          sizeLimit: 128Mi
  # https://github.com/crossplane-contrib/crossview/blob/main/helm/crossview/values.yaml
  values:
    global:
      namespace: crossview
      # The namespace is managed declaratively (namespace.yaml) so it carries the
      # Pod Security Standards labels; don't let the chart create it.
      createNamespace: false
    app:
      replicas: ${crossview_replicas:=1}
      # Crossview is a bursty, near-idle dashboard: ~14Mi RSS while nobody is
      # looking at it, but a single dashboard load lists Crossplane resources
      # cluster-wide (every managed resource across all provider CRDs, plus
      # composites/claims/XRDs/providers/functions) and spikes to ~240Mi+ — a
      # ~17x jump — with the frontend firing those lists concurrently.
      #
      # auto-vpa (the Kyverno-generated VerticalPodAutoscaler, controlledValues:
      # RequestsAndLimits) right-sizes the memory REQUEST to that low idle/steady
      # histogram and, preserving the authored limit:request ratio, drags the
      # LIMIT down with it. At the chart's default 4:1 ratio (1Gi:256Mi) a
      # transient-low request recommendation (~100Mi, e.g. after a VPA-recommender
      # restart) pins the limit near ~400Mi — below the load burst — and the pod
      # is OOMKilled mid-request. Every dashboard widget then shows "Error
      # loading", so Crossview looks like it lost kube-API access when it hasn't:
      # the SA token, RBAC (wildcard get/list/watch) and network are all fine.
      #
      # Fix (same auto-vpa footgun the homepage HelmRelease documents): author
      # resources explicitly with a WIDE memory ratio (8:1). VPA still scales the
      # request to the observed working set, but the preserved 8:1 ratio keeps the
      # limit generous at every request level — ~800Mi even at the ~100Mi low
      # bootstrap, ~1.9Gi at the ~240Mi steady target — so the burst is absorbed.
      # The limit is a ceiling, not a reservation (idle still reserves only the
      # request), and the auto-vpa maxAllowed (6Gi) remains the runaway/leak
      # guard. CPU stays at the chart default: compressible, VPA-managed, never
      # the OOM cause.
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 2Gi
      extraEnv:
        # Crossview keys several behaviours off NODE_ENV (lib/env.go ->
        # Environment): with it set to `production` the session-cookie middleware
        # marks the cookie Secure (api/middlewares/session.go), CORS debug logging
        # is off, and gin runs in release mode. Crossview is reached over the
        # Headlamp plugin's port-forward at http://localhost:<port>, and
        # Chromium-based browsers treat localhost as a trustworthy origin, so
        # the Secure cookie still sticks there (Safari does not — use Chrome,
        # same as the existing Headlamp-OIDC guidance).
        - name: NODE_ENV
          value: "production"
    # The chart bundles a Postgres for session/user state. Run it ephemeral (no
    # PVC) instead of provisioning a Longhorn volume: Crossview is an
    # SSO-fronted, read-only dashboard, so losing session/user rows on a pod
    # restart is acceptable — and it avoids the autoscaler-node Longhorn
    # data-loss footgun that bites stateful prod volumes.
    database:
      # Pin the chart's bundled Postgres image. The crossview chart defaults
      # database.image.tag to `latest` (a disallow-latest-tag policy violation,
      # and a reliability footgun: a pod restart can silently pull a new Postgres
      # major). Pin to the current stable — what `latest` resolves to today — and
      # let Renovate keep it current via the customManager scoped to this file in
      # .github/renovate.json. (Same image drives the chart's wait-for-db init.)
      image:
        # renovate: datasource=docker depName=postgres
        tag: "18.4"
      persistence:
        enabled: false
    # Every Crossview secret is sourced from the crossview-credentials Secret
    # (external-secret.yaml) via secretKeyRef. That Secret is materialized from
    # OpenBao by External Secrets — the values are generated once and seeded by
    # the ESO Password generators + PushSecrets in infrastructure/vault-seed
    # (apps/crossview/{db,app,admin}), and oidc-client-secret is the shared Dex
    # client secret read from infrastructure/oidc/dex — so nothing is committed
    # to this public repo.
    #
    #   dbPassword       the chart's bundled Postgres refuses to initialize
    #                    without POSTGRES_PASSWORD (it CrashLoopBackOffs with
    #                    "superuser password is not specified", stalling the app
    #                    in Init and hanging the whole `apps` Kustomization).
    #   sessionSecret    signs the session cookie set after OIDC / admin login;
    #                    a stable value keeps logins valid across pod restarts.
    #   adminPassword    the break-glass native `admin` login (createAdmin runs
    #                    at boot in session mode). Overriding it here means the
    #                    chart no longer emits the well-known admin/password
    #                    default into the crossview-secrets Secret — that Secret
    #                    now carries only the non-secret admin USERNAME.
    #   OIDCClientSecret the Dex confidential-client secret for the OIDC login
    #                    (config.sso.oidc below); Crossview presents it as the
    #                    shared `public-client`.
    secrets:
      dbPassword:
        secretKeyRef:
          name: crossview-credentials
          key: db-password
      sessionSecret:
        secretKeyRef:
          name: crossview-credentials
          key: session-secret
      adminPassword:
        secretKeyRef:
          name: crossview-credentials
          key: admin-password
      OIDCClientSecret:
        secretKeyRef:
          name: crossview-credentials
          key: oidc-client-secret
    config:
      server:
        cors:
          # Crossview has NO public route anymore: it is surfaced exclusively
          # inside Headlamp via the crossview-headlamp plugin, whose resolver
          # falls through to a Headlamp-managed port-forward of
          # crossview-service (target port 3001) bound on 127.0.0.1 — so the
          # browser-facing origin, and the post-login redirect target, is the
          # forwarded localhost URL.
          origin: http://localhost:3001
        # Crossview does its OWN authentication (no oauth2-proxy hop — and no
        # gateway route at all). Mode `session` is mandatory for the OIDC flow below:
        # the SessionAuthMiddleware gates the /api/kubernetes/* data routes on a
        # signed session cookie, the cookie store is ONLY wired up when
        # AUTH_MODE=session (api/middlewares/session.go), and the boot-time admin
        # user is seeded only in session mode (createAdmin, commands/serve.go). The
        # public /api/auth/* + /api/health routes stay unauthenticated so login and
        # kubelet probes work.
        auth:
          mode: session
      # Native OIDC against Dex — the platform's single OIDC IdP (Dex -> GitHub).
      # Crossview's Login page shows a "Sign in with OIDC" button when this is
      # enabled (src/presentation/pages/Login.jsx); clicking it runs
      # /api/auth/oidc -> Dex -> GitHub -> /api/auth/oidc/callback, which sets the
      # session cookie. Crossview reuses the shared confidential `public-client`
      # (clientId below + OIDCClientSecret from infrastructure/oidc/dex), exactly
      # like oauth2-proxy / headlamp; its callback is registered on that client in
      # controllers/dex/helm-release.yaml.
      #
      # Split-horizon endpoints, mirroring oauth2-proxy (skip_oidc_discovery):
      #   - authorizationURL is the PUBLIC Dex URL — the browser is redirected
      #     there and resolves it via /etc/hosts (local) or public DNS (prod).
      #   - tokenURL / userInfoURL are the IN-CLUSTER Dex Service — these are
      #     server-side calls from the Crossview pod, which cannot resolve
      #     dex.${domain} on the local/docker cluster and should not hairpin the
      #     LoadBalancer in prod.
      # The split works because `issuer` is explicitly EMPTY: since crossview
      # v4.5.0 an empty issuer SKIPS OIDC discovery entirely (fixed upstream for
      # exactly this split-horizon shape), so the explicit endpoints below are
      # used verbatim. Before 4.5.0 the chart forced a non-empty issuer and a
      # successful discovery overrode these endpoints — the old fail-closed
      # localhost-issuer workaround that used to be documented here is obsolete.
      # Crossview validates the user via the userinfo endpoint, not the
      # id_token, so no JWKS/issuer match is required.
      #
      # SECURITY NOTE: crossview has no oauth2-proxy allowed_groups gate, so the
      # effective gate is Dex's GitHub connector, which is narrowed to
      # devantler-tech/maintainers. They land as a non-admin `user` on
      # a read-only dashboard (the first login is the break-glass `admin` seeded
      # at boot, so SSO users are never `admin`). With the public route gone the
      # practical surface shrinks further: reaching the login page at all now
      # requires a kube-API port-forward (the Headlamp plugin path).
      sso:
        oidc:
          enabled: true
          clientId: public-client
          issuer: ""
          authorizationURL: https://dex.${domain}/auth
          tokenURL: http://dex.dex.svc.cluster.local:5556/token
          userInfoURL: http://dex.dex.svc.cluster.local:5556/userinfo
          # The browser-facing callback on the Headlamp-managed port-forward
          # (registered on the shared Dex client — controllers/dex/
          # helm-release.yaml). The plugin forwards crossview-service to a local
          # port; 3001 mirrors the service target port the forward requests.
          callbackURL: http://localhost:3001/api/auth/oidc/callback
