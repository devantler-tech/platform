apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  name: wedding-app
  namespace: wedding-app
spec:
  interval: 1m
  ref:
    tag: latest
  url: oci://ghcr.io/devantler-tech/wedding-app/manifests
  secretRef:
    name: ghcr-auth
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  annotations:
    ksail.devantler.tech/reconcile-exclude: "true"
  name: wedding-app
  namespace: wedding-app
spec:
  interval: 1m
  timeout: 5m
  retryInterval: 2m
  path: .
  prune: true
  wait: true
  force: true
  serviceAccountName: wedding-app
  sourceRef:
    kind: OCIRepository
    name: wedding-app
  targetNamespace: wedding-app
  decryption:
    provider: sops
    secretRef:
      name: sops-age
