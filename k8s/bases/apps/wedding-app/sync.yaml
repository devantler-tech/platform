apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  name: wedding-app
  namespace: wedding-app
spec:
  interval: 1m
  ref:
    tag: latest
  url: oci://ghcr.io/devantler-tech/wedding-app/manifests
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  name: wedding-app
  namespace: wedding-app
spec:
  interval: 1m
  timeout: 5m
  retryInterval: 2m
  path: ./deploy
  prune: true
  wait: true
  force: true
  serviceAccountName: wedding-app
  sourceRef:
    kind: OCIRepository
    name: wedding-app
  targetNamespace: wedding-app
