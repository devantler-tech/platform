apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  name: wedding-app
  namespace: wedding-app
spec:
  interval: 1m
  ref:
    tag: latest
  url: oci://ghcr.io/devantler-tech/wedding-app/manifests
  secretRef:
    name: ghcr-auth
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  name: wedding-app
  namespace: wedding-app
spec:
  interval: 1m
  timeout: 5m
  retryInterval: 2m
  path: .
  prune: true
  wait: true
  force: true
  serviceAccountName: wedding-app
  sourceRef:
    kind: OCIRepository
    name: wedding-app
  targetNamespace: wedding-app
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  patches:
    - target:
        kind: Deployment
        name: wedding-app
      patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: wedding-app
        spec:
          template:
            spec:
              imagePullSecrets:
                - name: ghcr-auth
              containers:
                - name: wedding-app
                  image: ghcr.io/devantler-tech/wedding-app:latest
                  env:
                    - name: DB_USER
                      valueFrom:
                        secretKeyRef:
                          name: wedding-db-credentials
                          key: username
                    - name: DB_PASS
                      valueFrom:
                        secretKeyRef:
                          name: wedding-db-credentials
                          key: password
                    - name: DATABASE_URL
                      value: "postgresql://$(DB_USER):$(DB_PASS)@wedding-db-rw:5432/wedding"
                    - name: PORT
                      value: "3000"
                    - name: NODE_ENV
                      value: "production"
