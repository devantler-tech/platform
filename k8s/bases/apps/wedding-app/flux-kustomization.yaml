---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  annotations:
    ksail.devantler.tech/reconcile-exclude: "true"
  name: wedding-app
  namespace: wedding-app
spec:
  interval: 1m
  timeout: 5m
  retryInterval: 2m
  path: .
  prune: true
  wait: true
  force: true
  serviceAccountName: wedding-app
  sourceRef:
    kind: OCIRepository
    name: wedding-app
  targetNamespace: wedding-app
