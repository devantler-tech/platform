apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-wedding-app
  namespace: wedding-app
spec:
  endpointSelector: {}
  ingress:
    # Gateway ingress
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Intra-namespace (app → db, db replication)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: wedding-app
    # CNPG operator needs to reach DB status endpoint (port 8000)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
            - port: "5432"
              protocol: TCP
    # Metrics scraping from monitoring namespace
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9187"
              protocol: TCP
  egress:
    # Intra-namespace (app → db)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: wedding-app
    # Kube API (for CNPG operator managing the cluster)
    - toEntities:
        - kube-apiserver
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
