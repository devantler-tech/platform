apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  name: wedding-app
  namespace: wedding-app
spec:
  image: ghcr.io/devantler-tech/wedding-app/manifests
  interval: 5m
  secretRef:
    name: ghcr-auth
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  name: wedding-app
  namespace: wedding-app
spec:
  imageRepositoryRef:
    name: wedding-app
  policy:
    semver:
      range: ">=1.0.0"
