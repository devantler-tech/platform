apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: wedding-app
  namespace: wedding-app
spec:
  imageRepositoryRef:
    name: wedding-app
  policy:
    semver:
      range: ">=1.0.0"
  filterTags:
    pattern: "^v(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)$"
    extract: "$version"
