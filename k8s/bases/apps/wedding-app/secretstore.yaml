# Tenant-scoped, namespaced SecretStore for wedding-app — provisioned by the
# platform so the tenant only has to add an ExternalSecret in its own deploy/
# artifact to read secrets pushed to its Vault path. A tenant gets a store like
# this ONLY if it needs app secrets (wedding-app does; the static
# ascoachingogvaner does not).
#
# Authenticates as the tenant's own `wedding-app` ServiceAccount via the
# dedicated `wedding-app` OpenBao Kubernetes auth role
# (k8s/bases/infrastructure/vault-config/job.yaml), which carries only the
# path-scoped `app-wedding-app` policy — read + seed-write limited to
# secret/{data,metadata}/apps/wedding-app/*. The tenant can therefore never
# reach infra or another tenant's secrets, unlike the shared cluster-scoped
# `openbao` ClusterSecretStore (which the `restrict-tenant-secret-stores`
# Kyverno policy blocks tenant ExternalSecrets from using).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao
  namespace: wedding-app
  labels:
    app.kubernetes.io/managed-by: ksail
spec:
  provider:
    vault:
      server: "http://openbao.openbao.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "wedding-app"
          serviceAccountRef:
            name: "wedding-app"
