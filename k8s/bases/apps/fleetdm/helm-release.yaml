apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fleetdm
  namespace: fleetdm
  labels:
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 15m
  install:
    remediation:
      retries: -1
  upgrade:
    force: true
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: fleet
      version: v6.9.3
      sourceRef:
        kind: HelmRepository
        name: fleetdm
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: fleet
            patch: |
              - op: add
                path: /metadata/annotations/secret.reloader.stakater.com~1reload
                value: mysql,redis,fleet-license
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 1
                    maxUnavailable: 0
              - op: add
                path: /spec/template/spec/topologySpreadConstraints
                value:
                  - maxSkew: 1
                    topologyKey: kubernetes.io/hostname
                    whenUnsatisfiable: ScheduleAnyway
                    labelSelector:
                      matchLabels:
                        app: fleet
          # The Fleet binary writes ~/.goquery/history on every invocation, but
          # the chart enables readOnlyRootFilesystem and runs as uid 3333 which
          # has no /etc/passwd entry. Mount an emptyDir at /home/fleet and run
          # as the image's actual `fleet` user (uid 100, gid 101) so the
          # binary can resolve $HOME and write its history file.
          - target:
              kind: Job
              name: fleet-migration
            patch: |
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: fleet-migration
              spec:
                # Allow MySQL time to initialize before declaring the migration
                # permanently failed. Default of 6 retries is insufficient when
                # MySQL starts cold (e.g. first deploy or CI).
                backoffLimit: 20
                template:
                  spec:
                    volumes:
                      - name: fleet-home
                        emptyDir: {}
                    containers:
                      - name: fleet-migration
                        securityContext:
                          runAsUser: 100
                          runAsGroup: 101
                        volumeMounts:
                          - name: fleet-home
                            mountPath: /home/fleet
          - target:
              kind: Deployment
              name: fleet
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: fleet
              spec:
                template:
                  spec:
                    volumes:
                      - name: fleet-home
                        emptyDir: {}
                    initContainers:
                      # Run `fleet prepare db` before the main container starts.
                      # Idempotent — no-op when schema already exists. Prevents
                      # CrashLoopBackOff if MySQL data is lost (e.g. PVC recreation
                      # after storage failures).
                      - name: fleet-db-init
                        image: fleetdm/fleet:v4.84.2
                        command: ["fleet", "prepare", "db"]
                        securityContext:
                          runAsUser: 100
                          runAsGroup: 101
                        volumeMounts:
                          - name: fleet-home
                            mountPath: /home/fleet
                        env:
                          - name: FLEET_MYSQL_ADDRESS
                            value: "fleetdm-mysql-primary.fleetdm:3306"
                          - name: FLEET_MYSQL_DATABASE
                            value: "fleet"
                          - name: FLEET_MYSQL_USERNAME
                            value: "fleet"
                          - name: FLEET_MYSQL_PASSWORD
                            valueFrom:
                              secretKeyRef:
                                name: mysql
                                key: mysql-password
                    containers:
                      - name: fleet
                        securityContext:
                          runAsUser: 100
                          runAsGroup: 101
                        volumeMounts:
                          - name: fleet-home
                            mountPath: /home/fleet
  # https://github.com/fleetdm/fleet/blob/main/charts/fleet/values.yaml
  values:
    hostName: fleetdm.${domain}
    replicas: ${fleetdm_replicas:=2}
    # Ingress is handled by a Gateway API HTTPRoute in this repo.
    ingress:
      enabled: false
    # FLEET_SERVER_PRIVATE_KEY is substituted by Flux from the
    # per-cluster SOPS-encrypted `variables-cluster-secret.enc.yaml`
    # before apply. The rendered Deployment carries the value as a
    # literal env, readable only to principals with RBAC on the fleetdm
    # namespace. Stable across restarts; losing this key invalidates
    # every enrolled device.
    environments:
      FLEET_SERVER_PRIVATE_KEY: ${fleetdm_server_private_key}
    fleet:
      # TLS terminates at the platform Gateway (Traefik / Cilium).
      tls:
        enabled: false
      license:
        secretName: fleet-license
        licenseKey: license-key
    # Run vulnerability processing in a dedicated container so the API
    # pods don't OOM every hour during the scan.
    vulnProcessing:
      dedicated: ${fleetdm_vuln_dedicated:=true}
    database:
      address: fleetdm-mysql.fleetdm:3306
    cache:
      address: fleetdm-redis-master.fleetdm:6379
      usePassword: true
    # https://github.com/bitnami/charts/blob/main/bitnami/mysql/values.yaml
    # NOTE: Broadcom/Bitnami moved all tagged images out of `bitnami/*` on
    # docker.io in August 2025; the old tags pinned by this chart version
    # now only resolve under `bitnamilegacy/*`. Override until the Fleet
    # chart upgrades or we migrate to the official MySQL/Redis images.
    # https://github.com/bitnami/containers/issues/83267
    mysql:
      enabled: true
      architecture: ${fleetdm_mysql_architecture:=replication}
      image:
        registry: docker.io
        repository: bitnamilegacy/mysql
      auth:
        createDatabase: true
        database: fleet
        username: fleet
        existingSecret: mysql
      # The chart enables readOnlyRootFilesystem but does not mount an
      # emptyDir for /opt/bitnami/mysql/tmp; mysqld init writes InnoDB
      # temp files there and fails on a fresh data dir without it.
      # This applies to both primary and secondary.
      primary:
        podSecurityContext:
          enabled: true
          fsGroup: 1001
          runAsUser: 1001
          runAsGroup: 1001
        containerSecurityContext:
          enabled: true
          runAsUser: 1001
          runAsGroup: 1001
        persistence:
          enabled: true
          size: 20Gi
        extraVolumes:
          - name: tmp
            emptyDir: {}
        extraVolumeMounts:
          - name: tmp
            mountPath: /opt/bitnami/mysql/tmp
      secondary:
        replicaCount: ${fleetdm_mysql_secondary_replicas:=2}
        podSecurityContext:
          enabled: true
          fsGroup: 1001
          runAsUser: 1001
          runAsGroup: 1001
        containerSecurityContext:
          enabled: true
          runAsUser: 1001
          runAsGroup: 1001
        persistence:
          enabled: true
          size: 20Gi
        extraVolumes:
          - name: tmp
            emptyDir: {}
        extraVolumeMounts:
          - name: tmp
            mountPath: /opt/bitnami/mysql/tmp
      metrics:
        enabled: true
        image:
          registry: docker.io
          repository: bitnamilegacy/mysqld-exporter
      volumePermissions:
        image:
          registry: docker.io
          repository: bitnamilegacy/os-shell
    # https://github.com/bitnami/charts/blob/main/bitnami/redis/values.yaml
    redis:
      enabled: true
      architecture: ${fleetdm_redis_architecture:=replication}
      image:
        registry: docker.io
        repository: bitnamilegacy/redis
      auth:
        existingSecret: redis
        existingSecretPasswordKey: redis-password
      master:
        podSecurityContext:
          enabled: true
          fsGroup: 1001
          runAsUser: 1001
          runAsGroup: 1001
        containerSecurityContext:
          enabled: true
          runAsUser: 1001
          runAsGroup: 1001
        persistence:
          enabled: true
          size: 8Gi
          storageClass: hcloud
      replica:
        replicaCount: ${fleetdm_redis_replicas:=2}
        podSecurityContext:
          enabled: true
          fsGroup: 1001
          runAsUser: 1001
          runAsGroup: 1001
        containerSecurityContext:
          enabled: true
          runAsUser: 1001
          runAsGroup: 1001
        persistence:
          enabled: true
          size: 8Gi
          storageClass: hcloud
      metrics:
        enabled: true
        image:
          registry: docker.io
          repository: bitnamilegacy/redis-exporter
      sentinel:
        image:
          registry: docker.io
          repository: bitnamilegacy/redis-sentinel
      volumePermissions:
        image:
          registry: docker.io
          repository: bitnamilegacy/os-shell
      sysctl:
        image:
          registry: docker.io
          repository: bitnamilegacy/os-shell
