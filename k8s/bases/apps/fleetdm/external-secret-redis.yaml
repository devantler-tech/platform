---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis
  namespace: fleetdm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: redis
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: apps/fleetdm/redis
        property: redis-password
