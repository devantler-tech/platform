apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-fleetdm
  namespace: fleetdm
spec:
  endpointSelector: {}
  ingress:
    # Gateway ingress
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Intra-namespace (fleet → mysql, fleet → redis)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: fleetdm
  egress:
    # Intra-namespace (fleet → mysql, fleet → redis)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: fleetdm
    # Kube API
    - toEntities:
        - kube-apiserver
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
