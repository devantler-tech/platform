# ExternalSecret CRs that replace SOPS-substituted FleetDM Secrets.
# These produce the same Secret names that the FleetDM HelmRelease
# references via existingSecret — no HelmRelease changes needed.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mysql
  namespace: fleetdm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: mysql
    creationPolicy: Owner
  data:
    - secretKey: mysql-root-password
      remoteRef:
        key: apps/fleetdm/mysql
        property: mysql-root-password
    - secretKey: mysql-replication-password
      remoteRef:
        key: apps/fleetdm/mysql
        property: mysql-replication-password
    - secretKey: mysql-password
      remoteRef:
        key: apps/fleetdm/mysql
        property: mysql-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis
  namespace: fleetdm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: redis
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: apps/fleetdm/redis
        property: redis-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fleet-license
  namespace: fleetdm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: fleet-license
    creationPolicy: Owner
  data:
    - secretKey: license-key
      remoteRef:
        key: apps/fleetdm/license
        property: license-key
