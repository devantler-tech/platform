apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fleetdm
  namespace: fleetdm
spec:
  # maxUnavailable: 1 is the platform-wide drain-safe PDB pattern (issue #1880):
  # it keeps the node drainable at every replica count. (fleetdm is disabled in
  # prod since 2026-06-03 and runs a single replica when re-enabled — see the
  # prod config-map; this PDB applies on re-enable.)
  maxUnavailable: 1
  selector:
    matchLabels:
      app: fleet
