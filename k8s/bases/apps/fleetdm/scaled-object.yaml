apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: fleetdm
  namespace: fleetdm
spec:
  scaleTargetRef:
    name: fleet
  minReplicaCount: 1
  maxReplicaCount: ${fleetdm_max_replicas:=4}
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
