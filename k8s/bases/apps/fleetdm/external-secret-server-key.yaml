apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fleetdm-server-key
  namespace: fleetdm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: fleetdm-server-key
    creationPolicy: Owner
  data:
    - secretKey: FLEET_SERVER_PRIVATE_KEY
      remoteRef:
        key: apps/fleetdm/server
        property: private-key
