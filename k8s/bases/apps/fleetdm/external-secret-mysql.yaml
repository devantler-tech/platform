# ExternalSecret CRs that replace SOPS-substituted FleetDM Secrets.
# These produce the same Secret names that the FleetDM HelmRelease
# references via existingSecret — no HelmRelease changes needed.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mysql
  namespace: fleetdm
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: mysql
    creationPolicy: Owner
  data:
    - secretKey: mysql-root-password
      remoteRef:
        key: apps/fleetdm/mysql
        property: mysql-root-password
    - secretKey: mysql-replication-password
      remoteRef:
        key: apps/fleetdm/mysql
        property: mysql-replication-password
    - secretKey: mysql-password
      remoteRef:
        key: apps/fleetdm/mysql
        property: mysql-password
