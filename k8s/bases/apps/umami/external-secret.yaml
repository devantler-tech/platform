# APP_SECRET for Umami, read from OpenBao via External Secrets. The value is
# generated once and seeded into OpenBao by the ESO Password generator +
# PushSecret in infrastructure/vault-seed (remoteKey apps/umami/app), so no
# manual seeding is required. A fixed value keeps login sessions and the daily
# visitor-hash salt stable across chart upgrades.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-app
  namespace: umami
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: umami-app
    creationPolicy: Owner
  data:
    - secretKey: app-secret
      remoteRef:
        key: apps/umami/app
        property: app-secret
