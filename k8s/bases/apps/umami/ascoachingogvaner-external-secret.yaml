# One-time BOOTSTRAP password for the Umami read-only customer login (AS Coaching
# og Vaner), from OpenBao via ESO (seeded once by the
# umami-ascoachingogvaner-password generator + PushSecret in vault-seed). The
# tenant-provisioner Job (provision-job.yaml) creates the `ascoachingogvaner`
# view-only user with this value and adds it to the ascoachingogvaner team
# (team-view-only), so the customer can check only their own analytics.
#
# The customer changes this on first login (Umami self-hosted has no SSO) and
# owns it thereafter — the Job never resets an existing user, so this value is a
# bootstrap only and sits inert afterwards. Hand it over ONCE via a secure channel
# (e.g. a password-manager share, not email). refreshInterval here only refreshes
# the inert bootstrap Secret; it does not touch the customer's chosen password.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-ascoachingogvaner
  namespace: umami
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: umami-ascoachingogvaner
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: apps/umami/ascoachingogvaner
        property: password
