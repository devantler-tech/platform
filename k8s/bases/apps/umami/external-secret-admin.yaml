# Managed admin password for the Umami dashboard, from OpenBao via ESO (seeded
# once by the umami-admin-password generator + PushSecret in vault-seed). The
# website-provisioner Job rotates Umami's default `admin`/`umami` password to
# this value on first run, then uses it to manage websites — so the publicly
# reachable admin account is never left on the default password.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-admin
  namespace: umami
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: umami-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: apps/umami/admin
        property: password
