# OpenBao Database secrets engine: the rotated password for the `umami`
# PostgreSQL role. OpenBao owns and rotates it on a static-role schedule (7 days
# — see vault-config); ESO reads the current value via this VaultDynamicSecret
# generator (ESO's Vault provider supports KV only, so the database engine must
# be read through a generator). The Umami HelmRelease consumes the projected
# Secret via database.external.existingSecret. Mirrors the fleetdm MySQL pattern.
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: umami-db-static-cred
  namespace: umami
spec:
  path: "database/static-creds/umami"
  method: GET
  provider:
    server: "http://openbao.openbao.svc.cluster.local:8200"
    auth:
      kubernetes:
        mountPath: "kubernetes"
        role: "umami-db-rotated"
        serviceAccountRef:
          name: "external-secrets"
---
# The generator returns {username, password, ttl, last_vault_rotation,
# rotation_period}; `ttl` decrements every refresh and would rewrite the Secret
# on every reconcile (restart churn). Project ONLY `password` so the Secret is
# stable between rotations and changes only when the password actually rotates.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-db-rotated
  namespace: umami
spec:
  refreshInterval: 1m
  target:
    name: umami-db-rotated
    creationPolicy: Owner
    template:
      engineVersion: v2
      # Opt this Secret out of Flagger's config-tracking. Umami runs under a
      # Flagger Gateway API canary (canary.yaml); by default Flagger snapshots
      # every Secret/ConfigMap the workload references into a `<name>-primary`
      # copy that the PRIMARY (prod-serving) Deployment uses, refreshed ONLY on a
      # successful canary promotion. That breaks for an EXTERNALLY-ROTATED secret:
      # when OpenBao rotates the `umami` password (7-day static-role schedule),
      # the live Secret updates but the `umami-db-rotated-primary` snapshot stays
      # frozen, so the primary authenticates with the stale password and
      # CrashLoopBackOffs on `28P01 password authentication failed` — and if the
      # canary cannot promote (e.g. Coroot SLOs unavailable during a node roll)
      # the snapshot never refreshes and the primary stays wedged. Disabling
      # tracking makes the primary reference the live `umami-db-rotated` Secret
      # directly, so it always sees the current rotated password (picked up on the
      # next pod start — the same rotation pattern every non-Flagger app uses).
      metadata:
        annotations:
          flagger.app/config-tracking: "disabled"
      data:
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: VaultDynamicSecret
          name: umami-db-static-cred
