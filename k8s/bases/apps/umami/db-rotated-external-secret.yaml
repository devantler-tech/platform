# OpenBao Database secrets engine: the rotated password for the `umami`
# PostgreSQL role. OpenBao owns and rotates it on a static-role schedule (7 days
# — see vault-config); ESO reads the current value via this VaultDynamicSecret
# generator (ESO's Vault provider supports KV only, so the database engine must
# be read through a generator). The Umami HelmRelease consumes the projected
# Secret via database.external.existingSecret. Mirrors the fleetdm MySQL pattern.
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: umami-db-static-cred
  namespace: umami
spec:
  path: "database/static-creds/umami"
  method: GET
  provider:
    server: "http://openbao.openbao.svc.cluster.local:8200"
    auth:
      kubernetes:
        mountPath: "kubernetes"
        role: "umami-db-rotated"
        serviceAccountRef:
          name: "external-secrets"
---
# The generator returns {username, password, ttl, last_vault_rotation,
# rotation_period}; `ttl` decrements every refresh and would rewrite the Secret
# on every reconcile (restart churn). Project ONLY `password` so the Secret is
# stable between rotations and changes only when the password actually rotates.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-db-rotated
  namespace: umami
spec:
  refreshInterval: 1m
  target:
    name: umami-db-rotated
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: VaultDynamicSecret
          name: umami-db-static-cred
