# OpenBao Database secrets engine: the rotated password for the `umami`
# PostgreSQL role. OpenBao owns and rotates it on a static-role schedule (7 days
# — see vault-config); ESO reads the current value via this VaultDynamicSecret
# generator (ESO's Vault provider supports KV only, so the database engine must
# be read through a generator). The Umami HelmRelease consumes the projected
# Secret via database.external.existingSecret. Mirrors the fleetdm MySQL pattern.
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: umami-db-static-cred
  namespace: umami
spec:
  path: "database/static-creds/umami"
  method: GET
  provider:
    # openbao-active = unsealed Raft leader only; the plain `openbao` Service
    # also round-robins onto sealed-but-Ready standbys (503 "Vault is sealed").
    server: "http://openbao-active.openbao.svc.cluster.local:8200"
    auth:
      kubernetes:
        mountPath: "kubernetes"
        role: "umami-db-rotated"
        serviceAccountRef:
          name: "external-secrets"
---
# The generator returns {username, password, ttl, last_vault_rotation,
# rotation_period}; `ttl` decrements every refresh and would rewrite the Secret
# on every reconcile (restart churn). Project ONLY the stable `username` and
# `password` fields so the Secret changes only when the password actually
# rotates.
#
# The Secret is typed kubernetes.io/basic-auth (username + password) because it
# is ALSO declared as the CNPG managed role's `passwordSecret`
# (postgres-cluster.yaml), which requires that type. That wiring makes CNPG an
# ENFORCER of the OpenBao-rotated value inside PostgreSQL: CNPG's role
# synchronizer re-applies the app role's password on (at least) every primary
# promotion — observed 2026-06-09 even with NO passwordSecret declared, when a
# promotion reset the `umami` role to the stale bootstrap password and broke the
# app for ~13h (28P01 / Prisma P1000, analytics ingest down). With CNPG applying
# THIS Secret instead, every such re-application converges PostgreSQL to the
# value OpenBao serves and the app consumes — drift is structurally impossible
# in any direction (promotion, restore, manual ALTER). Worst case is the ≤1m ESO
# refresh window right after a rotation, where CNPG could briefly re-apply the
# previous password before the Secret syncs — self-corrected on the next sync.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: umami-db-rotated
  namespace: umami
spec:
  refreshInterval: 1m
  target:
    name: umami-db-rotated
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      # Opt this Secret out of Flagger's config-tracking. Umami runs under a
      # Flagger Gateway API canary (canary.yaml); by default Flagger snapshots
      # every Secret/ConfigMap the workload references into a `<name>-primary`
      # copy that the PRIMARY (prod-serving) Deployment uses, refreshed ONLY on a
      # successful canary promotion. That breaks for an EXTERNALLY-ROTATED secret:
      # when OpenBao rotates the `umami` password (7-day static-role schedule),
      # the live Secret updates but the `umami-db-rotated-primary` snapshot stays
      # frozen, so the primary authenticates with the stale password and
      # CrashLoopBackOffs on `28P01 password authentication failed` — and if the
      # canary cannot promote (e.g. Coroot SLOs unavailable during a node roll)
      # the snapshot never refreshes and the primary stays wedged. Disabling
      # tracking makes the primary reference the live `umami-db-rotated` Secret
      # directly, so it always sees the current rotated password (picked up on the
      # next pod start — the same rotation pattern every non-Flagger app uses).
      metadata:
        annotations:
          flagger.app/config-tracking: "disabled"
        labels:
          # Make the CNPG operator react promptly when ESO syncs a rotated
          # password, instead of waiting for the next periodic reconcile.
          cnpg.io/reload: "true"
      data:
        # `username` is required by the kubernetes.io/basic-auth type and by
        # CNPG (which validates it matches the managed role's name). The
        # generator returns it alongside the password (always `umami`).
        username: "{{ .username }}"
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: VaultDynamicSecret
          name: umami-db-static-cred
