# Pushes the CloudNativePG-generated postgres superuser password into OpenBao KV
# so the vault-config Job can use it as the stable admin to configure the
# Database secrets engine connection and rotate the `umami` role (mirrors how
# fleetdm seeds its MySQL root password, except here CNPG generates it so we
# sync from the operator-managed secret rather than generating our own).
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-umami-db-superuser
  namespace: umami
spec:
  # Keep KV in sync with the operator-managed superuser secret.
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: umami-db-superuser
  data:
    - match:
        secretKey: password
        remoteRef:
          remoteKey: apps/umami/db
          property: postgres-password
