apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: umami
  namespace: umami
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: umami
      version: 2.0.0
      sourceRef:
        kind: HelmRepository
        name: umami
  postRenderers:
    # Flagger copies the source (umami-umami) Deployment's replicas onto the
    # primary. Pin it to 3 for an HA primary (require-three-replicas) instead of
    # removing it (which left the primary at the chart default of 1). Flux drift
    # detection ignores /spec/replicas, so Flagger's between-rollout
    # scale-to-zero of this source is not fought. See k8s/bases/apps/umami/canary.yaml.
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: umami-umami
            patch: |
              - op: replace
                path: /spec/replicas
                value: 3
  # https://github.com/helmforgedev/charts/blob/main/charts/umami/values.yaml
  values:
    # replicaCount intentionally omitted — Flagger manages canary replicas
    # (see the postRenderer above).
    serviceAccount:
      # Umami needs no Kubernetes API access.
      automountServiceAccountToken: false
    umami:
      port: 3000
      # Stable APP_SECRET from OpenBao via External Secrets — the `umami-app`
      # Secret produced by external-secret.yaml. A fixed value keeps login
      # sessions and the daily visitor-hash salt stable across chart upgrades
      # (the chart otherwise auto-generates a fresh one each release).
      existingSecret: umami-app
      existingSecretKey: app-secret
      # Privacy/quiet defaults: no phone-home telemetry or update checks.
      disableTelemetry: true
      disableUpdates: true
      # TLS is terminated upstream (Cloudflare + the platform Gateway); the HSTS
      # header is added on the HTTPRoute, so Umami must not also force SSL.
      forceSSL: false
    # Disable the chart's bundled PostgreSQL subchart — the database is the
    # CloudNativePG cluster in postgres-cluster.yaml.
    postgresql:
      enabled: false
    database:
      # External-PostgreSQL path pointed at the CloudNativePG cluster in
      # postgres-cluster.yaml. The password is OWNED AND ROTATED by OpenBao's
      # Database secrets engine (7-day static role — see vault-config), surfaced
      # by db-rotated-external-secret.yaml as the `umami-db-rotated` Secret
      # (not CNPG's static umami-db-app). Mirrors the fleetdm MySQL rotation.
      external:
        host: umami-db-rw.umami.svc.cluster.local
        port: "5432"
        name: umami
        username: umami
        existingSecret: umami-db-rotated
        existingSecretPasswordKey: password
    service:
      # Service port 80 -> container port 3000 (named `http`).
      port: 80
    # Routing, ingress and NetworkPolicy are handled by the platform's own
    # resources (canary.yaml's Flagger-generated HTTPRoute + networkpolicy.yaml),
    # not the chart.
    gatewayAPI:
      enabled: false
    ingress:
      enabled: false
    networkPolicy:
      enabled: false
    # restricted Pod Security Standard. The Umami image runs as the non-root
    # `nextjs` user (uid/gid 1001).
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
      # Next.js (standalone) writes its cache under /app/.next, so the root
      # filesystem cannot be read-only.
      readOnlyRootFilesystem: false
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi
