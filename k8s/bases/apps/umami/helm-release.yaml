apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: umami
  namespace: umami
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: umami
      version: 2.2.2
      sourceRef:
        kind: HelmRepository
        name: umami
  postRenderers:
    # Replicas are deliberately NOT pinned here: the KEDA ScaledObject
    # (scaled-object.yaml) owns them through the Canary's autoscalerRef — the
    # primary scales 2-3 on request rate and Flagger pauses the source's scaler
    # at 0 between rollouts. Flux drift detection ignores /spec/replicas, so
    # neither controller is fought. See k8s/bases/apps/umami/canary.yaml.
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: umami-umami
            patch: |
              # OpenBao rotates the umami DB password out of band (7-day static
              # role), refreshed into the umami-db-rotated Secret. The app reads it
              # into DATABASE_URL at startup, so a running pod keeps a stale
              # password after a rotation and crashes with Prisma P1000 until
              # restarted. Stakater Reloader restarts a workload when a Secret it
              # is annotated for changes. The live workload is the Flagger primary
              # (umami-umami-primary); Flagger does NOT carry this annotation onto
              # the primary (it freezes/filters primary metadata at creation —
              # fluxcd/flagger#1032), so the propagate-reloader-to-flagger-primary
              # ClusterPolicy copies it across. The annotation here also keeps the
              # canary source itself reloadable.
              - op: add
                path: /metadata/annotations/secret.reloader.stakater.com~1reload
                value: umami-db-rotated
  # https://github.com/helmforgedev/charts/blob/main/charts/umami/values.yaml
  values:
    # replicaCount intentionally omitted — replicas are owned by the KEDA
    # ScaledObject (scaled-object.yaml) through the Canary's autoscalerRef;
    # the primary scales 2-3 on request rate.
    # Spread the replicas across nodes so a single node failure cannot take down
    # the whole web tier (Coroot flagged umami-umami-primary as "all instances on
    # one node — not resilient to node failure": KEDA runs the primary at 2-3
    # replicas — scaled-object.yaml — but nothing pulled them apart). Set on the
    # SOURCE pod template here because Flagger builds umami-umami-primary by
    # COPYING this template, so the constraint propagates to the primary that
    # actually serves traffic. ScheduleAnyway (not DoNotSchedule) keeps scheduling
    # best-effort: on a small/cordoned cluster a replica still lands rather than
    # going Pending. The labelSelector keys on app.kubernetes.io/instance=umami —
    # NOT app.kubernetes.io/name — because Flagger's default --selector-labels
    # rewrites app.kubernetes.io/name to "umami-umami-primary" on the primary
    # while leaving instance=umami intact on the pods (same reason the PDB and the
    # Homepage pod-selector key on instance — see canary.yaml / pod-disruption-budget.yaml).
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/instance: umami
    serviceAccount:
      # Umami needs no Kubernetes API access.
      automountServiceAccountToken: false
    # Loosen the startup probe. The chart default (probes.startup) fires the first
    # probe at +30s with only a 3s timeout, but umami's serial cold boot —
    # npm-run-all → check-db → a cross-node Prisma connect to the CNPG primary →
    # migration diff → Next.js standalone listen — takes ~27s and /api/heartbeat is
    # still slow to answer right as that first probe fires, so the 3s timeout trips
    # "Startup probe failed: context deadline exceeded" (Coroot "Unhealthy" alert)
    # even though the pod then goes Ready (failureThreshold: 30 is generous). Widen
    # the per-probe timeout and period so a slightly slow boot no longer alerts;
    # liveness/readiness keep the chart defaults.
    probes:
      startup:
        enabled: true
        path: /api/heartbeat
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 8
        failureThreshold: 30
    umami:
      port: 3000
      # Stable APP_SECRET from OpenBao via External Secrets — the `umami-app`
      # Secret produced by external-secret.yaml. A fixed value keeps login
      # sessions and the daily visitor-hash salt stable across chart upgrades
      # (the chart otherwise auto-generates a fresh one each release).
      existingSecret: umami-app
      existingSecretKey: app-secret
      # Privacy/quiet defaults: no phone-home telemetry or update checks.
      disableTelemetry: true
      disableUpdates: true
      # TLS is terminated upstream (Cloudflare + the platform Gateway); the HSTS
      # header is added on the HTTPRoute, so Umami must not also force SSL.
      forceSSL: false
    # Disable the chart's bundled PostgreSQL subchart — the database is the
    # CloudNativePG cluster in postgres-cluster.yaml.
    postgresql:
      enabled: false
    database:
      # External-PostgreSQL path pointed at the CloudNativePG cluster in
      # postgres-cluster.yaml. The password is OWNED AND ROTATED by OpenBao's
      # Database secrets engine (7-day static role — see vault-config), surfaced
      # by external-secret-db-rotated.yaml as the `umami-db-rotated` Secret
      # (not CNPG's static umami-db-app). Mirrors the fleetdm MySQL rotation.
      external:
        host: umami-db-rw.umami.svc.cluster.local
        port: "5432"
        name: umami
        username: umami
        existingSecret: umami-db-rotated
        existingSecretPasswordKey: password
    service:
      # Service port 80 -> container port 3000 (named `http`).
      port: 80
    # Routing, ingress and NetworkPolicy are handled by the platform's own
    # resources (canary.yaml's Flagger-generated HTTPRoute + cilium-network-policy.yaml),
    # not the chart.
    gatewayAPI:
      enabled: false
    ingress:
      enabled: false
    networkPolicy:
      enabled: false
    # restricted Pod Security Standard. The Umami image runs as the non-root
    # `nextjs` user (uid/gid 1001).
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
      # Kubescape C-0017 (immutable container filesystem). The Umami image is a
      # plain Next.js standalone server (start-docker runs check-db →
      # update-tracker → `node server.js`, with NO runtime build), so the root FS
      # can be read-only now that the two dirs the server writes at runtime —
      # /app/.next/cache (fetch/ISR data cache + optimized images) and /tmp — are
      # backed by the writable emptyDirs below (extraVolumes/extraVolumeMounts).
      readOnlyRootFilesystem: true
    # Writable emptyDir mounts so readOnlyRootFilesystem: true does not crash the
    # app. The chart appends extraVolumes to the pod spec.volumes and
    # extraVolumeMounts to the umami container. Both dirs are owned/writable by
    # the nextjs user (uid/gid 1001 = podSecurityContext.fsGroup/runAsUser), so no
    # extra ownership fix is needed — the same read-only-root pattern the fleetdm
    # HelmRelease uses. Only /app/.next/cache is mounted (not all of /app/.next),
    # so the read-only build artifacts in the rest of /app/.next stay intact.
    extraVolumes:
      - name: next-cache
        emptyDir:
          sizeLimit: 512Mi
      - name: tmp
        emptyDir:
          sizeLimit: 128Mi
    extraVolumeMounts:
      - name: next-cache
        mountPath: /app/.next/cache
      - name: tmp
        mountPath: /tmp
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi
