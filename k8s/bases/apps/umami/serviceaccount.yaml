# ServiceAccount used as the JWT subject when ESO's VaultDynamicSecret generator
# authenticates to OpenBao for umami's rotated database credential. ESO ignores
# serviceAccountRef.namespace for generators (ESO #4629), so the SA must live in
# the generator's own namespace. No in-cluster RBAC is granted — authorisation
# is on the OpenBao side via the `umami-db-rotated` auth role (which carries only
# the `app-umami-db-readonly` policy).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: umami
