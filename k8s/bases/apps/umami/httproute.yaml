apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: umami
  namespace: umami
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Umami
    gethomepage.dev/description: Privacy-first web analytics.
    gethomepage.dev/group: Analytics
    gethomepage.dev/icon: si-umami
    gethomepage.dev/href: https://analytics.${domain}
    gethomepage.dev/pod-selector: app.kubernetes.io/name=umami
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - analytics.${domain}
  rules:
    # Always-on collector — route straight to the Umami Service (no KEDA
    # scale-to-zero, so tracking events are never dropped on a cold start).
    - backendRefs:
        - name: umami-umami
          namespace: umami
          port: 80
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
