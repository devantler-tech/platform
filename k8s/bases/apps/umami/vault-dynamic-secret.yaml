---
# OpenBao Database secrets engine: the rotated password for the `umami`
# PostgreSQL role. OpenBao owns and rotates it on a static-role schedule (7 days
# — see vault-config); ESO reads the current value via this VaultDynamicSecret
# generator (ESO's Vault provider supports KV only, so the database engine must
# be read through a generator). The Umami HelmRelease consumes the projected
# Secret via database.external.existingSecret. Mirrors the fleetdm MySQL pattern.
apiVersion: generators.external-secrets.io/v1alpha1
kind: VaultDynamicSecret
metadata:
  name: umami-db-static-cred
  namespace: umami
spec:
  path: "database/static-creds/umami"
  method: GET
  provider:
    # openbao-active = unsealed Raft leader only; the plain `openbao` Service
    # also round-robins onto sealed-but-Ready standbys (503 "Vault is sealed").
    server: "http://openbao-active.openbao.svc.cluster.local:8200"
    auth:
      kubernetes:
        mountPath: "kubernetes"
        role: "umami-db-rotated"
        serviceAccountRef:
          name: "external-secrets"
