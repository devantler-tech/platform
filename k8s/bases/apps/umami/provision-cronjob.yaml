# Declaratively provisions Umami "tenants" — one team per tenant — so teams,
# their websites, and (optionally) a shared customer login are managed in Git
# rather than created by hand in the Umami UI. Also rotates Umami's default
# admin password to the OpenBao-managed value.
#
# Model (TENANTS env): each entry is one team owning a set of websites, plus
# optional members (extra logins added to that team). Personal sites live on
# the `devantler-tech` team; each customer gets its own team + a read-only
# login so they can check only their own analytics.
#
# Idempotent and safe to re-run:
#   - admin password is rotated only when the managed value isn't already active;
#   - teams are matched by name (Umami does NOT enforce unique team names, so we
#     list-and-match rather than blindly create);
#   - websites are created under their team by id, or transferred into it if they
#     already exist as personal sites (GET by id first);
#   - member users are created only if missing (username is unique) and added to
#     their team only if not already a member. The OpenBao-backed member password
#     is a ONE-TIME BOOTSTRAP: the customer changes it on first login (Umami has no
#     SSO, so this is their real credential) and owns it thereafter — this Job
#     NEVER resets an existing user's password. Rotation is therefore the
#     customer's own (self-service) plus exception-only admin action on suspected
#     compromise / offboarding — NOT a schedule, so there is no credential to relay
#     on a cadence. Offboard by removing the member here (re-provisioning stops)
#     and deleting the user in the Umami admin UI.
#
# Why a CronJob (not a one-shot Job): provisioning targets an EXTERNAL system —
# the Umami HTTP API — that may be temporarily unavailable (Umami rolling, or
# crashlooping after a DB password rotation/failover). A one-shot Job fires once:
# if Umami is down in that window the run fails, and because the Job self-deletes
# (TTL) and only re-runs on a spec change, provisioning is silently never retried
# — which is exactly how Umami ended up with no teams/sites and the admin password
# left at its default. Running on a schedule makes this a self-healing reconcile
# loop: each tick re-asserts the desired tenants, converging within one interval
# once Umami is reachable, and picking up TENANTS edits automatically. The script
# is fully idempotent, so a steady-state tick is a fast no-op. `concurrencyPolicy:
# Forbid` prevents overlap, and `failedJobsHistoryLimit` keeps recent failures
# visible for debugging (the old TTL'd Job hid them). First provisioning lands
# within one interval of deploy; to apply immediately run
# `kubectl create job -n umami --from=cronjob/umami-provision-tenants umami-provision-now`.
#
# Reuses the Umami image (Node runtime, built-in fetch) so no extra image or
# curl/jq dependency is needed; pinned by digest per platform convention.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: umami-provision-tenants
  namespace: umami
spec:
  schedule: "*/15 * * * *"
  # Never run two reconciles at once; a slow run (e.g. waiting on a down Umami)
  # simply skips the next tick and resumes on the one after.
  concurrencyPolicy: Forbid
  # Bounded look-back (< the 15m interval) so the controller never tries to
  # back-fill a long backlog of missed runs after an outage / apps-layer block.
  startingDeadlineSeconds: 200
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # The */15 schedule IS the retry loop, so each run is a single attempt
      # (backoffLimit 0 + restartPolicy Never below): a failed run surfaces the
      # script's real error and the next tick retries it, instead of burning
      # in-Job retries against the deadline.
      backoffLimit: 0
      # Backstop for a hung run only. It sits comfortably above the script's
      # ~5m wait-for-Umami loop, so a normal "Umami unreachable" failure exits
      # with its real error well before this — never masquerading as
      # DeadlineExceeded.
      activeDeadlineSeconds: 420
      template:
        metadata:
          labels:
            app: umami-provision-tenants
        spec:
          # One attempt per scheduled run (paired with backoffLimit 0); the
          # CronJob schedule provides retries. A failed Job's pod is retained
          # (up to failedJobsHistoryLimit) for log inspection.
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: provision
              image: ghcr.io/umami-software/umami:3.1.0@sha256:e3f80c0625aad7179b49da27d475357cabb1068b8cacd9a792cfd6966888b123
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 128Mi
              env:
                - name: UMAMI_BASE
                  value: http://umami-umami.umami.svc.cluster.local
                - name: ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: umami-admin
                      key: password
                # One-time BOOTSTRAP password for the AS Coaching og Vaner customer's
                # read-only login, OpenBao-generated (apps/umami/ascoachingogvaner) and
                # referenced by the member's `passwordEnv` in TENANTS below. Used only
                # at account creation; the customer changes it on first login and owns
                # it thereafter, so this value then sits inert (never re-applied).
                - name: ASCOACHINGOGVANER_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: umami-ascoachingogvaner
                      key: password
                      # Bootstrap only: read solely when first creating the user.
                      # optional so the Job still starts (and re-runs cleanly) if the
                      # bootstrap Secret is removed once the customer owns their password.
                      optional: true
                # Declarative source of truth: one team per tenant, its websites, and
                # any extra member logins. The website UUIDs are the values hard-pinned
                # in each site's tracking script — adding a site = add an entry here +
                # reference the same id in that site's script. Adding a customer =
                # add a team with its website(s) + a member (and wire that member's
                # password via a new OpenBao generator/PushSecret/ExternalSecret).
                - name: TENANTS
                  value: |
                    [
                      {
                        "team": "devantler-tech",
                        "websites": [
                          { "id": "2f8d150e-c6f0-4a90-ab77-431c9ef9dc59", "name": "devantler.tech", "domain": "devantler.tech" },
                          { "id": "27f83d6b-8ce4-4239-9387-eabc7f57cd68", "name": "KSail Docs", "domain": "ksail.devantler.tech" },
                          { "id": "814417b8-13cd-427f-93b0-4aba673c511c", "name": "Wedding", "domain": "wedding.platform.devantler.tech" }
                        ]
                      },
                      {
                        "team": "ascoachingogvaner",
                        "websites": [
                          { "id": "5e76b00b-67e5-4aef-b4df-17fca43e9a33", "name": "AS Coaching og Vaner", "domain": "ascoachingogvaner.platform.devantler.tech" }
                        ],
                        "members": [
                          { "username": "ascoachingogvaner", "passwordEnv": "ASCOACHINGOGVANER_PASSWORD", "accountRole": "view-only", "teamRole": "team-view-only" }
                        ]
                      }
                    ]
              command:
                - node
                - -e
                - |
                  const base = process.env.UMAMI_BASE;
                  const newPw = process.env.ADMIN_PASSWORD;
                  const tenants = JSON.parse(process.env.TENANTS);
                  const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
                  const H = (t) => ({ 'content-type': 'application/json', ...(t ? { authorization: 'Bearer ' + t } : {}) });
                  const asArray = (j) => Array.isArray(j) ? j : (j && Array.isArray(j.data) ? j.data : []);
                  async function login(pw) {
                    try {
                      const r = await fetch(base + '/api/auth/login', { method: 'POST', headers: H(), body: JSON.stringify({ username: 'admin', password: pw }) });
                      return r.ok ? (await r.json()).token : null;
                    } catch { return null; }
                  }
                  async function ensureAuth() {
                    let token = await login(newPw);
                    if (token) return token;
                    const def = await login('umami');
                    if (!def) return null; // not ready yet
                    const r = await fetch(base + '/api/me/password', { method: 'POST', headers: H(def), body: JSON.stringify({ currentPassword: 'umami', newPassword: newPw }) });
                    if (!r.ok) throw new Error('admin password rotation failed: ' + r.status + ' ' + (await r.text()));
                    console.log('rotated default admin password to the managed value');
                    return await login(newPw);
                  }
                  // Umami does not enforce unique team names, so match by name then create.
                  async function ensureTeam(token, name) {
                    const r = await fetch(base + '/api/teams?pageSize=200', { headers: H(token) });
                    if (!r.ok) throw new Error('list teams failed: ' + r.status + ' ' + (await r.text()));
                    const existing = asArray(await r.json()).find((t) => t.name === name);
                    if (existing) return existing.id;
                    const c = await fetch(base + '/api/teams', { method: 'POST', headers: H(token), body: JSON.stringify({ name }) });
                    if (!c.ok) throw new Error('create team ' + name + ' failed: ' + c.status + ' ' + (await c.text()));
                    console.log('team created:', name);
                    return (await c.json()).id;
                  }
                  async function ensureWebsite(token, s, teamId) {
                    const g = await fetch(base + '/api/websites/' + s.id, { headers: H(token) });
                    // Umami returns 200 with a `null` body (NOT a 404) for a website id
                    // that doesn't exist yet, so a 2xx alone doesn't mean it's present —
                    // only treat it as existing when the body is a real website object,
                    // otherwise fall through to create. (Dereferencing the null body here
                    // is what crashed every run, leaving Umami with no websites.)
                    const w = g.ok ? await g.json() : null;
                    if (w && w.id) {
                      if (w.teamId === teamId) { console.log('website ok:', s.domain); return; }
                      const t = await fetch(base + '/api/websites/' + s.id + '/transfer', { method: 'POST', headers: H(token), body: JSON.stringify({ teamId }) });
                      if (!t.ok) throw new Error('transfer website ' + s.domain + ' failed: ' + t.status + ' ' + (await t.text()));
                      console.log('website moved to team:', s.domain);
                      return;
                    }
                    const c = await fetch(base + '/api/websites', { method: 'POST', headers: H(token), body: JSON.stringify({ id: s.id, name: s.name, domain: s.domain, teamId }) });
                    if (!c.ok) throw new Error('create website ' + s.domain + ' failed: ' + c.status + ' ' + (await c.text()));
                    console.log('website created:', s.domain);
                  }
                  async function findUserId(token, username) {
                    // List users via the admin endpoint: in Umami 3.x `/api/users`
                    // only handles POST (create); GET lives at `/api/admin/users`
                    // (paged + `search`, admin-gated). Hitting `/api/users` here
                    // returned 405 and aborted every member-provisioning run.
                    const r = await fetch(base + '/api/admin/users?pageSize=200&search=' + encodeURIComponent(username), { headers: H(token) });
                    if (!r.ok) throw new Error('list users failed: ' + r.status + ' ' + (await r.text()));
                    const u = asArray(await r.json()).find((u) => u.username === username);
                    return u ? u.id : null;
                  }
                  async function ensureMember(token, teamId, m) {
                    // Resolve the member, creating it only if missing. The bootstrap
                    // password is read ONLY on the create path — once the user exists
                    // (and owns its own password after first login), m.passwordEnv is
                    // never touched, so the bootstrap Secret can be removed after
                    // onboarding without breaking re-runs.
                    let userId = await findUserId(token, m.username);
                    if (userId) {
                      console.log('user exists:', m.username);
                    } else {
                      const password = process.env[m.passwordEnv];
                      if (!password) throw new Error('cannot create member ' + m.username + ': bootstrap password env ' + m.passwordEnv + ' is empty');
                      const c = await fetch(base + '/api/users', { method: 'POST', headers: H(token), body: JSON.stringify({ username: m.username, password, role: m.accountRole || 'user' }) });
                      if (c.ok) {
                        userId = (await c.json()).id;
                        console.log('user created:', m.username);
                      } else {
                        const body = await c.text();
                        // Created by a racing run between our lookup and this POST: re-resolve.
                        if (c.status === 400 && /exist/i.test(body)) {
                          userId = await findUserId(token, m.username);
                          if (!userId) throw new Error('user ' + m.username + ' exists but id not resolvable');
                          console.log('user exists:', m.username);
                        } else {
                          throw new Error('create user ' + m.username + ' failed: ' + c.status + ' ' + body);
                        }
                      }
                    }
                    const role = m.teamRole || 'team-view-only';
                    const a = await fetch(base + '/api/teams/' + teamId + '/users', { method: 'POST', headers: H(token), body: JSON.stringify({ userId, role }) });
                    if (a.ok) { console.log('member added:', m.username, '->', role); return; }
                    const ab = await a.text();
                    if (a.status === 400 && /member/i.test(ab)) { console.log('member ok:', m.username); return; }
                    throw new Error('add member ' + m.username + ' failed: ' + a.status + ' ' + ab);
                  }
                  (async () => {
                    let token = null;
                    for (let i = 0; i < 60 && !token; i++) {
                      token = await ensureAuth();
                      if (!token) { console.log('waiting for umami to be ready...'); await sleep(5000); }
                    }
                    if (!token) throw new Error('could not authenticate to umami after retries');
                    for (const t of tenants) {
                      const teamId = await ensureTeam(token, t.team);
                      for (const s of (t.websites || [])) await ensureWebsite(token, s, teamId);
                      for (const m of (t.members || [])) await ensureMember(token, teamId, m);
                    }
                    console.log('umami tenant provisioning complete');
                  })().catch((e) => { console.error(String((e && e.stack) || e)); process.exit(1); });
