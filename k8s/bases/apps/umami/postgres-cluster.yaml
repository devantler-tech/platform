# CloudNativePG-managed PostgreSQL for Umami — the platform's standard Postgres
# operator (see infrastructure/controllers/cloudnative-pg). CNPG bootstraps the
# `umami` database owned by the `umami` role and publishes the connection
# credentials in an auto-generated Secret named `<cluster>-app` (here:
# `umami-db-app`, keys: username/password/dbname/host/port/uri). The Umami
# HelmRelease consumes that Secret via `database.external.existingSecret`.
#
# longhorn is hardcoded because Umami is a prod-only app (it is excluded from the
# local/docker overlay, which has no CNPG operator or longhorn — same as the
# wedding-app and ascoachingogvaner tenants).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: umami-db
  namespace: umami
spec:
  instances: 1
  # Expose the postgres superuser so OpenBao's Database secrets engine has a
  # stable admin to rotate the `umami` application role's password (the engine
  # cannot rotate a role using that same role's credentials, so it needs a
  # separate stable admin). The superuser secret (umami-db-superuser) is pushed
  # to OpenBao KV by db-superuser-pushsecret.yaml and used only in-cluster.
  enableSuperuserAccess: true
  storage:
    size: 5Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: umami
      owner: umami
      postInitApplicationSQL:
        # Provision pgcrypto for Umami up front, in the bootstrap superuser
        # context (the app role cannot CREATE EXTENSION). Harmless if unused.
        - CREATE EXTENSION IF NOT EXISTS pgcrypto
  # OpenBao's Database secrets engine owns and rotates the `umami` role's password
  # (db-rotated-external-secret.yaml + vault-config). Declare the role here WITHOUT
  # a passwordSecret so CNPG manages the role but never (re)sets its password.
  # Otherwise CNPG re-applies the umami-db-app password to the role on every
  # primary startup/failover, clobbering OpenBao's rotated value -- which the app
  # consumes via the `umami-db-rotated` Secret (helm-release.yaml
  # database.external.existingSecret), NOT CNPG's autogenerated `umami-db-app` --
  # breaking the app with `28P01 password authentication failed` (observed
  # 2026-06-03: a DB pod recreation reset the password ~38s after the new
  # primary came up). Safe on
  # CNPG >=1.21 -- an existing role with no passwordSecret keeps its current
  # password (the NULL-by-default regression was fixed in cnpg#2029); note
  # `disablePassword` is deliberately NOT set. Attributes mirror the initdb owner
  # (LOGIN + CNPG defaults), so no other role attribute changes.
  managed:
    roles:
      - name: umami
        ensure: present
        login: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  # Off-cluster DB backup to Cloudflare R2 (continuous WAL archiving + base
  # backups, so PITR is possible). This is the in-tree barmanObjectStore — still
  # supported on CNPG 1.29.x but deprecated in favour of the Barman Cloud Plugin;
  # a future operator major (Renovate-gated to manual review) is the trigger to
  # migrate. Credentials come from `umami-db-backup-r2` (db-backup-external-secret.yaml,
  # OpenBao infrastructure/backup/r2 — the SAME R2 creds Velero uses); the daily
  # base backup is driven by db-scheduled-backup.yaml. r2_* are Flux-substituted
  # from variables-base (prod values; umami is prod-only). Egress to R2 is opened
  # in networkpolicy.yaml.
  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      destinationPath: s3://${r2_bucket}/cnpg/umami-db
      endpointURL: ${r2_endpoint}
      s3Credentials:
        accessKeyId:
          name: umami-db-backup-r2
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: umami-db-backup-r2
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
      data:
        compression: gzip
