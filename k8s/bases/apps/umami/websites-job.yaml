# Declaratively provisions the Umami "websites" so the per-site website-ids
# (referenced by each site's tracking script) are managed in Git rather than
# created by hand in the Umami UI. Also rotates Umami's default admin password
# to the OpenBao-managed value on first run.
#
# Idempotent and safe to re-run: each website is created only if missing
# (GET by id), and the password is rotated only when the managed value isn't
# already active. Re-runs whenever its spec (the WEBSITES list / image) changes,
# via the Flux force annotation — Jobs are immutable so Flux must recreate them.
#
# Reuses the Umami image (Node runtime, built-in fetch) so no extra image or
# curl/jq dependency is needed; pinned by digest per platform convention.
apiVersion: batch/v1
kind: Job
metadata:
  name: umami-provision-websites
  namespace: umami
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 20
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app: umami-provision-websites
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: provision
          image: ghcr.io/umami-software/umami:3.1.0@sha256:e3f80c0625aad7179b49da27d475357cabb1068b8cacd9a792cfd6966888b123
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          env:
            - name: UMAMI_BASE
              value: http://umami-umami.umami.svc.cluster.local
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: umami-admin
                  key: password
            # Declarative source of truth for website-ids. These UUIDs are the
            # values hard-pinned in each site's tracking script. Adding a site =
            # add an entry here + reference the same id in that site's script.
            - name: WEBSITES
              value: |
                [
                  { "id": "2f8d150e-c6f0-4a90-ab77-431c9ef9dc59", "name": "devantler.tech", "domain": "devantler.tech" },
                  { "id": "27f83d6b-8ce4-4239-9387-eabc7f57cd68", "name": "KSail Docs", "domain": "ksail.devantler.tech" },
                  { "id": "814417b8-13cd-427f-93b0-4aba673c511c", "name": "Wedding", "domain": "wedding.platform.devantler.tech" },
                  { "id": "5e76b00b-67e5-4aef-b4df-17fca43e9a33", "name": "AS Coaching og Vaner", "domain": "ascoachingogvaner.platform.devantler.tech" }
                ]
          command:
            - node
            - -e
            - |
              const base = process.env.UMAMI_BASE;
              const newPw = process.env.ADMIN_PASSWORD;
              const sites = JSON.parse(process.env.WEBSITES);
              const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
              const H = (t) => ({ 'content-type': 'application/json', ...(t ? { authorization: 'Bearer ' + t } : {}) });
              async function login(pw) {
                try {
                  const r = await fetch(base + '/api/auth/login', { method: 'POST', headers: H(), body: JSON.stringify({ username: 'admin', password: pw }) });
                  return r.ok ? (await r.json()).token : null;
                } catch { return null; }
              }
              async function ensureAuth() {
                let token = await login(newPw);
                if (token) return token;
                const def = await login('umami');
                if (!def) return null; // not ready yet
                const r = await fetch(base + '/api/me/password', { method: 'POST', headers: H(def), body: JSON.stringify({ currentPassword: 'umami', newPassword: newPw }) });
                if (!r.ok) throw new Error('admin password rotation failed: ' + r.status + ' ' + (await r.text()));
                console.log('rotated default admin password to the managed value');
                return await login(newPw);
              }
              (async () => {
                let token = null;
                for (let i = 0; i < 60 && !token; i++) {
                  token = await ensureAuth();
                  if (!token) { console.log('waiting for umami to be ready...'); await sleep(5000); }
                }
                if (!token) throw new Error('could not authenticate to umami after retries');
                for (const s of sites) {
                  const g = await fetch(base + '/api/websites/' + s.id, { headers: H(token) });
                  if (g.ok) { console.log('website exists:', s.domain); continue; }
                  const c = await fetch(base + '/api/websites', { method: 'POST', headers: H(token), body: JSON.stringify({ id: s.id, name: s.name, domain: s.domain }) });
                  if (!c.ok) throw new Error('create website ' + s.domain + ' failed: ' + c.status + ' ' + (await c.text()));
                  console.log('website created:', s.domain);
                }
                console.log('umami website provisioning complete');
              })().catch((e) => { console.error(String((e && e.stack) || e)); process.exit(1); });
