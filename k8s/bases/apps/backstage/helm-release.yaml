apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backstage
  namespace: backstage
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: backstage
      version: 2.8.2
      sourceRef:
        kind: HelmRepository
        name: backstage
  # https://github.com/backstage/charts/blob/main/charts/backstage/values.yaml
  values:
    # External Postgres (CNPG, cluster.yaml); the bundled subchart off.
    postgresql:
      enabled: false
    # Cilium owns NetworkPolicy + Gateway-API ingress; the chart's own are off.
    networkPolicy:
      enabled: false
    ingress:
      enabled: false
    service:
      type: ClusterIP

    backstage:
      # ── SCAFFOLD IMAGE — read docs/backstage.md before promoting ────────────
      # ghcr.io/backstage/backstage is the upstream DEMO image (example plugin
      # set + example catalog). A production Backstage with SSO, the Kubernetes
      # plugin and GitHub catalog discovery needs a CUSTOM-BUILT image — those
      # plugins are compiled in at build time and CANNOT be enabled through
      # values. This scaffold stands up the full platform integration (CNPG DB,
      # forward-auth SSO, HTTPRoute, netpol) so the only remaining step to
      # productionise is swapping this for an own-built image (ideally a tenant
      # repo published via publish-app.yaml). Pinned to a real tag — never
      # :latest (the disallow-latest-tag policy).
      image:
        registry: ghcr.io
        repository: backstage/backstage
        tag: "1.52.0"

      # Wire the backend to Postgres. The chart's default command
      # (`node packages/backend`) loads ONLY the bundled app-config.yaml, which
      # hard-codes an in-memory SQLite database; pluginDivisionMode:schema (a
      # Postgres-only feature, set in the appConfig below) then throws "The SQLite
      # driver does not support plugin division mode 'schema'" and the install
      # never goes Ready. So we load app-config.yaml AND a small generated
      # appConfig (below) that swaps the database over to Postgres.
      #
      # We deliberately do NOT load the image's bundled app-config.production.yaml:
      # it sets `backend.listen: ':7007'` as a STRING, which collides with
      # app-config.yaml's object form (`listen: {port: 7007}`) and crashes the
      # backend on startup — "Invalid type in config for key 'backend.listen' …
      # got string, wanted object". Our appConfig touches only backend.database, so
      # the correct listen object from app-config.yaml stands.
      args:
        - "--config"
        - "app-config.yaml"

      # Generated ConfigMap: the chart auto-mounts it and appends a second
      # `--config /app/app-config-from-configmap.yaml`. Overrides only the database
      # block — replaces app-config.yaml's in-memory SQLite (client:
      # better-sqlite3, connection: ':memory:') with Postgres. This establishes
      # `backend.database.connection` as an OBJECT (so reading it never hits the
      # in-memory string); the connection's secret values (host/port/user/password)
      # are layered on top from the APP_CONFIG_* env vars below rather than written
      # here. NB: we must NOT put `${POSTGRES_*}` here — Flux's Kustomize postBuild
      # substitution runs on this manifest at deploy time and, since those are not
      # Flux variables, would replace them with empty/null before Backstage ever
      # sees them (the image's app-config.production.yaml gets away with ${…}
      # because it lives inside the container image, which Flux never touches).
      appConfig:
        backend:
          database:
            client: pg
            # One database, a schema per plugin: the CNPG `backstage` role owns the
            # DB and can create schemas, whereas database-per-plugin would need
            # CREATEDB on the role.
            pluginDivisionMode: schema
            connection:
              database: backstage
        # Guest sign-in. The upstream demo image runs with NODE_ENV=production,
        # where Backstage's guest provider refuses to mint a token unless this is
        # set — without it the sign-in page's guest "Enter" 403s ("the guest
        # provider cannot be used outside of a development environment …"), and
        # every subsequent frontend API call is then 401, so the UI throws errors
        # on every action. Access is already gated by the oauth2-proxy / Dex
        # (GitHub) SSO forward-auth in front of the HTTPRoute, so a guest identity
        # INSIDE Backstage is the intended model for this scaffold; swapping in a
        # custom-built image with a real sign-in resolver is the productionisation
        # step (see docs/backstage.md).
        auth:
          providers:
            guest:
              dangerouslyAllowOutsideDevelopment: true

      # Single pod: Backstage runs plugin DB migrations on startup, so two
      # concurrent pods can race them. maxSurge:0 retires the old pod before the
      # new one starts (one pod at a time). 1 replica is deliberate, so opt out of
      # the (Audit-only) replica floor via the documented label.
      replicas: 1
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      podLabels:
        platform.devantler.tech/replica-floor: exempt

      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
        # Backstage writes to /app and /tmp at runtime; a read-only root would
        # need writable volume mounts. PSS-restricted does not require it here
        # (validate-pod-security explicitly does not check readOnlyRootFilesystem).
        readOnlyRootFilesystem: false

      extraEnvVars:
        # Backstage reads APP_CONFIG_<dotted_path> env keys as config overrides at
        # the HIGHEST precedence, and (unlike a config file) their values are NOT
        # run through Flux's ${…} substitution — so secret values reach the backend
        # intact. Public URLs: ${domain} IS a Flux substitution var. The DB
        # connection's secret-derived values come straight from the CNPG
        # backstage-db-app Secret via valueFrom and layer onto the connection
        # object defined in the appConfig above; BACKEND_SECRET signs
        # backend-to-backend auth.
        - name: APP_CONFIG_app_baseUrl
          value: https://backstage.${domain}
        - name: APP_CONFIG_backend_baseUrl
          value: https://backstage.${domain}
        - name: APP_CONFIG_backend_cors_origin
          value: https://backstage.${domain}
        # DB connection from the CNPG-generated backstage-db-app Secret.
        - name: APP_CONFIG_backend_database_connection_host
          valueFrom:
            secretKeyRef:
              name: backstage-db-app
              key: host
        - name: APP_CONFIG_backend_database_connection_port
          valueFrom:
            secretKeyRef:
              name: backstage-db-app
              key: port
        - name: APP_CONFIG_backend_database_connection_user
          valueFrom:
            secretKeyRef:
              name: backstage-db-app
              key: username
        - name: APP_CONFIG_backend_database_connection_password
          valueFrom:
            secretKeyRef:
              name: backstage-db-app
              key: password
        # Backend signing key (generated; password.yaml + external-secret.yaml).
        - name: BACKEND_SECRET
          valueFrom:
            secretKeyRef:
              name: backstage-backend-secret
              key: password

      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          memory: 1Gi
