apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backstage
  namespace: backstage
  annotations:
    # Surface on the homepage dashboard (same convention as headlamp/whoami).
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Backstage
    gethomepage.dev/description: Internal developer portal — software catalog.
    gethomepage.dev/group: Internal Developer Platform
    gethomepage.dev/icon: backstage.png
    gethomepage.dev/href: https://backstage.${domain}
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - backstage.${domain}
  rules:
    # Backstage has no native OIDC in the demo image, so it is fronted by
    # oauth2-proxy SSO (Dex) exactly like homepage / the Coroot / Longhorn UIs.
    # Productionising to native Backstage OIDC (a custom image + a Dex static
    # client) is the follow-up in docs/backstage.md.
    #
    # 1) Login dance — oauth2-proxy serves its own /oauth2/* endpoints directly,
    #    WITHOUT the ExternalAuth filter. The longer /oauth2 PathPrefix wins.
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: oauth2-proxy
          namespace: oauth2-proxy
          port: 80
    # 2) App traffic — GEP-1494 ExternalAuth filter delegates the per-request SSO
    #    check to oauth2-proxy /oauth2/auth (ext_authz, HTTP); on allow it routes
    #    STRAIGHT to the backstage Service (same namespace). Replaces the old
    #    oauth2-proxy → auth-proxy hop. SPIKE-PENDING (platform#1881): header sets
    #    + unauth redirect confirmed on the local spike before promotion.
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Auth-Request-Redirect
                value: https://backstage.${domain}/
        - type: ExternalAuth
          externalAuth:
            protocol: HTTP
            backendRef:
              name: oauth2-proxy
              namespace: oauth2-proxy
              port: 80
            http:
              path: /oauth2/auth
              allowedHeaders:
                - cookie
                - authorization
                - x-auth-request-redirect
              allowedResponseHeaders:
                - x-auth-request-user
                - x-auth-request-email
                - x-auth-request-groups
                - set-cookie
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: backstage
          port: 7007
