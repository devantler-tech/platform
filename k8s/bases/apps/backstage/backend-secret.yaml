# Backstage's backend signing key (BACKEND_SECRET → backend.auth.keys in the
# image's app-config). Generated once in-cluster by the External Secrets Password
# generator — an app-local secret with no external system of record, so it needs
# no OpenBao round-trip (mirrors the wedding-app tenant's generated admin codes).
# refreshInterval "0" generates it once and never rotates it: rotating the
# backend key would invalidate every live session and break service-to-service
# auth tokens, so it is deliberately stable.
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: backstage-backend-secret
  namespace: backstage
spec:
  length: 40
  digits: 8
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backstage-backend-secret
  namespace: backstage
spec:
  refreshInterval: "0"
  target:
    name: backstage-backend-secret
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: backstage-backend-secret
