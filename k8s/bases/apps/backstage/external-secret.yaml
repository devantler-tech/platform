---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backstage-backend-secret
  namespace: backstage
spec:
  refreshInterval: "0"
  target:
    name: backstage-backend-secret
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: backstage-backend-secret
