apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: actual-budget
  namespace: actual-budget
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Actual Budget
    gethomepage.dev/description: Local-first personal finance and budgeting.
    gethomepage.dev/group: Finance
    gethomepage.dev/icon: si-actualbudget
    gethomepage.dev/href: https://budget.${domain}
    gethomepage.dev/pod-selector: app.kubernetes.io/name=actualbudget
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - budget.${domain}
  rules:
    - filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Auth-Request-Redirect
                value: https://budget.${domain}/
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: oauth2-proxy
          namespace: oauth2-proxy
          port: 80
