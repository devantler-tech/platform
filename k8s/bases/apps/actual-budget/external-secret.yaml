apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: actual-budget-oidc
  namespace: actual-budget
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: actual-budget-oidc
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: infrastructure/oidc/dex
        property: client-secret
