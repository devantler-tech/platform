apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  # maxUnavailable: 1 is the platform-wide drain-safe PDB pattern (issue #1880).
  # The community chart exposes no PDB value, so the PDB is declared here.
  # actual-budget is a static single-replica app on an RWO SQLite PVC; with
  # maxUnavailable: 1 the PDB still permits the one pod's eviction, so a node
  # drain is never deadlocked. Selector mirrors the labels already used by the
  # topologySpreadConstraints patch in the HelmRelease.
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: actualbudget
      app.kubernetes.io/instance: actual-budget
