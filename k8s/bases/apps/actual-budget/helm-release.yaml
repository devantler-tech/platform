apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual-budget
  namespace: actual-budget
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  chart:
    spec:
      chart: actualbudget
      version: 1.8.9
      sourceRef:
        kind: HelmRepository
        name: actual-budget
  valuesFrom:
    - kind: Secret
      name: actual-budget-oidc
      valuesKey: client-secret
      targetPath: login.openid.clientSecret
      optional: true
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: actual-budget-actualbudget
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate
              - op: add
                path: /spec/template/spec/topologySpreadConstraints
                value:
                  - maxSkew: 1
                    topologyKey: kubernetes.io/hostname
                    whenUnsatisfiable: ScheduleAnyway
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: actualbudget
                        app.kubernetes.io/instance: actual-budget
              # Chart hardcodes startupProbe absence; values override the
              # liveness/readiness blocks below but not startupProbe. Gate
              # liveness/readiness on the container actually serving HTTP.
              # initialDelaySeconds skips past the ~10s cold-start window so
              # the first probe lands on a serving container — zero failure
              # events during the merge-queue's 90s steady-state Warning
              # check.
              - op: add
                path: /spec/template/spec/containers/0/startupProbe
                value:
                  httpGet:
                    path: /
                    port: http
                  initialDelaySeconds: 20
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 12  # 60s grace beyond initial delay
  # https://github.com/community-charts/helm-charts/blob/main/charts/actualbudget/values.yaml
  values:
    replicaCount: ${actual_budget_replicas:=1}
    serviceAccount:
      automount: false
    podSecurityContext:
      fsGroup: 1001
      fsGroupChangePolicy: OnRootMismatch
      runAsUser: 1001
      runAsGroup: 1001
    securityContext:
      readOnlyRootFilesystem: false
      runAsUser: 1001
      runAsGroup: 1001
    ingress:
      enabled: false
    persistence:
      enabled: true
      size: 10Gi
    login:
      method: "openid"
      openid:
        enforce: true
        providerName: "Dex"
        discoveryUrl: "https://dex.${domain}/.well-known/openid-configuration"
        clientId: "public-client"
        authMethod: "openid"
        tokenExpiration: "never"
