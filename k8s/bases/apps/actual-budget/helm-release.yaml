apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual-budget
  namespace: actual-budget
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: actualbudget
      version: 1.9.0
      sourceRef:
        kind: HelmRepository
        name: actual-budget
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: actual-budget-actualbudget
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate
              - op: add
                path: /spec/template/spec/topologySpreadConstraints
                value:
                  - maxSkew: 1
                    topologyKey: kubernetes.io/hostname
                    whenUnsatisfiable: ScheduleAnyway
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: actualbudget
                        app.kubernetes.io/instance: actual-budget
              # Chart hardcodes startupProbe absence; values override the
              # liveness/readiness blocks below but not startupProbe. Gate
              # liveness/readiness on the container actually serving HTTP.
              # initialDelaySeconds skips past the ~10s cold-start window so
              # the first probe lands on a serving container — zero failure
              # events during the merge-queue's 90s steady-state Warning
              # check.
              - op: add
                path: /spec/template/spec/containers/0/startupProbe
                value:
                  httpGet:
                    path: /
                    port: http
                  initialDelaySeconds: 20
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 12  # 60s grace beyond initial delay
              # OpenID/OIDC (Dex) env. The chart only emits the ACTUAL_OPENID_*
              # block when `ingress.enabled=true` (its deployment template gates
              # the whole block on the chart Ingress), but we serve via a Gateway
              # API HTTPRoute with the chart ingress disabled — so the chart drops
              # every OpenID var and the server's startup auto-enable (it runs
              # bootstrapOpenId(forced) when a discovery URL is present) never
              # fires, leaving OpenID disabled. Inject the env directly here so it
              # activates regardless of the ingress gate. The chart-native
              # `login.openid` values below are kept ONLY to satisfy the chart's
              # values schema (its `login.openid` oneOf rejects the empty default
              # when `login.method: openid`); they are inert at runtime (same
              # ingress gate), so the real config is these env vars. SERVER_HOSTNAME
              # drives the redirect_uri https://budget.${domain}/openid/callback,
              # which must be registered on the Dex public-client (see the dex
              # HelmRelease). CLIENT_SECRET is the ESO-synced Dex shared secret.
              # On the next pod start OpenID becomes the active login method
              # (sessions reset; ENFORCE=true removes the password option).
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: ACTUAL_OPENID_DISCOVERY_URL
                  value: "https://dex.${domain}/.well-known/openid-configuration"
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: ACTUAL_OPENID_CLIENT_ID
                  value: "public-client"
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: ACTUAL_OPENID_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: actual-budget-oidc
                      key: client-secret
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: ACTUAL_OPENID_SERVER_HOSTNAME
                  value: "https://budget.${domain}"
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: ACTUAL_OPENID_AUTH_METHOD
                  value: "openid"
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: ACTUAL_OPENID_ENFORCE
                  value: "true"
  # https://github.com/community-charts/helm-charts/blob/main/charts/actualbudget/values.yaml
  values:
    replicaCount: ${actual_budget_replicas:=1}
    # Enable Banking bank-sync credentials live only in the sync-server's internal
    # `secrets` SQLite table (set via the web UI; no env/config hook). This sidecar
    # reconciles them there from the ESO-synced `actual-budget-enablebanking` Secret
    # (OpenBao → ESO), using the app's own better-sqlite3 for byte-identical writes.
    # See config-map.yaml for the reconciler and its robustness notes.
    # Image is pinned to the chart appVersion; the reconciler only needs
    # better-sqlite3 so it is version-insensitive — keep it roughly in sync on bumps.
    extraContainers:
      - name: enablebanking-seed
        image: docker.io/actualbudget/actual-server:26.6.0
        imagePullPolicy: IfNotPresent
        # `args` (not `command`) so the image's tini ENTRYPOINT is preserved —
        # proper PID-1 signal forwarding/zombie reaping, and no dependency on the
        # tini path (differs between the bookworm/alpine image variants).
        args: ["node", "/scripts/seed-enablebanking.cjs"]
        workingDir: /app
        env:
          - name: NODE_PATH
            value: /app/node_modules
          - name: ACTUAL_SERVER_FILES
            value: /data/server-files
          - name: SEED_INTERVAL_SECONDS
            value: "300"
          # The creds come from a MOUNTED Secret (below), not secretKeyRef env:
          # env is snapshotted at container start, so a later ESO refresh after an
          # OpenBao edit would never reach the running sidecar. kubelet updates the
          # projected Secret files in place, and the loop re-reads them each pass.
          - name: ENABLEBANKING_SECRET_DIR
            value: /var/run/enablebanking
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
        volumeMounts:
          - name: data
            mountPath: /data
          - name: tmp
            mountPath: /tmp
          - name: enablebanking-secret
            mountPath: /var/run/enablebanking
            readOnly: true
          - name: enablebanking-seed-script
            mountPath: /scripts
            readOnly: true
    volumes:
      # optional: absent on local/CI where the OpenBao path is unset — the script
      # treats missing files (and the PLACEHOLDER sentinel) as "not configured".
      - name: enablebanking-secret
        secret:
          secretName: actual-budget-enablebanking
          optional: true
      - name: enablebanking-seed-script
        configMap:
          name: actual-budget-enablebanking-seed
          defaultMode: 0444
    serviceAccount:
      automount: false
    podSecurityContext:
      fsGroup: 1001
      fsGroupChangePolicy: OnRootMismatch
      runAsUser: 1001
      runAsGroup: 1001
    securityContext:
      # Kubescape C-0017 (immutable container filesystem). The chart already
      # mounts the only two paths actual-server writes to — the `tmp` emptyDir at
      # /tmp (scratch/uploads) and the `data` PVC at /data (ACTUAL_DATA_DIR:
      # account.sqlite, server-files/, user-files/) — so a read-only root FS needs
      # no extra volumes here. Proven safe by the enablebanking-seed sidecar above,
      # which runs the SAME actual-server image via node with
      # readOnlyRootFilesystem: true and only /data + /tmp, healthy in prod.
      readOnlyRootFilesystem: true
      runAsUser: 1001
      runAsGroup: 1001
    ingress:
      enabled: false
    persistence:
      enabled: true
      size: 10Gi
    # `login.method` renders ACTUAL_LOGIN_METHOD=openid (unconditional). The
    # `login.openid` block is SCHEMA-ONLY: the chart's values schema validates a
    # `login.openid` oneOf and rejects the empty default when method=openid, so
    # these fields must be populated for `helm upgrade` to pass — but the chart
    # gates the ACTUAL_OPENID_* env they would render behind `ingress.enabled`
    # (disabled here), so they are inert at runtime. The active OpenID config is
    # the ACTUAL_OPENID_* env injected by the postRenderer above. Do NOT remove
    # this block: dropping it fails the chart schema and wedges the apps
    # Kustomization (the helm upgrade never succeeds).
    #
    # Schema-satisfaction uses the oneOf's `existingSecret` branch (discoveryUrl +
    # existingSecret), which resolves STATICALLY — so an offline render (ksail's
    # in-process Helm validate) and a live upgrade both match exactly one branch.
    # The empty `clientSecret` keeps the inline-secret branch unmatched, so
    # exactly one branch matches. Do NOT re-introduce a `clientSecret` /
    # `valuesFrom` injection: with both a clientSecret and existingSecret present,
    # TWO branches match and the oneOf's "exactly one" fails, wedging the upgrade.
    login:
      method: "openid"
      openid:
        enforce: true
        providerName: "Dex"
        discoveryUrl: "https://dex.${domain}/.well-known/openid-configuration"
        clientId: "public-client"
        authMethod: "openid"
        tokenExpiration: "never"
        existingSecret:
          name: actual-budget-oidc
          clientSecretKey: client-secret
