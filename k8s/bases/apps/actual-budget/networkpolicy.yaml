apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-actual-budget
  namespace: actual-budget
spec:
  endpointSelector: {}
  ingress:
    # KEDA interceptor proxy routes traffic from gateway
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: keda
      toPorts:
        - ports:
            - port: "5006"
              protocol: TCP
  egress:
    # Dex OIDC discovery (external URL via Cloudflare proxy)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
