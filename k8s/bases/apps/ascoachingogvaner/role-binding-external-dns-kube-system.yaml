---
# Gateway reads, limited to kube-system (where the shared `platform` Gateway
# lives) — external-dns resolves route targets from the Gateway's LB address.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    # Phase A of the skeleton->Tenant-CR handover (#1932/#2486): when the KRO
    # swap de-inventories this object from the `apps` Kustomization, Flux must
    # NOT garbage-collect it — kro adopts it in place. Also guards against
    # accidental skeleton deletion meanwhile. Remove after Phase C.
    kustomize.toolkit.fluxcd.io/prune: disabled
  name: ascoachingogvaner-external-dns
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-external-dns
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: ascoachingogvaner
