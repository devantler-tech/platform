apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  name: ascoachingogvaner
  namespace: ascoachingogvaner
spec:
  interval: 1m
  ref:
    semver: ">=1.0.0"
  url: oci://ghcr.io/devantler-tech/ascoachingogvaner/manifests
  secretRef:
    name: ghcr-auth
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: '^https://token\.actions\.githubusercontent\.com$'
        subject: '^https://github\.com/devantler-tech/reusable-workflows/\.github/workflows/publish-app\.yaml@.+$'
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  annotations:
    ksail.devantler.tech/reconcile-exclude: "true"
  name: ascoachingogvaner
  namespace: ascoachingogvaner
spec:
  interval: 1m
  timeout: 5m
  retryInterval: 2m
  path: .
  prune: true
  wait: true
  force: true
  serviceAccountName: ascoachingogvaner
  sourceRef:
    kind: OCIRepository
    name: ascoachingogvaner
  targetNamespace: ascoachingogvaner
