apiVersion: v1
kind: Namespace
metadata:
  annotations:
    # Phase A of the skeleton->Tenant-CR handover (#1932/#2486): when the KRO
    # swap de-inventories this object from the `apps` Kustomization, Flux must
    # NOT garbage-collect it — kro adopts it in place. Also guards against
    # accidental skeleton deletion meanwhile. Remove after Phase C.
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    app.kubernetes.io/managed-by: ksail
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
  name: ascoachingogvaner
