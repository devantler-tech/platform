---
# Namespace reads (cluster-scoped informer required by the gateway source).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations:
    # Phase A of the skeleton->Tenant-CR handover (#1932/#2486): when the KRO
    # swap de-inventories this object from the `apps` Kustomization, Flux must
    # NOT garbage-collect it — kro adopts it in place. Also guards against
    # accidental skeleton deletion meanwhile. Remove after Phase C.
    kustomize.toolkit.fluxcd.io/prune: disabled
  name: ascoachingogvaner-external-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tenant-external-dns-global
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: ascoachingogvaner
