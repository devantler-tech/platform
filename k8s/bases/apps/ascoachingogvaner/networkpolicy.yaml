apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ascoachingogvaner
  namespace: ascoachingogvaner
spec:
  endpointSelector: {}
  ingress:
    # Gateway ingress — static site served by unprivileged nginx on 8080
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
