apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: homepage
  namespace: homepage
spec:
  scaleTargetRef:
    name: homepage
  minReplicaCount: 0
  maxReplicaCount: ${homepage_max_replicas:=2}
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
