apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-homepage
  namespace: homepage
spec:
  endpointSelector: {}
  ingress:
    # Gateway ingress (Envoy → homepage). With Gateway API ExternalAuth the
    # gateway's Envoy connects to the backend DIRECTLY after the per-request
    # ext_authz check (no oauth2-proxy/auth-proxy hop), so the source is the
    # `ingress` identity — the same identity the oauth2-proxy policy already
    # trusts on its own port.
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Intra-namespace (Helm test pods)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homepage
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Flagger load-tester (blue/green acceptance smoke + load) -> the canary pods.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flagger-system
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
  egress:
    # Kube API for widget data
    - toEntities:
        - kube-apiserver
    # Intra-namespace (Helm test pods reaching homepage service)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homepage
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
