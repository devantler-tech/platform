# Blue/green canary for Homepage (the root dashboard, `${domain}`). It sits behind
# oauth2-proxy (auth-proxy forwards ${domain} -> homepage.homepage.svc:80), so a
# gateway-level weighted split isn't possible. Flagger's `kubernetes` provider
# does blue/green instead: it builds homepage-primary, runs the analysis against
# the homepage-canary Service, and promotes by repointing the apex Service to the
# new version. The public path (httproute.yaml -> oauth2-proxy -> auth-proxy ->
# homepage apex Service) is untouched and always resolves to the primary.
#
# ⚠️ High blast radius (platform front page) — watch the first rollout.
# Replicas are owned by the KEDA ScaledObject referenced below (autoscalerRef):
# the primary scales 2-3 on request rate (see scaled-object.yaml). Latency
# threshold is generous because Homepage is a single-threaded Next.js SSR app
# that bursts under load.
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: homepage
  namespace: homepage
spec:
  provider: kubernetes
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: homepage
  # The KEDA ScaledObject (scaled-object.yaml) owns replica count on BOTH
  # sides: Flagger clones it to homepage-primary — rewriting the Prometheus
  # query below for primary pods (the source query's vowel-free hash regex
  # cannot match "-primary-") — and pauses the source's scaler at 0 between
  # rollouts. Replaces the old postRenderer replicas pin (see helm-release.yaml).
  autoscalerRef:
    apiVersion: keda.sh/v1alpha1
    kind: ScaledObject
    name: homepage
    primaryScalerQueries:
      http-requests-per-second: 'sum(rate(container_http_inbound_requests_total{container_id=~"/k8s/homepage/homepage-primary-[bcdfghjklmnpqrstvwxz2-9]+-[a-z0-9]+/.*"}[2m]))'
  progressDeadlineSeconds: 600
  service:
    port: 80
    targetPort: 3000
  analysis:
    interval: 1m
    threshold: 5
    iterations: 5
    metrics:
      - name: success-rate
        templateRef:
          name: coroot-request-success-rate
          namespace: flagger-system
        thresholdRange:
          min: 99
        interval: 2m
      - name: latency-p99
        templateRef:
          name: coroot-request-duration
          namespace: flagger-system
        thresholdRange:
          max: 2000
        interval: 2m
    webhooks:
      - name: acceptance-test
        type: pre-rollout
        url: http://flagger-loadtester.flagger-system/
        timeout: 30s
        metadata:
          type: bash
          cmd: "curl -sf http://homepage-canary.homepage/"
      - name: load-test
        type: rollout
        url: http://flagger-loadtester.flagger-system/
        timeout: 30s
        metadata:
          type: cmd
          cmd: "hey -z 1m -q 5 -c 2 http://homepage-canary.homepage/"
