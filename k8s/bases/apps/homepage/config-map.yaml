---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  settings.yaml: |
    title: Platform
    favicon: https://avatars.githubusercontent.com/u/178524219?v=4&s=32
    theme: dark
    color: slate
    cardBlur: sm
    background:
      image: https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D
      blur: sm
      opacity: 70
    layout:
      Kubernetes:
        icon: si-talos-#FF7300
      Device Management:
        icon: mdi-cellphone-cog
      Diagnostics:
        icon: mdi-stethoscope
      Cloud:
        icon: si-hetzner
      Network:
        icon: si-cloudflare
      Monitoring:
        icon: si-grafana
      Analytics:
        icon: si-googleanalytics
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  widgets.yaml: |
    - logo:
        icon: https://avatars.githubusercontent.com/u/178524219?v=4&s=200
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: google
        target: _blank
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hourCycle: h23
  services.yaml: |
    - Cloud:
        - Hetzner Cloud:
            icon: hetzner
            href: https://console.hetzner.cloud/projects
            description: Hetzner Cloud infrastructure provider.
    - Network:
        - Cloudflare:
            icon: cloudflare
            href: https://dash.cloudflare.com
            description: Central hub for managing public networking, e.g. FQDN and DNS.
        - UniFi:
            icon: unifi
            href: https://unifi.ui.com
            description: Central hub for managing on-prem UniFi network infrastructure.
    - Analytics:
        - Google Analytics:
            icon: google-analytics
            href: https://analytics.google.com
            description: Web analytics service.
    - Monitoring:
        - Grafana:
            icon: grafana
            href: https://devantler.grafana.net
            description: Central hub for monitoring my infrastructure.
  bookmarks.yaml: |
    - Personal:
        - Personal Site:
            - icon: github-light
              href: https://devantler.tech
    - GitHub:
        - GitHub:
            - icon: github-light
              href: https://github.com
        - DevantlerTech:
            - icon: github-light
              href: https://github.com/devantler-tech
        - Security:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/security/overview
        - Insights:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/insights
        - Packages:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/packages
        - Projects:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/projects/5
    - Developer Tools:
        - Codecov:
            - icon: si-codecov-#F01F7A
              href: https://app.codecov.io
        - StepSecurity:
            - icon: si-stepsecurity
              href: https://app.stepsecurity.io
        - Renovate:
            - icon: si-renovatebot-#007fa0
              href: https://developer.mend.io
        - skills.sh:
            - icon: mdi-certificate-outline
              href: https://skills.sh
        - lllm-stats.com:
            - icon: mdi-chart-bar
              href: https://lllm-stats.com
    - Kubernetes:
        - ArtifactHUB:
            - icon: si-artifacthub-#417598
              href: https://artifacthub.io
        - CRD Docs:
            - icon: si-kubernetes-#326CE5
              href: https://doc.crds.dev
        - Network Policy Editor:
            - icon: si-kubernetes-#326CE5
              href: https://editor.networkpolicy.io
    - Package Registries:
        - Docker Hub:
            - icon: docker
              href: https://hub.docker.com
        - NuGet:
            - icon: si-nuget-#1088d6
              href: https://www.nuget.org
  docker.yaml: ""
  custom.css: ""
  custom.js: ""
