---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  settings.yaml: |
    title: Platform
    # `favicon` also drives the iOS Add-to-Home-Screen icon: Homepage emits
    # <link rel="apple-touch-icon" sizes="180x180" href={favicon}> and has no
    # separate apple-touch-icon setting. At s=32 iOS upscaled a 32px image to
    # 180px, so the installed PWA tile was badly blurred. Request s=180 to match
    # the apple-touch-icon size exactly — a crisp, unscaled render (the avatar
    # tops out at 460x460 upstream) — which the browser also downsamples for the
    # tab favicon.
    favicon: https://avatars.githubusercontent.com/u/178524219?v=4&s=180
    # PWA manifest icons for the installed app. Without this the manifest falls
    # back to Homepage's own logo; point it at the DevantlerTech avatar so an
    # installed app stays on-brand. iOS uses the apple-touch-icon above for the
    # home-screen tile; these cover the web manifest (Android / desktop install /
    # splash). s=512 is capped to the avatar's native 460x460 — still far sharper
    # than the old 32px asset.
    pwa:
      icons:
        - src: https://avatars.githubusercontent.com/u/178524219?v=4&s=192
          type: image/jpeg
          sizes: 192x192
        - src: https://avatars.githubusercontent.com/u/178524219?v=4&s=512
          type: image/jpeg
          sizes: 512x512
    theme: dark
    # zinc, not slate: homepage's gray chrome (text, card fills, borders, and
    # the #__next page background) follows this `color` ramp. slate is a
    # ~47%-saturated blue and read as "too blue"; zinc (hue 240, ~6% saturation)
    # matches devantler.tech's low-saturation cool-gray ramp. See custom.css.
    color: zinc
    # No background.image — eliminates the cold-load white→image flash and
    # the cross-origin Unsplash dependency. The dark, flat backdrop is
    # painted from custom.css below; cardBlur is omitted because there is
    # no underlying image for backdrop-filter to blur.
    headerStyle: clean
    statusStyle: dot
    iconStyle: gradient
    hideVersion: true
    # Disable Homepage's built-in GitHub release check. The cluster egress
    # NetworkPolicy (cilium-network-policy.yaml) intentionally allows no internet
    # access, so the check — GET api.github.com/repos/gethomepage/homepage/
    # releases, fired by the Version component — is dropped by Cilium and
    # hangs ~8s on the TCP connect timeout before failing, wasting an
    # event-loop slot on this single-threaded server. This is separate from
    # hideVersion (which only hides the footer display); hideVersion alone did
    # not stop the call in prod, so disable the check at its source. Gates the
    # useSWR("/api/releases") key in the Version component, so it holds even
    # if hideVersion is later set false to show the version again.
    disableUpdateCheck: true
    target: _blank
    # Layout order also controls render order on the page. Groups not listed
    # here still appear (Homepage falls back to alphabetical) but get a generic
    # icon — keep this in sync with the gethomepage.dev/group annotations on
    # the HTTPRoutes under k8s/bases/apps/** and k8s/**/infrastructure/** (incl.
    # provider overlays, e.g. Longhorn on Hetzner) and the service entries below.
    layout:
      # First on the page: the Internal Developer Platform (Backstage and any
      # future self-service portals). Keep this entry first so the IDP is the
      # landing focus.
      Internal Developer Platform:
        icon: mdi-developer-board
      Kubernetes:
        icon: si-talos-#FF7300
      Observability:
        # `coroot` is not in any icon set Homepage resolves; use an MDI icon.
        icon: mdi-chart-line
      Storage:
        icon: mdi-harddisk
      Security:
        icon: mdi-shield-lock
      Diagnostics:
        icon: mdi-stethoscope
      Device Management:
        icon: mdi-cellphone-cog
      Cloud:
        icon: si-hetzner
      Network:
        icon: si-cloudflare
      Finance:
        icon: mdi-finance
      Analytics:
        icon: si-umami
      Personal Sites:
        icon: mdi-web
      Customer Sites:
        icon: mdi-briefcase-account
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  widgets.yaml: |
    - logo:
        icon: https://avatars.githubusercontent.com/u/178524219?v=4&s=200
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: google
        target: _blank
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hourCycle: h23
  services.yaml: |
    - Cloud:
        - Hetzner Cloud:
            icon: hetzner
            href: https://console.hetzner.cloud/projects
            description: Hetzner Cloud infrastructure provider.
    - Network:
        - Cloudflare:
            icon: cloudflare
            href: https://dash.cloudflare.com
            description: Central hub for managing public networking, e.g. FQDN and DNS.
        - UniFi:
            icon: unifi
            href: https://unifi.ui.com
            description: Central hub for managing on-prem UniFi network infrastructure.
    # Analytics is populated dynamically from the gethomepage.dev annotations on
    # Umami's Flagger-generated HTTPRoute (k8s/bases/apps/umami/canary.yaml,
    # spec.service.apex.annotations).
  bookmarks.yaml: |
    - Personal:
        - Personal Site:
            - icon: github-light
              href: https://devantler.tech
    - GitHub:
        - GitHub:
            - icon: github-light
              href: https://github.com
        - DevantlerTech:
            - icon: github-light
              href: https://github.com/devantler-tech
        - Security:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/security/overview
        - Insights:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/insights
        - Packages:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/packages
        - Projects:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/projects/5
    - Developer Tools:
        - Codecov:
            - icon: si-codecov-#F01F7A
              href: https://app.codecov.io
        - CodeRabbit:
            - icon: si-coderabbit-#FF570A
              href: https://app.coderabbit.ai
        - Enable Banking:
            - icon: mdi-bank-outline
              href: https://enablebanking.com
        - StepSecurity:
            - icon: si-stepsecurity
              href: https://app.stepsecurity.io
        - Renovate:
            - icon: si-renovatebot-#007fa0
              href: https://developer.mend.io
        - skills.sh:
            - icon: mdi-certificate-outline
              href: https://skills.sh
        - lllm-stats.com:
            - icon: mdi-chart-bar
              href: https://lllm-stats.com
    - Kubernetes:
        - ArtifactHUB:
            - icon: si-artifacthub-#417598
              href: https://artifacthub.io
        - CRD Docs:
            - icon: si-kubernetes-#326CE5
              href: https://doc.crds.dev
        - Network Policy Editor:
            - icon: si-kubernetes-#326CE5
              href: https://editor.networkpolicy.io
    - Package Registries:
        - Docker Hub:
            - icon: docker
              href: https://hub.docker.com
        - NuGet:
            - icon: si-nuget-#1088d6
              href: https://www.nuget.org
  docker.yaml: ""
  # Theme: mirror https://devantler.tech. That site is Astro Starlight with the
  # stock dark palette — a gray ramp at hue 224 but only ~6-14% saturation, i.e.
  # a near-neutral, faintly-cool dark — and the accent swapped to a "Matrix"
  # neon green (--sl-color-accent #39ff14, high #7aff6e). Cards are frosted glass
  # that glow green and lift on hover; section accents and selection are green.
  # Reproduced purely in CSS — no background.image, because (a) the cluster
  # egress NetworkPolicy blocks external assets and (b) a remote image caused a
  # cold-load flash.
  #
  # Two levers carry the look:
  #   1. color:zinc (settings.yaml) — homepage's gray chrome (text, card fills,
  #      borders, and the #__next page background, all `theme-*` / --color-*
  #      driven) follows the `color` ramp. slate is ~47%-saturated blue and read
  #      as "too blue"; zinc (hue 240, ~6% saturation) is the closest match to
  #      devantler's low-saturation cool gray, so this de-blues the page at once.
  #   2. The CSS below — a flat backdrop at devantler's exact hsl(224,10%,10%)
  #      plus the green accent layer (borders / glow / underlines / selection).
  # cardBlur stays unset: the theme already paints a translucent fill
  # (dark:bg-white/5 ≈ devantler's glass), so the glass look comes from a faint
  # border + glow here, not backdrop-filter (nothing high-frequency to blur).
  # gethomepage hooks: #__next + html/body (page bg), .service-card, .bookmark,
  # .service-group-name / .bookmark-group-name, #information-widgets, scoped to
  # #layout-groups / #services / #bookmarks so they beat the chart's utilities.
  custom.css: |
    :root {
      --dt-accent: #39ff14;                     /* Matrix neon green */
      --dt-accent-high: #7aff6e;                /* lighter, more legible green */
      --dt-glow-subtle: rgba(57, 255, 20, 0.10);
      --dt-card-border: rgba(255, 255, 255, 0.10);
      --dt-card-border-hover: rgba(57, 255, 20, 0.45);
    }

    /* Page backdrop. Homepage paints the VISIBLE page background on #__next
       (the Next.js root, height:100%) via `background-color: rgb(var(--bg-color))`,
       where dark-theme --bg-color = color-800 of the `color` setting. That rule
       carries ID specificity, so it sits above a plain `body {}` background —
       which is why the earlier html/body auras here were never seen. Match
       devantler.tech's flat backdrop by painting its exact --sl-color-bg,
       hsl(224, 10%, 10%) (a near-neutral dark with a faint cool tint — not the
       saturated slate-800 the chart shipped), on #__next too. The `body #__next`
       selector outranks the chart's grouped rule regardless of stylesheet order.
       Flat, no auras — devantler's body background is flat. */
    html,
    body,
    body #__next {
      background-color: hsl(224, 10%, 10%);
      background-image: none;
    }

    /* Neon-green text selection + keyboard focus ring, matching devantler.tech. */
    ::selection {
      background: rgba(57, 255, 20, 0.25);
    }
    *:focus-visible {
      outline: 2px solid var(--dt-accent);
      outline-offset: 2px;
    }

    /* Service & bookmark cards: the theme already paints a translucent glass
       fill; add a faint border at rest and a green glow + lift on hover —
       devantler's card interaction. Scoped to the group containers so these
       override the chart's Tailwind utilities regardless of stylesheet order. */
    #layout-groups .service-card,
    #services .service-card,
    #layout-groups .bookmark > a,
    #bookmarks .bookmark > a {
      border: 1px solid var(--dt-card-border);
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
    }
    #layout-groups .service-card:hover,
    #services .service-card:hover,
    #layout-groups .bookmark > a:hover,
    #bookmarks .bookmark > a:hover {
      border-color: var(--dt-card-border-hover);
      box-shadow:
        0 4px 24px var(--dt-glow-subtle),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
    }
    /* Nudge the title toward the lighter green on hover (devantler link hover). */
    #layout-groups .service-card:hover .service-name,
    #services .service-card:hover .service-name,
    #layout-groups .bookmark > a:hover .bookmark-name,
    #bookmarks .bookmark > a:hover .bookmark-name {
      color: var(--dt-accent-high);
    }

    /* Section headers: keep the theme's light-gray text (as devantler's h2s do)
       and add a short green accent underline — a calmer take on devantler's
       gradient <hr> dividers. */
    .service-group-name,
    .bookmark-group-name {
      padding-bottom: 0.3rem;
      background-image: linear-gradient(to right, var(--dt-accent), transparent);
      background-size: 2.75rem 2px;
      background-position: 0 100%;
      background-repeat: no-repeat;
    }

    /* Top widgets bar: a hairline separator under the widgets. The logo sat on a
       hard 16px green halo that read as a glowing ring; drop it and instead
       feather the logo's own edges into the dark backdrop with a soft radial
       mask, so the near-black badge dissolves into hsl(224,10%,10%) and reads as
       a subtle, understated mark rather than a green-rimmed sticker. The mask
       stays fully opaque across the emblem (inner ~65%) and only fades the flat
       black margin and corners, so no logo detail is dimmed. */
    #information-widgets {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 0.85rem;
      margin-bottom: 0.25rem;
    }
    #information-widgets img {
      border-radius: 12px;
      -webkit-mask-image: radial-gradient(circle, #000 65%, transparent 100%);
              mask-image: radial-gradient(circle, #000 65%, transparent 100%);
    }

    /* Thin, dark scrollbar with a green thumb. */
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(57, 255, 20, 0.30) transparent;
    }
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background-color: rgba(57, 255, 20, 0.25);
      border: 2px solid transparent;
      border-radius: 9999px;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover {
      background-color: rgba(57, 255, 20, 0.45);
      background-clip: content-box;
    }

    /* Respect reduced-motion: the only transitions are card hovers. */
    @media (prefers-reduced-motion: reduce) {
      #layout-groups .service-card,
      #services .service-card,
      #layout-groups .bookmark > a,
      #bookmarks .bookmark > a {
        transition: none;
      }
    }
  custom.js: ""
