---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  settings.yaml: |
    title: Platform
    favicon: https://avatars.githubusercontent.com/u/178524219?v=4&s=32
    theme: dark
    color: slate
    # No background.image — eliminates the cold-load white→image flash and
    # the cross-origin Unsplash dependency. The dark gradient backdrop is
    # painted from custom.css below; cardBlur is omitted because there is
    # no underlying image for backdrop-filter to blur.
    headerStyle: clean
    statusStyle: dot
    iconStyle: gradient
    hideVersion: true
    # Disable Homepage's built-in GitHub release check. The cluster egress
    # NetworkPolicy (networkpolicy.yaml) intentionally allows no internet
    # access, so the check — GET api.github.com/repos/gethomepage/homepage/
    # releases, fired by the Version component — is dropped by Cilium and
    # hangs ~8s on the TCP connect timeout before failing, wasting an
    # event-loop slot on this single-threaded server. This is separate from
    # hideVersion (which only hides the footer display); hideVersion alone did
    # not stop the call in prod, so disable the check at its source. Gates the
    # useSWR("/api/releases") key in the Version component, so it holds even
    # if hideVersion is later set false to show the version again.
    disableUpdateCheck: true
    target: _blank
    # Layout order also controls render order on the page. Groups not listed
    # here still appear (Homepage falls back to alphabetical) but get a generic
    # icon — keep this in sync with the gethomepage.dev/group annotations on
    # the HTTPRoutes under k8s/bases/apps/** and k8s/**/infrastructure/** (incl.
    # provider overlays, e.g. Longhorn on Hetzner) and the service entries below.
    layout:
      Kubernetes:
        icon: si-talos-#FF7300
      Observability:
        icon: coroot
      Storage:
        icon: mdi-harddisk
      Security:
        icon: mdi-shield-lock
      Diagnostics:
        icon: mdi-stethoscope
      Device Management:
        icon: mdi-cellphone-cog
      Cloud:
        icon: si-hetzner
      Network:
        icon: si-cloudflare
      Finance:
        icon: mdi-finance
      Analytics:
        icon: si-umami
      Personal Sites:
        icon: mdi-web
      Customer Sites:
        icon: mdi-briefcase-account
  kubernetes.yaml: |
    mode: cluster
    gateway: true
  widgets.yaml: |
    - logo:
        icon: https://avatars.githubusercontent.com/u/178524219?v=4&s=200
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: google
        target: _blank
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hourCycle: h23
  services.yaml: |
    - Cloud:
        - Hetzner Cloud:
            icon: hetzner
            href: https://console.hetzner.cloud/projects
            description: Hetzner Cloud infrastructure provider.
    - Network:
        - Cloudflare:
            icon: cloudflare
            href: https://dash.cloudflare.com
            description: Central hub for managing public networking, e.g. FQDN and DNS.
        - UniFi:
            icon: unifi
            href: https://unifi.ui.com
            description: Central hub for managing on-prem UniFi network infrastructure.
    # Analytics is populated dynamically from the Umami HTTPRoute's
    # gethomepage.dev annotations (k8s/bases/apps/umami/httproute.yaml).
  bookmarks.yaml: |
    - Personal:
        - Personal Site:
            - icon: github-light
              href: https://devantler.tech
    - GitHub:
        - GitHub:
            - icon: github-light
              href: https://github.com
        - DevantlerTech:
            - icon: github-light
              href: https://github.com/devantler-tech
        - Security:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/security/overview
        - Insights:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/insights
        - Packages:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/packages
        - Projects:
            - icon: si-github-#181717
              href: https://github.com/orgs/devantler-tech/projects/5
    - Developer Tools:
        - Codecov:
            - icon: si-codecov-#F01F7A
              href: https://app.codecov.io
        - StepSecurity:
            - icon: si-stepsecurity
              href: https://app.stepsecurity.io
        - Renovate:
            - icon: si-renovatebot-#007fa0
              href: https://developer.mend.io
        - skills.sh:
            - icon: mdi-certificate-outline
              href: https://skills.sh
        - lllm-stats.com:
            - icon: mdi-chart-bar
              href: https://lllm-stats.com
    - Kubernetes:
        - ArtifactHUB:
            - icon: si-artifacthub-#417598
              href: https://artifacthub.io
        - CRD Docs:
            - icon: si-kubernetes-#326CE5
              href: https://doc.crds.dev
        - Network Policy Editor:
            - icon: si-kubernetes-#326CE5
              href: https://editor.networkpolicy.io
    - Package Registries:
        - Docker Hub:
            - icon: docker
              href: https://hub.docker.com
        - NuGet:
            - icon: si-nuget-#1088d6
              href: https://www.nuget.org
  docker.yaml: ""
  # Theme: mirror https://devantler.tech on the dashboard. devantler.tech is an
  # Astro Starlight site whose signature is a "Matrix" neon-green accent
  # (#39ff14) over a dark near-black base, with frosted-glass cards that glow
  # green and lift on hover, green section accents, and green selection/focus.
  # We reproduce that purely in CSS — no background.image, because (a) the
  # cluster egress NetworkPolicy blocks external assets and (b) a remote image
  # caused a cold-load flash. cardBlur stays unset: the theme already paints a
  # translucent card fill (dark:bg-white/5 ≈ devantler's rgba(255,255,255,.045)
  # glass), so the glass look comes from a faint border + glow here rather than
  # backdrop-filter (which has nothing high-frequency behind it to blur).
  # color:slate (settings.yaml) already matches devantler's blue-tinted gray
  # family, so only the accent layer changes below. gethomepage hooks used:
  # html/body, .service-card, .bookmark, .service-group-name /
  # .bookmark-group-name, #information-widgets, scoped to #layout-groups /
  # #services / #bookmarks so they win over the chart's Tailwind utilities.
  custom.css: |
    :root {
      --dt-accent: #39ff14;                     /* Matrix neon green */
      --dt-accent-high: #7aff6e;                /* lighter, more legible green */
      --dt-glow-subtle: rgba(57, 255, 20, 0.10);
      --dt-card-border: rgba(255, 255, 255, 0.10);
      --dt-card-border-hover: rgba(57, 255, 20, 0.45);
    }

    /* Page backdrop: devantler's dark near-black base with two soft green
       "Matrix" auras (replaces the previous blue/violet auras). Painted on
       html+body so it covers tall scrollable pages; fixed so cards scroll
       over a stable backdrop. */
    html,
    body {
      background-color: #0b0e14;
      background-image:
        radial-gradient(at 18% 12%, rgba(57, 255, 20, 0.10), transparent 55%),
        radial-gradient(at 82% 88%, rgba(57, 255, 20, 0.06), transparent 60%);
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    /* Neon-green text selection + keyboard focus ring, matching devantler.tech. */
    ::selection {
      background: rgba(57, 255, 20, 0.25);
    }
    *:focus-visible {
      outline: 2px solid var(--dt-accent);
      outline-offset: 2px;
    }

    /* Service & bookmark cards: the theme already paints a translucent glass
       fill; add a faint border at rest and a green glow + lift on hover —
       devantler's card interaction. Scoped to the group containers so these
       override the chart's Tailwind utilities regardless of stylesheet order. */
    #layout-groups .service-card,
    #services .service-card,
    #layout-groups .bookmark > a,
    #bookmarks .bookmark > a {
      border: 1px solid var(--dt-card-border);
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
    }
    #layout-groups .service-card:hover,
    #services .service-card:hover,
    #layout-groups .bookmark > a:hover,
    #bookmarks .bookmark > a:hover {
      border-color: var(--dt-card-border-hover);
      box-shadow:
        0 4px 24px var(--dt-glow-subtle),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
    }
    /* Nudge the title toward the lighter green on hover (devantler link hover). */
    #layout-groups .service-card:hover .service-name,
    #services .service-card:hover .service-name,
    #layout-groups .bookmark > a:hover .bookmark-name,
    #bookmarks .bookmark > a:hover .bookmark-name {
      color: var(--dt-accent-high);
    }

    /* Section headers: keep the theme's light-gray text (as devantler's h2s do)
       and add a short green accent underline — a calmer take on devantler's
       gradient <hr> dividers. */
    .service-group-name,
    .bookmark-group-name {
      padding-bottom: 0.3rem;
      background-image: linear-gradient(to right, var(--dt-accent), transparent);
      background-size: 2.75rem 2px;
      background-position: 0 100%;
      background-repeat: no-repeat;
    }

    /* Top widgets bar: a hairline separator + soft green halo on the logo,
       echoing devantler's glass header and glowing hero avatar. */
    #information-widgets {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 0.85rem;
      margin-bottom: 0.25rem;
    }
    #information-widgets img {
      border-radius: 12px;
      box-shadow: 0 0 16px rgba(57, 255, 20, 0.22);
    }

    /* Thin, dark scrollbar with a green thumb. */
    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(57, 255, 20, 0.30) transparent;
    }
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background-color: rgba(57, 255, 20, 0.25);
      border: 2px solid transparent;
      border-radius: 9999px;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover {
      background-color: rgba(57, 255, 20, 0.45);
      background-clip: content-box;
    }

    /* Respect reduced-motion: the only transitions are card hovers. */
    @media (prefers-reduced-motion: reduce) {
      #layout-groups .service-card,
      #services .service-card,
      #layout-groups .bookmark > a,
      #bookmarks .bookmark > a {
        transition: none;
      }
    }
  custom.js: ""
