apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: homepage
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - ${domain}
  rules:
    - backendRefs:
        - name: auth-proxy
          namespace: oauth2-proxy
          port: 80
