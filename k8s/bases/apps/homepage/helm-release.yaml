apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
  namespace: homepage
  labels:
    # Helm test disabled: busybox wget writes index.html which fails under
    # Kyverno's readOnlyRootFilesystem policy; deployment readiness probe
    # already validates service health.
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: homepage
      version: 4.11.1
      sourceRef:
        kind: HelmRepository
        name: homepage
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: homepage
            patch: |
              # Replicas are deliberately NOT pinned here: the KEDA ScaledObject
              # (scaled-object.yaml) owns them through the Canary's autoscalerRef
              # — the primary scales 2-3 on request rate and Flagger pauses the
              # source's scaler at 0 between rollouts. The chart's replicas
              # default (1) only exists for the instant before Flagger/KEDA
              # reconcile; Flux drift detection ignores /spec/replicas, so
              # neither controller is fought. See canary.yaml.
              - op: add
                path: /metadata/annotations/configmap.reloader.stakater.com~1reload
                value: homepage
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 1
                    maxUnavailable: 0
              - op: add
                path: /spec/template/spec/topologySpreadConstraints
                value:
                  - maxSkew: 1
                    topologyKey: kubernetes.io/hostname
                    whenUnsatisfiable: ScheduleAnyway
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: homepage
                        app.kubernetes.io/instance: homepage
              # Chart hardcodes liveness/readiness with K8s defaults
              # (timeoutSeconds: 1, failureThreshold: 3, periodSeconds: 10).
              # Homepage takes ~13s to start serving on a fresh pod, so each
              # rollout produces 3 Unhealthy probe warnings per pod and leaves
              # only ~17s of headroom before the liveness restart fires. Add
              # a startupProbe to gate liveness/readiness during initial boot.
              #
              # initialDelaySeconds is past the observed ~13s cold start so
              # the first probe lands on a serving container — zero failure
              # events during a normal rollout (the merge-queue's 90s
              # steady-state Warning check would otherwise count probe
              # failures fired in that window).
              - op: add
                path: /spec/template/spec/containers/0/startupProbe
                value:
                  httpGet:
                    path: /
                    port: http
                  initialDelaySeconds: 20
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 12  # 60s grace beyond initial delay
              # Once the startupProbe succeeds, liveness/readiness take over
              # with the chart's tight timeoutSeconds: 1. When a replica lands
              # on a CPU-pressured node its event loop is briefly starved and
              # GET / can't answer within 1s, so liveness fails 3×10s and
              # SIGTERMs an otherwise-healthy pod (observed in steady state:
              # 4 restarts, exitCode 0 / Completed, 119Mi of 512Mi — not an
              # OOMKill). Relax the timeout, and make liveness slower to act,
              # so transient starvation doesn't restart a healthy pod; a
              # genuinely hung container is still caught within ~60s.
              - op: add
                path: /spec/template/spec/containers/0/livenessProbe/timeoutSeconds
                value: 5
              - op: add
                path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
                value: 6
              - op: add
                path: /spec/template/spec/containers/0/readinessProbe/timeoutSeconds
                value: 5
              # Graceful drain on termination. The release rolls often (helm
              # revisions + reloader restarts) and the Service's ClientIP
              # affinity (below) pins each gateway Envoy source to one homepage
              # replica. Without draining, a rolling pod stops serving the
              # instant it is SIGTERMed while the gateway is still routed to it,
              # so the rollout window returns 502 Bad Gateway — and the
              # dashboard's ~14 /api/* polls per refresh amplify that into a
              # latency+error incident at the gateway. A short preStop keeps the
              # old pod answering until it has been removed from the Service
              # endpoints and the affinity has rebalanced.
              - op: add
                path: /spec/template/spec/terminationGracePeriodSeconds
                value: 30
              - op: add
                path: /spec/template/spec/containers/0/lifecycle
                value:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "sleep 10"]
          # Flicker fix: with replicaCount=2 and the chart's default ClusterIP
          # service, the Kubernetes widget's poll for node/cluster CPU/memory
          # round-robins between two pods that each maintain their own
          # kube-apiserver watcher cache — values pop between slightly-stale
          # and slightly-fresh on every refresh. Pinning to ClientIP keeps
          # each gateway Envoy source stuck to one homepage replica so the
          # widget reads from a consistent cache.
          - target:
              kind: Service
              name: homepage
            patch: |
              - op: add
                path: /spec/sessionAffinity
                value: ClientIP
  # ICONS:
  # https://github.com/walkxcode/dashboard-icons
  # https://simpleicons.org
  # https://pictogrammers.com/library/mdi/
  # ---
  # https://github.com/M0NsTeRRR/helm-charts/blob/main/charts/homepage/values.yaml
  values:
    # replicaCount intentionally omitted — replicas are owned by the KEDA
    # ScaledObject (scaled-object.yaml) through the Canary's autoscalerRef;
    # the primary scales 2-3 on request rate.
    # Homepage is a single-threaded Next.js server: it idles near ~3m CPU but
    # bursts hard on every load — server-rendering the page, polling ~14
    # service statuses against kube-apiserver, and aggregating the cluster /
    # node Kubernetes widget. With no explicit block it inherits the namespace
    # LimitRange's default CPU limit of 500m, and auto-vpa (controlledValues:
    # RequestsAndLimits) preserves that stingy default limit:request ratio, so
    # the limit stays pinned near 500m and can never grow to absorb a burst.
    # Measured result: the container was CFS-throttled in 35-60% of scheduled
    # periods, starving the event loop — the "GET / can't answer within 1s"
    # stall the probe tuning below was only working around, and the real cause
    # of the dashboard feeling slow.
    #
    # Author resources explicitly (Kyverno add-resource-defaults uses +(key)
    # anchors, so these win and stay scanner-visible). Pin the CPU request to
    # the auto-vpa minAllowed floor (15m) on purpose: VPA keeps the request
    # there, and because it preserves the authored limit:request ratio the
    # generous 2-core limit survives its proportional scaling. CPU is
    # compressible and the namespace ResourceQuota caps requests, not limits,
    # so a 2-core ceiling reserves nothing while it idles.
    resources:
      requests:
        cpu: 15m
        memory: 192Mi
      limits:
        cpu: "2"
        memory: 512Mi
    config:
      allowedHosts:
        - ${domain}
    ingress:
      enabled: false
    volumes:
      - name: homepage-config
        configMap:
          name: homepage
    volumeMounts:
      - mountPath: /app/config/custom.js
        name: homepage-config
        subPath: custom.js
      - mountPath: /app/config/custom.css
        name: homepage-config
        subPath: custom.css
      - mountPath: /app/config/docker.yaml
        name: homepage-config
        subPath: docker.yaml
      - mountPath: /app/config/settings.yaml
        name: homepage-config
        subPath: settings.yaml
      - mountPath: /app/config/kubernetes.yaml
        name: homepage-config
        subPath: kubernetes.yaml
      - mountPath: /app/config/widgets.yaml
        name: homepage-config
        subPath: widgets.yaml
      - mountPath: /app/config/services.yaml
        name: homepage-config
        subPath: services.yaml
      - mountPath: /app/config/bookmarks.yaml
        name: homepage-config
        subPath: bookmarks.yaml
