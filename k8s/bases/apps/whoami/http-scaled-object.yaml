---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: whoami
  namespace: whoami
spec:
  hosts:
    - whoami.${domain}
  scaleTargetRef:
    name: whoami
    service: whoami
    port: 80
  replicas:
    # Always-on HA: min 2 keeps two replicas serving at all times (survives a
    # pod/node failure) rather than scaling to zero. whoami is stateless.
    min: 2
    max: 2
  scaledownPeriod: 300
  scalingMetric:
    requestRate:
      granularity: 1s
      targetValue: 100
      window: 1m
