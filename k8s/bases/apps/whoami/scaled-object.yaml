apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: whoami
  namespace: whoami
spec:
  scaleTargetRef:
    name: whoami
  minReplicaCount: 0
  maxReplicaCount: ${whoami_max_replicas:=2}
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
