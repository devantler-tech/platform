apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-whoami
  namespace: whoami
spec:
  endpointSelector: {}
  ingress:
    # KEDA interceptor proxy routes traffic from gateway
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: keda
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
