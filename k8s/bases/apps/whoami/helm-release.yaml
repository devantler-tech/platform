apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whoami
  namespace: whoami
  labels:
    # helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: whoami
      version: 6.0.0
      sourceRef:
        kind: HelmRepository
        name: whoami
  # https://github.com/cowboysysop/charts/blob/master/charts/whoami/values.yaml
  values:
    replicaCount: ${whoami_replicas:=2}
    pdb:
      create: true
      # Drain-safe + scale-to-zero compatible (#1880/#1882): maxUnavailable: 1
      # lets the single pod be evicted during a node drain (minAvailable would
      # block it), and KEDA can still scale to 0 — a controller scale-down is a
      # direct ReplicaSet delete, not an eviction-API call the PDB governs.
      minAvailable: null
      maxUnavailable: 1
    podSecurityContext:
      runAsUser: 65534
      runAsGroup: 65534
    securityContext:
      allowPrivilegeEscalation: false
      runAsUser: 65534
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: whoami
            app.kubernetes.io/instance: whoami
    ingress:
      enabled: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: whoami
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 1
                    maxUnavailable: 0
          - target:
              kind: ServiceAccount
              name: whoami
            patch: |
              - op: add
                path: /automountServiceAccountToken
                value: false
