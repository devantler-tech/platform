apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: whoami
  namespace: whoami
  labels:
    # helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  chart:
    spec:
      chart: whoami
      version: 6.0.0
      sourceRef:
        kind: HelmRepository
        name: whoami
  # https://github.com/cowboysysop/charts/blob/master/charts/whoami/values.yaml
  values:
    replicaCount: ${whoami_replicas:=2}
    pdb:
      create: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: whoami
            app.kubernetes.io/instance: whoami
    ingress:
      enabled: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: whoami
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 1
                    maxUnavailable: 0
