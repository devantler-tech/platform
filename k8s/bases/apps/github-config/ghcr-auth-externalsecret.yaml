# GHCR image-pull secret for the github-config app, sourced from OpenBao (same
# shape and path as every other tenant's ghcr-auth). Consumed by the app's
# OCIRepository (secretRef) and ServiceAccount (imagePullSecrets) to pull the
# cosign-signed manifests artifact published by devantler-tech/.github.
#
# PLATFORM-side resource: reconciled by flux-system (the apps layer applies the
# app scaffolding), never by the app ServiceAccount, so it uses the shared
# cluster-scoped `openbao` ClusterSecretStore reading the platform path
# infrastructure/ghcr/auth — the `restrict-tenant-secret-stores` Kyverno policy
# carves out flux-system-applied ExternalSecrets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-auth
  namespace: github-config
  labels:
    app.kubernetes.io/managed-by: ksail
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: ghcr-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .dockerconfigjson }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: infrastructure/ghcr/auth
        property: dockerconfigjson
