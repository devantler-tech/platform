# PushSecret for the GitHub App credentials used by provider-upjet-github.
# Same durable-seed pattern as seed-hcloud: re-pushing hourly from the SOPS
# source (variables-cluster) re-seeds the keys automatically after OpenBao data
# loss.
#
# Lives with the github-config app (the apps layer), NOT in
# infrastructure/vault-seed/, on purpose: until the maintainer adds the
# github_app_* keys to the prod variables-cluster secret this PushSecret stalls,
# and the apps layer is the leaf of the Flux dependency chain — so the stall can
# never hold `infrastructure` (and through it every deploy) red. A vault-seed
# placement would block the chain. Seed the keys before/with rollout to avoid
# even a transient red apps layer.
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-github-app
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-cluster
  data:
    - match:
        secretKey: github_app_id
        remoteRef:
          remoteKey: infrastructure/github/app
          property: app_id
    - match:
        secretKey: github_app_installation_id
        remoteRef:
          remoteKey: infrastructure/github/app
          property: installation_id
    - match:
        secretKey: github_app_pem
        remoteRef:
          remoteKey: infrastructure/github/app
          property: pem
