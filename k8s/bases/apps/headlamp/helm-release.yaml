apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  timeout: 10m
  chart:
    spec:
      chart: headlamp
      version: 0.43.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
  valuesFrom:
    - kind: Secret
      name: headlamp-oidc
      valuesKey: client-secret
      targetPath: config.oidc.clientSecret
      optional: true
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: headlamp
            patch: |
              - op: add
                path: /metadata/annotations/secret.reloader.stakater.com~1reload
                value: headlamp-oidc
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 0
                    maxUnavailable: 1
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: tmp-dir
                  emptyDir: {}
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: headlamp-config
                  emptyDir: {}
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: tmp-dir
                  mountPath: /tmp
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: headlamp-config
                  mountPath: /home/headlamp/.config
              - op: add
                path: /spec/template/spec/containers/1/volumeMounts/-
                value:
                  name: tmp-dir
                  mountPath: /tmp
              # Chart hardcodes liveness/readiness with K8s defaults
              # (timeoutSeconds: 1, failureThreshold: 3, periodSeconds: 10).
              # Headlamp is KEDA-scaled to 0 in prod; every cold start logs
              # 1-3 Unhealthy probe warnings while the Go binary initialises.
              # Add a startupProbe so liveness/readiness are gated until the
              # main container is actually serving.
              # initialDelaySeconds skips past the cold-start window so the
              # first probe lands on a serving container — zero failure
              # events during the merge-queue's 90s steady-state Warning
              # check.
              - op: add
                path: /spec/template/spec/containers/0/startupProbe
                value:
                  httpGet:
                    path: /
                    port: http
                  initialDelaySeconds: 20
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 12  # 60s grace beyond initial delay
          - target:
              kind: Deployment
              name: headlamp
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: headlamp
              spec:
                template:
                  spec:
                    volumes:
                      - name: plugins-dir
                        emptyDir: null
                        persistentVolumeClaim:
                          claimName: headlamp
  # https://github.com/kubernetes-sigs/headlamp/blob/main/charts/headlamp/values.yaml
  values:
    replicaCount: ${headlamp_replicas:=1}
    podDisruptionBudget:
      enabled: true
      # Drain-safe (#1880/#1882): maxUnavailable: 1 lets the pod be evicted
      # during a node drain (minAvailable would block a single-replica pod).
      minAvailable: null
      maxUnavailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: headlamp
            app.kubernetes.io/instance: headlamp
    # Least-privilege RBAC. The chart default binds Headlamp's ServiceAccount to
    # cluster-admin, but Headlamp runs with OIDC (config.oidc below;
    # unsafeUseServiceAccountToken defaults to false), so every Kubernetes API
    # request is authenticated with the logged-in USER's token — the pod
    # ServiceAccount is not used to serve user requests.
    #
    # Disable the chart's ClusterRoleBinding and bind the SA to the read-only
    # cluster-reader ClusterRole via our own binding (cluster-role-binding.yaml).
    # We deliberately do NOT just set clusterRoleName: a ClusterRoleBinding's
    # roleRef is IMMUTABLE, so retargeting the existing headlamp-admin binding
    # fails the Helm upgrade ("cannot change roleRef"). Disabling create lets Helm
    # delete the old cluster-admin binding, and our separate, differently-named
    # binding is created fresh — no `*/*/*` god-role (clears Kubescape CIS-5.1.3 /
    # C-0187), while still covering any baseline cluster reads the backend makes.
    clusterRoleBinding:
      create: false
    config:
      watchPlugins: true
      oidc:
        clientID: public-client
        issuerURL: https://dex.${domain}
        scopes: "profile,email,groups"
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: headlamp_flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.6.0
          - name: headlamp_cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.0
          - name: headlamp_keda
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_keda
            version: 0.1.1-beta
          - name: headlamp_opencost
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_opencost
            version: 0.1.3
          - name: headlamp_kubescape
            source: https://artifacthub.io/packages/headlamp/kubescape-headlamp-plugin/headlamp_kubescape
            version: 0.11.2
        installOptions:
          parallel: true
          maxConcurrent: 3
    persistentVolumeClaim:
      enabled: false
    podSecurityContext:
      fsGroup: 101
      runAsUser: 100
      runAsGroup: 101
    securityContext:
      runAsUser: 100
      runAsGroup: 101
    ingress:
      enabled: false
