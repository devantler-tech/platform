apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: headlamp
      version: 0.41.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: headlamp
            patch: |
              - op: add
                path: /metadata/annotations/secret.reloader.stakater.com~1reload
                value: oidc
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 0
                    maxUnavailable: 1
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: tmp-dir
                  emptyDir: {}
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: headlamp-config
                  emptyDir: {}
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: tmp-dir
                  mountPath: /tmp
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  name: headlamp-config
                  mountPath: /home/headlamp/.config
              - op: add
                path: /spec/template/spec/containers/1/volumeMounts/-
                value:
                  name: tmp-dir
                  mountPath: /tmp
  # https://github.com/kubernetes-sigs/headlamp/blob/main/charts/headlamp/values.yaml
  values:
    replicaCount: ${headlamp_replicas:=2}
    podDisruptionBudget:
      enabled: true
      minAvailable: 0
      maxUnavailable: null
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: headlamp
            app.kubernetes.io/instance: headlamp
    config:
      watchPlugins: true
      oidc:
        clientID: public-client
        clientSecret: ${dex_client_secret}
        issuerURL: https://dex.${domain}
        scopes: "profile,email,groups"
    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: headlamp_flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.6.0
          - name: headlamp_cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.0
          - name: headlamp_keda
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_keda
            version: 0.1.1-beta
          - name: headlamp_opencost
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_opencost
            version: 0.1.3
          - name: headlamp_kubescape
            source: https://artifacthub.io/packages/headlamp/kubescape-headlamp-plugin/headlamp_kubescape
            version: 0.11.0
        installOptions:
          parallel: true
          maxConcurrent: 3
    ingress:
      enabled: false
