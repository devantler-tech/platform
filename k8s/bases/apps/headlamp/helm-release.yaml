apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
  labels:
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: headlamp
      version: 0.41.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: headlamp
            patch: |
              - op: add
                path: /metadata/annotations/secret.reloader.stakater.com~1reload
                value: oidc
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 1
                    maxUnavailable: 0
  # https://github.com/kubernetes-sigs/headlamp/blob/main/charts/headlamp/values.yaml
  values:
    replicaCount: ${headlamp_replicas:=2}
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
      maxUnavailable: null
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: headlamp
            app.kubernetes.io/instance: headlamp
    config:
      oidc:
        clientID: public-client
        clientSecret: ${dex_client_secret}
        issuerURL: https://dex.${domain}
        scopes: "profile,email,groups"
    ingress:
      enabled: false
    initContainers:
      - name: install-plugins
        image: busybox:1.37
        command:
          - /bin/sh
          - -c
          - |
            set -e
            PLUGINS_DIR="/headlamp/plugins"
            mkdir -p "$PLUGINS_DIR"
            PLUGINS="
              https://github.com/headlamp-k8s/plugins/releases/download/flux-0.6.0/headlamp-k8s-flux-0.6.0.tar.gz
              https://github.com/headlamp-k8s/plugins/releases/download/prometheus-0.8.2/prometheus-0.8.2.tar.gz
              https://github.com/headlamp-k8s/plugins/releases/download/cert-manager-0.1.0/headlamp-k8s-cert-manager-0.1.0.tar.gz
              https://github.com/headlamp-k8s/plugins/releases/download/plugin-catalog-0.4.3/headlamp-k8s-plugin-catalog-0.4.3.tar.gz
              https://github.com/headlamp-k8s/plugins/releases/download/keda-0.1.1-beta/headlamp-k8s-keda-0.1.1-beta.tar.gz
            "
            for url in $PLUGINS; do
              name=$(basename "$url" .tar.gz)
              echo "Installing plugin: $name"
              mkdir -p "$PLUGINS_DIR/$name"
              wget -qO- "$url" | tar xz -C "$PLUGINS_DIR/$name" --strip-components=1
            done
        volumeMounts:
          - name: headlamp-plugins
            mountPath: /headlamp/plugins
