apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: headlamp
  namespace: headlamp
spec:
  hosts:
    - headlamp.${domain}
  scaleTargetRef:
    name: headlamp
    kind: Deployment
    apiVersion: apps/v1
    service: headlamp
    port: 80
  replicas:
    min: 0
    max: ${headlamp_max_replicas:=2}
  scaledownPeriod: 300
  scalingMetric:
    concurrency:
      targetValue: 10
