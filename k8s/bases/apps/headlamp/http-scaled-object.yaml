---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: headlamp
  namespace: headlamp
spec:
  hosts:
    - headlamp.${domain}
  scaleTargetRef:
    name: headlamp
    service: headlamp
    port: 80
  replicas:
    min: 0
    max: 2 # OIDC callback state is safe at >1 because all traffic routes through the KEDA HTTP interceptor-proxy.
  scaledownPeriod: 300
  scalingMetric:
    requestRate:
      granularity: 1s
      targetValue: 100
      window: 1m
