apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-headlamp
  namespace: headlamp
spec:
  endpointSelector: {}
  ingress:
    # Gateway ingress (direct from Cilium envoy)
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "4466"
              protocol: TCP
  egress:
    # Kube API for dashboard
    - toEntities:
        - kube-apiserver
    # Dex OIDC (via Cloudflare proxy). Dynamic plugin downloads are disabled
    # in helm-release.yaml, so Headlamp no longer needs Artifact Hub, GitHub
    # release assets, or npm egress at runtime.
    - toFQDNs:
        - matchName: "dex.${domain}"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution. rules.dns engages Cilium's L7 DNS proxy so the toFQDNs
    # allow-list above can be enforced; matchPattern "*" leaves resolution
    # itself unrestricted (the FQDN list constrains where traffic may go).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
