apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: headlamp
  namespace: headlamp
spec:
  scaleTargetRef:
    name: headlamp
  minReplicaCount: 0
  maxReplicaCount: ${headlamp_max_replicas:=2}
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
