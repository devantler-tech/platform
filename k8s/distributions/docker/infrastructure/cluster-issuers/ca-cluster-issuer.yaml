# CA ClusterIssuer backed by the mkcert root CA.
# The key pair is stored as a SOPS-encrypted Secret (platform-ca-key-pair.enc.yaml)
# so it survives cluster recreation. Because the mkcert CA is already trusted
# in the macOS system keychain, browsers accept certificates issued by this CA.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: platform-ca
spec:
  ca:
    secretName: platform-ca-key-pair
