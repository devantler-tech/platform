# Docker-specific ExternalSecret CRs for secrets that only exist in the
# Docker provider overlay.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-ca-key-pair
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: platform-ca-key-pair
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: infrastructure/tls/platform-ca
        property: tls.crt
    - secretKey: tls.key
      remoteRef:
        key: infrastructure/tls/platform-ca
        property: tls.key
