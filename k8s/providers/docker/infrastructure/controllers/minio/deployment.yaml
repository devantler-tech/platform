---
# Local-only stand-in for Cloudflare R2 so Velero + CNPG exercise the
# exact same S3 code path in CI as in prod. Single replica, ephemeral
# emptyDir storage -- backups themselves are throw-away here; what
# matters is that the backup/restore flow runs end-to-end.
#
# The bitnami/minio chart was replaced with a hand-rolled Deployment
# using the official minio/minio image because the bitnami image
# 2025.7.23 ships strict SigV4 credential validation ("Credential
# access key has length X, should be 32") that rejects Velero's
# regular S3 calls.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio
  labels:
    app.kubernetes.io/name: minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
    spec:
      # minio is a pure S3 server and never calls the Kubernetes API, so it has
      # no use for a mounted ServiceAccount token (kubescape C-0034).
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z@sha256:8834ae47a2de3509b83e0e70da9369c24bbbc22de42f2a2eddc530eee88acd1b
          args:
            - server
            - /data
            - --console-address
            - :9001
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: MINIO_ROOT_USER
              value: minio
            - name: MINIO_ROOT_PASSWORD
              value: minio-local-development-only
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
