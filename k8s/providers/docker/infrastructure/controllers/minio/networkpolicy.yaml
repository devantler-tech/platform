apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-minio
  namespace: minio
spec:
  endpointSelector: {}
  ingress:
    # Velero and CNPG backup/restore access, plus the OpenBao raft-snapshot
    # mirror (vault-backup CronJob + init Job). Cilium drops a flow unless
    # BOTH the client's egress AND the server's ingress allow it, so the
    # egress rule in bases/infrastructure/vault-backup/networkpolicy.yaml is
    # not sufficient on its own — its missing counterpart here crashlooped
    # vault-snapshot-init's mirror container in CI (mc i/o timeout) and
    # wedged the infrastructure health gate.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: velero
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: openbao
            app: vault-snapshot
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # Intra-namespace (create-bucket job → minio)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: minio
  egress:
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Intra-namespace
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: minio
