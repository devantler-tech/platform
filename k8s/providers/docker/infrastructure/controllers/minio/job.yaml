---
# Create the `platform-backups` bucket used by Velero/CNPG as a one-shot
# Job after MinIO comes up. Uses the MinIO client image.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: minio
spec:
  backoffLimit: 20
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      # The bucket-creation Job runs the mc client only; it never calls the
      # Kubernetes API, so it needs no ServiceAccount token (kubescape C-0034).
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2025-04-08T15-39-49Z@sha256:7e3efb09c22c0882fbf341b9d99f61f94ae6c4c20a06f2f1a2b20ea8993d8952
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: mc-config
              mountPath: /tmp/.mc
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set local http://minio.minio.svc.cluster.local:9000 \
                    minio minio-local-development-only; do
                sleep 2
              done
              mc mb --ignore-existing local/platform-backups
              mc ls local/
      volumes:
        - name: mc-config
          emptyDir: {}
