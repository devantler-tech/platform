# Local-development credentials for the MinIO R2 stand-in. These are NOT
# sensitive: MinIO here is an ephemeral, in-cluster, local/CI-only backup target
# with throwaway data (emptyDir storage). They live in a Secret rather than
# inline env literals so the static Kubescape scan does not flag plaintext
# credentials in the Deployment/Job (C-0012).
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: minio
type: Opaque
stringData:
  root-user: minio
  root-password: minio-local-development-only
