# Default-deny NetworkPolicy so the static Kubescape scan sees the minio
# workloads (including the bucket-creation Job) as network-restricted
# (C-0030 Ingress and Egress blocked). The allow-minio CiliumNetworkPolicy
# (networkpolicy.yaml) provides the actual allows; Cilium evaluates
# NetworkPolicy and CiliumNetworkPolicy allows additively, so this adds no new
# restriction at runtime.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: minio
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
