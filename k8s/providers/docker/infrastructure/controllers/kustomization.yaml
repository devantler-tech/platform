---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../bases/infrastructure/controllers/
  - coredns/
  - minio/
patches:
  - target:
      kind: HelmRelease
      name: cilium
      namespace: kube-system
    path: cilium/patches/helm-release-patch.yaml
  - target:
      kind: HelmRelease
      name: metrics-server
      namespace: kube-system
    path: metrics-server/patches/helm-release-patch.yaml
  - target:
      kind: HelmRelease
      name: flux-operator
      namespace: flux-system
    path: flux-operator/patches/helm-release-patch.yaml
  # Pin all ScaledObjects to 1 replica in local Docker clusters.
  - target:
      kind: ScaledObject
    patch: |
      - op: replace
        path: /spec/minReplicaCount
        value: 1
      - op: replace
        path: /spec/maxReplicaCount
        value: 1
