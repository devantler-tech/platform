# Extends the KSail-bootstrapped FluxInstance to lower the dependency
# requeue interval for faster reconciliation on the local Docker cluster.
#
# No spec.cluster.size profile is set: on a small (often single-node) local
# cluster the 'medium' profile (--concurrent=10 on kustomize- and
# helm-controller) starves etcd/the apiserver while the core HelmReleases
# install at once — leader-election leases time out and reconciliation
# collapses ("etcdserver: request timed out"). The default profile keeps Flux's
# stock concurrency (4) and resource limits, and renders manifests that differ
# from the KSail-bootstrapped instance only in the kustomize-controller patch
# below, so helm-controller and source-controller are not restarted
# mid-bootstrap.
---
apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.8.x"
    registry: "ghcr.io/fluxcd"
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    multitenant: false
    networkPolicy: true
  kustomize:
    patches:
      - target:
          kind: Deployment
          name: kustomize-controller
          namespace: flux-system
        patch: |
          - op: test
            path: /spec/template/spec/containers/0/name
            value: manager
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --requeue-dependency=5s
