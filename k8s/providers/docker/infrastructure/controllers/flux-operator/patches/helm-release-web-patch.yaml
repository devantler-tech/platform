---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator-web
  namespace: flux-system
spec:
  values:
    web:
      config:
        # Local Dex is fronted by the self-signed platform CA; skip OIDC issuer
        # TLS verification for the Docker/CI provider only.
        insecure: true
    extraVolumes:
      - name: platform-ca
        configMap:
          name: platform-ca
          optional: true
    extraVolumeMounts:
      - name: platform-ca
        mountPath: /etc/ssl/certs/platform-ca.crt
        subPath: ca-certificates.crt
        readOnly: true
    extraEnvs:
      - name: SSL_CERT_FILE
        value: /etc/ssl/certs/platform-ca.crt
