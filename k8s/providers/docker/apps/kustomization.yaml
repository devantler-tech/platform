---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../bases/apps/
patches:
  - target:
      kind: HelmRelease
      name: headlamp
      namespace: headlamp
    path: headlamp/patches/helm-release-patch.yaml
  - target:
      kind: HelmRelease
      name: fleetdm
      namespace: fleetdm
    path: fleetdm/patches/helm-release-patch.yaml
  - target:
      group: source.toolkit.fluxcd.io
      kind: OCIRepository
      name: wedding-app
      namespace: wedding-app
    path: wedding-app/patches/ocirepository-patch.yaml
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: wedding-app
      namespace: wedding-app
    path: wedding-app/patches/kustomization-patch.yaml
  - target:
      group: image.toolkit.fluxcd.io
      kind: ImageRepository
      name: wedding-app
      namespace: wedding-app
    path: wedding-app/patches/imagerepository-patch.yaml
  - target:
      group: image.toolkit.fluxcd.io
      kind: ImagePolicy
      name: wedding-app
      namespace: wedding-app
    path: wedding-app/patches/imagepolicy-patch.yaml
  - target:
      group: source.toolkit.fluxcd.io
      kind: GitRepository
      name: wedding-app
      namespace: wedding-app
    path: wedding-app/patches/gitrepository-patch.yaml
  - target:
      group: image.toolkit.fluxcd.io
      kind: ImageUpdateAutomation
      name: wedding-app
      namespace: wedding-app
    path: wedding-app/patches/imageupdateautomation-patch.yaml
  - target:
      group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: wedding-app
      namespace: wedding-app
    path: wedding-app/patches/httproute-patch.yaml
