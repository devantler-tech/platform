---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../bases/apps/
patches:
  - target:
      kind: HelmRelease
      name: headlamp
      namespace: headlamp
    path: headlamp/patches/helm-release-patch.yaml
  - target:
      kind: HelmRelease
      name: fleetdm
      namespace: fleetdm
    path: fleetdm/patches/helm-release-patch.yaml
  # Pin all ScaledObjects to 1 replica in local Docker clusters.
  # KEDA is installed but autoscaling is disabled — CI needs
  # deterministic replica counts and resources are unlimited.
  - target:
      kind: ScaledObject
    patch: |
      - op: replace
        path: /spec/minReplicaCount
        value: 1
      - op: replace
        path: /spec/maxReplicaCount
        value: 1
