apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fleetdm
  namespace: fleetdm
spec:
  # Docker CI starts MySQL cold; allow more time than the base 5m.
  timeout: 15m
  values:
    replicas: 1
    vulnProcessing:
      dedicated: false
    mysql:
      architecture: standalone
      secondary:
        replicaCount: 0
      primary:
        persistence:
          enabled: true
          size: 2Gi
    redis:
      architecture: standalone
      replica:
        replicaCount: 0
      master:
        persistence:
          enabled: true
          size: 1Gi
