apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fleetdm
  namespace: fleetdm
spec:
  # Docker CI starts MySQL cold and runs the migration job with
  # exponential backoff; allow enough time for cold-start init.
  timeout: 25m
  values:
    replicas: 1
    vulnProcessing:
      dedicated: false
    mysql:
      architecture: standalone
      secondary:
        replicaCount: 0
      primary:
        persistence:
          enabled: true
          size: 2Gi
    redis:
      architecture: standalone
      replica:
        replicaCount: 0
      master:
        persistence:
          enabled: true
          size: 1Gi
          # Base sets storageClass: hcloud; clear to use the cluster default.
          storageClass: ""
