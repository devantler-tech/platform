apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  # Required by the HelmRelease v2 schema so ksail (>= 7.26.0) can validate this
  # opt-in patch standalone; matches the base, so it's a no-op once merged in.
  interval: 2m
  values:
    config:
      extraArgs:
        - "-oidc-ca-file=/etc/ssl/certs/platform-ca/ca-certificates.crt"
    volumes:
      - name: trust-bundle
        configMap:
          name: platform-ca
    volumeMounts:
      - name: trust-bundle
        mountPath: /etc/ssl/certs/platform-ca
        readOnly: true
