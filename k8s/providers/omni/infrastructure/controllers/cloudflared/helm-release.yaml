apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: cloudflare-tunnel
      version: 0.3.2
      sourceRef:
        kind: HelmRepository
        name: cloudflared
  # TODO: Remove postRenderers when Cilium supports QUIC protocol for cloudflared (https://github.com/cilium/cilium/issues/37529)
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: cloudflared-cloudflare-tunnel
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/args/1
                value: --protocol
              - op: add
                path: /spec/template/spec/containers/0/args/2
                value: http2
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 1
                    maxUnavailable: 0
              - op: add
                path: /spec/template/spec/topologySpreadConstraints
                value:
                  - maxSkew: 1
                    topologyKey: kubernetes.io/hostname
                    whenUnsatisfiable: ScheduleAnyway
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: cloudflare-tunnel
                        app.kubernetes.io/instance: cloudflared
  # https://github.com/cloudflare/helm-charts/blob/main/charts/cloudflare-tunnel/values.yaml
  values:
    replicaCount: ${cloudflared_replicas:=2}
    cloudflare:
      account: ${cloudflare_account_id}
      tunnelName: ${cloudflared_tunnel_name}
      tunnelId: ${cloudflared_tunnel_id}
      secret: ${cloudflared_tunnel_secret}
      ingress:
        - hostname: "*.${domain}"
          service: https://cilium-gateway-platform.kube-system:443
          originRequest:
            noTLSVerify: true
        - hostname: "${domain}"
          service: https://cilium-gateway-platform.kube-system:443
          originRequest:
            noTLSVerify: true
    image:
      pullPolicy: Always
