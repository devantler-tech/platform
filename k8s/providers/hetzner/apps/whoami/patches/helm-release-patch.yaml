# Pilot: run whoami inside a private user namespace.
#
# Sets `hostUsers: false` on the whoami pod (KEP-127, GA in Kubernetes 1.36;
# beta and on-by-default since 1.30, so it already works on the cluster's
# current v1.35.5). The container's UID/GID (65534) is mapped to an unprivileged
# subordinate range on the host, so a container-runtime escape lands as a
# non-root, capability-less host user — defence in depth on top of the
# restricted securityContext already set in the base HelmRelease
# (k8s/bases/apps/whoami/helm-release.yaml).
#
# Why this is scoped to the hetzner (prod) overlay rather than the base:
# prod nodes run Talos on real Hetzner kernels where user namespaces and idmap
# mounts are supported, whereas the local Docker provider runs Talos nested
# inside Docker where userns support is not guaranteed. whoami is the canary —
# it is stateless (no volumes; automountServiceAccountToken is already false),
# so there are no idmap-volume constraints to hit. Once this is confirmed
# healthy in prod, extend the same treatment to homepage and the rest.
#
# Mechanism: an RFC 6902 `add` that APPENDS (`/-`) to the base HelmRelease's
# existing postRenderers[0].kustomize.patches list, so the base's strategy and
# ServiceAccount post-render patches are preserved rather than replaced (a
# strategic-merge patch on the list would replace it).
- op: add
  path: /spec/postRenderers/0/kustomize/patches/-
  value:
    target:
      kind: Deployment
      name: whoami
    patch: |
      - op: add
        path: /spec/template/spec/hostUsers
        value: false
