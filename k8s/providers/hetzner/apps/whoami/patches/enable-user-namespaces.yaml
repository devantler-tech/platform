# Opt the proven stateless canary into the label-gated `add-user-namespaces`
# Kyverno rule. This label lives only in the Hetzner overlay, so the nested
# local Docker provider remains default-off. whoami has no volumes or service
# account token, avoiding idmapped-volume constraints.
---
apiVersion: v1
kind: Namespace
metadata:
  name: whoami
  labels:
    pod-security.devantler.tech/user-namespaces: enabled
