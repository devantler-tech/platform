apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ascoachingogvaner
  namespace: ascoachingogvaner
spec:
  patches:
    - target:
        kind: HTTPRoute
        name: ascoachingogvaner
      patch: |
        - op: replace
          path: /spec/hostnames
          value:
            - ascoachingogvaner.platform.devantler.tech
