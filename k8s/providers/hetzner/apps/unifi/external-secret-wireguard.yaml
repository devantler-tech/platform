---
# The WireGuard keys the VPN Client managed resource references — its
# privateKeySecretRef + peer.publicKeySecretRef both point at this
# `cluster-wireguard` Secret (keys `private-key` and `peer-public-key`) in the
# unifi namespace. The gateway's private key is sensitive; the Talos server's
# public key is not, but the provider schema requires a Secret reference for it
# too. Read via the tenant's NAMESPACED `openbao` SecretStore (secret-store.yaml).
# SEEDING: the vault-config Job seeds PLACEHOLDERS at
# secret/infrastructure/unifi/wireguard on first run (only if absent). GATE (WS3):
# overwrite them in place via the OpenBao UI/CLI once the Talos WireGuard server
# exists — the gateway private key (`wg genkey`) and the server's public key.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cluster-wireguard
  namespace: unifi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: SecretStore
  target:
    name: cluster-wireguard
    creationPolicy: Owner
  data:
    - secretKey: private-key
      remoteRef:
        key: infrastructure/unifi/wireguard
        property: private_key
    - secretKey: peer-public-key
      remoteRef:
        key: infrastructure/unifi/wireguard
        property: peer_public_key
