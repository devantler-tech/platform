apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-unifi
  namespace: unifi
spec:
  endpointSelector: {}
  ingress:
    # tofu-controller (flux-system) drives the runner over gRPC :30000.
    # Cluster-wide require-mutual-auth layers SPIRE mTLS on top — only the
    # L3/L4 allow is needed here (mirrors the other controller policies).
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flux-system
      toPorts:
        - ports:
            - port: "30000"
              protocol: TCP
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Kube API — runner reads/writes its OpenTofu state Secret.
    - toEntities:
        - kube-apiserver
    # gRPC back to tofu-controller in flux-system.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flux-system
    # Egress to the UniFi controller API (443 / legacy 8443) and the OpenTofu
    # provider registry + GitHub provider-binary downloads (443). `world` is
    # broad; tighten to the controller's address + registry FQDNs once known.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "8443"
              protocol: TCP
