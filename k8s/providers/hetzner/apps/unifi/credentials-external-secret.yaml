---
# UniFi controller API credentials from OpenBao, read via the shared `openbao`
# ClusterSecretStore into the `unifi-credentials` Secret the Terraform CR
# consumes (varsFrom → OpenTofu vars). Seeded declaratively (GitOps): the
# SOPS-encrypted `unifi_api_url` / `unifi_api_key` in variables-cluster are
# pushed to OpenBao by the seed-unifi PushSecret
# (providers/hetzner/infrastructure/vault-seed/seed-unifi.yaml); this reads them
# back. The read is authorised by the infra-unifi-readonly OpenBao policy on the
# external-secrets role (k8s/bases/infrastructure/vault-config/job.yaml).
# GATE: variables-cluster ships PLACEHOLDERS — set the real key by editing
# k8s/clusters/prod/bootstrap/variables-cluster-secret.enc.yaml (api_url omits
# the /api path; Limited-Admin Local-Access-Only key, controller >= 9.0.108).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-credentials
  namespace: unifi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: unifi-credentials
    creationPolicy: Owner
  data:
    - secretKey: unifi_api_url
      remoteRef:
        key: infrastructure/unifi/controller
        property: api_url
    - secretKey: unifi_api_key
      remoteRef:
        key: infrastructure/unifi/controller
        property: api_key
