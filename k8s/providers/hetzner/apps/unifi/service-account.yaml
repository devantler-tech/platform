---
# The unifi app's ServiceAccount. The app's Flux Kustomization
# (flux-kustomization.yaml) runs AS this SA, so the Managed Resources pulled from
# devantler-tech/unifi are applied with exactly the namespace-scoped authority
# granted by role.yaml + role-binding.yaml — nothing more. It also authenticates
# the namespaced SecretStore (secret-store.yaml) to OpenBao. No pods use it
# (the Crossplane provider runs in crossplane-system), so the token is not mounted.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unifi
  namespace: unifi
  labels:
    app.kubernetes.io/managed-by: ksail
automountServiceAccountToken: false
