---
# Applies the UniFi Managed Resources from the devantler-tech/unifi GitRepository
# into this namespace, AS the namespace-scoped `unifi` ServiceAccount (so the MRs
# are created with only the authority granted in role.yaml). Replaces the former
# tofu-controller Terraform CR. It is itself applied by the `apps` Flux
# Kustomization; it must NOT dependsOn it (deadlock) — it retries benignly until
# the provider (infrastructure layer) has established the namespaced unifi CRDs.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unifi
  namespace: unifi
  labels:
    app.kubernetes.io/managed-by: ksail
  annotations:
    ksail.devantler.tech/reconcile-exclude: "true"
spec:
  # SECURITY: this external Git source drives write-scoped UniFi Crossplane
  # managed resources through the Cloud Connector credential. Keep automatic
  # reconciliation paused until the source is pinned or signature-verified so a
  # compromised moving branch cannot use Crossplane as a confused deputy.
  suspend: true
  interval: 1m
  timeout: 5m
  retryInterval: 2m
  path: ./
  prune: true
  wait: true
  # No force: these are Crossplane managed resources with the default
  # deletionPolicy: Delete, so a force delete/recreate on immutable-field drift
  # would cascade into deleting the backing UniFi object. Handle a genuine
  # immutable conflict per-resource with the
  # kustomize.toolkit.fluxcd.io/force: enabled annotation instead.
  serviceAccountName: unifi
  sourceRef:
    kind: GitRepository
    name: unifi
  targetNamespace: unifi
