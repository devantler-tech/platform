---
# UniFi controller API credentials from OpenBao, read via the shared `openbao`
# ClusterSecretStore into the `unifi-credentials` Secret the Terraform CR
# consumes (varsFrom → OpenTofu vars). The read is authorised by the
# infra-unifi-readonly OpenBao policy on the external-secrets role
# (k8s/bases/infrastructure/vault-config/job.yaml).
# SEEDING: the vault-config Job seeds PLACEHOLDERS at
# secret/infrastructure/unifi/controller on first run (only if absent — same
# pattern as the GitHub App creds). GATE: overwrite them in place via the OpenBao
# UI/CLI (api_url omits the /api path; Limited-Admin Local-Access-Only key,
# controller >= 9.0.108). OpenBao is backed up (Raft → R2), so the value is durable.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-credentials
  namespace: unifi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: unifi-credentials
    creationPolicy: Owner
  data:
    - secretKey: unifi_api_url
      remoteRef:
        key: infrastructure/unifi/controller
        property: api_url
    - secretKey: unifi_api_key
      remoteRef:
        key: infrastructure/unifi/controller
        property: api_key
