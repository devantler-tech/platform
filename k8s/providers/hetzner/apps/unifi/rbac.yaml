---
# The runner persists OpenTofu state as a Secret in this namespace (the
# controller's default Kubernetes backend) and reads the vars Secret, so the
# tf-runner SA needs namespaced Secret access. Scoped to this namespace only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tf-runner
  namespace: unifi
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf-runner
  namespace: unifi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tf-runner
subjects:
  - kind: ServiceAccount
    name: tf-runner
    namespace: unifi
