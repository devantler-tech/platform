# Create a dedicated Coroot monitoring login instead of granting pg_monitor to
# Umami's write-capable application owner. JSON6902 appends the role to the
# existing managed.roles list so the base `umami` role and its OpenBao-rotated
# passwordSecret remain unchanged. The generated Secret is kubernetes.io/basic-auth
# and is consumed only by Coroot's Postgres scrape annotations.
- op: add
  path: /spec/managed/roles/-
  value:
    name: coroot_monitor
    ensure: present
    login: true
    inRoles:
      - pg_monitor
    passwordSecret:
      name: umami-db-coroot-monitor
