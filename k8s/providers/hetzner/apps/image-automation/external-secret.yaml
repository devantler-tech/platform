# Builds the image-automation-git-auth secret for Flux GitHub App auth.
# App ID and installation ID are not sensitive (templated literals); the App
# private key is read from OpenBao at secret/infrastructure/git/image-automation
# (property: private-key) so it never lives in git. Seed OpenBao with a freshly
# regenerated devantler-tech-platform-prod private key before merging.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/managed-by: ksail
  name: image-automation-git-auth
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: image-automation-git-auth
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        githubAppID: "1322070"
        githubAppInstallationID: "68329260"
        githubAppPrivateKey: "{{ .privateKey }}"
  data:
    - secretKey: privateKey
      remoteRef:
        key: infrastructure/git/image-automation
        property: private-key
