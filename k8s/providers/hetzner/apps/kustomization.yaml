---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../bases/apps/
  # Prod-only tenant: the UniFi network managed declaratively via tofu-controller
  # (providers/hetzner/apps/unifi/). Lives in the hetzner apps overlay rather than
  # bases/apps/ because both its reconciler (tofu-controller) and the controller
  # API it reaches are Hetzner-only — on local/CI clusters the Terraform CRD is
  # absent. Reconciled by the shared `apps` Flux Kustomization like any tenant.
  - unifi/
  # Prod-only tenant: AWS-as-code via the upbound Crossplane family providers
  # (providers/hetzner/apps/aws/ — platform#2325). Credential plumbing only for
  # now (namespace, SecretStore, bootstrap-IAM ExternalSecret, ProviderConfig);
  # the devantler-tech/aws repo sync lands in a follow-up increment. Hetzner-only
  # because Crossplane (and the provider packages) are prod-only.
  - aws/
  # Short-lived activation of the disposable userns + Longhorn idmapped-mount
  # proof (platform#2604). Capture the completed Job's logs, then remove this
  # resource again so its generic ephemeral PVC and volume are garbage-collected.
  - userns-longhorn-smoke/
  # Prod-only Coroot Postgres integration for the platform-owned CNPG DBs:
  # additive CiliumNetworkPolicies that let the observability cluster-agent
  # scrape each on 5432 (the Cluster patches below stamp the
  # coroot.com/postgres-scrape annotations + pg_monitor + pg_stat_statements).
  # coroot-db needs none — it is intra-namespace to the agent and already
  # covered by the base allow-coroot policy. The wedding-app TENANT owns its own
  # equivalent in its repo's deploy/ (cluster.yaml + networkpolicy.yaml), since
  # tenant DB instrumentation is tenant self-description, not a platform patch.
  - umami/cilium-network-policy.yaml
  - backstage/cilium-network-policy.yaml
components:
  # Platform-wide HelmRelease drift detection (mode: enabled) — see
  # bases/components/helmrelease-drift-detection.
  - ../../../bases/components/helmrelease-drift-detection
  - ../../../bases/components/helmrelease-flux-defaults
# Strategic-merge patch files self-identify (apiVersion/kind/name/namespace), so
# they need only a path — no redundant `target:` selector. JSON6902 patches have
# no embedded identity and keep an explicit target.
patches:
  # fleetdm disabled 2026-06-03 (see bases/apps/kustomization.yaml). Its
  # prod-only HelmRelease patch (timeout + MySQL primary service address +
  # hcloud storageClass) and the providers/hetzner/apps/fleetdm/ dir were
  # removed with the app: an unreferenced patch fragment is schema-validated
  # standalone by `ksail workload validate`, and a partial HelmRelease (no
  # spec.interval) fails. Restore the patch from git history if re-enabling.
  - path: wedding-app/patches/flux-kustomization-protect-wedding-db.yaml
  # Prod-only Coroot Postgres integration for the in-repo CNPG DBs (strategic
  # merge: inheritedMetadata scrape annotations + pg_stat_statements params, plus
  # for backstage a pg_monitor managed role). These self-identify, so no target.
  - path: umami/patches/enable-coroot-monitoring.yaml
  - path: backstage/patches/enable-coroot-monitoring.yaml
  # umami's pg_monitor grant is a JSON6902 append onto its EXISTING managed role
  # (so it doesn't replace the list / desync the OpenBao-rotation enforcer); a
  # JSON6902 patch has no embedded identity, so it keeps an explicit target.
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: umami-db
      namespace: umami
    path: umami/patches/grant-pg-monitor.yaml
  # User namespaces (hostUsers: false) — prod-only and default-off. These
  # namespace-label patches opt proven-stateless workloads into the
  # add-security-context Kyverno rule. Local/CI and stateful workloads stay
  # out; in mixed namespaces (umami, backstage) the rule itself excludes the
  # CNPG database pods via their cnpg.io/cluster label.
  - path: whoami/patches/enable-user-namespaces.yaml
  - path: homepage/patches/enable-user-namespaces.yaml
  - path: umami/patches/enable-user-namespaces.yaml
  - path: backstage/patches/enable-user-namespaces.yaml
  - path: crossview/patches/enable-user-namespaces.yaml
