---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../bases/apps/
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: ascoachingogvaner
      namespace: ascoachingogvaner
    path: ascoachingogvaner/patches/kustomization-patch.yaml
  # fleetdm disabled 2026-06-03 — see bases/apps/kustomization.yaml. This
  # prod-only HelmRelease patch is parked until fleetdm is re-enabled; the
  # patch file (fleetdm/patches/helm-release-patch.yaml) is retained.
  # - target:
  #     kind: HelmRelease
  #     name: fleetdm
  #     namespace: fleetdm
  #   path: fleetdm/patches/helm-release-patch.yaml
  - target:
      kind: HelmRelease
      name: headlamp
      namespace: headlamp
    path: headlamp/patches/helm-release-patch.yaml
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
      name: wedding-app
      namespace: wedding-app
    path: wedding-app/patches/kustomization-patch.yaml
