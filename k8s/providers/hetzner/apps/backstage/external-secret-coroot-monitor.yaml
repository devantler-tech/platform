apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backstage-db-coroot-monitor
  namespace: backstage
spec:
  refreshInterval: "0"
  target:
    name: backstage-db-coroot-monitor
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: coroot_monitor
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: backstage-db-coroot-monitor
