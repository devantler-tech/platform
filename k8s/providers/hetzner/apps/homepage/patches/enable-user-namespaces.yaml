# Opt homepage into the label-gated `add-user-namespaces` Kyverno rule. This
# remains Hetzner-only: the app has run successfully with hostUsers:false on
# real Talos kernels, while the nested local Docker provider is deliberately
# kept default-off. Homepage is stateless apart from read-only ConfigMap mounts,
# so it has no idmapped-volume dependency.
---
apiVersion: v1
kind: Namespace
metadata:
  name: homepage
  labels:
    pod-security.devantler.tech/user-namespaces: enabled
