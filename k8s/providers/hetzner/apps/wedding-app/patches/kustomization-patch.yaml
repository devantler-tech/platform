apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wedding-app
  namespace: wedding-app
spec:
  patches:
    # The wedding-db CNPG Cluster ships from the tenant's OCI artifact as a
    # single instance. Patch it to longhorn storage AND to 3 instances (1
    # primary + 2 replicas) for high availability: a single-instance Cluster
    # gets a `<cluster>-primary` PodDisruptionBudget with minAvailable=1 on the
    # sole pod, which blocks every voluntary eviction (a node drain during a
    # Talos roll or autoscaler scale-down hangs) and drops the database on any
    # node loss. With 3 instances CNPG promotes a replica to drain a node and
    # sets the replica PDB to minAvailable=instances-1, so drains proceed and
    # the database survives a node shutdown. The 3 instances spread one per
    # static Longhorn storage worker via CNPG's default pod anti-affinity.
    - target:
        group: postgresql.cnpg.io
        kind: Cluster
        name: wedding-db
      patch: |
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: wedding-db
        spec:
          instances: 3
          storage:
            storageClass: longhorn
    - target:
        kind: HTTPRoute
        name: wedding-app
      patch: |
        - op: replace
          path: /spec/hostnames
          value:
            - wedding.platform.devantler.tech
    # Surface this tenant on the homepage dashboard. The HTTPRoute ships
    # from an external OCI artifact (ghcr.io/devantler-tech/wedding-app),
    # so the gethomepage.dev/* annotations have to be injected here rather
    # than committed at the source. Strategic merge (not JSON patch) so we
    # add to — rather than overwrite — any annotations that already exist
    # on the upstream HTTPRoute.
    - target:
        kind: HTTPRoute
        name: wedding-app
      patch: |
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: wedding-app
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/name: Wedding
            gethomepage.dev/description: Wedding RSVP and information site.
            gethomepage.dev/group: Personal Sites
            gethomepage.dev/icon: mdi-ring
            gethomepage.dev/href: https://wedding.platform.devantler.tech
            gethomepage.dev/pod-selector: app.kubernetes.io/name=wedding-app
