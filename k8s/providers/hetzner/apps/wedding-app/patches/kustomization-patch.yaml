apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wedding-app
  namespace: wedding-app
spec:
  patches:
    # storageClass is a platform-specific override: the wedding-app OCI artifact
    # is environment-agnostic and must not hardcode Hetzner's longhorn class.
    # HA (spec.instances: 3, for the PDB / node-drain reasons documented on the
    # umami-db Cluster) is owned by the wedding-app source repo, so it is
    # deliberately NOT patched here.
    - target:
        group: postgresql.cnpg.io
        kind: Cluster
        name: wedding-db
      patch: |
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: wedding-db
          annotations:
            # Never let Flux delete+recreate this database (force-recreate +
            # reclaimPolicy=Delete PVCs = data loss, the failure that hit
            # coroot-db on 2026-06-18). Flux can still update it; immutable
            # changes need a manual backup/restore by an operator.
            kustomize.toolkit.fluxcd.io/force: disabled
            kustomize.toolkit.fluxcd.io/prune: disabled
        spec:
          storage:
            storageClass: longhorn
          # Quorum-based SYNCHRONOUS replication, same rationale as umami-db: a
          # longhorn instance-manager restart that kills the primary must not be
          # able to fork the timeline and strand the old primary on a pg_rewind
          # "could not find common ancestor" loop (which wedged wedding-db at 2/3
          # and failed the wedding-app health check on 2026-06-19, requiring a
          # manual PVC re-bootstrap). Like storageClass above this is a
          # platform-storage concern (it mitigates longhorn/instance-manager
          # churn), so it is patched here rather than hardcoded in the
          # environment-agnostic wedding-app source artifact. `dataDurability:
          # preferred` relaxes to async if BOTH standbys are unavailable, so the
          # DB stays writable instead of blocking commits.
          postgresql:
            synchronous:
              method: any
              number: 1
              dataDurability: preferred
    - target:
        kind: HTTPRoute
        name: wedding-app
      patch: |
        - op: replace
          path: /spec/hostnames
          value:
            - wedding.platform.devantler.tech
    # Surface this tenant on the homepage dashboard. The HTTPRoute ships
    # from an external OCI artifact (ghcr.io/devantler-tech/wedding-app),
    # so the gethomepage.dev/* annotations have to be injected here rather
    # than committed at the source. Strategic merge (not JSON patch) so we
    # add to — rather than overwrite — any annotations that already exist
    # on the upstream HTTPRoute.
    - target:
        kind: HTTPRoute
        name: wedding-app
      patch: |
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: wedding-app
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/name: Wedding
            gethomepage.dev/description: Wedding RSVP and information site.
            gethomepage.dev/group: Personal Sites
            gethomepage.dev/icon: mdi-ring
            gethomepage.dev/href: https://wedding.platform.devantler.tech
            gethomepage.dev/pod-selector: app.kubernetes.io/name=wedding-app
