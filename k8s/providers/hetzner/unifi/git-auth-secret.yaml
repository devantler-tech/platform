# Read-only git credentials for the private devantler-tech/unifi GitRepository.
# `${unifi_git_token}` is substituted by the unifi Flux Kustomization from the
# SOPS-encrypted `variables-cluster` Secret (postBuild.substituteFrom). GATE:
# the maintainer must add `unifi_git_token` (a fine-grained PAT with
# Contents: read on devantler-tech/unifi) to
# k8s/clusters/prod/bootstrap/variables-cluster-secret.enc.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: unifi-git-auth
  namespace: unifi
type: Opaque
stringData:
  username: git
  password: ${unifi_git_token}
