# UniFi controller API credentials, consumed as OpenTofu variables by the
# Terraform CR (varsFrom). `${unifi_api_url}` / `${unifi_api_key}` are
# substituted by the unifi Flux Kustomization from the SOPS-encrypted
# `variables-cluster` Secret. GATE: the maintainer must add `unifi_api_url`
# (controller base URL, WITHOUT the /api path) and `unifi_api_key` (a Limited
# Admin, Local Access Only API key; controller >= 9.0.108) to
# k8s/clusters/prod/bootstrap/variables-cluster-secret.enc.yaml.
#
# `unifi_site` is intentionally omitted — the OpenTofu variable defaults to
# "default"; add a key here only to manage a non-default site.
apiVersion: v1
kind: Secret
metadata:
  name: unifi-credentials
  namespace: unifi
type: Opaque
stringData:
  unifi_api_url: ${unifi_api_url}
  unifi_api_key: ${unifi_api_key}
