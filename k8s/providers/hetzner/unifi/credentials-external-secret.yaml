---
# UniFi controller API credentials from OpenBao, read via the shared `openbao`
# ClusterSecretStore into the `unifi-credentials` Secret the Terraform CR
# consumes (varsFrom → OpenTofu vars). Mirrors external-dns's Cloudflare token:
# not bootstrap-critical, so the value is fed into OpenBao directly (GATE):
#
#   bao kv put secret/infrastructure/unifi/controller \
#     api_url=https://<controller> api_key=<Limited-Admin-Local-Access-Only key>
#
# (api_url must omit the /api path; controller >= 9.0.108 for API keys.)
# Alternative (GitOps seeding): SOPS-encrypt the values in variables-cluster +
# add a PushSecret under providers/hetzner/infrastructure/vault-seed/.
# The read is authorised by the infra-unifi-readonly OpenBao policy on the
# external-secrets role (k8s/bases/infrastructure/vault-config/job.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-credentials
  namespace: unifi
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: unifi-credentials
    creationPolicy: Owner
  data:
    - secretKey: unifi_api_url
      remoteRef:
        key: infrastructure/unifi/controller
        property: api_url
    - secretKey: unifi_api_key
      remoteRef:
        key: infrastructure/unifi/controller
        property: api_key
