---
# Cloudflare API token from OpenBao — same KV entry the cert-manager DNS01
# solver reads (../cluster-issuers/cloudflare-api-token-external-secret.yaml).
# The token is user-fed (`bao kv put secret/infrastructure/dns/cloudflare
# api_token=<token>`), NOT SOPS-seeded: external-dns is not bootstrap-critical
# (existing DNS records keep serving while it waits), which is why this dir
# lives in the `infrastructure` layer — in `infrastructure/controllers` the
# wait-gated layer would deadlock on this ExternalSecret before the
# ClusterSecretStore (an `infrastructure`-layer resource) exists.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-cloudflare
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: external-dns-cloudflare
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: infrastructure/dns/cloudflare
        property: api_token
