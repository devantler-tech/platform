---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../bases/infrastructure/
  - cluster-issuers/
  # Crossplane provider-upjet-github package + activation policy. Lives in this
  # `infrastructure` layer (not `infrastructure/controllers/`) because these are
  # pkg.crossplane.io CRs that need the Crossplane CRDs the core HelmRelease in
  # controllers/crossplane/ installs first — same controller-then-CR ordering as
  # Coroot/Flagger. Establishes the namespaced github CRDs the github-config app
  # (bases/apps/github-config/) consumes. Prod-only (Crossplane is Hetzner-only).
  - crossplane/
  # external-dns lives in this `infrastructure` layer (not
  # `infrastructure/controllers/`) because its Cloudflare token is a user-fed
  # OpenBao secret materialised by an ExternalSecret, and the openbao
  # ClusterSecretStore is itself an `infrastructure`-layer resource — in the
  # wait-gated controllers layer the never-syncing Secret would deadlock the
  # bootstrap dependency chain. Not bootstrap-critical: existing DNS records
  # keep serving while it waits for the token.
  - external-dns/
  - vault-seed/
  # Prod-only FinOps: a Kyverno ClusterPolicy that biases pod scheduling toward
  # the static baseline workers and away from the autoscaler nodes, so the
  # cost-optimized `autoscale-cx*` pools stay idle and scale to zero. Lives in
  # the hetzner overlay because autoscaling is Hetzner/prod-only; see the file
  # header for the `ksail.io/autoscaled` node-label contract it depends on.
  - cluster-policies/prefer-baseline-nodes.yaml
  # Prod-only: reconcile Coroot's node Custom Cloud Pricing to Hetzner rates
  # (Coroot otherwise prices non-AWS/GCP/Azure nodes at the GCP-C4 fallback,
  # ~16x the real bill). Lives in this `infrastructure` layer because it targets
  # the `platform` project the coroot-patch below adds to the Coroot CR.
  - coroot/custom-cloud-pricing-cronjob.yaml
  # Prod-only: the CloudNativePG datastore + backup wiring that lets the Coroot
  # SERVER run HA (replicas: 2 — set in the coroot-patch below). The operator
  # only honours replicas > 1 when spec.postgres is set, so this Postgres is the
  # precondition for a non-singleton Coroot server. CNPG/hcloud are prod-only, so
  # (like umami-db) these live in this overlay, not the shared base. The
  # drain-safe PDB for the operator-built server StatefulSet ships here too.
  - coroot/postgres-cluster.yaml
  - coroot/db-backup-external-secret.yaml
  - coroot/db-object-store.yaml
  - coroot/db-scheduled-backup.yaml
  - coroot/networkpolicy.yaml
  - coroot/pod-disruption-budget.yaml
  # Longhorn CSI VolumeSnapshotClass for Velero CSI backups. Kept in this
  # `infrastructure` layer (not `infrastructure/controllers/`) so the
  # snapshot.storage.k8s.io CRDs shipped by the snapshot-controller HelmRelease
  # are established first — see volume-snapshot-classes/longhorn.yaml. (hcloud
  # block storage has no snapshot support, so openbao stays on FSB.)
  - volume-snapshot-classes/
  # Prod-only over-provisioning ("spare room") buffer: the native Cluster
  # Autoscaler CapacityBuffer + its PodTemplate. KSail installs the CRD +
  # controller when ksail.prod.yaml's autoscaler.node.capacityBuffers: true is
  # set; this reserves one warm spare node as VIRTUAL (pod-less) headroom.
  # Unlike the old balloon-pod ReplicaSet (+ its cluster-proportional-autoscaler)
  # — which had to live OUTSIDE this health-gated `wait: true` layer because its
  # pause pods sat Pending and held `infrastructure` (+ its `apps` dependent +
  # every CI/CD deploy) red for ~30h on 2026-06-09/10 — the native buffer creates
  # no real pods, so nothing sits Pending and it rides along here like any other
  # resource. Hetzner/prod-only (the autoscaler pools are Hetzner).
  #
  # The CapacityBuffer CRD (autoscaling.x-k8s.io/v1beta1) + controller are
  # installed by KSail only from a release that ships ksail#5277, first released
  # in v7.59.0. The pinned KSAIL_VERSION is now 7.59.1 (ci.yaml/cd.yaml, bumped in
  # #2097), so the gate is satisfied. Deploy ordering keeps the first apply safe:
  # `ksail cluster update` (installs the CRD + controller) runs before `ksail
  # workload reconcile` (applies this CR) in both cd.yaml and the ci.yaml
  # merge-queue deploy, so the CRD always exists before Flux reconciles the
  # CapacityBuffer — no "no matches for kind CapacityBuffer" wedge. (It was
  # TEMPORARILY DISABLED 2026-06-16..#2097 while the pin still read 7.58.3, which
  # predated #5277; the old balloon-pod buffer was already removed in #2087.)
  - overprovisioning/
  #
  # NOTE: tenant-owned custom-domain TLS (the ascoachingogvaner.dk Certificate +
  # its simply.com DNS01 solver credential) is NOT a platform resource at all —
  # it lives in the tenant's own deploy/ (a namespaced cert-manager Issuer +
  # Certificate + ReferenceGrant), delivered by the tenant Flux Kustomization.
  # That credential/issuance is EXPECTED to sit InProgress until the maintainer
  # seeds apps/ascoachingogvaner/simply in OpenBao; keeping it in the tenant means
  # only the (isolated) tenant Kustomization is affected, never this `wait: true`
  # layer. The platform keeps only the shared Gateway HTTPS listener patch
  # (ascoachingogvaner-dk-listeners-patch.yaml, below), which references the
  # tenant Secret cross-namespace and stays Ready (Gateway Programmed) regardless.
components:
  # Platform-wide HelmRelease drift detection (mode: enabled) — covers the
  # opencost HelmRelease in this layer. See
  # bases/components/helmrelease-drift-detection.
  - ../../../bases/components/helmrelease-drift-detection
  - ../../../bases/components/helmrelease-flux-defaults
patches:
  # gateway-patch self-identifies (Gateway/platform/kube-system), so a path is
  # enough — no explicit target, matching the coroot patch below.
  - path: gateway-patch.yaml
  # JSON6902 patches don't self-identify, so this one needs an explicit
  # target. Adds HTTPS listeners for the tenant-owned ascoachingogvaner.dk
  # domain — see the file header.
  - path: ascoachingogvaner-dk-listeners-patch.yaml
    target:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: platform
  # Prod-only Coroot tuning: hcloud-backed persistent storage + Slack webhook
  # wiring. The CR it patches comes from ../../../bases/infrastructure/coroot/
  # (the `infrastructure` layer); the strategic-merge patch matches on the
  # embedded coroot.com/v1 Coroot/coroot identity, so no explicit target.
  - path: coroot/patches/coroot-patch.yaml
  # Prod-only: migrate the OpenBao raft-snapshot PVC from the default longhorn
  # StorageClass to hcloud so node-mobile snapshot Jobs can attach it reliably
  # (see the file header). Self-identifies via PersistentVolumeClaim/openbao/
  # vault-snapshots, so no explicit target is needed.
  - path: vault-snapshots-hcloud-patch.yaml

