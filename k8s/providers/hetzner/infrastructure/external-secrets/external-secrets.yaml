# Hetzner-specific ExternalSecret CRs.
# NOTE: Secrets that a controller needs at first startup (e.g., hcloud) must
# stay in SOPS. Controllers that tolerate a missing secret and retry
# (e.g., external-dns) can use ExternalSecrets even though the controller
# itself is deployed in infrastructure-controllers.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-cloudflare
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: external-dns-cloudflare
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: infrastructure/dns/cloudflare
        property: api_token
