# Hetzner-specific ExternalSecret CRs for secrets that only exist in the
# Hetzner provider overlay.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-cloudflare
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: external-dns-cloudflare
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: infrastructure/dns/cloudflare
        property: api_token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hcloud
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: hcloud
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: infrastructure/hcloud/credentials
        property: token
    - secretKey: network
      remoteRef:
        key: infrastructure/hcloud/credentials
        property: network
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: luks-encryption
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: luks-encryption
    creationPolicy: Owner
  data:
    - secretKey: encryption-passphrase
      remoteRef:
        key: infrastructure/hcloud/luks
        property: encryption-passphrase
