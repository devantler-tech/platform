# Hetzner-specific ExternalSecret CRs.
# NOTE: Secrets consumed by infrastructure-controllers (e.g., hcloud) must
# stay in SOPS because they deploy before ESO is available. Secrets for
# components in infrastructure/apps Kustomizations can use ExternalSecrets.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-cloudflare
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: external-dns-cloudflare
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: infrastructure/dns/cloudflare
        property: api_token
