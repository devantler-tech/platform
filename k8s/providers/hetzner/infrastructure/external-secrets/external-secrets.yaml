# Hetzner-specific ExternalSecret CRs for secrets that only exist in the
# Hetzner provider overlay.
# NOTE: hcloud and luks-encryption secrets stay on SOPS in infrastructure-controllers
# (controllers that need secrets must use SOPS, not CRD-based resources).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-cloudflare
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: external-dns-cloudflare
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: infrastructure/dns/cloudflare
        property: api_token
