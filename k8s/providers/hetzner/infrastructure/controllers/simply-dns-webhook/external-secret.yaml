apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: simply-credentials
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: simply-credentials
    creationPolicy: Owner
  data:
    # Same OpenBao entry the tenant's own external-dns reads through its
    # namespaced SecretStore — the credential is tenant-owned, so it lives
    # under the tenant's apps/ path (covered here by app-ascoachingogvaner-readonly
    # on the ClusterSecretStore role). The solver expects exactly these two
    # secret keys (account-name/api-key) in the Secret named by the
    # ClusterIssuer's config.secretName.
    - secretKey: account-name
      remoteRef:
        key: apps/ascoachingogvaner/simply
        property: account_name
    - secretKey: api-key
      remoteRef:
        key: apps/ascoachingogvaner/simply
        property: api_key
