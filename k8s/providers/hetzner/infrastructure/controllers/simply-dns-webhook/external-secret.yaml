apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: simply-credentials
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: simply-credentials
    creationPolicy: Owner
  data:
    # Same OpenBao entry as the external-dns-simply instance; the solver
    # expects exactly these two secret keys (account-name/api-key) in the
    # Secret named by the ClusterIssuer's config.secretName.
    - secretKey: account-name
      remoteRef:
        key: infrastructure/dns/simply
        property: account_name
    - secretKey: api-key
      remoteRef:
        key: infrastructure/dns/simply
        property: api_key
