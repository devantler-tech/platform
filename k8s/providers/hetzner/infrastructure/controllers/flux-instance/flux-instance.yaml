# Overrides the KSail-bootstrapped FluxInstance to pin the distribution and
# tune the controllers. KSail creates the initial FluxInstance during
# `ksail cluster create`; this resource is reconciled by the
# infrastructure-controllers Flux Kustomization post-bootstrap in the Hetzner
# (prod) environment only. Tenant apps update via native OCIRepository semver
# selection, so the image-reflector/image-automation controllers are not
# installed.
---
apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.8.x"
    registry: "ghcr.io/fluxcd"
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    multitenant: false
    networkPolicy: true
    size: large
  kustomize:
    patches:
      - target:
          kind: Deployment
          name: kustomize-controller
          namespace: flux-system
        patch: |
          - op: test
            path: /spec/template/spec/containers/0/name
            value: manager
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --requeue-dependency=5s
      # Run kustomize-/helm-/notification-controller active/standby (HA) for
      # node-failure resilience: each binary runs --enable-leader-election and
      # holds a coordination.k8s.io Lease, so a 2nd replica is a warm standby (one
      # active leader, one standby that takes the Lease within its TTL when the
      # leader's node fails). Upstream ships replicas: 1, which is why Coroot flags
      # each as "single instance - not resilient to node failure"; bumping these
      # three to 2 clears that.
      #
      # PATCH BY NAME, and DELIBERATELY DO NOT patch source-controller.
      # source-controller is the one controller that cannot run a ready warm
      # standby: its readiness probe targets the artifact file server on :9090, a
      # leader-election runnable that only starts on the active leader, so the
      # standby blocks in "attempting to acquire leader lease", never opens :9090,
      # and stays 0/1 — wedging the Deployment at 1/2, the FluxInstance at
      # "source-controller status: InProgress", and the infrastructure-controllers
      # health-check into a 25m timeout that FREEZES all GitOps delivery.
      # An earlier attempt used a label-selector replicas:2 over all
      # part-of=flux controllers + a name-targeted replicas:1 override for
      # source-controller. That did NOT work: raw `kustomize build` honours patch
      # order and yields 1, but flux-operator resolves the overlapping label- and
      # name-targeted patches the other way, so source-controller stayed at 2
      # (verified live via a forced FluxInstance reconcile). The robust fix is to
      # match each HA controller BY NAME and leave source-controller matched by no
      # replicas patch at all, so it keeps the base manifest's single replica with
      # zero ambiguity. (topologySpread + ndots below still target the whole
      # part-of=flux set by label — those don't conflict and are safe at 1
      # replica.) flux-operator itself stays single-replica: its chart exposes no
      # replicas/leaderElection (0.50.0), so it relies on reschedule.
      - target:
          kind: Deployment
          name: kustomize-controller
          namespace: flux-system
        patch: |
          - op: replace
            path: /spec/replicas
            value: 2
      - target:
          kind: Deployment
          name: helm-controller
          namespace: flux-system
        patch: |
          - op: replace
            path: /spec/replicas
            value: 2
      - target:
          kind: Deployment
          name: notification-controller
          namespace: flux-system
        patch: |
          - op: replace
            path: /spec/replicas
            value: 2
      # Spread the four Flux controllers across worker nodes. They all carry
      # app.kubernetes.io/part-of=flux, so a per-controller topology spread
      # keyed on that label distributes the set (skew <= 1) — and, combined with
      # the replicas: 2 patch above, keeps each controller's active and standby
      # pods on different nodes instead of letting the scheduler stack them.
      # On 2026-05-28 kustomize-controller landed on prod-worker-2 when that
      # node's Cilium ClusterIP datapath degraded after an OOMKill; it then
      # crash-looped on "dial tcp 10.96.0.1:443: i/o timeout" and GitOps
      # reconciliation stalled — so the fix for the underlying OOM could not be
      # applied (a deadlock GitOps cannot self-heal from). Keeping the
      # controllers spread means a single bad worker cannot decapitate
      # reconciliation. Soft (ScheduleAnyway) so it never blocks scheduling.
      - target:
          kind: Deployment
          labelSelector: app.kubernetes.io/part-of=flux
        patch: |
          - op: add
            path: /spec/template/spec/topologySpreadConstraints
            value:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/part-of: flux
      # The Flux controllers poll external endpoints on every interval —
      # source-controller fetches ghcr.io OCI artifacts + Helm repo indexes,
      # kustomize-controller and helm-controller pull OCI artifacts/charts from
      # external registries, and notification-controller posts to external
      # webhook receivers. With the default ndots:5 each external (dotted) name
      # is tried against the four-entry cluster search path FIRST, producing
      # thousands of guaranteed-NXDOMAIN queries per hour against CoreDNS
      # (Coroot flags this as a DNS warning on these apps). ndots:1 makes any
      # dotted name resolve absolute-first; the search path remains a fallback.
      # This is safe for in-cluster controller-to-controller traffic because
      # Flux addresses its own services by trailing-dot absolute FQDN
      # (source-controller advertises itself via
      # --storage-adv-addr=source-controller.flux-system.svc.cluster.local.),
      # which bypasses search-path expansion at any ndots value — so nothing
      # relies on it.
      #
      # Applied to the whole controller set via the shared
      # app.kubernetes.io/part-of=flux label (same selector as the topology
      # spread above) rather than per-controller, so every current and future
      # Flux controller inherits it. The image-reflector/image-automation
      # controllers are not installed (see header), so this covers the four
      # listed components.
      - target:
          kind: Deployment
          labelSelector: app.kubernetes.io/part-of=flux
        patch: |
          - op: add
            path: /spec/template/spec/dnsConfig
            value:
              options:
                - name: ndots
                  value: "1"
