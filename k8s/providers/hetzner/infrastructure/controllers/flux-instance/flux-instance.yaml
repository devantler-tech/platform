# Overrides the KSail-bootstrapped FluxInstance to pin the distribution and
# tune the controllers. KSail creates the initial FluxInstance during
# `ksail cluster create`; this resource is reconciled by the
# infrastructure-controllers Flux Kustomization post-bootstrap in the Hetzner
# (prod) environment only. Tenant apps update via native OCIRepository semver
# selection, so the image-reflector/image-automation controllers are not
# installed.
---
apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.8.x"
    registry: "ghcr.io/fluxcd"
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    multitenant: false
    networkPolicy: true
    size: large
  kustomize:
    patches:
      - target:
          kind: Deployment
          name: kustomize-controller
          namespace: flux-system
        patch: |
          - op: test
            path: /spec/template/spec/containers/0/name
            value: manager
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --requeue-dependency=5s
      # Spread the four Flux controllers across worker nodes. They are
      # single-replica Deployments that all carry app.kubernetes.io/part-of=flux,
      # so a per-controller topology spread keyed on that label distributes the
      # set (skew <= 1) instead of letting the scheduler stack them on one node.
      # On 2026-05-28 kustomize-controller landed on prod-worker-2 when that
      # node's Cilium ClusterIP datapath degraded after an OOMKill; it then
      # crash-looped on "dial tcp 10.96.0.1:443: i/o timeout" and GitOps
      # reconciliation stalled — so the fix for the underlying OOM could not be
      # applied (a deadlock GitOps cannot self-heal from). Keeping the
      # controllers spread means a single bad worker cannot decapitate
      # reconciliation. Soft (ScheduleAnyway) so it never blocks scheduling on
      # the capacity-constrained 3-worker cluster.
      - target:
          kind: Deployment
          labelSelector: app.kubernetes.io/part-of=flux
        patch: |
          - op: add
            path: /spec/template/spec/topologySpreadConstraints
            value:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: ScheduleAnyway
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/part-of: flux
      # The Flux controllers poll external endpoints on every interval —
      # source-controller fetches ghcr.io OCI artifacts + Helm repo indexes,
      # kustomize-controller and helm-controller pull OCI artifacts/charts from
      # external registries, and notification-controller posts to external
      # webhook receivers. With the default ndots:5 each external (dotted) name
      # is tried against the four-entry cluster search path FIRST, producing
      # thousands of guaranteed-NXDOMAIN queries per hour against CoreDNS
      # (Coroot flags this as a DNS warning on these apps). ndots:1 makes any
      # dotted name resolve absolute-first; the search path remains a fallback.
      # This is safe for in-cluster controller-to-controller traffic because
      # Flux addresses its own services by trailing-dot absolute FQDN
      # (source-controller advertises itself via
      # --storage-adv-addr=source-controller.flux-system.svc.cluster.local.),
      # which bypasses search-path expansion at any ndots value — so nothing
      # relies on it.
      #
      # Applied to the whole controller set via the shared
      # app.kubernetes.io/part-of=flux label (same selector as the topology
      # spread above) rather than per-controller, so every current and future
      # Flux controller inherits it. The image-reflector/image-automation
      # controllers are not installed (see header), so this covers the four
      # listed components.
      - target:
          kind: Deployment
          labelSelector: app.kubernetes.io/part-of=flux
        patch: |
          - op: add
            path: /spec/template/spec/dnsConfig
            value:
              options:
                - name: ndots
                  value: "1"
