---
# Namespaced Longhorn access, scoped to longhorn-system only.
#  - nodes:            get/list to enumerate candidates; patch to set
#                      allowScheduling=false (the validating webhook rejects
#                      deleting a still-schedulable Node); delete to remove a
#                      confirmed orphan.
#  - instancemanagers: get/list to find the orphan's leftover IMs; delete them.
#  - replicas/engines: get/list ONLY — the job reads spec.nodeID as a safety gate
#                      (never delete a Node still referenced by replica/engine
#                      data) and never mutates them.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: longhorn-stale-node-cleanup
  namespace: longhorn-system
rules:
  - apiGroups: ["longhorn.io"]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "delete"]
  - apiGroups: ["longhorn.io"]
    resources: ["instancemanagers"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["longhorn.io"]
    resources: ["replicas", "engines"]
    verbs: ["get", "list"]
