---
# Identity for the stale-node-cleanup CronJob. Longhorn never auto-deletes its
# own Node CRs (it deliberately keeps them after the Kubernetes Node is gone, in
# case the node returns), so on a cluster-autoscaler cluster every scale-down
# leaves an orphaned nodes.longhorn.io (and its InstanceManager) behind that
# accumulates forever as UI/API noise and scheduler bookkeeping. This SA is the
# subject the cleanup job uses to read core Nodes (to decide which Longhorn Node
# CRs are orphaned) and to remove the orphans. Its access is least-privilege —
# see the cluster-role/role and their bindings (cluster-role-stale-node-cleanup.yaml,
# role-stale-node-cleanup.yaml, cluster-role-binding-stale-node-cleanup.yaml,
# role-binding-stale-node-cleanup.yaml).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-stale-node-cleanup
  namespace: longhorn-system
