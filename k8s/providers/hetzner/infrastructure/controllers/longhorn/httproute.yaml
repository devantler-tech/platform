# Expose the Longhorn UI behind oauth2-proxy SSO. The Longhorn frontend ships no
# built-in authentication, so SSO at the gateway is the only access control: the
# GEP-1494 ExternalAuth filter (below) runs the per-request auth check against
# oauth2-proxy and routes straight to the longhorn-frontend Service.
# The gethomepage.dev annotations surface it on the dashboard under "Storage".
# Hetzner-only: Longhorn is deployed solely on prod (k8s/providers/hetzner).
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Longhorn
    gethomepage.dev/description: Distributed block storage and volume management.
    gethomepage.dev/group: Storage
    gethomepage.dev/icon: longhorn.png
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - longhorn.${domain}
  rules:
    # 1) Login dance — oauth2-proxy serves its own /oauth2/* endpoints directly,
    #    WITHOUT the ExternalAuth filter. The longer /oauth2 PathPrefix wins.
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: oauth2-proxy
          namespace: oauth2-proxy
          port: 80
    # 2) App traffic — GEP-1494 ExternalAuth filter delegates the per-request SSO
    #    check to oauth2-proxy /oauth2/auth (ext_authz, HTTP); on allow it routes
    #    STRAIGHT to the longhorn-frontend Service (same namespace). Replaces the
    #    old oauth2-proxy → auth-proxy hop. SPIKE-PENDING (platform#1881): header
    #    sets + unauth redirect confirmed on the local spike before promotion.
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Auth-Request-Redirect
                value: https://longhorn.${domain}/
        - type: ExternalAuth
          externalAuth:
            protocol: HTTP
            backendRef:
              name: oauth2-proxy
              namespace: oauth2-proxy
              port: 80
            http:
              path: /oauth2/auth
              allowedHeaders:
                - cookie
                - authorization
                - x-auth-request-redirect
              allowedResponseHeaders:
                - x-auth-request-user
                - x-auth-request-email
                - x-auth-request-groups
                - set-cookie
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: longhorn-frontend
          port: 80
