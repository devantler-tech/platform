apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-longhorn
  namespace: longhorn-system
spec:
  endpointSelector: {}
  ingress:
    # Webhook from kube-apiserver (hostNetwork on control plane nodes)
    - fromEntities:
        - kube-apiserver
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "9502"
              protocol: TCP
    # Intra-namespace (manager, driver, engine)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: longhorn-system
    # Longhorn UI is KEDA HTTP scale-to-zero, so the direct client is the KEDA
    # interceptor, not auth-proxy: Gateway -> oauth2-proxy -> auth-proxy ->
    # interceptor -> longhorn-frontend. longhorn-frontend forwards to the
    # longhorn-ui pod on container port 8000 (Service longhorn-frontend: 80 ->
    # 8000). Mirrors allow-hubble-ui; mutual auth (require-mutual-auth) is
    # applied cluster-wide, so only the L3/L4 allow is needed here.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: keda
            app.kubernetes.io/component: interceptor
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
  egress:
    # Kube API
    - toEntities:
        - kube-apiserver
    # Intra-namespace
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: longhorn-system
    # iSCSI to nodes
    - toEntities:
        - host
        - remote-node
    # Backup targets (S3-compatible)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
