apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-longhorn
  namespace: longhorn-system
spec:
  endpointSelector: {}
  ingress:
    # Webhook from kube-apiserver (hostNetwork on control plane nodes)
    - fromEntities:
        - kube-apiserver
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "9502"
              protocol: TCP
    # Intra-namespace (manager, driver, engine)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: longhorn-system
    # Longhorn UI: the client is auth-proxy (post-SSO): Gateway -> oauth2-proxy
    # -> auth-proxy -> longhorn-frontend. longhorn-frontend forwards to the
    # longhorn-ui pod on container port 8000 (Service longhorn-frontend: 80 ->
    # 8000). Mirrors allow-hubble-ui; mutual auth (require-mutual-auth) is
    # applied cluster-wide, so only the L3/L4 allow is needed here.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: oauth2-proxy
            app: auth-proxy
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
  egress:
    # Kube API
    - toEntities:
        - kube-apiserver
    # Intra-namespace
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: longhorn-system
    # iSCSI to nodes
    - toEntities:
        - host
        - remote-node
    # External HTTPS, pinned by FQDN instead of world:443 so a compromised
    # pod cannot exfiltrate volume data to arbitrary external services:
    # - *.r2.cloudflarestorage.com — S3-compatible backup target (none is
    #   configured today; kept for when one is)
    # - the upgrade responder      — Longhorn's chart-default version check
    - toFQDNs:
        - matchPattern: "*.r2.cloudflarestorage.com"
        - matchName: "longhorn-upgrade-responder.rancher.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution. rules.dns engages Cilium's L7 DNS proxy so the toFQDNs
    # allow-list above can be enforced; matchPattern "*" leaves resolution
    # itself unrestricted (the FQDN list constrains where traffic may go).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
