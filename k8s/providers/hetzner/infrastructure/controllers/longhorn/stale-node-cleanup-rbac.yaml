---
# Cluster-scoped read on core Nodes: the job's orphan test is "no Kubernetes Node
# of this name exists". get is used per-candidate; list lets the job confirm the
# API is answering before it trusts a NotFound (a transient API error must never
# be read as "the node is gone"). Read-only, the minimum to make the decision.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-stale-node-cleanup
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-stale-node-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-stale-node-cleanup
subjects:
  - kind: ServiceAccount
    name: longhorn-stale-node-cleanup
    namespace: longhorn-system
---
# Namespaced Longhorn access, scoped to longhorn-system only.
#  - nodes:            get/list to enumerate candidates; patch to set
#                      allowScheduling=false (the validating webhook rejects
#                      deleting a still-schedulable Node); delete to remove a
#                      confirmed orphan.
#  - instancemanagers: get/list to find the orphan's leftover IMs; delete them.
#  - replicas/engines: get/list ONLY — the job reads spec.nodeID as a safety gate
#                      (never delete a Node still referenced by replica/engine
#                      data) and never mutates them.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: longhorn-stale-node-cleanup
  namespace: longhorn-system
rules:
  - apiGroups: ["longhorn.io"]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "delete"]
  - apiGroups: ["longhorn.io"]
    resources: ["instancemanagers"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["longhorn.io"]
    resources: ["replicas", "engines"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: longhorn-stale-node-cleanup
  namespace: longhorn-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: longhorn-stale-node-cleanup
subjects:
  - kind: ServiceAccount
    name: longhorn-stale-node-cleanup
    namespace: longhorn-system
