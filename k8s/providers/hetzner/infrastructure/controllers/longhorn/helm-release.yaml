---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  # The Longhorn CSI snapshotter sidecar (enabled via
  # longhorn_csi_snapshotter_replicas) needs the snapshot.storage.k8s.io CRDs to
  # exist or it crash-loops. Gate Longhorn on the snapshot-controller (which
  # installs those CRDs) so the sidecar never starts before they are present.
  dependsOn:
    - name: snapshot-controller
      namespace: kube-system
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
  interval: 10m0s
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  timeout: 10m
  # https://github.com/longhorn/charts/blob/master/charts/longhorn/values.yaml
  values:
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      # Match the number of workers so every volume is replicated across
      # all available nodes.
      defaultReplicaCount: ${longhorn_replica_count:=3}
      # Redistribute replicas onto fresh nodes as the worker pool changes.
      # With auto-balance disabled (the Longhorn default), a worker roll — the
      # cx33→cx43 server-type migration, a Talos version bump, or autoscaler
      # churn — deletes each replaced node's replicas without ever rebuilding
      # them onto the replacement node. With only a handful of storage nodes
      # a one-at-a-time roll then walks every replica of an RWO volume onto
      # already-removed nodes before any rebuild catches up, and the volume
      # goes `faulted` (data loss). Observed 2026-06-16: umami-db, wedding-db
      # and kubescape storage all faulted during a full worker roll.
      # best-effort keeps replicas spread evenly across the live nodes
      # (matching defaultReplicaCount above), so each step of a rolling
      # replacement rebuilds redundancy onto the new node and always leaves a
      # healthy replica behind. (Use least-effort if rebuild churn on frequent
      # autoscaler scale-ups becomes a concern.)
      replicaAutoBalance: best-effort
      # Reclaim space from deleted volumes automatically.
      autoDeletePodWhenVolumeDetachedUnexpectedly: true
      # Only create default disks on nodes explicitly labeled for storage.
      # This prevents control plane nodes (which lack dedicated volumes)
      # from hosting replicas and running out of memory.
      createDefaultDiskOnLabeledNodesOnly: true
      # Restrict Longhorn system-managed pods (instance-managers, etc.)
      # to storage nodes. Prevents ~100Mi overhead per non-storage node.
      systemManagedComponentsNodeSelector: "node.longhorn.io/create-default-disk:true"
      # Tell Longhorn this cluster runs the Cluster Autoscaler: Longhorn then
      # annotates its system-managed per-node pods (instance-managers, etc.)
      # as safe-to-evict where no replica pins them, so the autoscaler can
      # drain and remove an under-utilized node instead of treating every
      # Longhorn pod as an unevictable blocker. Without this, any node that
      # ever ran an instance-manager was permanently unremovable (part of the
      # 2026-06-30 stuck-autoscale-node ratchet). Data safety is unchanged —
      # Longhorn still refuses to evict a pod that hosts the last healthy
      # replica; pair with the restrict-storage-to-baseline-workers policy
      # (cluster-policies/) which keeps replicas off autoscale nodes entirely.
      kubernetesClusterAutoscalerEnabled: true
      # Rebuild degraded replicas of DETACHED volumes too. A volume can sit
      # detached for long stretches (an app scaled down or disabled, or a PVC
      # between pod reschedules); when an autoscaled node holding a replica
      # leaves, that replica stays degraded indefinitely because normal rebuilds
      # only run while attached (observed 2026-06-10: a detached app volume at
      # 2/3 replicas, plus nightly Velero CSI-snapshot DataUploads timing out
      # against it). Longhorn briefly attaches the volume in maintenance mode,
      # rebuilds, and detaches again.
      offlineReplicaRebuilding: true
      # Engine->replica gRPC timeout. Raised from the 8s chart default to the
      # 30s maximum because this cluster enforces Cilium SPIRE mutual
      # authentication (the require-mutual-auth CiliumClusterwideNetworkPolicy,
      # mode: required) on all intra-cluster traffic. When an engine<->replica
      # auth-cache entry is cold -- after a cilium/spire-agent roll wipes every
      # node's cache, or once an idle entry expires -- Cilium drops the first
      # packet(s) while the SPIRE handshake completes, and the TCP
      # retransmit-during-handshake delay intermittently exceeds the 8s default.
      # The engine then declares an otherwise-healthy replica `in error` ->
      # Faulted -> rebuild -> recover (~40-80s), so longhorn-manager spams
      # Faulted / FailedRebuilding / FailedSnapshotPurge events (and matching
      # log errors) every hour even though every volume is healthy at every
      # point-in-time check. 30s absorbs the handshake latency WITHOUT weakening
      # mutual auth (WireGuard still encrypts the wire and the SPIRE identity
      # gate is unchanged) -- the long-lived-data-plane equivalent of the in-run
      # curl retries the coroot-pricing / umami-provision CronJobs already use
      # for the same first-packet-drop race. Longhorn caps this setting at 30s.
      engineReplicaTimeout: "30"

    persistence:
      # The chart-managed `longhorn` StorageClass uses volumeBindingMode: Immediate,
      # binding a PVC (and provisioning its Longhorn volume) BEFORE the consuming pod
      # is scheduled — which strands stateful pods on whatever node the volume landed
      # on (incl. autoscaler overflow nodes) and defeats scale-down. So the cluster
      # default is now the sibling `longhorn-wffc` class (WaitForFirstConsumer,
      # storage-class-longhorn-wffc.yaml). This `longhorn` class is KEPT but demoted to
      # non-default so existing PVCs and CNPG clusters that name it still resolve; move
      # workloads onto longhorn-wffc per-workload (reclaimPolicy is Delete — no bulk PVC deletes).
      defaultClass: false
      defaultClassReplicaCount: ${longhorn_replica_count:=3}
      # RWX support via Longhorn's built-in NFS server.
      defaultFsType: ext4
      reclaimPolicy: Delete

    # Resource-conscious settings for cx23 workers (2 vCPU, 4 GB RAM).
    csi:
      attacherReplicaCount: ${longhorn_csi_attacher_replicas:=1}
      provisionerReplicaCount: ${longhorn_csi_provisioner_replicas:=1}
      resizerReplicaCount: ${longhorn_csi_resizer_replicas:=1}
      snapshotterReplicaCount: ${longhorn_csi_snapshotter_replicas:=1}

    # Restrict Longhorn DaemonSets to storage-labeled nodes only.
    # Control planes don't carry disks and no pods on them mount Longhorn
    # volumes — running longhorn-manager there wastes ~250Mi per node.
    longhornManager:
      nodeSelector:
        node.longhorn.io/create-default-disk: "true"

    longhornUI:
      replicas: ${longhorn_ui_replicas:=1}
