apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-simply
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: external-dns-simply
    creationPolicy: Owner
  data:
    # simply.com API credentials (control panel -> Account -> API). The
    # account name is the S-number (Sxxxxxx); together they form the HTTP
    # Basic auth pair for https://api.simply.com/2/. Seeded manually into
    # OpenBao, like infrastructure/dns/cloudflare.
    - secretKey: account-name
      remoteRef:
        key: infrastructure/dns/simply
        property: account_name
    - secretKey: api-key
      remoteRef:
        key: infrastructure/dns/simply
        property: api_key
