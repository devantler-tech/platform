apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-external-dns-simply
  namespace: external-dns
spec:
  # Scoped to this instance's pods — the namespace-wide allow-external-dns
  # policy in ../external-dns/ pins egress to api.cloudflare.com only, so the
  # simply.com instance needs its own FQDN allowance.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: external-dns-simply
  egress:
    # Kube API for watching HTTPRoutes/Gateways
    - toEntities:
        - kube-apiserver
    # The webhook sidecar talks to simply.com for DNS record management.
    # Pinned by FQDN rather than world:443 so a compromised pod cannot reach
    # arbitrary external services. matchName is exact — the v2 API lives
    # exclusively on api.simply.com today.
    - toFQDNs:
        - matchName: "api.simply.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution. rules.dns activates Cilium's L7 DNS proxy so the
    # toFQDNs rule above can be enforced; the visibility list is restricted
    # to the names this pod actually needs to resolve (see the rationale in
    # ../external-dns/networkpolicy.yaml).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchName: "api.simply.com"
              - matchPattern: "*.cluster.local"
