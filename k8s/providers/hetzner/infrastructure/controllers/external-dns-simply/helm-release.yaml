apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-simply
  namespace: external-dns
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  chart:
    spec:
      chart: external-dns
      version: 1.21.1
      sourceRef:
        # Shared with the Cloudflare instance — see ../external-dns/helm-repository.yaml.
        kind: HelmRepository
        name: external-dns
  # https://github.com/kubernetes-sigs/external-dns/blob/master/charts/external-dns/values.yaml
  values:
    provider:
      name: webhook
      webhook:
        # The only external-dns provider for simply.com, listed in the official
        # external-dns webhook-provider registry. Young, single-maintainer
        # project, hence pinned by digest; fork into devantler-tech if it
        # becomes load-bearing.
        image:
          repository: ghcr.io/uozalp/external-dns-simply-webhook
          tag: 0.1.0@sha256:8a564b62c2dfb0089b6d51cff3198722ea72b8c7e1f4d8d057a2d1f3feb2cab4
        env:
          # The image serves the webhook API *and* /healthz on PORT (default
          # 8888). The chart declares containerPort 8080 (`http-webhook`) and
          # probes /healthz on it, so align the image with the chart and point
          # external-dns at it via --webhook-provider-url below.
          - name: PORT
            value: "8080"
          - name: SIMPLY_ACCOUNT_NAME
            valueFrom:
              secretKeyRef:
                name: external-dns-simply
                key: account-name
          - name: SIMPLY_API_KEY
            valueFrom:
              secretKeyRef:
                name: external-dns-simply
                key: api-key
        # The chart leaves the sidecar's securityContext empty; mirror the main
        # container's restricted defaults so validate-container-security passes.
        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          capabilities:
            drop: ["ALL"]
    sources:
      - gateway-httproute
    policy: sync
    registry: txt
    txtOwnerId: "${domain}"
    txtPrefix: "_externaldns."
    # No domainFilters: the webhook negotiates the zone list with external-dns
    # at startup — exactly the zones the simply.com account DNS-hosts — so
    # hostnames in other zones (platform.devantler.tech, *.platform.lan) are
    # ignored without per-tenant configuration here. Which records get created
    # is driven entirely by the tenants' own HTTPRoute hostnames.
    # simply.com advertises rate limits only via X-RateLimit headers; poll
    # gently — records here change ~never.
    interval: 5m
    extraArgs:
      - --exclude-target-net=10.0.0.0/8
      # external-dns defaults to port 8888 for webhook providers; the chart's
      # sidecar contract (containerPort + probes) is 8080 — see PORT above.
      - --webhook-provider-url=http://localhost:8080
    deploymentStrategy:
      type: Recreate
    serviceMonitor:
      enabled: false
