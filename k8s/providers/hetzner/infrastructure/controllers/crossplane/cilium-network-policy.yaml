apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-crossplane
  namespace: crossplane-system
spec:
  # Namespace-wide: covers the Crossplane core pod (package manager pulls
  # provider OCI packages itself, in-pod — unlike runtime images, which the
  # kubelet pulls at node level) AND the provider pods Crossplane creates here
  # (provider-upjet-github talks to the GitHub API).
  endpointSelector: {}
  egress:
    # Kube API for watching/updating managed resources and leader election.
    - toEntities:
        - kube-apiserver
    # Pinned by FQDN rather than world:443 so a compromised pod cannot reach
    # arbitrary external services:
    #   ghcr.io + pkg-containers.githubusercontent.com — provider package
    #     pulls by the core package manager (ghcr blob fetches redirect to
    #     pkg-containers.githubusercontent.com).
    #   api.github.com — the GitHub REST/GraphQL API used by
    #     provider-upjet-github to reconcile org/repo state.
    #   xpkg.upbound.io + d3qrbvrml4iuq4.cloudfront.net — the Upbound registry
    #     and its blob CDN, for the provider-aws-iam / provider-family-aws
    #     package pulls. The registry serves the /v2 API, token endpoint and
    #     manifests from xpkg.upbound.io itself, then 307-redirects layer blob
    #     downloads to its CloudFront distribution. Pinned by exact host (not
    #     *.cloudfront.net) to keep egress tight; if Upbound rotates the
    #     distribution the blob pull will fail and the new host can be rediscovered
    #     with: curl -sSI -H "Authorization: Bearer <token>" \
    #     https://xpkg.upbound.io/v2/upbound/provider-aws-iam/blobs/<digest>
    #     and read the Location header.
    #   sts.us-east-1.amazonaws.com + iam.amazonaws.com — the narrowly scoped
    #     AWS identity APIs used by provider-aws-iam. The provider calls STS
    #     GetCallerIdentity before reconciling IAM resources, then uses the
    #     global IAM endpoint for the managed OIDC provider and role.
    - toFQDNs:
        - matchName: "ghcr.io"
        - matchName: "pkg-containers.githubusercontent.com"
        - matchName: "api.github.com"
        - matchName: "xpkg.upbound.io"
        - matchName: "d3qrbvrml4iuq4.cloudfront.net"
        - matchName: "sts.us-east-1.amazonaws.com"
        - matchName: "iam.amazonaws.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution. rules.dns activates Cilium's L7 DNS proxy so the
    # toFQDNs rule above can be enforced; the visibility list is restricted
    # to the names these pods actually need to resolve, closing off DNS
    # tunneling exfil (same pattern as external-dns).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchName: "ghcr.io"
              - matchName: "pkg-containers.githubusercontent.com"
              - matchName: "api.github.com"
              - matchName: "xpkg.upbound.io"
              - matchName: "d3qrbvrml4iuq4.cloudfront.net"
              - matchName: "sts.us-east-1.amazonaws.com"
              - matchName: "iam.amazonaws.com"
              - matchPattern: "*.cluster.local"
