apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-external-dns
  namespace: external-dns
spec:
  endpointSelector: {}
  ingress:
    # Metrics scraping
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "7979"
              protocol: TCP
  egress:
    # Kube API for watching services/ingresses
    - toEntities:
        - kube-apiserver
    # Cloudflare/Hetzner DNS API
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
