---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 10m
  chart:
    spec:
      chart: cluster-autoscaler
      version: 9.46.6
      sourceRef:
        kind: HelmRepository
        name: cluster-autoscaler
  # https://github.com/kubernetes/autoscaler/blob/master/charts/cluster-autoscaler/values.yaml
  values:
    cloudProvider: hetzner

    # --- Node pool definitions ---
    autoscalingGroups:
      - name: autoscale-small
        minSize: ${autoscaler_small_pool_min}
        maxSize: ${autoscaler_small_pool_max}
        instanceType: ${autoscaler_small_server_type}
        region: ${autoscaler_location}
      - name: autoscale-medium
        minSize: ${autoscaler_medium_pool_min}
        maxSize: ${autoscaler_medium_pool_max}
        instanceType: ${autoscaler_medium_server_type}
        region: ${autoscaler_location}

    extraArgs:
      # Prefer the cheapest eligible node group when scaling up. See
      # https://github.com/kubernetes/autoscaler/blob/master/cluster-autoscaler/FAQ.md
      expander: price
      # Wait before removing underutilized nodes to avoid flapping.
      scale-down-delay-after-add: 5m
      scale-down-delay-after-delete: 2m
      scale-down-unneeded-time: 10m
      # Hard ceiling on total cluster nodes (KSail CPs + static workers
      # + autoscaler workers combined). 3 CPs + 3 workers = 6 base;
      # current pool caps allow 2 more (1 small + 1 medium). Ceiling of
      # 10 provides headroom for future pool expansion.
      max-nodes-total: ${autoscaler_max_nodes_total}
      ok-total-unready-count: 3
      # Log autoscaler decisions.
      v: "4"

    # --- Environment variables (map format) ---
    extraEnv: {}

    # --- Environment variables from Secrets ---
    extraEnvSecrets:
      HCLOUD_TOKEN:
        name: hcloud
        key: token
      HCLOUD_NETWORK:
        name: hcloud
        key: network
      # Talos snapshot ID — stored as string in Secret to avoid Helm
      # scientific notation. See docs/node-autoscaling.md.
      HCLOUD_IMAGE:
        name: cluster-autoscaler-config
        key: hcloud_image
      # Base64-encoded Talos worker machine config YAML.
      HCLOUD_CLOUD_INIT:
        name: cluster-autoscaler-config
        key: hcloud_cloud_init

    # Run on control plane nodes so the autoscaler itself isn't evicted
    # during scale-down of worker nodes.
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""

    rbac:
      create: true
      serviceAccount:
        create: true
        name: cluster-autoscaler

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
