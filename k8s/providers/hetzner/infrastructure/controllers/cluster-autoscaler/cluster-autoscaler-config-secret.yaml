# Cluster Autoscaler environment variables — per-pool Talos worker
# machine config and image ID. Values are injected via Flux variable
# substitution from each cluster's variables (ConfigMap + Secret).
---
apiVersion: v1
kind: Secret
metadata:
  name: cluster-autoscaler-config
  namespace: kube-system
stringData:
  # Talos v1.11.2 Hetzner snapshot — shared across dev/prod because it
  # is version-specific, not cluster-specific. Update when Talos is
  # upgraded. See docs/node-autoscaling.md for snapshot creation.
  hcloud_image: "380360661"
  # Base64-encoded Talos worker machine config YAML. Talos reads this
  # from Hetzner user-data on boot. Generated from the running cluster
  # — see docs/node-autoscaling.md.
  hcloud_cloud_init: "${autoscaler_cloud_init_b64}"
