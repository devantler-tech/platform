# Cluster Autoscaler HCLOUD_CLUSTER_CONFIG — per-pool Talos worker
# machine config and image. The cloudInit values are base64-encoded
# Talos worker machine configs injected via Flux variable substitution
# from each cluster's variables-cluster-secret.enc.yaml.
---
apiVersion: v1
kind: Secret
metadata:
  name: cluster-autoscaler-config
  namespace: kube-system
stringData:
  cluster-config.json: |
    {
      "imagesForArch": {
        "amd64": "${autoscaler_talos_image}"
      },
      "nodeConfigs": {
        "autoscale-small": {
          "cloudInit": "${autoscaler_cloud_init_b64}",
          "labels": {
            "node.kubernetes.io/role": "autoscaler-worker"
          }
        },
        "autoscale-medium": {
          "cloudInit": "${autoscaler_cloud_init_b64}",
          "labels": {
            "node.kubernetes.io/role": "autoscaler-worker"
          }
        }
      }
    }
