# PLACEHOLDER — This Secret must be populated manually after creating
# the Talos Hetzner snapshot and generating a worker machine config.
#
# Steps:
# 1. Create Talos snapshot (see docs/node-autoscaling.md)
# 2. Generate worker machine config from the running cluster
# 3. Build the cluster-config.json (see template below)
# 4. Encrypt with: sops -e cluster-autoscaler-config-secret.yaml > cluster-autoscaler-config-secret.enc.yaml
# 5. Commit the .enc.yaml and delete the plaintext
#
# cluster-config.json template:
# {
#   "imagesForArch": {
#     "amd64": "<talos-snapshot-id>"
#   },
#   "nodeConfigs": {
#     "autoscale-small": {
#       "cloudInit": "<base64-encoded-talos-worker-machine-config>",
#       "labels": {
#         "node.kubernetes.io/role": "autoscaler-worker"
#       }
#     },
#     "autoscale-medium": {
#       "cloudInit": "<base64-encoded-talos-worker-machine-config>",
#       "labels": {
#         "node.kubernetes.io/role": "autoscaler-worker"
#       }
#     }
#   }
# }
---
apiVersion: v1
kind: Secret
metadata:
  name: cluster-autoscaler-config
  namespace: kube-system
stringData:
  cluster-config.json: |
    {
      "imagesForArch": {
        "amd64": "${autoscaler_talos_image}"
      },
      "nodeConfigs": {
        "autoscale-small": {
          "cloudInit": "PLACEHOLDER_BASE64_TALOS_WORKER_CONFIG",
          "labels": {
            "node.kubernetes.io/role": "autoscaler-worker"
          }
        },
        "autoscale-medium": {
          "cloudInit": "PLACEHOLDER_BASE64_TALOS_WORKER_CONFIG",
          "labels": {
            "node.kubernetes.io/role": "autoscaler-worker"
          }
        }
      }
    }
