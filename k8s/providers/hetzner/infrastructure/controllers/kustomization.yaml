---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Full base controller aggregate — prod tracks every base controller
  # automatically. The VM stack (cdi + kubevirt) is the only base-level
  # exclusion and is no longer in the aggregate (it lives in the docker provider,
  # local/CI only): no VirtualMachines/DataVolumes exist on Hetzner and
  # virt-handler crash-looped (1000+ restarts) with zero VMs.
  - ../../../../bases/infrastructure/controllers/
  # Prod-only: a minimal Alertmanager scoped to Kubescape runtime-detection
  # alerts. The Headlamp Kubescape plugin's "Runtime Detection > Alerts" tab
  # reads ONLY from a Prometheus Alertmanager (GET /api/v2/alerts), which the
  # Coroot migration removed from the cluster; this reintroduces one, fed by the
  # node-agent (kubescape/patches/ below) and routing to Slack. See its
  # helm-release.yaml header. Prod-only (runtimeDetection is off on docker/local).
  - alertmanager/
  # Prod-only: layers a cluster-wide mutual-auth (SPIRE mTLS) policy on top of
  # the base Cilium controller listed above. SPIRE is enabled only on Hetzner,
  # so the policy lives here, not in the base — see cilium/ for the rationale.
  - cilium/
  - coredns/
  # Prod-only: Crossplane core for declarative GitHub management — external
  # reconcilers must run on exactly one always-on cluster. The provider
  # package + managed resources live in the dedicated `github` layer
  # (../../github/), applied by its own Flux Kustomization. (Crossplane core
  # has no ExternalSecret dependency, so unlike external-dns it stays in this
  # wait-gated controllers layer.)
  - crossplane/
  # Prod-only: the SIG Descheduler — rebalances RUNNING pods (violated affinity/
  # taints/spread, replica clumps) and drains nearly-empty nodes so the
  # ksail-managed Cluster Autoscaler can reclaim them. Karpenter has no Hetzner
  # provider, so CA (provision/deprovision) + descheduler (rebalance/consolidate)
  # is the Hetzner-native consolidation pair — see docs/node-autoscaling.md.
  - descheduler/
  # NB: external-dns moved to ../external-dns/ (the `infrastructure` layer):
  # its Cloudflare token now arrives via an OpenBao ExternalSecret, and the
  # ClusterSecretStore only exists once `infrastructure` reconciles — in this
  # wait-gated layer the missing Secret would deadlock the dependency chain.
  - flux-instance/
  - hcloud-ccm/
  - hcloud-csi/
  - kubelet-serving-cert-approver/
  - longhorn/
  - origin-ca-issuer/
  # cert-manager DNS01 solver for simply.com-hosted zones (ascoachingogvaner.dk).
  - simply-dns-webhook/
  - snapshot-controller/
  # GitOps OpenTofu/Terraform reconciler (Flux). Installs the `Terraform`
  # (infra.contrib.fluxcd.io) CRD + controller used by the `unifi` tenant to
  # reconcile the UniFi network from devantler-tech/unifi. Prod-only: the
  # UniFi controller API is only reached from Hetzner.
  - tofu-controller/
  # Hetzner-local Velero extras (the volume-policy ConfigMap). The base Velero
  # HelmRelease is included via ../../../../bases/...; this dir only adds the
  # prod-only ConfigMap, and the patch below rewires the HelmRelease.
  - velero/
  # Opt-in game-day chaos engineering — uncomment to enable, re-comment when the
  # game day ends (see docs/chaos-engineering.md). Left off by default: the
  # chaos-daemon is a permanently-privileged DaemonSet, so it ships only while
  # experiments are actually running, not as always-on prod attack surface.
  # - ../../../../bases/infrastructure/controllers/chaos-mesh/
components:
  # Platform-wide HelmRelease drift detection (mode: enabled). Restores
  # Helm-rendered resources deleted/mutated out-of-band — the cause of the
  # silently-broken keda external-scaler and homepage Deployments.
  - ../../../../bases/components/helmrelease-drift-detection
  - ../../../../bases/components/helmrelease-flux-defaults
patches:
  - path: openbao/patches/store-data-on-hcloud.yaml
  # Prod-only fail-closed WireGuard encryption (egress strict mode) — see file.
  - path: cilium/patches/enforce-wireguard-strict-mode.yaml
  # Prod-only: move the SPIRE server datastore off Longhorn onto hcloud-csi to
  # break the SPIRE <-> Longhorn <-> mTLS circular deadlock — see file.
  - path: cilium/patches/store-spire-data-on-hcloud.yaml
  # Prod-only: switch Velero to a MIXED backup model — CSI volume snapshots +
  # data movement for Longhorn-backed PVCs (→ R2), file-system (Kopia) backup
  # for openbao + any non-Longhorn PVC. The base tier stays all-FSB because the
  # docker/local-path provider cannot snapshot.
  - path: velero/patches/enable-csi-snapshots.yaml
  # Prod-only: enable the ksail-operator's native Dex OIDC. The operator does
  # eager startup OIDC discovery that needs a cluster-resolvable + TLS-trusted
  # issuer, which the local *.platform.lan host-file domain isn't — see file.
  - path: ksail-operator/patches/enable-oidc.yaml
  # Prod-only: point the Kubescape node-agent's runtime-detection alerts at the
  # in-cluster Alertmanager (alertmanager/ above) + keep the stdout exporter on,
  # fanning them out to the Headlamp plugin, Slack, and Coroot — see file.
  - path: kubescape/patches/route-runtime-detection-alerts.yaml
  # NB: the Coroot CR moved to the `infrastructure` layer (so the operator's
  # CRD is installed first), so its hetzner patch now lives in
  # ../coroot/patches/ and is applied by ../kustomization.yaml, not here.
