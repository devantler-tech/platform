# provider-upjet-github declares SafeStart, so its ManagedResourceDefinitions
# install Inactive; only the ones named here become CRDs (each active MRD costs
# the apiserver ~3MiB, and the provider ships ~78). The chart's
# activate-everything default MRAP is disabled via
# `provider.defaultActivations: []` in the crossplane HelmRelease.
#
# We activate the NAMESPACED (Crossplane v2, `*.github.m.upbound.io`) variants
# only — namespaced managed resources can be applied by a namespace-scoped
# tenant ServiceAccount with a plain Role (no cluster RBAC), which is what makes
# github-config a genuinely isolated app/tenant. Extend this list as more of the
# org's GitHub surface comes under management (org rulesets, Actions secrets, …)
# — see docs/github-management.md.
apiVersion: apiextensions.crossplane.io/v1alpha1
kind: ManagedResourceActivationPolicy
metadata:
  name: github
spec:
  activate:
    - repositories.repo.github.m.upbound.io
    - defaultbranches.repo.github.m.upbound.io
    - branchprotections.repo.github.m.upbound.io
    - repositoryrulesets.repo.github.m.upbound.io
    - issuelabels.repo.github.m.upbound.io
    # Org-level rulesets (the ~19 UI-managed org rules that gate every repo) —
    # adopted Observe-first in devantler-tech/.github deploy/. The tenant Role
    # already covers the enterprise.github.m.upbound.io group.
    - organizationrulesets.enterprise.github.m.upbound.io
    # Team management — the maintainers team + its membership and team->repo
    # access (declared in devantler-tech/.github deploy/teams/). Lets a team be
    # the canonical CODEOWNERS owner across the suite.
    - teams.team.github.m.upbound.io
    - teammemberships.team.github.m.upbound.io
    - teamrepositories.team.github.m.upbound.io
    # Actions repository permissions — the per-repo "Require actions to be pinned
    # to a full-length commit SHA" policy (sha_pinning_required), declared in
    # devantler-tech/.github deploy/actions-permissions/ for every managed repo
    # except `actions`. The tenant Role already covers the
    # actions.github.m.upbound.io group. REQUIRES a provider-upjet-github release
    # embedding terraform-provider-github >= 6.11.0 (where sha_pinning_required
    # landed) — absent in the currently-deployed v0.19.1 (TF 6.6.0).
    - repositorypermissions.actions.github.m.upbound.io
