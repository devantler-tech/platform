# AWS Crossplane provider (Upbound official family) — foundation for declarative
# AWS test credentials (the devantler-tech/aws tenant, platform#2324 / platform#2325).
# Lives alongside provider-upjet-github in this `infrastructure` layer (not
# `infrastructure/controllers/`) for the same reason: Provider/DeploymentRuntimeConfig
# are pkg.crossplane.io CRs that need the Crossplane CRDs the core HelmRelease in
# controllers/crossplane/ installs first. Prod-only (Crossplane is Hetzner-only).
#
# provider-family-aws ships the shared AWS ProviderConfig CRD consumed by every
# family member. Crossplane would auto-resolve it as a dependency of provider-aws-iam,
# but it is declared explicitly so its version is pinned and its runtime pod is
# resource-bounded (see deployment-runtime-config-family-aws.yaml).
#
# No ProviderConfig/credentials yet: a Provider package becomes Healthy on its own;
# credentials are only consulted when reconciling managed resources. SafeStart +
# `defaultActivations: []` (controllers/crossplane/helm-release.yaml) means the AWS
# ManagedResourceDefinitions install Inactive at zero apiserver cost — the specific
# IAM kinds are activated by an explicit ManagedResourceActivationPolicy when the
# EKS-test IAM identity is created (platform#2326). xpkg.upbound.io is the official
# publish registry for the Upbound family providers.
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-family-aws
spec:
  package: xpkg.upbound.io/upbound/provider-family-aws:v2.6.1
  runtimeConfigRef:
    name: provider-family-aws
