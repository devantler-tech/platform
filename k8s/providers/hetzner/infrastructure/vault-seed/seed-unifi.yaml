# PushSecret for the UniFi controller API credentials. Only present on the
# Hetzner provider overlay because the source keys (unifi_api_url / unifi_api_key
# in variables-cluster) are only populated for prod; on local Docker clusters
# there is no UniFi integration and this PushSecret would stall in InProgress.
# Declarative seeding: the SOPS-encrypted variables-cluster values are the source
# of truth — set the real key by editing
# k8s/clusters/prod/bootstrap/variables-cluster-secret.enc.yaml (ships a
# placeholder). The unifi tenant's ExternalSecret reads this back
# (providers/hetzner/apps/unifi/credentials-external-secret.yaml).
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-unifi
  namespace: flux-system
spec:
  # 1h, not "0" (push-once): re-pushing hourly from the durable SOPS source is
  # what re-seeds the keys automatically after OpenBao data loss — see
  # k8s/bases/infrastructure/vault-seed/push-secrets.yaml.
  refreshInterval: 1h
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-cluster
  data:
    - match:
        secretKey: unifi_api_url
        remoteRef:
          remoteKey: infrastructure/unifi/controller
          property: api_url
    - match:
        secretKey: unifi_api_key
        remoteRef:
          remoteKey: infrastructure/unifi/controller
          property: api_key
