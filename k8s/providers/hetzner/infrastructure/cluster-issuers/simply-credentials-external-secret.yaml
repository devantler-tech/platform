# simply.com DNS01 solver credential for the letsencrypt-prod ClusterIssuer
# (see letsencrypt-prod-issuer.yaml). Mirrors cloudflare-api-token-external-secret.yaml:
# the solver credential lives here in the `infrastructure` layer — next to the
# issuer that consumes it and, crucially, alongside the `vault-config` Job
# (../../../bases/infrastructure/vault-config/) that grants the `external-secrets`
# role read access to this path via the `app-ascoachingogvaner-readonly` policy.
#
# It MUST NOT live with the webhook in `infrastructure-controllers`
# (../controllers/simply-dns-webhook/): that layer reconciles BEFORE
# `infrastructure`, so the OpenBao policy would not exist yet, the ExternalSecret
# would be stuck (403 permission denied) under `wait: true`, and because
# `infrastructure` (which runs vault-config) `dependsOn` `infrastructure-controllers`,
# the two layers deadlock — wedging infrastructure → apps cluster-wide. The
# webhook Deployment itself stays in `infrastructure-controllers`; it reads this
# Secret only at DNS01-solve time, so it does not need it to become Ready.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: simply-credentials
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: simply-credentials
    creationPolicy: Owner
  data:
    # The credential is tenant-owned, so it lives under the tenant's apps/ path
    # (covered by app-ascoachingogvaner-readonly on the ClusterSecretStore role).
    # The solver expects exactly these two secret keys (account-name/api-key) in
    # the Secret named by the ClusterIssuer's config.secretName.
    - secretKey: account-name
      remoteRef:
        key: apps/ascoachingogvaner/simply
        property: account_name
    - secretKey: api-key
      remoteRef:
        key: apps/ascoachingogvaner/simply
        property: api_key
