apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${admin_email}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # Cloudflare hosts ${domain}. This shared ClusterIssuer only carries the
      # Cloudflare solver; tenant-owned zones DNS-hosted at simply.com (e.g.
      # ascoachingogvaner.dk) are issued by a TENANT-owned namespaced Issuer in
      # the tenant's deploy/ — it reads the tenant's own simply-credentials
      # Secret via the cluster-wide simply-dns-webhook solver
      # (../controllers/simply-dns-webhook/), so neither the credential nor the
      # certificate is a platform resource that could wedge this layer.
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
