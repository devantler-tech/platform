# Prod-only network policy for the coroot-db CloudNativePG cluster
# (cluster.yaml). The shared base `allow-coroot` policy
# (controllers/coroot/cilium-network-policy.yaml, endpointSelector: {}) already covers
# the rest for every observability pod — intra-namespace traffic in both
# directions (so the Coroot server reaches coroot-db on 5432), egress to the
# kube-apiserver (CNPG manages the cluster), and DNS via kube-dns. This policy
# adds ONLY the two coroot-db-specific gaps that base policy does not grant, so
# it stays in the hetzner overlay (CNPG is prod-only):
#   1. ingress from the cnpg-system operator (it reaches each instance's status
#      endpoint on 8000 and PostgreSQL on 5432 — base allows only
#      observability-namespace sources);
#   2. egress to Cloudflare R2 for the barman-cloud backup sidecar's WAL
#      archiving + base backups (base allows only Slack/healthchecks/coroot.com
#      on 443).
# Mirrors the CNPG-specific clauses of umami's networkpolicy.yaml. Scoped to the
# coroot-db instance pods via CNPG's cnpg.io/cluster label.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-coroot-db
  namespace: observability
spec:
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: coroot-db
  ingress:
    # CNPG operator reaches the instance status (8000) and PostgreSQL (5432).
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
            - port: "5432"
              protocol: TCP
  egress:
    # coroot-db -> Cloudflare R2 (S3) for the barman-cloud sidecar's WAL
    # archiving + base backups (cluster.yaml + object-store.yaml).
    # Pinned by FQDN instead of world:443 so a compromised pod cannot exfiltrate
    # to arbitrary external services; the R2 pattern matches any account host
    # without committing the account id (same pattern as umami).
    - toFQDNs:
        - matchPattern: "*.r2.cloudflarestorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # DNS resolution so the toFQDNs allow-list above can be enforced by Cilium's
    # L7 DNS proxy (the base policy's DNS clause selects all observability pods,
    # but a CiliumNetworkPolicy's egress is evaluated per-policy, so the FQDN
    # rule needs its own DNS clause to resolve the R2 host).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
