---
apiVersion: coroot.com/v1
kind: Coroot
metadata:
  name: coroot
  namespace: observability
spec:
  # --- High availability (prod-only) -----------------------------------------
  # Run TWO Coroot server pods so the UI / ingestion API rides out a node drain
  # (Talos roll, autoscaler scale-down) or a single node loss — coroot-coroot was
  # the last single-replica SPOF in the stack after ClickHouse (2) + Keeper (3)
  # went HA. The operator (controller/coroot.go) only honours replicas > 1 when
  # spec.postgres is set — it silently falls back to 1 replica otherwise, because
  # the default embedded-SQLite store on each pod's PVC can't be shared — so HA
  # REQUIRES the external Postgres below. The drain-safe maxUnavailable:1 PDB and
  # the cross-node spread that keep the two pods genuinely available live in
  # pod-disruption-budget.yaml and spec.affinity (below).
  replicas: 2
  # External Postgres datastore = the precondition for replicas > 1. Points at
  # the CloudNativePG cluster in postgres-cluster.yaml; CNPG owns the `coroot`
  # role's password and publishes it (with host/port/dbname) in the
  # auto-generated coroot-db-app Secret, which the operator consumes via
  # passwordSecret -> PG_PASSWORD + PG_CONNECTION_STRING (controller/postgres.go).
  # host is the CNPG -rw (read-write/primary) Service so writes always reach the
  # current primary across switchovers. sslmode: require matches the platform's
  # established CNPG connection posture (vault-config connects to umami-db the
  # same way) — encrypt in-cluster without pinning CNPG's self-signed CA.
  postgres:
    host: coroot-db-rw.observability.svc.cluster.local
    port: 5432
    user: coroot
    database: coroot
    passwordSecret:
      name: coroot-db-app
      key: password
    params:
      sslmode: require
  # Spread the two server pods across nodes. The operator passes spec.affinity
  # straight through to the server pod template (controller/coroot.go) and adds
  # no anti-affinity of its own, so without this both replicas could land on one
  # node and a single node loss would take Coroot down despite replicas: 2.
  # Preferred (not required) so scheduling still succeeds if only one eligible
  # node is available — the platform house pattern (spread-pods).
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/managed-by: coroot-operator
                app.kubernetes.io/part-of: coroot
                app.kubernetes.io/component: coroot
  # Persist on Hetzner Cloud block storage. The base uses the default storage
  # class (fine for ephemeral local/CI), but in prod a VPA eviction, node
  # drain, or autoscaler scale-down would otherwise wipe all telemetry. hcloud
  # block storage (not Longhorn) for the same reason OpenBao/Prometheus used
  # it: the ~36 GiB Talos rootfs is too small to host Longhorn replicas this
  # large. Velero's daily backup of the observability namespace ships these to R2.
  storage:
    className: hcloud
    size: 2Gi
  # Coroot's own pod is bursty (trace/log ingestion) and auto-vpa governs it.
  # With no explicit resources it gets the default ~4:1 limit:request, so the
  # VPA-set ~1Gi request lands a ~4.1Gi limit -- which a node-churn ingestion
  # spike blew through, OOMKilling coroot-coroot-0 twice on 2026-06-16. Pin an
  # explicit block (same pattern as clickhouse below): the request stays ~1Gi
  # (no extra reservation on this memory-tight cluster) but the limit rises to
  # 6Gi (the VPA's existing maxAllowed), giving ~50% more burst headroom before
  # the OOM kill. auto-vpa runs controlledValues:RequestsAndLimits, so it
  # preserves this 6:1 ratio when it sets the request from live usage.
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 6Gi
  prometheus:
    # 14d metrics retention (matches the old kube-prometheus-stack posture).
    retention: 14d
    storage:
      className: hcloud
      size: 20Gi
  clickhouse:
    # ClickHouse ships config.xml with max_server_memory_usage=0 (auto), so it
    # derives its memory ceiling from the cgroup limit. Left at the auto-vpa
    # floor (≈128Mi req / 512Mi limit) that ceiling lands at ~224 MiB, and
    # ClickHouse then throws "Code 241: memory limit exceeded" on every
    # background merge and on Coroot's own trace ingestion — by far the largest
    # source of Coroot's self-reported error logs/alerts. Pin a generous
    # limit:request ratio: the auto-vpa generated VPA runs in
    # controlledValues:RequestsAndLimits, so it preserves this 4:1 ratio when it
    # sets the request from live usage — keeping the limit (and thus ClickHouse's
    # memory ceiling) ~4x the request instead of clamping it back to the floor.
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    storage:
      className: hcloud
      size: 15Gi
    keeper:
      storage:
        className: hcloud
        size: 2Gi
  # Longer log/trace/profile retention now that storage is durable.
  logsTTL: 7d
  tracesTTL: 7d
  profilesTTL: 7d
  # --- Slack alerting (fully declarative, prod-only) --------------------------
  # Coroot CE has no pre-fillable bot-token Slack integration, but its generic
  # *webhook* integration POSTs a templated body to any URL -- so we reuse the
  # exact Slack incoming-webhook the prometheus stack used:
  # ${alertmanager_webhook_url}, injected by Flux from the per-cluster
  # variables-cluster Secret (same value, same source as before -- nothing to
  # fill in). This lives only in the hetzner overlay: the base Coroot CR has no
  # `projects`/webhook integration at all, so local/CI (docker overlay) has
  # nothing to send and stays quiet by design, exactly as the old Alertmanager
  # did. Slack alerting is a prod-only concern.
  #
  # Describing a project re-homes the bundled agents onto its API key, but the
  # keySecret is created automatically by the operator (generated in-cluster,
  # no seed), so telemetry keeps flowing with zero manual steps.
  projects:
    - name: platform
      apiKeys:
        - keySecret:
            name: coroot-api-key
            key: key
          description: bundled node-agent + cluster-agent
      notificationIntegrations:
        # Required by the Coroot CRD whenever any notificationIntegrations are
        # set (`spec.projects[].notificationIntegrations.baseURL`, pattern
        # ^https?://.+$). Coroot interpolates it into the `.URL` template
        # variable used in the Slack templates below, so incident/alert links
        # deep-link back to the affected app in this instance. Same host the
        # HTTPRoute serves the UI on; `${domain}` is substituted by
        # Flux from the per-cluster variables-cluster ConfigMap.
        baseURL: https://observability.${domain}
        webhook:
          url: ${alertmanager_webhook_url:=https://example.invalid/no-slack-configured}
          incidents: true
          alerts: true
          # Slack-mrkdwn payloads. `json` (json.Marshal) escapes each
          # interpolated field so quotes/newlines can't break the JSON body.
          incidentTemplate: |
            {"text": {{ if eq .Status "OK" }}{{ json (printf ":white_check_mark: <%s|%s/%s> incident resolved" .URL .Application.Namespace .Application.Name) }}{{ else }}{{ json (printf ":fire: %s: <%s|%s/%s> is not meeting its SLOs\n%s" .Status .URL .Application.Namespace .Application.Name .RCASummary) }}{{ end }}}
          alertTemplate: |
            {"text": {{ if eq .Status "OK" }}{{ json (printf ":white_check_mark: %s resolved - <%s|%s/%s>" .RuleName .URL .Application.Namespace .Application.Name) }}{{ else }}{{ json (printf ":rotating_light: [%s] %s - <%s|%s/%s>\n%s" .Severity .RuleName .URL .Application.Namespace .Application.Name .Summary) }}{{ end }}}
