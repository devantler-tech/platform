# R2 credentials for coroot-db's CNPG Barman Cloud backup (postgres-cluster.yaml).
# Projects the shared backup R2 key/secret from OpenBao (infrastructure/backup/r2
# — the same path Velero's velero-r2-credentials and umami-db-backup-r2 read)
# into a Secret in the observability namespace, where CNPG's backup
# s3Credentials must live (it can only reference a Secret in the Cluster's own
# namespace). Mirrors umami-db-backup-r2 1:1.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: coroot-db-backup-r2
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: coroot-db-backup-r2
    creationPolicy: Owner
    template:
      # REGION is a constant ("auto") rather than a fetched secret — CNPG's
      # s3Credentials.region must point at a Secret key, and barman-cloud/boto3
      # need a region for SigV4 signing. "auto" is R2's environment-independent
      # convention (the same value Velero's BackupStorageLocation uses).
      data:
        ACCESS_KEY_ID: "{{ .ACCESS_KEY_ID }}"
        SECRET_ACCESS_KEY: "{{ .SECRET_ACCESS_KEY }}"
        REGION: "auto"
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: infrastructure/backup/r2
        property: access_key_id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: infrastructure/backup/r2
        property: secret_access_key
