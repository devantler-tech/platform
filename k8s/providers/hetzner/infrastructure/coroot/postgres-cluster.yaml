# CloudNativePG-managed PostgreSQL backing a HIGH-AVAILABILITY Coroot server.
#
# WHY THIS EXISTS: the coroot-operator runs the Coroot server as a StatefulSet
# whose default store is embedded SQLite on the pod's own PVC — which cannot be
# shared across pods, so the server is a hard singleton at replicas: 1. The CRD
# exposes spec.replicas, but the operator's own validation (controller/coroot.go)
# silently FALLS BACK to 1 replica whenever replicas > 1 and spec.postgres is
# unset ("Coroot requires Postgres to run multiple replicas"). Pointing the
# server at an external Postgres is therefore the ONLY supported way to run more
# than one Coroot server pod — so this Cluster is what makes coroot-coroot HA.
# spec.postgres + spec.replicas: 2 + the spread affinity live in
# patches/coroot-patch.yaml (this same hetzner overlay).
#
# PROD-ONLY (lives in the hetzner overlay, not the shared base): the base Coroot
# CR stays single-replica SQLite for local/CI, which have no CloudNativePG
# operator and no hcloud/longhorn storage — exactly how umami-db, the
# wedding-app DB and the rest of the CNPG estate are split. CNPG is the
# platform's standard Postgres operator (infrastructure/controllers/cloudnative-pg).
#
# CREDENTIALS: CNPG generates and OWNS the `coroot` role's password, publishing
# it (with the connection coordinates) in the auto-created `coroot-db-app`
# Secret (keys: username/password/dbname/host/port/uri). The Coroot server reads
# it via spec.postgres.passwordSecret -> coroot-db-app/password. Unlike umami,
# Coroot's password is NOT rotated by OpenBao: Coroot is the sole consumer and
# CNPG is the single source of truth, so there is no separate rotated Secret to
# enforce and none of umami's promotion-time clobber risk (cnpg#2029) applies —
# whatever CNPG writes to coroot-db-app is exactly what Coroot consumes.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: coroot-db
  namespace: observability
  annotations:
    # Never let Flux delete+recreate this database. The infrastructure Flux
    # Kustomization runs force: true + prune: true, so an immutable-field change
    # or a live/Git drift on this Cluster would otherwise make kustomize-
    # controller recreate it — and with the longhorn PVCs on reclaimPolicy=
    # Delete that wipes the data via a fresh initdb (this happened 2026-06-18).
    # force: disabled makes Flux surface the apply error for an operator to
    # resolve deliberately (with a backup/restore plan) instead of recreating;
    # prune: disabled stops GC if the Cluster is ever dropped from a kustomization.
    kustomize.toolkit.fluxcd.io/force: disabled
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  # Pin the PostgreSQL operand image to clear fixable base-OS + PostgreSQL CVEs in
  # the CNPG operator default (18.3-system-trixie) — same rationale and Renovate
  # wiring as umami-db. CNPG rolls the image in place across the HA instances.
  # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-system-trixie
  # Coroot Postgres self-integration: stamp the coroot.com/postgres-scrape
  # annotations onto the DB instance Pods (CNPG inheritedMetadata propagates to
  # all managed objects, incl. Pods) so Coroot's own cluster-agent discovers and
  # scrapes this metadata DB. It only reads POD annotations, so inheritedMetadata
  # is the supported path for a CNPG-managed Postgres. Credentials come from the
  # CNPG-generated `coroot-db-app` Secret (kubernetes.io/basic-auth,
  # username=coroot) — the same one the Coroot server consumes. Intra-namespace,
  # so the base allow-coroot policy already permits the scrape (no extra
  # NetworkPolicy, unlike the cross-namespace umami/backstage DBs; the wedding-app
  # tenant ships its own equivalent in its repo's deploy/networkpolicy.yaml).
  # sslmode=require works whether CNPG's pg_hba uses `host` or `hostssl`.
  inheritedMetadata:
    annotations:
      coroot.com/postgres-scrape: "true"
      coroot.com/postgres-scrape-port: "5432"
      coroot.com/postgres-scrape-credentials-secret-name: coroot-db-app
      coroot.com/postgres-scrape-credentials-secret-username-key: username
      coroot.com/postgres-scrape-credentials-secret-password-key: password
      coroot.com/postgres-scrape-param-sslmode: require
  # Run 3 instances (1 primary + 2 streaming replicas) for high availability —
  # the SAME rationale as umami-db: a single-instance Cluster makes CNPG create a
  # `<cluster>-primary` PDB with minAvailable=1 on the only pod, which BLOCKS
  # every voluntary eviction, so a node drain (Talos roll, autoscaler
  # scale-down) hangs forever and an involuntary node loss takes the DB — and
  # thus the whole HA Coroot server — offline until it reschedules. With >=2
  # instances CNPG drains a node by promoting a replica (switchover) and sets the
  # replica PDB to minAvailable=instances-1, so drains proceed one pod at a time
  # and Postgres survives any single node going away. Three lands one instance on
  # each of the 3 static Longhorn storage workers via CNPG's default (preferred)
  # pod anti-affinity, keeping a primary+replica quorum even under maintenance.
  instances: 3
  storage:
    # Bumped 2Gi -> 10Gi (2026-06-19). The 2Gi volumes filled with WAL during a
    # Talos node roll: the primary retained WAL for the rolled replicas'
    # replication slots while base data was only ~32Mi (pg_wal alone reached
    # 1.4Gi), tripping CNPG's low-disk guard. Postgres then refused to start on
    # all three instances ("Not enough disk space"), so the coroot-db Cluster
    # never went Ready and the `infrastructure` Kustomization's health check
    # timed out — wedging infrastructure -> apps platform-wide. 10Gi gives WAL
    # ample headroom; the longhorn StorageClass has allowVolumeExpansion=true, so
    # CNPG (1.29) resizes the existing PVCs in place — no recreation needed.
    size: 10Gi
    storageClass: longhorn
  postgresql:
    parameters:
      # Bound replication-slot WAL retention so a replica that is down during a
      # node roll (Talos upgrade / autoscaler churn) can no longer retain WAL
      # without limit and re-fill the data volume — the root cause of the wedge
      # above. Beyond this, CNPG invalidates the lagging slot and re-syncs that
      # replica from a base backup (cheap: the DB is ~32Mi). Set well above
      # normal WAL for this low-write metadata DB, yet well below the 10Gi volume.
      max_slot_wal_keep_size: "3GB"
      # Enable pg_stat_statements for Coroot's per-query latency/calls view. CNPG's
      # managed-extensions feature keys off any pg_stat_statements.* parameter: it
      # adds the library to shared_preload_libraries (a one-time rolling restart)
      # AND runs CREATE EXTENSION IF NOT EXISTS in every database automatically —
      # fully declarative, no Job or superuser step.
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: all
    # Quorum-based SYNCHRONOUS replication — the SAME rationale as umami-db: it
    # guarantees the promoted standby holds every committed transaction, so an
    # unclean primary loss during a longhorn instance-manager restart / node roll
    # can no longer fork the timeline and strand the old primary on a pg_rewind
    # "could not find common ancestor" loop (observed cluster-wide 2026-06-19).
    # `dataDurability: preferred` relaxes to async if BOTH standbys are down, so
    # the HA Coroot server's metadata DB stays writable rather than blocking.
    synchronous:
      method: any
      number: 1
      dataDurability: preferred
  bootstrap:
    initdb:
      database: coroot
      owner: coroot
  # Grant the existing `coroot` login membership in pg_monitor so the cluster-agent
  # (which logs in AS the coroot role via coroot-db-app) can read the full
  # pg_stat_* surface. passwordSecret pins the role to the CNPG-generated
  # coroot-db-app value the server already uses, so CNPG's role synchronizer
  # converges to it on every reconcile/promotion (a no-op here, since CNPG owns
  # that Secret) rather than re-applying a stale bootstrap password. pg_monitor is
  # read-only — a minimal addition to a login the Coroot server already holds.
  managed:
    roles:
      - name: coroot
        ensure: present
        login: true
        inRoles:
          - pg_monitor
        passwordSecret:
          name: coroot-db-app
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  # Off-cluster DB backup to Cloudflare R2 (continuous WAL archiving + base
  # backups, so PITR is possible) via the Barman Cloud Plugin — the supported
  # replacement for the in-tree spec.backup.barmanObjectStore (deprecated in CNPG
  # 1.26, removed in 1.30). The R2 destination, the `coroot-db-backup-r2`
  # credentials (db-backup-external-secret.yaml, OpenBao infrastructure/backup/r2
  # — the SAME creds Velero/umami use) and retention live in the ObjectStore CR
  # (db-object-store.yaml); the daily base backup is driven by
  # db-scheduled-backup.yaml. Egress to R2 is opened in networkpolicy.yaml (the
  # plugin injects a barman-cloud sidecar into these instance pods).
  # isWALArchiver routes WAL archiving through the plugin.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: coroot-db
