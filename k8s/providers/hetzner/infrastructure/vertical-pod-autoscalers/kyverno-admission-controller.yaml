# VPA target for the kyverno admission controller (shared policy applied via
# kustomization.yaml patches). Its VPA is patched to RequestsOnly so the
# HelmRelease's explicit 1Gi memory limit remains the fail-closed admission
# safety guard while VPA right-sizes the request.
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: kyverno-admission-controller
  namespace: kyverno
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kyverno-admission-controller
