# VPA targets for kube-system. The shared updatePolicy + resourcePolicy is
# applied ONCE via patches in kustomization.yaml (so it is not repeated per
# workload); each entry here is just a targetRef. DaemonSets carry
# `vpa-tier: daemonset` so the patch can give them the tighter per-node ceiling.
# Mirror pods (kube-apiserver/etcd/scheduler/controller-manager) are bare Pods,
# not controllers, so they are intentionally absent — VPA cannot target them.
#
# --- Deployments ---
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cilium-operator
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cilium-operator
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cluster-autoscaler-hetzner-cluster-autoscaler
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cluster-autoscaler-hetzner-cluster-autoscaler
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: coredns
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coredns
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: hcloud-cloud-controller-manager
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hcloud-cloud-controller-manager
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: hcloud-csi-controller
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hcloud-csi-controller
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: hubble-relay
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hubble-relay
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: hubble-ui
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hubble-ui
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: metrics-server
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: snapshot-controller
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: snapshot-controller
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: tetragon-operator
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tetragon-operator
# --- DaemonSets (vpa-tier: daemonset → tighter maxAllowed so a per-node pod
#     still fits the smallest autoscale-cx23 worker) ---
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cilium
  namespace: kube-system
  labels:
    vpa-tier: daemonset
spec:
  targetRef:
    apiVersion: apps/v1
    kind: DaemonSet
    name: cilium
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cilium-envoy
  namespace: kube-system
  labels:
    vpa-tier: daemonset
spec:
  targetRef:
    apiVersion: apps/v1
    kind: DaemonSet
    name: cilium-envoy
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: hcloud-csi-node
  namespace: kube-system
  labels:
    vpa-tier: daemonset
spec:
  targetRef:
    apiVersion: apps/v1
    kind: DaemonSet
    name: hcloud-csi-node
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: spire-agent
  namespace: kube-system
  labels:
    vpa-tier: daemonset
spec:
  targetRef:
    apiVersion: apps/v1
    kind: DaemonSet
    name: spire-agent
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: tetragon
  namespace: kube-system
  labels:
    vpa-tier: daemonset
spec:
  targetRef:
    apiVersion: apps/v1
    kind: DaemonSet
    name: tetragon
# --- StatefulSet: spire-server is a singleton on an RWO volume; the
#     kustomization patch overrides its updateMode to Initial (never evict). ---
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: spire-server
  namespace: kube-system
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: spire-server
