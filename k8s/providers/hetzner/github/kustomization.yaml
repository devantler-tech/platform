# Declarative GitHub management — the devantler-tech org's GitHub state
# (repositories, rulesets, labels, …) as Crossplane managed resources. This
# layer holds the ENGINE + the .github TENANT wiring; the desired-state managed
# resources themselves live in the devantler-tech/.github repo under deploy/ and
# are pulled in as a cosign-signed OCI artifact (sync.yaml). See
# docs/github-management.md.
#
# Applied by its OWN Flux Kustomization (`github`, see
# k8s/clusters/prod/github-flux-kustomization.yaml), NOT the health-gated
# `infrastructure` layer: GitHub org state is orthogonal to cluster workloads,
# and a stalled GitHub reconcile (credentials not seeded, GitHub API outage,
# .github not yet published) must never hold `infrastructure`/`apps` — and with
# them every merge-queue / tag deploy — red.
#
# Two parts:
#   ENGINE (cluster infra) — provider.yaml (the provider package + runtime),
#     managed-resource-activation-policy.yaml (activate only the namespaced MRDs
#     we use), seed-github-app.yaml (seed the GitHub App credential into OpenBao).
#   TENANT (.github) — namespace, ServiceAccount + least-privilege Role/Binding,
#     ghcr pull + GitHub App credential ExternalSecrets, the namespaced
#     ProviderConfig, and the OCIRepository + Kustomization that pull and apply
#     the org's managed resources as the tenant SA.
#
# Crossplane core (the controller) lives one layer earlier in
# ../infrastructure/controllers/crossplane/. On a FRESH install the first
# reconcile here fails benignly (the namespaced CRDs only exist once the Provider
# package + activation policy have run; the OCI artifact only exists once .github
# has published a v* release) and converges on the next retries.
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Engine (cluster infra)
  - provider.yaml
  - managed-resource-activation-policy.yaml
  - seed-github-app.yaml
  # Tenant (.github)
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - ghcr-auth-externalsecret.yaml
  - external-secret.yaml
  - provider-config.yaml
  - sync.yaml
