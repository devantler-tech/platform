# Materializes the provider-upjet-github credentials Secret from OpenBao.
# The provider expects ONE JSON document ({"app_auth":[…],"owner":…}) whose
# pem_file value carries \n-escaped newlines — the template builds it from the
# three plain keys seeded by seed-github-app.yaml (toJson does the escaping),
# so the PEM can live in OpenBao/SOPS as a normal multiline string.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-app-credentials
  namespace: github-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: github-app-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        credentials: '{"app_auth":[{"id":"{{ .app_id }}","installation_id":"{{ .installation_id }}","pem_file":{{ .pem | toJson }}}],"owner":"devantler-tech"}'
  data:
    - secretKey: app_id
      remoteRef:
        key: infrastructure/github/app
        property: app_id
    - secretKey: installation_id
      remoteRef:
        key: infrastructure/github/app
        property: installation_id
    - secretKey: pem
      remoteRef:
        key: infrastructure/github/app
        property: pem
