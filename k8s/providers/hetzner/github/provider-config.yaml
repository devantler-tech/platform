# Namespaced ProviderConfig (Crossplane v2): authenticates provider-upjet-github
# against the devantler-tech org as a GitHub App (not a PAT — short-lived
# installation tokens, org-scoped, survives personal-account changes). Living in
# the github-config namespace, it is referenced by the namespaced Repository/…
# managed resources in their own namespace, so no cluster-scoped config is
# needed. The credentials Secret is local (same namespace), materialized by
# external-secret.yaml from OpenBao.
apiVersion: github.m.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  namespace: github-config
spec:
  credentials:
    source: Secret
    secretRef:
      name: github-app-credentials
      key: credentials
