# One file per managed repository. Adoption is Observe-first (the Crossplane
# import flow): every repo starts with managementPolicies: ["Observe"] —
# read-only, zero risk to the live repo — and is flipped to ["*"] only after
# its spec.forProvider has been backfilled from status.atProvider. Keep
# deletionPolicy: Orphan on every repo even when fully managed, so no Flux
# prune or CR mishap can ever delete a real GitHub repository.
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - platform.yaml
  - ksail.yaml
