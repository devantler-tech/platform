apiVersion: repo.github.upbound.io/v1alpha1
kind: Repository
metadata:
  name: platform
  annotations:
    # Binds this CR to the EXISTING devantler-tech/platform repository
    # (owner comes from the ProviderConfig credentials).
    crossplane.io/external-name: platform
spec:
  # Observe-only while adopting: Crossplane fills status.atProvider and never
  # writes to GitHub. Flip to ["*"] after backfilling forProvider — see
  # repositories/kustomization.yaml and docs/github-management.md.
  managementPolicies: ["Observe"]
  deletionPolicy: Orphan
  forProvider: {}
  providerConfigRef:
    name: default
