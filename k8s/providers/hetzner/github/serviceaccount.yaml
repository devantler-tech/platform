# The .github tenant's ServiceAccount. The tenant's Flux Kustomization (sync.yaml)
# runs AS this SA, so the GitHub managed resources are applied with exactly the
# namespace-scoped authority granted by rbac.yaml — nothing more. imagePullSecrets
# lets it pull the cosign-signed manifests artifact from GHCR.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-config
  namespace: github-config
  labels:
    app.kubernetes.io/managed-by: ksail
automountServiceAccountToken: false
imagePullSecrets:
  - name: ghcr-auth
