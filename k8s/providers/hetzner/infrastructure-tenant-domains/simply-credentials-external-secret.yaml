# simply.com DNS01 solver credential for the letsencrypt-prod ClusterIssuer's
# tenant-zone solver (see
# ../infrastructure/cluster-issuers/letsencrypt-prod-issuer.yaml). The solver
# expects exactly the two secret keys (account-name/api-key) in the Secret named
# by the ClusterIssuer's config.secretName.
#
# Delivered by the dedicated `infrastructure-tenant-domains` Flux Kustomization
# (wait: false, dependsOn: infrastructure) — NOT inline in the `infrastructure`
# layer. The value at apps/ascoachingogvaner/simply is seeded out-of-band by the
# maintainer, so under the infrastructure layer's `wait: true` this ExternalSecret
# sat InProgress ("secret does not exist") and wedged infrastructure → apps
# cluster-wide until the seed landed. dependsOn: infrastructure still guarantees
# the vault-config Job has granted the external-secrets role read access to this
# path (the app-ascoachingogvaner-readonly policy) and the `openbao`
# ClusterSecretStore exists before this reconciles, so there is no 403 deadlock;
# moving lanes only removes the health-gate. See the Flux Kustomization header
# (k8s/clusters/prod/tenant-domains-flux-kustomization.yaml).
#
# The webhook Deployment that consumes this Secret stays in
# `infrastructure-controllers` (../infrastructure/controllers/simply-dns-webhook/);
# it reads the Secret only at DNS01-solve time, so it does not need it to Ready.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: simply-credentials
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: simply-credentials
    creationPolicy: Owner
  data:
    # The credential is tenant-owned, so it lives under the tenant's apps/ path
    # (covered by app-ascoachingogvaner-readonly on the ClusterSecretStore role).
    - secretKey: account-name
      remoteRef:
        key: apps/ascoachingogvaner/simply
        property: account_name
    - secretKey: api-key
      remoteRef:
        key: apps/ascoachingogvaner/simply
        property: api_key
