# Tenant-owned custom-domain certificate terminated on the shared platform
# Gateway (the https-ascoachingogvaner-dk listeners added by
# ../infrastructure/ascoachingogvaner-dk-listeners-patch.yaml reference the
# ascoachingogvaner-dk-tls Secret this Certificate issues). Delivered by the
# `infrastructure-tenant-domains` Flux Kustomization (wait: false) so the
# minutes-to-hours ACME DNS01 issuance does not health-gate the infrastructure
# layer — see k8s/clusters/prod/tenant-domains-flux-kustomization.yaml.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ascoachingogvaner-dk
  namespace: kube-system
spec:
  secretName: ascoachingogvaner-dk-tls
  dnsNames:
    - ascoachingogvaner.dk
    - www.ascoachingogvaner.dk
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    # Hardcoded (not ${issuer_name}): this zone is DNS-hosted at simply.com,
    # so only the letsencrypt-prod issuer (with its simply.com DNS01 solver —
    # see ../infrastructure/cluster-issuers/) can validate it; the Cloudflare
    # Origin CA alternative doesn't apply to non-Cloudflare zones.
    name: letsencrypt-prod
