# Reconciles the `unifi` tenant — see providers/hetzner/unifi/ — via its OWN
# Flux Kustomization rather than the `apps` layer.
#
# Why isolated: the tenant's `Terraform` CR reconciles an EXTERNAL system (the
# UniFi controller API). If the controller is unreachable or a plan is pending
# manual approval, that resource is not Ready. Folding it into the wait-gated
# `apps` layer would couple every app deploy to UniFi readiness; a dedicated
# Kustomization keeps a UniFi stall from ever blocking app rollouts (same
# rationale as overprovisioning-flux-kustomization.yaml).
#
# `wait: false` — Ready once the tenant manifests APPLY; the Terraform CR's own
# status reports plan/apply/drift state, which is not an apps-blocking signal.
#
# dependsOn infrastructure: needs both the `Terraform` CRD (tofu-controller, in
# infrastructure-controllers) AND the `openbao` ClusterSecretStore that the
# tenant's ExternalSecret reads (an infrastructure-layer resource). The
# infrastructure layer dependsOn infrastructure-controllers, so depending on it
# covers both. No SOPS/postBuild needed — the only secret (the UniFi API key)
# comes from OpenBao via ExternalSecret; nothing in this path is encrypted or
# templated. GATE: seed `secret/infrastructure/unifi/controller` in OpenBao
# (see credentials-external-secret.yaml); until then the Terraform CR waits.
#
# Prod-only: the UniFi controller API is only reachable from Hetzner, so this
# file is wired into clusters/prod only.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unifi
  namespace: flux-system
spec:
  interval: 60m
  timeout: 5m
  retryInterval: 2m
  path: providers/hetzner/unifi
  sourceRef:
    kind: OCIRepository
    name: flux-system
  dependsOn:
    - name: infrastructure
  # Apply-only (see header). A pending plan / unreachable controller must not
  # turn this red in a way that blocks other layers.
  wait: false
  prune: true
  force: true
