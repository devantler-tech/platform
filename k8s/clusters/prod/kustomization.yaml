---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  # Prod-only: applies the over-provisioning buffer outside the health-gated
  # `infrastructure` layer (its pause pods are expected-Pending at the
  # autoscaler ceiling and must not hold deploys red) — see the file header.
  - overprovisioning-flux-kustomization.yaml
  # Prod-only: declarative GitHub org management (Crossplane managed
  # resources), isolated in its own Flux Kustomization so a GitHub-side stall
  # never holds the infrastructure→apps deploy chain red — see the file header.
  - github-flux-kustomization.yaml

# Template inputs for this cluster. cluster-meta drives the replacements
# below; it is annotated local-config and never applied to the cluster.
patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cluster-meta
        namespace: flux-system
      data:
        cluster_name: prod
        provider: hetzner
  # Prod has heavier components (Longhorn, Coroot's operator + ClickHouse +
  # Prometheus, etc.) that need more time to reconcile than the 3m base
  # timeout allows; adding margin gives the full chain
  # (infrastructure-controllers → infrastructure → apps) room to complete
  # within the ksail connection.timeout (30m).
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: infrastructure-controllers
        namespace: flux-system
      spec:
        timeout: 25m
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: infrastructure
        namespace: flux-system
      spec:
        timeout: 20m
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: apps
        namespace: flux-system
      spec:
        timeout: 20m

replacements:
  # Point apps / infrastructure / infrastructure-controllers Flux Kustomizations
  # at the provider directory for this cluster.
  - source:
      kind: ConfigMap
      name: cluster-meta
      fieldPath: data.provider
    targets:
      - select:
          kind: Kustomization
          namespace: flux-system
        reject:
          # bootstrap uses a __CLUSTER__ path (rewritten by cluster_name below),
          # not a __PROVIDER__ path, so exclude it from the provider rewrite.
          - name: bootstrap
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 1
  # Point the bootstrap Flux Kustomization at this cluster's bootstrap directory.
  - source:
      kind: ConfigMap
      name: cluster-meta
      fieldPath: data.cluster_name
    targets:
      - select:
          kind: Kustomization
          namespace: flux-system
          name: bootstrap
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 1
