---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../bases/cluster

# Template inputs for this cluster. cluster-meta drives the replacements
# below; it is annotated local-config and never applied to the cluster.
patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cluster-meta
        namespace: flux-system
      data:
        cluster_name: prod
        provider: hetzner
  # Prod has heavier components (Longhorn, etc.) that need more time to
  # reconcile than the 3m base timeout allows. kube-prometheus-stack has a
  # 15m HelmRelease timeout itself; adding margin gives the full chain
  # (infrastructure-controllers → infrastructure → apps) room to complete
  # within the ksail connection.timeout (30m).
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: infrastructure-controllers
        namespace: flux-system
      spec:
        timeout: 25m
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: infrastructure
        namespace: flux-system
      spec:
        timeout: 20m
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: apps
        namespace: flux-system
      spec:
        timeout: 20m

replacements:
  # Point apps / infrastructure / infrastructure-controllers Flux Kustomizations
  # at the provider directory for this cluster.
  - source:
      kind: ConfigMap
      name: cluster-meta
      fieldPath: data.provider
    targets:
      - select:
          kind: Kustomization
          namespace: flux-system
        reject:
          - name: variables
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 1
  # Point the variables Flux Kustomization at this cluster's variables directory.
  - source:
      kind: ConfigMap
      name: cluster-meta
      fieldPath: data.cluster_name
    targets:
      - select:
          kind: Kustomization
          namespace: flux-system
          name: variables
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 1
