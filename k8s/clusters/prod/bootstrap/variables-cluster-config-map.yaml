---
apiVersion: v1
kind: ConfigMap
metadata:
  name: variables-cluster
  namespace: flux-system
data:
  cluster_name: prod
  domain: platform.devantler.tech
  github_app_client_id: Iv23limfvbk93bAXZI6b
  issuer_group: cert-manager.io
  issuer_kind: ClusterIssuer
  issuer_name: letsencrypt-prod
  # Per-env prefixes inside the shared R2 bucket.
  r2_prefix_velero: velero/prod
  # --- Critical controllers (2 replicas for HA; the require-replica-floor minimum) ---
  # With VPA updateMode=InPlaceOrRecreate, single-replica services get 502s during
  # eviction. The replica-floor (#1898/#1900) wants 2 so a maxUnavailable: 1 PDB +
  # topology spread keep one pod serving through a node drain. These run leader
  # election or are stateless/admission webhooks, so the second replica is a cheap
  # warm standby (3-replica HA, to also survive a concurrent failure, is opt-in).
  # cert_manager_replicas drives the controller, webhook AND cainjector; the keda
  # vars drive the operator, admission webhooks, HTTP scaler and interceptor floor.
  cert_manager_replicas: "2"
  metrics_server_replicas: "2"
  vpa_admission_replicas: "2"
  keda_operator_replicas: "2"
  keda_webhooks_replicas: "2"
  keda_scaler_replicas: "2"
  keda_interceptor_min_replicas: "2"
  # --- Leader-elected operators (2 replicas for HA; the require-replica-floor minimum) ---
  # One replica is active; the other is a warm standby that takes over on a node
  # failure/drain. velero stays 1 — its chart hardcodes replicas: 1 and it has
  # no leader election (multiple servers would double-run backups); cilium
  # operator is 2 (chart-managed, leader-elected).
  trust_manager_replicas: "2"
  reloader_replicas: "2"
  cilium_replicas: "2"
  velero_replicas: "1"
  cloudnative_pg_replicas: "2"
  # KEDA-managed apps: HelmRelease replicas are the initial value only;
  # KEDA HTTPScaledObject overrides at runtime. Setting the initial to 1
  # saves memory until the first KEDA reconciliation.
  # headlamp: min 0, max 1 (OIDC state in-memory — must stay single-pod)
  # whoami/fleetdm: min 0, max 2
  # actual-budget: parked at 0/0 (unused; SQLite on RWO PVC keeps max≤1 when re-enabled)
  headlamp_replicas: "1"
  whoami_replicas: "1"
  fleetdm_replicas: "1"
  # Standalone MySQL (no replication). The bitnami replication topology causes
  # VPA `InPlaceOrRecreate` evictions to drop DDL connections mid-migration on
  # initial install (3 mysql pods churning simultaneously). Standalone is
  # simpler, faster to install, and Hetzner CSI snapshots/Velero handle DR.
  fleetdm_mysql_architecture: "standalone"
  fleetdm_mysql_secondary_replicas: "0"
  fleetdm_redis_architecture: "standalone"
  fleetdm_redis_replicas: "0"
  # Parked: HelmRelease starts at 0; KEDA holds it at 0 (min=0) but can spin up
  # 1 pod on a stray HTTP hit (max=1) since KEDA HTTP rejects max=0 at the
  # translated ScaledObject layer (MinReplicaCount=1 must be less than
  # MaxReplicaCount=0). SQLite on RWO PVC requires max <= 1 even when re-enabled.
  # To re-enable as actively-served, set:
  #   actual_budget_replicas: "1"
  #   actual_budget_replicas_min: "1"
  #   actual_budget_replicas_max: "1"
  actual_budget_replicas: "0"
  actual_budget_replicas_min: "0"
  actual_budget_replicas_max: "1"
  hubble_ui_replicas: "1"
  # OpenCost (FinOps cost API/UI): 2 replicas for node-failure resilience
  # (Coroot flagged opencost-primary as a single instance). It is a Flagger
  # canary WITHOUT a KEDA autoscalerRef, so Flagger sizes opencost-primary from
  # this pinned chart replica count (not from a ScaledObject); paired with a
  # drain-safe PDB + topology spread in the opencost base.
  opencost_replicas: "2"
  # Auth chain: 2 replicas for HA (the require-replica-floor minimum). User-facing
  # auth survives a node drain; also prevents 502s during VPA InPlaceOrRecreate
  # evictions.
  dex_replicas: "2"
  oauth2_proxy_replicas: "2"
  auth_proxy_replicas: "2"
  # --- Hetzner Cloud ---
  hetzner_lb_location: "fsn1"
  hetzner_lb_type: "lb11"
  hcloud_network: "prod-network"
  # --- Contact ---
  admin_email: "ned@devantler.tech"
  # Leader-elected controllers: 2 replicas for HA (the require-replica-floor minimum).
  hcloud_ccm_replicas: "2"
  hcloud_csi_controller_replicas: "2"
  # external-snapshotter control plane (kube-system snapshot-controller);
  # leader-elected, so extra replicas are warm standbys.
  snapshot_controller_replicas: "2"
  # --- Longhorn distributed storage ---
  # All 3 static workers carry Longhorn disks (labeled with
  # node.longhorn.io/create-default-disk=true). Replica count matches the
  # worker count (3), so every volume is fully replicated across all storage
  # nodes.
  longhorn_replica_count: "3"
  # The snapshot.storage.k8s.io CRDs are now installed cluster-wide by the
  # snapshot-controller HelmRelease (providers/hetzner/infrastructure/
  # controllers/snapshot-controller), so the CSI snapshotter no longer
  # crash-loops. Run it (1 replica, leader-elected) to service the
  # VolumeSnapshots Velero creates for CSI backups of Longhorn volumes.
  longhorn_csi_snapshotter_replicas: "1"
  # CSI control-plane sidecars (attacher/provisioner/resizer) default to a
  # single replica in the base HelmRelease. They are leader-elected, so a
  # second replica is a cheap warm standby that costs ~nothing when idle.
  # Run 2 for HA: on 2026-05-28 the sole csi-attacher/provisioner happened to
  # sit on a worker whose Cilium ClusterIP datapath had degraded, which took
  # out volume attach/detach orchestration cluster-wide (FailedAttachVolume
  # storms, pods stuck ContainerCreating). A standby on another node keeps CSI
  # functioning through a single-node outage.
  longhorn_csi_attacher_replicas: "2"
  longhorn_csi_provisioner_replicas: "2"
  longhorn_csi_resizer_replicas: "2"
  # The longhorn-ui (longhorn-frontend) is the web dashboard only — it is NOT in
  # the storage data path (longhorn-manager, the CSI sidecars, and the
  # instance-managers run the data plane and never touch the UI). It is wired for
  # KEDA HTTP scale-to-zero like hubble-ui, so this is the INITIAL replica count
  # only: the longhorn-ui HTTPScaledObject (providers/hetzner/infrastructure/
  # http-scaled-objects/longhorn.yaml) owns /spec/replicas at runtime — held at 0
  # while idle, scaled 0->1 on the first request to longhorn.${domain} (Gateway ->
  # oauth2-proxy -> auth-proxy -> KEDA interceptor -> longhorn-ui), then back to 0
  # after the scaledownPeriod. Start at 0 to avoid running the pod until first use.
  # (Flux drift detection ignores Deployment /spec/replicas, so it won't fight KEDA.)
  longhorn_ui_replicas: "0"
  # --- Non-essential services scaled to 0 ---
  # Origin CA issuer requests 1 CPU (50% of worker allocatable) for a simple
  # cert controller. Disabled until we actually need Cloudflare Origin certs.
  origin_ca_issuer_replicas: "0"
  # VPA recommender computes resource recommendations; admission controller
  # applies them at pod start. Updater evicts pods to apply new resource
  # recommendations continuously.
  # 2 replicas: recommender/updater are leader-elected (helm-release
  # extraArgs leader-elect: true) and sit on no serving path — a failover
  # gap only delays the next recommendation/eviction cycle. Active + one
  # warm standby with a maxUnavailable: 1 PDB (helm-release) still rides
  # out a node drain.
  vpa_recommender_replicas: "2"
  vpa_updater_replicas: "2"
  # --- Kyverno (leader-elected controllers) ---
  # background runs 2 (active + warm standby): it executes the generate/mutate-
  # existing rules the platform leans on (e.g. propagate-reloader-to-flagger-
  # primary), so keep a standby for it even though it is off every serving path.
  kyverno_background_replicas: "2"
  # reports/cleanup run 2 (active + warm standby, maxUnavailable: 1 PDB):
  # report generation and cleanup are best-effort background work off every
  # serving path.
  kyverno_reports_replicas: "2"
  kyverno_cleanup_replicas: "2"
  # --- Flagger (2 replicas for HA; gated by leaderElection.enabled) ---
  flagger_replicas: "2"
  # --- OpenBao secrets vault ---
  # 3-node Raft HA (quorum minimum; tolerates 1 failure). Stays 3 regardless of
  # the require-replica-floor minimum — Raft needs an odd member count, and 2
  # tolerates zero failures. See the cutover runbook
  # docs/dr/openbao-raft-ha-migration.md.
  openbao_replicas: "3"
  openbao_storage_size: 10Gi
  # --- External Secrets Operator (2 replicas for HA; the require-replica-floor minimum) ---
  # Drives the controller, webhook and cert-controller. Controller + cert-controller
  # are leader-elected and the webhook is stateless, so the second replica is a warm
  # standby that keeps the operator available through a node drain.
  external_secrets_replicas: "2"
