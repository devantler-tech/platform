# Applies the over-provisioning ("spare room") buffer — see
# providers/hetzner/infrastructure-overprovisioning/ — via its OWN Flux
# Kustomization instead of the `infrastructure` layer.
#
# Why it cannot ride along in `infrastructure`: that layer reconciles with
# `wait: true`, which health-checks EVERY applied resource (Flux has no
# per-resource opt-out). The buffer's low-priority pause pods are EXPECTED to
# sit Pending whenever the Cluster Autoscaler is at maxNodesTotal (the buffer
# exists precisely to be the first thing squeezed out at the capacity ceiling),
# and kstatus reports a ReplicaSet with Pending pods as InProgress forever.
# That single expected-Pending placeholder held `infrastructure` (and its
# `apps` dependent, and with them every merge-queue / tag deploy, which waits
# for all Kustomizations to turn Ready) red for ~30h on 2026-06-09/10.
#
# `wait: false` means this Kustomization is Ready once the buffer manifests
# APPLY cleanly — pod schedulability is explicitly not a health signal here.
# The directory also carries the cluster-proportional-autoscaler HelmRelease
# that scales the buffer's ReplicaSet with cluster size; the helm-controller
# health-gates that release on its own, independent of this `wait: false`.
# This is the one sanctioned exception to the `enforce-flux-best-practices`
# Kyverno policy's `wait: true` rule; the policy excludes this Kustomization by
# name (see bases/infrastructure/cluster-policies/flux/).
#
# Prod-only: the buffer targets the Hetzner autoscaler pools, so this file is
# wired into clusters/prod only (no docker/local counterpart). The path is
# still provider-templated by the cluster overlay's `replacements`, which is a
# no-op for prod (hetzner → hetzner).
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-overprovisioning
  namespace: flux-system
spec:
  interval: 60m
  # Apply-only (no health checking), so a short timeout is plenty.
  timeout: 5m
  retryInterval: 2m
  path: providers/hetzner/infrastructure-overprovisioning
  sourceRef:
    kind: OCIRepository
    name: flux-system
  # After `infrastructure` so the Kyverno mutation/validation policies that
  # shape pods (PSS, resource defaults, ns quotas) exist before the buffer's
  # namespace and ReplicaSet are first created on a fresh cluster. No circular
  # dependency: `infrastructure` no longer contains the buffer.
  dependsOn:
    - name: infrastructure
  # Deliberately NOT `wait: true` — see the file header.
  wait: false
  prune: true
  force: true
