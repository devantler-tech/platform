---
apiVersion: v1
kind: ConfigMap
metadata:
  name: variables-cluster
  namespace: flux-system
data:
  domain: platform.devantler.tech
  github_app_client_id: Iv23limfvbk93bAXZI6b
  issuer_group: cert-manager.k8s.cloudflare.com
  issuer_kind: ClusterOriginIssuer
  issuer_name: cloudflare-origin
  # Per-env prefixes inside the shared R2 bucket so dev/prod don't collide.
  r2_prefix_velero: velero/prod
  r2_prefix_cnpg: cnpg/prod
  # --- HA replica overrides for the 3× CX23 prod cluster ---
  # User-facing path keeps the default of 2 replicas for zero-downtime
  # rolling updates (homepage, headlamp, whoami, dex, oauth2-proxy,
  # auth-proxy, kyverno admission).
  # Operators are leader-elected; 1 replica is sufficient — a brief blip
  # during a rolling upgrade of the operator itself does not affect the
  # data plane. Dropping them to 1 frees CPU headroom on the 6 vCPU
  # total available after Talos + Cilium overhead.
  cert_manager_replicas: "1"
  trust_manager_replicas: "1"
  reloader_replicas: "1"
  metrics_server_replicas: "1"
  vpa_admission_replicas: "1"
  cilium_replicas: "1"
  velero_replicas: "1"
  cloudnative_pg_replicas: "1"
  alertmanager_replicas: "1"
  # --- Hetzner Cloud Load Balancer ---
  hetzner_lb_location: "fsn1"
  hetzner_lb_type: "lb11"
  # --- Hetzner Cloud Network ---
  hcloud_network: "prod-network"
  # --- Longhorn distributed storage ---
  longhorn_replica_count: "2"
  # --- Node Autoscaler (Hetzner Cluster Autoscaler) ---
  # Talos snapshot ID on Hetzner Cloud — created from the Talos Image
  # Factory hcloud image. Must be updated when Talos is upgraded.
  # See docs/node-autoscaling.md for the snapshot creation process.
  autoscaler_talos_image: "PLACEHOLDER"
  autoscaler_small_server_type: "cx23"
  autoscaler_small_pool_min: "0"
  autoscaler_small_pool_max: "1"
  autoscaler_medium_server_type: "cx33"
  autoscaler_medium_pool_min: "0"
  autoscaler_medium_pool_max: "1"
  autoscaler_location: "fsn1"
  # Hard ceiling: max nodes in the cluster (total, including KSail-
  # managed CPs and static workers). Hetzner limit is 5 servers/project.
  autoscaler_max_nodes_total: "5"

