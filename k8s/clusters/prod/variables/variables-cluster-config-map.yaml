---
apiVersion: v1
kind: ConfigMap
metadata:
  name: variables-cluster
  namespace: flux-system
data:
  cluster_name: prod
  domain_regex: platform\.devantler\.tech
  domain: platform.devantler.tech
  github_app_client_id: Iv23limfvbk93bAXZI6b
  issuer_group: cert-manager.io
  issuer_kind: ClusterIssuer
  issuer_name: letsencrypt-prod
  # Per-env prefixes inside the shared R2 bucket.
  r2_prefix_velero: velero/prod
  r2_prefix_cnpg: cnpg/prod
  # --- Critical controllers (2 replicas for HA during VPA evictions) ---
  # With VPA updateMode=InPlaceOrRecreate, single-replica services get 502s
  # during eviction. User-facing auth and admission webhooks need 2+ replicas.
  # TEMP (stabilization): trimmed 2->1 to free worker memory+CPU so the Velero
  # node-agent DaemonSet can schedule, unblocking infrastructure-controllers and
  # letting the lowered auto-vpa floor reconcile. Restore to "2" once prod has
  # headroom.
  # Operational risk (accepted, temporary): cert-manager runs an admission
  # webhook (failurePolicy=Fail). At 1 replica, a restart/rollout briefly makes
  # the webhook unavailable, which blocks admission of cert-manager.io resources
  # (Certificate/Issuer) and delays cert issuance/renewal until it recovers.
  # This is control-plane only (no data-plane / user-facing 502s) and the window
  # is short, so it is acceptable purely as a stabilization measure.
  cert_manager_replicas: "1"
  metrics_server_replicas: "2"
  vpa_admission_replicas: "2"
  keda_operator_replicas: "2"
  keda_webhooks_replicas: "2"
  keda_scaler_replicas: "2"
  keda_interceptor_min_replicas: "2"
  # --- Non-critical operators (1 replica — leader-elected) ---
  # Brief blip during rolling upgrade does not affect data plane.
  trust_manager_replicas: "1"
  reloader_replicas: "1"
  cilium_replicas: "2"
  velero_replicas: "1"
  cloudnative_pg_replicas: "1"
  # Homepage: 2 replicas for HA during VPA evictions (it is behind oauth2-proxy
  # and cannot use KEDA HTTP scale-to-zero).
  homepage_replicas: "2"
  # KEDA-managed apps: HelmRelease replicas are the initial value only;
  # KEDA HTTPScaledObject overrides at runtime. Setting the initial to 1
  # saves memory until the first KEDA reconciliation.
  # headlamp: min 0, max 1 (OIDC state in-memory — must stay single-pod)
  # whoami/fleetdm: min 0, max 2
  # actual-budget: min 1, max 1 (SQLite on RWO PVC — no scale-to-zero)
  headlamp_replicas: "1"
  whoami_replicas: "1"
  fleetdm_replicas: "1"
  # Standalone MySQL (no replication). The bitnami replication topology causes
  # VPA `InPlaceOrRecreate` evictions to drop DDL connections mid-migration on
  # initial install (3 mysql pods churning simultaneously). Standalone is
  # simpler, faster to install, and Hetzner CSI snapshots/Velero handle DR.
  fleetdm_mysql_architecture: "standalone"
  fleetdm_mysql_secondary_replicas: "0"
  fleetdm_redis_architecture: "standalone"
  fleetdm_redis_replicas: "0"
  actual_budget_replicas: "1"
  hubble_ui_replicas: "1"
  # Auth chain: 2 replicas for HA during VPA evictions (prevents 502s).
  dex_replicas: "2"
  oauth2_proxy_replicas: "2"
  auth_proxy_replicas: "2"
  # --- Hetzner Cloud ---
  hetzner_lb_location: "fsn1"
  hetzner_lb_type: "lb11"
  hcloud_network: "prod-network"
  # --- Contact ---
  admin_email: "ned@devantler.tech"
  # Leader-elected controllers: 1 replica is sufficient.
  hcloud_ccm_replicas: "1"
  hcloud_csi_controller_replicas: "1"
  # --- Longhorn distributed storage ---
  # All 3 static workers carry Longhorn disks (labeled with
  # node.longhorn.io/create-default-disk=true). Replica count matches
  # worker count so every volume is fully replicated across all nodes.
  longhorn_replica_count: "3"
  # VolumeSnapshot CRDs (snapshot.storage.k8s.io) are not installed; the
  # CSI snapshotter crash-loops trying to list them. Disable until CRDs
  # are added.
  longhorn_csi_snapshotter_replicas: "0"
  # --- Non-essential services scaled to 0 ---
  # Origin CA issuer requests 1 CPU (50% of worker allocatable) for a simple
  # cert controller. Disabled until we actually need Cloudflare Origin certs.
  origin_ca_issuer_replicas: "0"
  # VPA recommender computes resource recommendations; admission controller
  # applies them at pod start. Updater evicts pods to apply new resource
  # recommendations continuously.
  vpa_recommender_replicas: "1"
  vpa_updater_replicas: "1"
  # --- Kyverno ---
  kyverno_background_replicas: "1"
  kyverno_reports_replicas: "1"
  kyverno_cleanup_replicas: "1"
  # --- Alertmanager ---
  alertmanager_replicas: "1"
  # --- OpenBao secrets vault ---
  openbao_replicas: "1"
  openbao_storage_size: 10Gi
  # --- External Secrets Operator ---
  # TEMP (stabilization): trimmed 2->1 alongside cert_manager_replicas to break
  # the reconciliation deadlock (see comment above). Restore to "2" once prod
  # has headroom.
  # Operational risk (accepted, temporary): external-secrets runs an admission
  # webhook and a cert-controller. At 1 replica, a restart/rollout briefly makes
  # the webhook unavailable, which blocks admission of external-secrets.io
  # resources (ExternalSecret/SecretStore) and delays secret reconciliation.
  # This is control-plane only (no user-facing impact) and short-lived, so it is
  # acceptable purely as a stabilization measure.
  external_secrets_replicas: "1"

