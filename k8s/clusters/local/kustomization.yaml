---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../bases/cluster

# Template inputs for this cluster. cluster-meta drives the replacements
# below; it is annotated local-config and never applied to the cluster.
patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cluster-meta
        namespace: flux-system
      data:
        cluster_name: local
        provider: docker
  # Docker CI has slower startup for apps due to cold image cache.
  # Override the base apps timeout to allow more time for health checks.
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: apps
        namespace: flux-system
      spec:
        timeout: 20m
  # Docker CI has slower image pulls on cold runners. Increase the
  # infrastructure-controllers health-check timeout so VPA (5m default timeout)
  # and keda-http-add-on (10m timeout) can complete before the health check
  # fires, reducing the retry storm that can temporarily overload the API server.
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: infrastructure-controllers
        namespace: flux-system
      spec:
        timeout: 12m
  # The vault-config Job co-located in the infrastructure layer (see
  # bases/infrastructure/vault-config/job.yaml) bootstraps OpenBao —
  # KV engine, Kubernetes auth, policies, roles — and is depended on
  # intra-Kustomization by the openbao ClusterSecretStore consumers
  # (ExternalSecrets, vault-seed PushSecrets). On cold Docker CI runners
  # the Job legitimately takes longer than the 3m base health-check
  # budget, which caused system-test flakes (see PR #1636 run
  # 26603473269: `[Job/openbao/vault-config status: 'InProgress']
  # (HealthCheckFailed)`). The Job's own activeDeadlineSeconds is 3600s.
  # 20m mirrors the prod patch value for the same Kustomization.
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: infrastructure
        namespace: flux-system
      spec:
        timeout: 20m

replacements:
  # Point apps / infrastructure / infrastructure-controllers Flux Kustomizations
  # at the provider directory for this cluster.
  - source:
      kind: ConfigMap
      name: cluster-meta
      fieldPath: data.provider
    targets:
      - select:
          kind: Kustomization
          namespace: flux-system
        reject:
          - name: variables
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 1
  # Point the variables Flux Kustomization at this cluster's variables directory.
  - source:
      kind: ConfigMap
      name: cluster-meta
      fieldPath: data.cluster_name
    targets:
      - select:
          kind: Kustomization
          namespace: flux-system
          name: variables
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 1
