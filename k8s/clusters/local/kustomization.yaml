---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../bases/cluster

# Template inputs for this cluster. cluster-meta drives the replacements
# below; it is annotated local-config and never applied to the cluster.
patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cluster-meta
        namespace: flux-system
      data:
        cluster_name: local
        provider: docker

replacements:
  # Point apps / infrastructure / infrastructure-controllers Flux Kustomizations
  # at the provider directory for this cluster.
  - source:
      kind: ConfigMap
      name: cluster-meta
      fieldPath: data.provider
    targets:
      - select:
          kind: Kustomization
          namespace: flux-system
        reject:
          - name: variables
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 1
  # Point the variables Flux Kustomization at this cluster's variables directory.
  - source:
      kind: ConfigMap
      name: cluster-meta
      fieldPath: data.cluster_name
    targets:
      - select:
          kind: Kustomization
          namespace: flux-system
          name: variables
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 1
