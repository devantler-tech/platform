---
apiVersion: v1
kind: ConfigMap
metadata:
  name: variables-cluster
  namespace: flux-system
data:
  domain: dev.platform.devantler.tech
  github_app_client_id: Iv23lidTbdsQoKttGTUI
  issuer_group: cert-manager.k8s.cloudflare.com
  issuer_kind: ClusterOriginIssuer
  issuer_name: cloudflare-origin
  # Per-env prefixes inside the shared R2 bucket so dev/prod don't collide.
  r2_prefix_velero: velero/dev
  r2_prefix_cnpg: cnpg/dev
  # --- HA replica overrides for the 3× CX23 dev cluster ---
  # Mirrors prod: user-facing stays at 2 replicas, operators drop to 1
  # because they are leader-elected and single-replica operators are
  # sufficient for the stated RPO/RTO. This keeps the cluster within
  # CPU budget on the shared 6 vCPU footprint.
  cert_manager_replicas: "1"
  trust_manager_replicas: "1"
  reloader_replicas: "1"
  metrics_server_replicas: "1"
  vpa_admission_replicas: "1"
  cilium_replicas: "1"
  velero_replicas: "1"
  cloudnative_pg_replicas: "1"
  alertmanager_replicas: "1"
  # --- Hetzner Cloud Load Balancer ---
  hetzner_lb_location: "fsn1"
  hetzner_lb_type: "lb11"
  # --- Hetzner Cloud Network ---
  hcloud_network: "dev-network"
  # --- Longhorn distributed storage ---
  longhorn_replica_count: "2"

