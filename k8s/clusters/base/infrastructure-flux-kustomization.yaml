---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 60m
  timeout: 3m
  retryInterval: 2m
  path: providers/__PROVIDER__/infrastructure
  sourceRef:
    kind: OCIRepository
    name: flux-system
  dependsOn:
    - name: infrastructure-controllers
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      # Per-Flux docs, later entries override earlier ones, so the base
      # (defaults) come first and the per-cluster overrides come last.
      # The variables-base SECRET is deliberately absent: its only remaining
      # key (ghcr_dockerconfigjson) is seed-only (vault-seed PushSecrets read
      # the Secret object directly) — no manifest substitutes from it.
      - kind: ConfigMap
        name: variables-base
      - kind: ConfigMap
        name: variables-cluster
      - kind: Secret
        name: variables-cluster
  wait: true
  prune: true
  force: true
