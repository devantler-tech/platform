# Prod Talos + Hetzner cluster.
# See docs/TEMPLATING.md for the fields a fork of this repo needs to edit.
---
apiVersion: ksail.io/v1alpha1
kind: Cluster
metadata:
  name: prod
spec:
  cluster:
    distributionConfig: talos
    connection:
      context: admin@prod
      timeout: 15m
    distribution: Talos
    provider: Hetzner
    cni: Cilium
    gitOpsEngine: Flux
    # Delegate worker scaling to the in-cluster Cluster Autoscaler
    # (Hetzner provider). KSail installs and configures the autoscaler
    # natively when autoscaler.node.enabled is set. Initial static node
    # counts still apply on `cluster create`.
    # Workaround: nodeAutoscaling set alongside autoscaler.node.enabled
    # due to ksail#4507 (deprecated field default conflict).
    nodeAutoscaling: Enabled
    autoscaler:
      node:
        enabled: Enabled
        expander: Price
        maxNodesTotal: 10
        scaleDownUnneededTime: "10m"
        pools:
          - name: autoscale-small
            serverType: cx23
            location: fsn1
            min: 0
            max: 1
          - name: autoscale-medium
            serverType: cx33
            location: fsn1
            min: 0
            max: 1
    # These components are installed by ksail. There is a known race on
    # Hetzner clusters between ksail's metrics-server install and Flux's
    # kubelet-serving-cert-approver install (required because Talos
    # rotate-server-certificates: true leaves kubelet serving CSRs
    # pending). File upstream in devantler-tech/ksail if this trips
    # bootstrap again.
    certManager: Enabled
    metricsServer: Enabled
    policyEngine: Kyverno
    controlPlanes: 3
    # Baseline workers — guaranteed minimum even if autoscaler is down.
    # Longhorn requires dedicated Hetzner Cloud Volumes on static
    # workers; autoscaler-created nodes are compute-only.
    # The Cluster Autoscaler manages additional workers dynamically.
    workers: 3
    talos:
      # Pin Talos to match the ISO so 'ksail cluster update' doesn't attempt
      # an unwanted in-place upgrade to ksail's default version.
      version: v1.11.2
      # Hetzner Talos ISO (x86_64). Override to 122629 for ARM.
      iso: 122630
    localRegistry:
      registry: "devantler:${GHCR_TOKEN}@ghcr.io/devantler-tech/platform/manifests"
  provider:
    hetzner:
      controlPlaneServerType: cx23
      workerServerType: cx23
      location: fsn1
      networkCidr: 10.0.0.0/16
      placementGroupStrategy: Spread
      fallbackLocations:
        - nbg1
        - hel1
      placementGroupFallbackToNone: true
  workload:
    sourceDirectory: k8s
    kustomizationFile: clusters/prod
    tag: latest
