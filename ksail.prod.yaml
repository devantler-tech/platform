---
apiVersion: ksail.io/v1alpha1
kind: Cluster
metadata:
  name: prod
spec:
  cluster:
    distributionConfig: talos-prod
    connection:
      context: devantler-prod
      timeout: 10m
    distribution: Talos
    provider: Omni
    cni: Cilium
    gitOpsEngine: Flux
    omni:
      endpoint: "https://devantler.omni.siderolabs.io:443"
    localRegistry:
      registry: "${GITHUB_ACTOR}:${GITHUB_TOKEN}@ghcr.io/devantler-tech/platform"
  workload:
    sourceDirectory: k8s
    tag: latest
