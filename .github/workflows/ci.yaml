name: CI
on:
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      pull-requests: read # detect changed files
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔍 Filter paths
        uses: step-security/paths-filter@5c5241b8233e77b55b9046daf88f1cb7560281de # v4.0.1
        id: filter
        with:
          filters: |
            k8s:
              - 'k8s/**'
              - 'ksail.yaml'
              - 'ksail.dev.yaml'
              - '.sops.yaml'
              - 'talos-local/**'
              - 'talos-omni/**'
              - '.github/workflows/ci.yaml'

  system-test:
    name: 🧪 System Test
    needs: [changes]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read # checkout repository
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 System Test
        uses: devantler-tech/ksail/.github/actions/ksail-cluster@ac2749c8e8e6a690f62a2a4607eb6c6560cb0cc6 # v7.2.2
        with:
          distribution: Talos
          provider: Docker
          init: "false"
          validate: "true"
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          hosts-file: ${{ vars.HOSTS_FILE }}
          root-ca-cert-file: ${{ vars.ROOT_CA_CERT_FILE }}
          push: "true"
          # Reconcile handled by explicit step below so we can extend the
          # timeout past the action's built-in default (the HA/DR stack
          # adds Velero + MinIO + kube-prometheus-stack which can push
          # reconciliation past the default 5m budget on GHA runners).
          reconcile: "false"
          delete: "false"

      - name: 🔁 Reconcile with extended timeout
        id: reconcile
        run: ksail workload reconcile --timeout 30m

      - name: 🩺 Diagnose Flux on failure
        if: failure() && steps.reconcile.outcome == 'failure'
        run: |
          set +e
          echo "::group::Nodes"
          kubectl get nodes -o wide
          echo "::endgroup::"
          echo "::group::Flux Kustomizations"
          kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux HelmReleases"
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux OCIRepositories"
          kubectl get ocirepositories.source.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Failing Kustomizations describe"
          for k in infrastructure-controllers infrastructure apps; do
            echo "--- $k ---"
            kubectl describe kustomizations.kustomize.toolkit.fluxcd.io "$k" -n flux-system 2>&1 | tail -80
          done
          echo "::endgroup::"
          echo "::group::Flux controller pods"
          kubectl get pods -n flux-system -o wide
          echo "::endgroup::"
          echo "::group::kustomize-controller logs"
          kubectl logs -n flux-system -l app=kustomize-controller --tail=300
          echo "::endgroup::"
          echo "::group::helm-controller logs"
          kubectl logs -n flux-system -l app=helm-controller --tail=300
          echo "::endgroup::"
          echo "::group::source-controller logs"
          kubectl logs -n flux-system -l app=source-controller --tail=200
          echo "::endgroup::"
          echo "::group::All pods"
          kubectl get pods -A -o wide
          echo "::endgroup::"
          echo "::group::Recent events (warnings)"
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -100
          echo "::endgroup::"

      - name: 🔥 Delete cluster
        if: always()
        run: ksail cluster delete || echo "⚠️ Cluster may not have been created"

  # PR #7: DR restore drill. Validates the full Velero -> MinIO -> Velero
  # round trip end-to-end on a fresh cluster, so an etcd loss / cluster
  # rebuild scenario is regression-tested every PR.
  #
  # Total wall budget = 4h (matches the documented RTO in docs/dr/runbook.md).
  # In practice the drill takes ~15 min; the budget is the manual-prod
  # ceiling we promise to operators.
  restore-drill:
    name: 🔁 DR Restore Drill
    needs: [changes]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: ci
    timeout-minutes: 240
    permissions:
      contents: read
    env:
      KSAIL_CONFIG: ksail.yaml
      MARKER_NS: dr-drill
      MARKER_NAME: dr-marker
      BACKUP_NAME: dr-drill
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        uses: devantler-tech/actions/setup-ksail-cli@961f62f4a771b31e48acaae4a619cef6c7fe2195 # v2.1.1

      - name: 🔐 Create SOPS Age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          umask 077
          echo "${SOPS_AGE_KEY}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: ⚙️ Install Velero CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v1.16.1 --repo vmware-tanzu/velero \
            --pattern "velero-v1.16.1-linux-amd64.tar.gz" --dir /tmp
          tar -C /tmp -xzf /tmp/velero-v1.16.1-linux-amd64.tar.gz
          sudo install -m 0755 /tmp/velero-v1.16.1-linux-amd64/velero /usr/local/bin/velero
          velero version --client-only

      - name: 🚀 Create cluster (round 1)
        id: create1
        run: |
          ksail cluster create
          ksail workload push
          ksail workload reconcile --timeout 30m

      - name: 🩺 Diagnose Flux on failure (round 1)
        if: failure() && steps.create1.outcome == 'failure'
        run: |
          set +e
          kubectl get nodes -o wide
          kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A -o wide
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o wide
          for k in infrastructure-controllers infrastructure apps; do
            echo "--- $k ---"
            kubectl describe kustomizations.kustomize.toolkit.fluxcd.io "$k" -n flux-system 2>&1 | tail -60
          done
          kubectl get pods -n flux-system -o wide
          kubectl logs -n flux-system -l app=kustomize-controller --tail=300
          kubectl logs -n flux-system -l app=helm-controller --tail=300
          kubectl get pods -A -o wide
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -100

      - name: ⏳ Wait for Velero + MinIO ready (round 1)
        run: |
          kubectl -n velero rollout status deploy/velero --timeout=10m
          kubectl -n minio rollout status deploy/minio --timeout=10m
          # Wait for default BackupStorageLocation to become Available.
          for i in $(seq 1 30); do
            phase=$(kubectl -n velero get backupstoragelocation default -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            [[ "$phase" == "Available" ]] && exit 0
            sleep 10
          done
          echo "BackupStorageLocation never became Available" >&2
          kubectl -n velero get backupstoragelocation -o yaml
          exit 1

      - name: 📌 Write marker resource
        run: |
          kubectl create namespace "$MARKER_NS"
          kubectl -n "$MARKER_NS" create configmap "$MARKER_NAME" \
            --from-literal=created-at="$(date -u +%FT%TZ)" \
            --from-literal=run-id="${{ github.run_id }}" \
            --from-literal=sha="${{ github.sha }}"

      - name: 💾 Backup namespace via Velero
        run: |
          velero backup create "$BACKUP_NAME" \
            --include-namespaces "$MARKER_NS" \
            --wait
          # `velero backup describe --details` generates presigned URLs
          # against the in-cluster MinIO DNS (minio.minio.svc.cluster.local)
          # which the GitHub runner can't resolve. Also, newer Velero CLIs
          # query cnpg CRDs for ItemOperations and exit non-zero when the
          # CNPG backup object does not exist. Fall back to checking the
          # phase directly on the Backup CR.
          velero backup describe "$BACKUP_NAME" 2>/dev/null || true
          phase=$(kubectl -n velero get backups.velero.io "$BACKUP_NAME" -o jsonpath='{.status.phase}')
          [[ "$phase" == "Completed" ]] || { echo "Backup phase=$phase, expected Completed" >&2; exit 1; }

      - name: 🗑️ Simulate data loss (delete marker namespace)
        # In prod the data-loss event is a lost cluster; R2 retains the
        # backup. Locally, MinIO runs in-cluster with ephemeral storage,
        # so destroying the cluster also destroys the backup target.
        # Instead, simulate data loss by deleting the marker namespace
        # and restoring it from the backup -- exercises the same
        # Velero->S3->Velero code path end-to-end.
        run: |
          kubectl delete namespace "$MARKER_NS" --wait=true --timeout=2m

      - name: ♻️ Restore marker from backup
        run: |
          # Marker namespace must NOT exist right before restore.
          ! kubectl get ns "$MARKER_NS" >/dev/null 2>&1
          velero restore create "$BACKUP_NAME-restore" \
            --from-backup "$BACKUP_NAME" \
            --wait
          # Skip --details on describe for the same presigned-URL + CNPG
          # reasons as the backup step above.
          velero restore describe "$BACKUP_NAME-restore" 2>/dev/null || true
          phase=$(kubectl -n velero get restores.velero.io "$BACKUP_NAME-restore" -o jsonpath='{.status.phase}')
          [[ "$phase" == "Completed" ]] || { echo "Restore phase=$phase, expected Completed" >&2; exit 1; }

      - name: ✅ Assert marker present
        run: |
          got_run_id=$(kubectl -n "$MARKER_NS" get configmap "$MARKER_NAME" -o jsonpath='{.data.run-id}')
          [[ "$got_run_id" == "${{ github.run_id }}" ]] || {
            echo "Marker run-id mismatch: got=$got_run_id expected=${{ github.run_id }}" >&2
            exit 1
          }
          echo "DR drill OK: marker survived backup -> data-loss -> restore"

      - name: 🧹 Tear down
        if: always()
        run: ksail cluster delete || true

  deploy-dev:
    name: 🚀 Deploy to Dev
    needs: [changes]
    if: github.event_name == 'merge_group' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        uses: devantler-tech/actions/setup-ksail-cli@961f62f4a771b31e48acaae4a619cef6c7fe2195 # v2.1.1

      - name: ⚙️ Setup omnictl
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          gh release download v1.6.5 --repo siderolabs/omni \
            --pattern "omnictl-linux-amd64" --dir "$TMP_DIR"
          gh release download v1.6.5 --repo siderolabs/omni \
            --pattern "sha256sum.txt" --dir "$TMP_DIR"
          (cd "$TMP_DIR" && grep " omnictl-linux-amd64$" sha256sum.txt | sha256sum -c -)
          install -m 0755 "$TMP_DIR/omnictl-linux-amd64" /usr/local/bin/omnictl

      - name: 🔐 Create SOPS Age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          umask 077
          echo "${SOPS_AGE_KEY}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      # Workaround: ksail cluster update does not fetch kubeconfig from
      # Omni, so we fetch it manually via omnictl.
      # TODO: Remove once ksail natively fetches kubeconfig during
      # cluster update for the Omni provider.
      - name: 🔐 Setup kubeconfig
        continue-on-error: true
        run: |
          omnictl kubeconfig --cluster devantler-dev --force \
            --service-account --user github-actions \
            --force-context-name devantler-dev
          CTX=$(kubectl config current-context 2>/dev/null || true)
          if [[ -n "$CTX" && "$CTX" != "devantler-dev" ]]; then
            kubectl config rename-context "$CTX" "devantler-dev"
          fi
        env:
          OMNI_ENDPOINT: ${{ vars.OMNI_ENDPOINT }}
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}

      - name: 🔄 Create or update cluster
        run: |
          if ksail --config ksail.dev.yaml cluster info > /dev/null 2>&1; then
            ksail --config ksail.dev.yaml cluster update
          else
            ksail --config ksail.dev.yaml cluster create
          fi
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          OMNI_ENDPOINT: ${{ vars.OMNI_ENDPOINT }}
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}

      - name: 📦 Push manifests to GHCR
        run: ksail --config ksail.dev.yaml workload push
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          OMNI_ENDPOINT: ${{ vars.OMNI_ENDPOINT }}
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}

      # TODO: Remove continue-on-error once dev cluster bootstrap is stable
      # (Talos Hetzner CCM node initialization requires talos-omni patches
      # for kubelet cloud-provider=external; tracked in a follow-up issue).
      - name: 🔁 Trigger Flux reconciliation
        id: reconcile
        run: ksail --config ksail.dev.yaml workload reconcile --timeout 30m
        continue-on-error: true
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          OMNI_ENDPOINT: ${{ vars.OMNI_ENDPOINT }}
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}

      - name: 🩺 Diagnose Flux on failure
        if: steps.reconcile.outcome == 'failure'
        env:
          OMNI_ENDPOINT: ${{ vars.OMNI_ENDPOINT }}
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
        run: |
          set +e
          echo "::group::Flux Kustomizations"
          kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux HelmReleases"
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux OCIRepositories"
          kubectl get ocirepositories.source.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Failing Kustomizations describe"
          for k in infrastructure-controllers infrastructure apps; do
            echo "--- $k ---"
            kubectl describe kustomizations.kustomize.toolkit.fluxcd.io "$k" -n flux-system 2>&1 | tail -60
          done
          echo "::endgroup::"
          echo "::group::Flux controller pods"
          kubectl get pods -n flux-system -o wide
          echo "::endgroup::"
          echo "::group::kustomize-controller logs"
          kubectl logs -n flux-system -l app=kustomize-controller --tail=200
          echo "::endgroup::"
          echo "::group::helm-controller logs"
          kubectl logs -n flux-system -l app=helm-controller --tail=200
          echo "::endgroup::"
          echo "::group::source-controller logs"
          kubectl logs -n flux-system -l app=source-controller --tail=100
          echo "::endgroup::"
          echo "::group::Recent events (warnings)"
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -50
          echo "::endgroup::"
