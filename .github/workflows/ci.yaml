name: CI
on:
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      pull-requests: read # detect changed files
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            k8s:
              - 'k8s/**'
              - 'ksail.yaml'
              - 'ksail.prod.yaml'
              - '.sops.yaml'
              - 'talos-local/**'
              - 'talos/**'
              - '.github/workflows/ci.yaml'

  system-test:
    name: 🧪 System Test
    needs: [changes]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧹 Free disk space
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3.2.2
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: false
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"

      - name: 🧪 System Test
        uses: devantler-tech/ksail/.github/actions/ksail-cluster@0731600520062f025b53f5a7e3a4176e5f6884b4 # v7.17.3
        with:
          distribution: Talos
          provider: Docker
          ksail-version: "7.16.0"
          init: "false"
          validate: "true"
          scan: "true"
          scan-framework: "nsa"
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          hosts-file: ${{ vars.HOSTS_FILE }}
          root-ca-cert-file: ${{ vars.ROOT_CA_CERT_FILE }}
          push: "true"
          reconcile: "true"
          delete: "false"

      - name: 🩺 Diagnose Flux on failure
        if: failure()
        run: |
          set +e
          echo "::group::Nodes"
          kubectl get nodes -o wide
          echo "::endgroup::"
          echo "::group::Flux Kustomizations"
          kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux HelmReleases"
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux OCIRepositories"
          kubectl get ocirepositories.source.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Failing Kustomizations describe"
          for k in infrastructure-controllers infrastructure apps; do
            echo "--- $k ---"
            kubectl describe kustomizations.kustomize.toolkit.fluxcd.io "$k" -n flux-system 2>&1 | tail -80
          done
          echo "::endgroup::"
          echo "::group::Flux controller pods"
          kubectl get pods -n flux-system -o wide
          echo "::endgroup::"
          echo "::group::kustomize-controller logs"
          kubectl logs -n flux-system -l app=kustomize-controller --tail=300
          echo "::endgroup::"
          echo "::group::helm-controller logs"
          kubectl logs -n flux-system -l app=helm-controller --tail=300
          echo "::endgroup::"
          echo "::group::source-controller logs"
          kubectl logs -n flux-system -l app=source-controller --tail=200
          echo "::endgroup::"
          echo "::group::All pods"
          kubectl get pods -A -o wide
          echo "::endgroup::"
          echo "::group::Recent events (warnings)"
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -100
          echo "::endgroup::"
          echo "::group::Failed/CrashLooping pod logs"
          # Dump previous + current logs from any pod that's not Running OR
          # has containers in a waiting/terminated-error state. CrashLoopBackOff
          # pods stay in phase=Running with waiting.reason=CrashLoopBackOff,
          # so we must inspect containerStatuses, not just phase.
          pods_to_dump=$(kubectl get pods -A -o json 2>/dev/null | jq -r '
            .items[]
            | select(
                .status.phase != "Running" and .status.phase != "Succeeded"
                or ((.status.containerStatuses // [])[]? | (.restartCount // 0) > 0)
                or ((.status.containerStatuses // [])[]? | (.state.waiting.reason // "") | test("CrashLoopBackOff|Error|ImagePullBackOff|ErrImagePull|CreateContainerError"))
                or ((.status.containerStatuses // [])[]? | (.state.terminated.reason // "") == "Error")
              )
            | "\(.metadata.namespace)\t\(.metadata.name)"
          ' | sort -u)
          while IFS=$'\t' read -r ns name; do
            [ -z "$ns" ] && continue
            echo "--- $ns/$name (previous + current) ---"
            kubectl logs -n "$ns" "$name" --all-containers --previous --tail=200 2>&1 | sed 's/^/  /'
            echo "  --- current ---"
            kubectl logs -n "$ns" "$name" --all-containers --tail=200 2>&1 | sed 's/^/  /'
          done <<< "$pods_to_dump"
          # Also dump logs from any Job pods (these often complete then disappear from "not Running")
          while IFS=$'\t' read -r ns name; do
            [ -z "$ns" ] && continue
            echo "--- Job pod $ns/$name ---"
            kubectl logs -n "$ns" "$name" --all-containers --tail=200 2>&1 | sed 's/^/  /'
          done < <(kubectl get pods -A -l job-name -o jsonpath='{range .items[*]}{.metadata.namespace}{"\t"}{.metadata.name}{"\n"}{end}' 2>/dev/null)
          echo "::endgroup::"
          echo "::group::Failing Jobs describe"
          kubectl get jobs -A -o json 2>/dev/null | jq -r '.items[] | select(.status.failed > 0 or (.status.conditions // [])[]?.type == "Failed") | "\(.metadata.namespace)/\(.metadata.name)"' | while read -r job; do
            ns="${job%%/*}"; name="${job##*/}"
            echo "--- $ns/$name ---"
            kubectl describe job -n "$ns" "$name" 2>&1 | tail -50
          done
          echo "::endgroup::"

      - name: 🔥 Delete cluster
        if: always()
        run: ksail cluster delete || echo "⚠️ Cluster may not have been created"


  deploy-prod:
    name: 🚀 Deploy to Prod
    needs: [changes]
    if: github.event_name == 'merge_group' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: prod
    # Shared with the CD tag-deploy workflow (cd.yaml) so a tag deploy and a
    # merge-queue deploy can never run against the prod cluster at once.
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        # TEMP: pinned to v7.19.0. The v7.20.0 release shipped only desktop
        # artifacts (CLI binaries missing), so `brew install ksail` 404s on the
        # linux tarball. Revert to setup-ksail-cli once a complete ksail release
        # exists. See devantler-tech/ksail v7.20.0 CD failure.
        env:
          # renovate: datasource=github-releases depName=devantler-tech/ksail extractVersion=^v(?<version>.+)$
          KSAIL_VERSION: "7.19.0"
        run: |
          curl -fsSL "https://github.com/devantler-tech/ksail/releases/download/v${KSAIL_VERSION}/ksail_${KSAIL_VERSION}_linux_amd64.tar.gz" -o /tmp/ksail.tar.gz
          tar -xzf /tmp/ksail.tar.gz -C /tmp
          sudo install /tmp/ksail /usr/local/bin/ksail
          ksail --version

      - name: 🔐 Create SOPS Age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          umask 077
          echo "${SOPS_AGE_KEY}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: 🔑 Restore kubeconfig
        # ksail cluster update needs a valid kubeconfig to detect the current
        # cluster state. Without it, the component detector returns defaults and
        # triggers spurious changes that all fail. The KUBE_CONFIG secret must be
        # kept up-to-date from the homelab after any cluster recreation.
        # See devantler-tech/ksail#4369 for the upstream design context.
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          umask 077
          printf '%s' "${KUBE_CONFIG}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🔑 Restore talosconfig
        env:
          TALOS_CONFIG: ${{ secrets.TALOS_CONFIG }}
        run: |
          mkdir -p ~/.talos
          umask 077
          printf '%s' "${TALOS_CONFIG}" > ~/.talos/config
          chmod 600 ~/.talos/config

      - name: 🩺 Verify prod cluster is reachable
        # Fail fast if the restored kubeconfig can't reach the prod API server.
        # When the cluster is unreachable — most commonly because KUBE_CONFIG /
        # TALOS_CONFIG are stale after a cluster rebuild — `ksail cluster update`
        # otherwise only warns, falls back to a "nothing is installed" baseline,
        # proposes a full reinstall, and then fails mid-apply against the live
        # nodes (a confusing, potentially destructive failure mode). Catch it
        # here with an actionable message instead.
        # Upstream: devantler-tech/ksail#4868 (fail fast) and #4869 (baseline).
        # Refresh procedure: docs/dr/runbook.md → "Refresh CI deploy credentials".
        # Pin --context to admin@prod (ksail.prod.yaml's connection.context) so
        # the check targets the same cluster `ksail cluster update` will use,
        # regardless of the restored kubeconfig's current-context.
        run: |
          for attempt in 1 2 3; do
            if kubectl --context admin@prod get --raw='/readyz' --request-timeout=30s >/dev/null 2>&1; then
              echo "✅ Prod API server reachable."
              exit 0
            fi
            echo "Attempt ${attempt}/3: prod API server (context admin@prod) not reachable yet…"
            sleep 10
          done
          echo "::error::Prod cluster (context admin@prod) is unreachable with the restored kubeconfig. KUBE_CONFIG (and likely TALOS_CONFIG) are probably stale after a cluster rebuild — refresh both and update the 'prod' environment secrets. See docs/dr/runbook.md → 'Refresh CI deploy credentials'."
          exit 1

      - name: 🔄 Update cluster
        run: ksail --config ksail.prod.yaml cluster update
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: 📦 Push manifests to GHCR
        run: ksail --config ksail.prod.yaml workload push
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: 🔧 Reset stuck HelmReleases
        continue-on-error: true
        run: |
          # HelmReleases may be stuck in Failed state after a cluster outage (e.g.
          # Kyverno webhook unavailable during recovery exhausted the retry budget).
          # Suspend + resume clears the failure status so the new OCI artifact spec
          # (with explicit remediation) can take effect on the next reconcile.
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o json 2>/dev/null | \
            jq -r '.items[] | select(.status.conditions // [] | any(.type == "Ready" and .status == "False" and (.reason // "" | test("Failed|Stalled")))) | "\(.metadata.namespace) \(.metadata.name)"' | \
          while read -r ns name; do
            printf 'Resetting stuck HelmRelease: %s/%s\n' "$ns" "$name"
            kubectl patch helmrelease.helm.toolkit.fluxcd.io "$name" -n "$ns" \
              --type=merge -p '{"spec":{"suspend":true}}' || true
          done
          sleep 5
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o json 2>/dev/null | \
            jq -r '.items[] | select(.spec.suspend == true) | "\(.metadata.namespace) \(.metadata.name)"' | \
          while read -r ns name; do
            printf 'Resuming HelmRelease: %s/%s\n' "$ns" "$name"
            kubectl patch helmrelease.helm.toolkit.fluxcd.io "$name" -n "$ns" \
              --type=merge -p '{"spec":{"suspend":false}}' || true
          done

      - name: 🔁 Trigger Flux reconciliation
        id: reconcile
        run: ksail --config ksail.prod.yaml workload reconcile
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: 🩺 Diagnose Flux on failure
        if: failure() && steps.reconcile.outcome == 'failure'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set +e
          echo "::group::Flux Kustomizations"
          kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux HelmReleases"
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux OCIRepositories"
          kubectl get ocirepositories.source.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Failing Kustomizations describe"
          for k in infrastructure-controllers infrastructure apps; do
            echo "--- $k ---"
            kubectl describe kustomizations.kustomize.toolkit.fluxcd.io "$k" -n flux-system 2>&1 | tail -60
          done
          echo "::endgroup::"
          echo "::group::Flux controller pods"
          kubectl get pods -n flux-system -o wide
          echo "::endgroup::"
          echo "::group::kustomize-controller logs"
          kubectl logs -n flux-system -l app=kustomize-controller --tail=200
          echo "::endgroup::"
          echo "::group::helm-controller logs"
          kubectl logs -n flux-system -l app=helm-controller --tail=200
          echo "::endgroup::"
          echo "::group::source-controller logs"
          kubectl logs -n flux-system -l app=source-controller --tail=100
          echo "::endgroup::"
          echo "::group::Recent events (warnings)"
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -50
          echo "::endgroup::"

  ci-required-checks:
    name: CI - Required Checks
    runs-on: ubuntu-latest
    needs: [changes, system-test, deploy-prod]
    if: always()
    permissions: {}
    steps:
      - name: 📊 Evaluate job results
        uses: devantler-tech/actions/aggregate-job-checks@59d3ffbe1a9437fcc39e2794fa2f221abe878310 # v3.3.0
        with:
          job-results: >-
            ${{ needs.changes.result }}
            ${{ needs.system-test.result }}
            ${{ needs.deploy-prod.result }}
