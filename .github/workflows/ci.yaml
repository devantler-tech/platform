name: CI
on:
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      pull-requests: read # detect changed files
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            k8s:
              - 'k8s/**'
              - 'ksail.yaml'
              - 'ksail.prod.yaml'
              - '.sops.yaml'
              - 'talos-local/**'
              - 'talos/**'
              - '.github/workflows/ci.yaml'

  validate:
    name: 🧪 Validate Manifests
    needs: [changes]
    # Static, no-cluster validation. The local Docker cluster is now a thin
    # manual test-bed (see AGENTS.md) rather than a full prod stand-in, so CI no
    # longer boots it; instead it schema-validates and security-scans the
    # manifests. This needs no secrets, so — unlike the old system test — it also
    # runs on fork PRs.
    if: github.event_name == 'pull_request' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        # Two pinned ksail binaries — no single release does both jobs
        # deterministically (https://github.com/devantler-tech/ksail/issues/5371):
        #   • validate → ksail 7.65.0: 7.66.x parallelised the in-process Helm
        #     render and made `ksail workload validate` racy (varying YAML parse
        #     errors on a different kustomization each run); 7.65.0 renders
        #     serially and validates deterministically.
        #   • scan → ksail 7.66.4 with --no-render (the flag landed in 7.66.x):
        #     the *rendered* scan score depends on how many upstream Helm charts
        #     get fetched (87% in CI vs 94% offline) and on chart-version bumps;
        #     --no-render scans only the raw authored manifests, so it is
        #     deterministic and environment-independent (94.20%).
        # Collapse to one binary once a ksail release fixes the render race.
        shell: bash
        run: |
          install_ksail() {  # <version> <dest>
            curl -fsSL "https://github.com/devantler-tech/ksail/releases/download/v$1/ksail_$1_linux_amd64.tar.gz" -o "/tmp/ksail-$1.tgz"
            mkdir -p "/tmp/ksail-$1"
            tar -xzf "/tmp/ksail-$1.tgz" -C "/tmp/ksail-$1"
            sudo install "/tmp/ksail-$1/ksail" "$2"
          }
          install_ksail 7.65.0 /usr/local/bin/ksail        # validate (deterministic build)
          install_ksail 7.66.4 /usr/local/bin/ksail-scan   # scan --no-render
          ksail --version && ksail-scan --version

      - name: ✅ Validate manifests (local + prod overlays)
        # Schema-aware kubeconform validation with Flux variable substitution,
        # building both cluster overlays. Fully static: no cluster, no SOPS key
        # (Secrets are skipped), no network (offline schema cache).
        run: |
          ksail workload validate
          ksail --config ksail.prod.yaml workload validate

      - name: 🔎 Scan manifests (Kubescape NSA) — hard gate
        # Static NSA-CISA security scan, gated on the compliance score: the job
        # FAILS if a change drops the posture below the threshold, so new
        # findings must be fixed (or justified) before merge.
        #
        # Runs on the 7.66.4 `ksail-scan` binary with --no-render (see "Setup
        # KSail" above for the two-binary rationale). --no-render scans the raw
        # authored manifests and is deterministic + environment-independent
        # (94.20% every run); the default rendered scan is not (87% in CI vs 94%
        # offline, plus the 7.66.x render race,
        # https://github.com/devantler-tech/ksail/issues/5371).
        #
        # The threshold is the deterministic floor (94), not 100. The residual
        # findings are either runtime-enforced (Kyverno securityContext/limits,
        # CiliumNetworkPolicy) or genuinely unfixable — notably C-0002, the
        # KubeVirt operator's pods/exec RBAC, which it needs to manage VMs and so
        # can only be excepted. `ksail workload scan` can't consume the platform's
        # ClusterSecurityException CRs yet (https://github.com/devantler-tech/ksail/issues/5369),
        # so reaching --compliance-threshold 100 is blocked on that. Until then,
        # ratchet this number up as genuine gaps are fixed; never lower it.
        run: ksail-scan workload scan --no-render --framework nsa --compliance-threshold 94

  deploy-prod:
    name: 🚀 Deploy to Prod
    needs: [changes]
    if: github.event_name == 'merge_group' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: prod
    # Shared with the CD workflow (cd.yaml) so a manual deploy and a
    # merge-queue deploy can never run against the prod cluster at once.
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
      id-token: write # mint OIDC token for cosign keyless signing (Fulcio + Rekor)
      attestations: write # write SBOM + SLSA provenance attestations (see deploy-prod action)
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🚀 Deploy to Production
        # Shared with cd.yaml's manual deploy via this composite action so the
        # merge-queue and manual paths can never drift. Secrets are passed as
        # inputs because composite actions cannot read `secrets` directly.
        uses: ./.github/actions/deploy-prod
        with:
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          kube-config: ${{ secrets.KUBE_CONFIG }}
          talos-config: ${{ secrets.TALOS_CONFIG }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          hcloud-token: ${{ secrets.HCLOUD_TOKEN }}

  ci-required-checks:
    name: CI - Required Checks
    runs-on: ubuntu-latest
    needs: [changes, validate, deploy-prod]
    if: always()
    permissions: {}
    steps:
      - name: 📊 Evaluate job results
        uses: devantler-tech/actions/aggregate-job-checks@9d98cb8be059537ec1e82f71c90d75ecba321713 # v6.1.0
        with:
          job-results: >-
            ${{ needs.changes.result }}
            ${{ needs.validate.result }}
            ${{ needs.deploy-prod.result }}
