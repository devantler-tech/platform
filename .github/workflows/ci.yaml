name: CI
on:
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      pull-requests: read # detect changed files
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            k8s:
              - 'k8s/**'
              - 'ksail.yaml'
              - 'ksail.dev.yaml'
              - '.sops.yaml'
              - 'talos-local/**'
              - 'talos-dev/**'
              - '.github/workflows/ci.yaml'

  system-test:
    name: 🧪 System Test
    needs: [changes]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 System Test
        uses: devantler-tech/ksail/.github/actions/ksail-cluster@7d82a994df2fbd1c1448d510cc3c70428589321b # v5.82.0
        with:
          distribution: Talos
          provider: Docker
          init: "false"
          validate: "true"
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          hosts-file: ${{ vars.HOSTS_FILE }}
          root-ca-cert-file: ${{ vars.ROOT_CA_CERT_FILE }}
          push: "true"
          reconcile: "true"
          delete: "true"

  deploy-dev:
    name: 🚀 Deploy to Dev
    needs: [changes]
    if: github.event_name == 'merge_group' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        uses: devantler-tech/actions/setup-ksail-action@884a9b7321e269351d5fc006d95e0b50b2ddedf6 # v1.9.7

      - name: 🔐 Setup kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG}" > ~/.kube/config
          chmod 600 ~/.kube/config
          CONTEXT=$(kubectl config current-context)
          if [[ "$CONTEXT" != "devantler-dev" ]]; then
            kubectl config rename-context "$CONTEXT" "devantler-dev"
          fi

      - name: 👉 Set root kustomization to dev
        run: sed -i 's|clusters/local|clusters/dev|' k8s/kustomization.yaml

      - name: 🔄 Update cluster
        run: ksail --config ksail.dev.yaml cluster update

      - name: 📦 Push manifests to GHCR
        run: ksail --config ksail.dev.yaml workload push
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔁 Trigger Flux reconciliation
        run: ksail --config ksail.dev.yaml workload reconcile
