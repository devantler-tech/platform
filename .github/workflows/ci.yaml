name: CI
on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            k8s:
              - 'k8s/**'
              - 'ksail.yaml'
              - '.sops.yaml'
              - 'talos-local/**'
              - '.github/workflows/ci.yaml'

  system-test:
    name: 🧪 System Test
    needs: [changes]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧪 System Test
        uses: devantler-tech/ksail/.github/actions/ksail-cluster@e8af568986b21cb6e1ed1b3be92ff9c8c3612363 # v5.74.3
        with:
          distribution: Talos
          provider: Docker
          init: "false"
          validate: "true"
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          hosts-file: ${{ vars.HOSTS_FILE }}
          root-ca-cert-file: ${{ vars.ROOT_CA_CERT_FILE }}
          push: "true"
          reconcile: "true"
          delete: "true"
