name: CI
on:
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      pull-requests: read # detect changed files
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            k8s:
              - 'k8s/**'
              - 'ksail.yaml'
              - 'ksail.prod.yaml'
              - '.sops.yaml'
              - 'talos-local/**'
              - 'talos/**'
              - '.github/workflows/ci.yaml'

  system-test:
    name: 🧪 System Test
    needs: [changes]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: 🧹 Free disk space
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3.2.2
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: false
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"

      - name: 🧪 System Test
        uses: devantler-tech/ksail/.github/actions/ksail-cluster@99c97b5f43dc088cdb3ddb9e3d0f1a55a223fe79 # v7.11.1
        with:
          distribution: Talos
          provider: Docker
          ksail-version: "7.8.0"
          init: "false"
          validate: "true"
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          hosts-file: ${{ vars.HOSTS_FILE }}
          root-ca-cert-file: ${{ vars.ROOT_CA_CERT_FILE }}
          push: "true"
          reconcile: "true"
          delete: "false"

      - name: 🩺 Diagnose Flux on failure
        if: failure()
        run: |
          set +e
          echo "::group::Nodes"
          kubectl get nodes -o wide
          echo "::endgroup::"
          echo "::group::Flux Kustomizations"
          kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux HelmReleases"
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux OCIRepositories"
          kubectl get ocirepositories.source.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Failing Kustomizations describe"
          for k in infrastructure-controllers infrastructure apps; do
            echo "--- $k ---"
            kubectl describe kustomizations.kustomize.toolkit.fluxcd.io "$k" -n flux-system 2>&1 | tail -80
          done
          echo "::endgroup::"
          echo "::group::Flux controller pods"
          kubectl get pods -n flux-system -o wide
          echo "::endgroup::"
          echo "::group::kustomize-controller logs"
          kubectl logs -n flux-system -l app=kustomize-controller --tail=300
          echo "::endgroup::"
          echo "::group::helm-controller logs"
          kubectl logs -n flux-system -l app=helm-controller --tail=300
          echo "::endgroup::"
          echo "::group::source-controller logs"
          kubectl logs -n flux-system -l app=source-controller --tail=200
          echo "::endgroup::"
          echo "::group::All pods"
          kubectl get pods -A -o wide
          echo "::endgroup::"
          echo "::group::Recent events (warnings)"
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -100
          echo "::endgroup::"

      - name: 🔥 Delete cluster
        if: always()
        run: ksail cluster delete || echo "⚠️ Cluster may not have been created"


  deploy-prod:
    name: 🚀 Deploy to Prod
    needs: [changes]
    if: github.event_name == 'merge_group' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        uses: devantler-tech/actions/setup-ksail-cli@59d3ffbe1a9437fcc39e2794fa2f221abe878310 # v3.3.0

      - name: 🔐 Create SOPS Age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          umask 077
          echo "${SOPS_AGE_KEY}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: 🔑 Restore kubeconfig
        # ksail cluster update needs a valid kubeconfig to detect the current
        # cluster state. Without it, the component detector returns defaults and
        # triggers spurious changes that all fail. The KUBE_CONFIG secret must be
        # kept up-to-date from the homelab after any cluster recreation.
        # See devantler-tech/ksail#4369 for the upstream design context.
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          umask 077
          printf '%s' "${KUBE_CONFIG}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🔄 Update cluster
        run: ksail --config ksail.prod.yaml cluster update
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: 📦 Push manifests to GHCR
        run: ksail --config ksail.prod.yaml workload push
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: 🔧 Reset stuck HelmReleases
        continue-on-error: true
        run: |
          # HelmReleases may be stuck in Failed state after a cluster outage (e.g.
          # Kyverno webhook unavailable during recovery exhausted the retry budget).
          # Suspend + resume clears the failure status so the new OCI artifact spec
          # (with explicit remediation) can take effect on the next reconcile.
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o json 2>/dev/null | \
            jq -r '.items[] | select(.status.conditions // [] | any(.type == "Ready" and .status == "False" and (.reason // "" | test("Failed|Stalled")))) | "\(.metadata.namespace) \(.metadata.name)"' | \
          while read -r ns name; do
            printf 'Resetting stuck HelmRelease: %s/%s\n' "$ns" "$name"
            kubectl patch helmrelease.helm.toolkit.fluxcd.io "$name" -n "$ns" \
              --type=merge -p '{"spec":{"suspend":true}}' || true
          done
          sleep 5
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o json 2>/dev/null | \
            jq -r '.items[] | select(.spec.suspend == true) | "\(.metadata.namespace) \(.metadata.name)"' | \
          while read -r ns name; do
            printf 'Resuming HelmRelease: %s/%s\n' "$ns" "$name"
            kubectl patch helmrelease.helm.toolkit.fluxcd.io "$name" -n "$ns" \
              --type=merge -p '{"spec":{"suspend":false}}' || true
          done

      - name: 🔁 Trigger Flux reconciliation
        id: reconcile
        run: ksail --config ksail.prod.yaml workload reconcile
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: 🩺 Diagnose Flux on failure
        if: failure() && steps.reconcile.outcome == 'failure'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set +e
          echo "::group::Flux Kustomizations"
          kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux HelmReleases"
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux OCIRepositories"
          kubectl get ocirepositories.source.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Failing Kustomizations describe"
          for k in infrastructure-controllers infrastructure apps; do
            echo "--- $k ---"
            kubectl describe kustomizations.kustomize.toolkit.fluxcd.io "$k" -n flux-system 2>&1 | tail -60
          done
          echo "::endgroup::"
          echo "::group::Flux controller pods"
          kubectl get pods -n flux-system -o wide
          echo "::endgroup::"
          echo "::group::kustomize-controller logs"
          kubectl logs -n flux-system -l app=kustomize-controller --tail=200
          echo "::endgroup::"
          echo "::group::helm-controller logs"
          kubectl logs -n flux-system -l app=helm-controller --tail=200
          echo "::endgroup::"
          echo "::group::source-controller logs"
          kubectl logs -n flux-system -l app=source-controller --tail=100
          echo "::endgroup::"
          echo "::group::Recent events (warnings)"
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -50
          echo "::endgroup::"

  ci-required-checks:
    name: CI - Required Checks
    runs-on: ubuntu-latest
    needs: [changes, system-test, deploy-prod]
    if: always()
    permissions: {}
    steps:
      - name: 📊 Evaluate job results
        uses: devantler-tech/actions/aggregate-job-checks@59d3ffbe1a9437fcc39e2794fa2f221abe878310 # v3.3.0
        with:
          job-results: >-
            ${{ needs.changes.result }}
            ${{ needs.system-test.result }}
            ${{ needs.deploy-prod.result }}
