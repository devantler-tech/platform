name: CI
on:
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      pull-requests: read # detect changed files
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
      bridge_validation: ${{ steps.filter.outputs.bridge_validation }}
      talos: ${{ steps.filter.outputs.talos }}
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: ⚙️ Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: 🩹 Validate merge-group heal contract
        run: |
          go test ./scripts/validate-merge-group-heal
          go run ./scripts/validate-merge-group-heal .github/workflows/ci.yaml

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            k8s:
              - 'k8s/**'
              - 'ksail.yaml'
              - 'ksail.prod.yaml'
              - '.sops.yaml'
              - 'talos-local/**'
              - 'talos/**'
              - 'scripts/validate-naming.py'
              - 'scripts/validate-embedded-json.py'
              - 'scripts/generate-kubescape-exceptions/**'
              - 'go.mod'
              - 'go.sum'
              - 'scripts/tests/test-cilium-bandwidth-manager-component.sh'
              - 'tests/cilium-bandwidth-manager-bbr/**'
              - 'scripts/validate-alert-coverage.sh'
              - 'scripts/tests/validate-alert-coverage/**'
              - 'scripts/refresh-flux-ghcr-auth.sh'
              - 'scripts/refresh-flux-ghcr-auth-safety.sh'
              - 'scripts/ghcr-auth-lib.sh'
              - 'scripts/run-ksail-prod-with-pull-auth.sh'
              - '.github/actions/deploy-prod/**'
              - '.github/workflows/dr-rebuild.yaml'
              - '.github/workflows/ci.yaml'
            bridge_validation:
              - 'scripts/refresh-flux-ghcr-auth.sh'
              - 'scripts/refresh-flux-ghcr-auth-safety.sh'
              - 'scripts/ghcr-auth-lib.sh'
              - 'scripts/run-ksail-prod-with-pull-auth.sh'
              - 'scripts/tests/test-refresh-flux-ghcr-auth-safety.sh'
              - 'scripts/tests/refresh-flux-ghcr-auth/**'
              - 'docs/dr/runbook.md'
              - '.github/actions/deploy-prod/**'
              - '.github/workflows/dr-rebuild.yaml'
              - '.github/workflows/ci.yaml'
            talos:
              - 'talos/**'
              - 'talos-local/**'
              - '.github/workflows/ci.yaml'

  validate:
    name: 🧪 Validate Manifests
    needs: [changes]
    # Static, no-cluster validation. The local Docker cluster is now a thin
    # manual test-bed (see AGENTS.md) rather than a full prod stand-in, so CI no
    # longer boots it; instead it schema-validates and security-scans the
    # manifests. This needs no secrets, so — unlike the old system test — it also
    # runs on fork PRs.
    if: >-
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.k8s == 'true' ||
      needs.changes.outputs.bridge_validation == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⚙️ Setup Go
        # Needed by the Kubescape exceptions generator below (Go, per the
        # bash-or-Go scripting standard) — the scan step shells out to it.
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: 🔐 Validate Flux GHCR credential bridge
        # Pure local tests with fake ksail/docker/kubectl commands: no SOPS key,
        # registry credential, cluster access, or network is used.
        run: |
          bash -n \
            scripts/ghcr-auth-lib.sh \
            scripts/refresh-flux-ghcr-auth-safety.sh \
            scripts/refresh-flux-ghcr-auth.sh \
            scripts/run-ksail-prod-with-pull-auth.sh \
            scripts/tests/test-refresh-flux-ghcr-auth-safety.sh
          shellcheck \
            scripts/ghcr-auth-lib.sh \
            scripts/refresh-flux-ghcr-auth-safety.sh \
            scripts/refresh-flux-ghcr-auth.sh \
            scripts/run-ksail-prod-with-pull-auth.sh \
            scripts/tests/test-refresh-flux-ghcr-auth-safety.sh
          bash scripts/tests/test-refresh-flux-ghcr-auth-safety.sh
          go test ./scripts/tests/refresh-flux-ghcr-auth

      - name: 🧩 Validate embedded JSON blobs
        # ConfigMaps that embed whole JSON documents as block scalars (e.g. the
        # Headlamp Kubescape exceptions ConfigMap's exceptionPolicies) are opaque
        # strings to schema validation, so a stray comma ships silently and only
        # surfaces at consumption time — where an empty exceptions view reads
        # identical to a clean posture. Pure Python stdlib, runs in under a
        # second, so it goes first — before the ksail download. See
        # scripts/validate-embedded-json.py (#2480).
        run: python3 scripts/validate-embedded-json.py

      - name: 🚦 Validate default-off Cilium bandwidth manager
        if: needs.changes.outputs.k8s == 'true'
        # Render the committed and temporary opt-in states so the staged
        # bandwidth-manager + BBR component cannot silently become active or
        # regress the Hetzner WireGuard settings. Bash plus the kubectl bundled
        # on the GitHub-hosted runner; no cluster or secrets required.
        run: bash scripts/tests/test-cilium-bandwidth-manager-component.sh

      - name: 📢 Validate reconciliation-Alert namespace coverage
        if: needs.changes.outputs.k8s == 'true'
        # notification-controller has no namespace wildcard, so the Alert must list
        # every namespace holding a HelmRelease. A namespace missing from that list
        # is invisible: the release fails, rolls back, reports Ready, and nothing
        # pages (ksail-operator, 2026-07-14). Drift is a build failure, not a
        # comment. Go behavioral tests + Bash with the runner's kubectl/yq; no
        # cluster or secrets required.
        run: |
          go test ./scripts/tests/validate-alert-coverage
          shellcheck scripts/validate-alert-coverage.sh
          bash scripts/validate-alert-coverage.sh

      - name: ⚙️ Setup KSail
        # Renovate-managed (datasource github-releases; grouped 'ksail' with the
        # deploy-prod / dr-rebuild pins). The validate step below renders
        # HelmReleases in-process (Kustomize + Helm) so the actually-applied
        # manifests are validated. This was briefly non-deterministic — a
        # buffer-aliasing data race in kubeconform's resource.FromStream (it yields
        # resources aliasing the reused bufio.Scanner buffer, parsed concurrently
        # with the producer's next Scan()) corrupted the validated stream on the
        # >4MB HelmRelease-dense overlays (ksail#5362) — and was worked around with
        # --skip-helm-render (platform PR #2270). KSail v7.163.1 contains the
        # ksail#5978 containment: split the multi-document stream and clone each
        # document before concurrent validation. Upstream
        # yannh/kubeconform#363 is still pending, so require consecutive
        # stable-green runs here. TRIPWIRE: if validate/scan swing again, re-add
        # --skip-helm-render and reopen ksail#5362.
        shell: bash
        env:
          # renovate: datasource=github-releases depName=devantler-tech/ksail extractVersion=^v(?<version>.+)$
          KSAIL_VERSION: "7.171.3"
        run: |
          curl -fsSL "https://github.com/devantler-tech/ksail/releases/download/v${KSAIL_VERSION}/ksail_${KSAIL_VERSION}_linux_amd64.tar.gz" -o /tmp/ksail.tar.gz
          tar -xzf /tmp/ksail.tar.gz -C /tmp
          sudo install /tmp/ksail /usr/local/bin/ksail
          ksail --version

      - name: 📥 Restore kubeconform schema cache
        # ksail's kubeconform client fetches JSON schemas from
        # raw.githubusercontent.com/yannh/kubernetes-json-schema on every cold run
        # and has nowhere to persist them across ephemeral CI runners — heavy,
        # repeated traffic across every PR is what tripped upstream 429
        # rate-limiting portfolio-wide (2026-07-09). Restore/save are split (rather
        # than the single `actions/cache` step) so the save below can run with
        # `if: always()` — the validate step below is exactly what's exercising
        # this cache and can itself fail on an uncached/rate-limited schema fetch;
        # a save gated on job success would then never persist the schemas it did
        # manage to fetch, and every retry would cold-start again.
        id: kubeconform-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ksail/kubeconform
          key: kubeconform-schema-cache-v1-${{ github.run_id }}
          restore-keys: |
            kubeconform-schema-cache-v1-

      - name: ✅ Validate manifests (local + prod overlays)
        # Schema-aware kubeconform validation with Flux variable substitution,
        # building both cluster overlays. Fully static: no cluster, no SOPS key
        # (Secrets are skipped); schema fetches are cached by the step above so
        # repeat runs make no network calls for already-seen schemas.
        #
        # This PR deliberately removes the temporary --skip-helm-render
        # workaround so the actually-applied Helm-rendered manifests are
        # validated again. KSail v7.163.1 carries the ksail#5978
        # stream-splitting containment for ksail#5362 while
        # yannh/kubeconform#363 remains open; merge only after this gate has
        # consecutive stable-green evidence.
        run: |
          ksail workload validate
          ksail --config ksail.prod.yaml workload validate

      - name: 📤 Save kubeconform schema cache
        # Runs even if the validate step above failed (see the restore step's
        # note) so any schemas fetched before a rate-limit hit still persist for
        # the next run's restore-keys prefix match. Skipped only on an exact
        # primary-key hit (impossible here since the key includes
        # `github.run_id`, but keeps the step correct if that ever changes).
        if: "!cancelled() && steps.kubeconform-cache.outputs.cache-hit != 'true'"
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ksail/kubeconform
          key: ${{ steps.kubeconform-cache.outputs.cache-primary-key }}

      - name: 🔎 Scan manifests (Kubescape NSA) — hard gate
        # Static NSA-CISA security scan, gated on the compliance score: the job
        # FAILS if a change drops the posture below the threshold, so new
        # findings must be fixed (or justified) before merge.
        #
        # The scan consumes the platform's justified exceptions: the
        # ClusterSecurityException CRs (k8s/bases/infrastructure/
        # cluster-security-exceptions/ — the single source of truth, also
        # consumed in-cluster by the kubescape-operator) are converted at scan
        # time into Kubescape's native exceptions format by
        # scripts/generate-kubescape-exceptions (#2264). With runtime-
        # enforced and except-only findings suppressed, the threshold gates the
        # residual REAL posture instead of sitting ~15 points under it.
        #
        # The threshold is a regression FLOOR, not the live score. The
        # Kubescape compliance score has historically been environment-
        # dependent (Linux CI runner vs macOS) and shifts with the ksail
        # render, so CI is the source of truth: the observed CI score with
        # exceptions applied is 98.87% (2026-07-11, ksail 7.165.2 — matching
        # the local value on that date), and the gate sits a few points under
        # it to catch real regressions without flaking on run-to-run
        # variance. (NB the floor may need re-baselining after a ksail
        # version bump.)
        #
        # Known un-excepted residual: C-0012 on the local-dev MinIO Deployment
        # (deliberate dev-only credential — tracked for a root-cause fix, not
        # an exception). Ratchet the floor up as genuine gaps close; never
        # lower it.
        run: |
          go test ./scripts/generate-kubescape-exceptions
          go run ./scripts/generate-kubescape-exceptions -o /tmp/kubescape-exceptions.json
          ksail workload scan --framework nsa --exceptions /tmp/kubescape-exceptions.json --compliance-threshold 95

  naming:
    name: 🏷️ Validate Naming Conventions
    needs: [changes]
    # Static folder/file naming gate: kebab-case dirs, one-resource-per-file,
    # type-led filenames, and flux-kustomization disambiguation. Pure Python
    # stdlib — no cluster, no secrets, no network — so it also runs on fork PRs
    # and returns in seconds. See scripts/validate-naming.py and AGENTS.md
    # 'File and Directory Naming Conventions'.
    if: github.event_name == 'pull_request' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🏷️ Validate naming conventions
        run: python3 scripts/validate-naming.py

  validate-talos:
    name: 🧪 Validate Talos Machine Config
    needs: [changes]
    # Renders the Talos machine config with every talos/ (prod) and talos-local/
    # patch applied and runs `talosctl validate` on the result — on the PR
    # event, so a broken patch (or an env expansion that would render empty,
    # like #2462's ${WG_SERVER_PRIVATE_KEY}) fails the PR instead of surfacing
    # in the merge group's deploy and evicting the queued PR. Placeholder key
    # material stands in for the env-expanded secrets, so this needs no real
    # secrets and runs on fork PRs too (issue #2477).
    if: github.event_name == 'pull_request' && needs.changes.outputs.talos == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⚙️ Setup talosctl
        env:
          # Keep in step with the Talos version the prod cluster runs (ksail's
          # node image pin — see ksail DefaultTalosImage).
          # renovate: datasource=github-releases depName=siderolabs/talos extractVersion=^v(?<version>.+)$
          TALOS_VERSION: "1.13.6"
        run: |
          curl -fsSL "https://github.com/siderolabs/talos/releases/download/v${TALOS_VERSION}/talosctl-linux-amd64" -o /tmp/talosctl
          sudo install /tmp/talosctl /usr/local/bin/talosctl
          talosctl version --client

      - name: ✅ Render + validate patched machine configs
        run: |
          set -euo pipefail

          # Placeholder key material for env-expanded patch values (ksail
          # expands these from environment secrets at deploy time — see
          # talos/control-planes/wireguard.yaml and
          # talos/cluster/authenticate-ghcr-pulls.yaml and
          # talos/cluster/mark-ghcr-pull-revision.yaml).
          # Real-format but throwaway, so validation exercises the expansion
          # path without any real secret on the PR event.
          WG_SERVER_PRIVATE_KEY="$(openssl rand -base64 32)"
          GHCR_USERNAME="placeholder-ghcr-user"
          GHCR_TOKEN="placeholder-ghcr-token"
          GHCR_PULL_REVISION="$(printf '%s\n' 'ENC[ci-placeholder-ciphertext]' | shasum -a 256 | awk '{print $1}')"
          export WG_SERVER_PRIVATE_KEY GHCR_USERNAME GHCR_TOKEN GHCR_PULL_REVISION

          validate_overlay() {
            local dir="$1" mode="$2"
            echo "::group::${dir} (${mode})"

            # Every ${VAR} referenced by the overlay's patches must be set and
            # non-empty here — an empty expansion is exactly the class of
            # failure that evicted #2462 from the merge queue.
            local vars v fmt=""
            vars=$(grep -rhoE '[$][{][A-Za-z_][A-Za-z0-9_]*[}]' "$dir" | sort -u | tr -d '{}$') || true
            for v in $vars; do
              if [ -z "${!v:-}" ]; then
                echo "::error::${dir}: \${${v}} is referenced by a patch but unset/empty — deploy would render an invalid machine config"
                exit 1
              fi
              fmt="${fmt}\${${v}} "
            done

            local out; out=$(mktemp -d)
            talosctl gen config ci-validate https://192.0.2.1:6443 --output-dir "${out}" >/dev/null

            # Mirror ksail's patch layering: cluster/ applies to every node,
            # control-planes/ and workers/ to their role. Expand env per patch
            # and fail on any token that survives substitution.
            local role base patches f expanded
            for role in control-planes workers; do
              case "${role}" in
                control-planes) base="${out}/controlplane.yaml" ;;
                workers) base="${out}/worker.yaml" ;;
              esac
              patches=()
              for f in "${dir}"/cluster/*.yaml "${dir}/${role}"/*.yaml; do
                [ -f "${f}" ] || continue
                expanded="${out}/$(echo "${f}" | tr '/' '_')"
                # Allowlist-scoped substitution: only the pre-checked vars are
                # expanded, so an unexpected placeholder shape survives for the
                # post-check below instead of being silently cleared.
                if [ -n "${fmt}" ]; then
                  envsubst "${fmt}" < "${f}" > "${expanded}"
                else
                  cp "${f}" "${expanded}"
                fi
                if grep -qE '[$][{][A-Za-z_][A-Za-z0-9_]*[}]' "${expanded}"; then
                  echo "::error::${f}: unexpanded \${VAR} after substitution"
                  exit 1
                fi
                patches+=("--patch" "@${expanded}")
              done
              if [ "${#patches[@]}" -gt 0 ]; then
                talosctl machineconfig patch "${base}" "${patches[@]}" -o "${out}/${role}-patched.yaml"
              else
                cp "${base}" "${out}/${role}-patched.yaml"
              fi
              talosctl validate -c "${out}/${role}-patched.yaml" -m "${mode}" >/dev/null
              echo "${dir}/${role}: rendered + validated (${mode})"
            done
            echo "::endgroup::"
          }

          validate_overlay talos cloud          # prod (Hetzner)
          validate_overlay talos-local container # local Docker test-bed

  deploy-prod:
    name: 🚀 Deploy to Prod
    needs: [changes]
    if: github.event_name == 'merge_group' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: prod
    # Shared with the CD workflow (cd.yaml) so a manual deploy and a
    # merge-queue deploy can never run against the prod cluster at once.
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
      id-token: write # mint OIDC token for cosign keyless signing (Fulcio + Rekor)
      attestations: write # write SBOM + SLSA provenance attestations (see deploy-prod action)
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🚀 Deploy to Production
        # Shared with cd.yaml's manual deploy via this composite action so the
        # merge-queue and manual paths can never drift. Secrets are passed as
        # inputs because composite actions cannot read `secrets` directly.
        uses: ./.github/actions/deploy-prod
        with:
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          kube-config: ${{ secrets.KUBE_CONFIG }}
          talos-config: ${{ secrets.TALOS_CONFIG }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          hcloud-token: ${{ secrets.HCLOUD_TOKEN }}
          wg-server-private-key: ${{ secrets.WG_SERVER_PRIVATE_KEY }}

  heal-prod-on-failure:
    name: 🩹 Heal Prod (restore main after unsuccessful merge-group deploy)
    needs: [changes, deploy-prod]
    # The deploy above runs on the SPECULATIVE merge ref, before the PR lands on
    # `main`. When it fails the merge group is ejected — but the OCI `latest` tag
    # (and the prod cluster reconciling it) is left pointing at that ejected
    # artifact, which never lands on `main`, so prod silently diverges from Git
    # until some future merge overwrites it (devantler-tech/platform#2026). This
    # unsuccessful-path-only job re-deploys the current tip of `main` via the
    # SAME composite, so the speculative artifact is immediately replaced by
    # main's signed artifact and prod reconverges with Git. It covers explicit
    # cancellation too: GitHub re-evaluates job conditions during normal
    # cancellation, and `always()` keeps this cleanup eligible after the deploy
    # job becomes cancelled. It has ZERO effect on a green merge (skipped) and
    # does NOT relax the gate: deploy-prod's failure still fails `CI - Required
    # Checks` below, so the PR is still ejected. It is intentionally NOT part of
    # that aggregation — it is best-effort cleanup, not a merge gate.
    if: >-
      always() &&
      github.event_name == 'merge_group' &&
      needs.changes.outputs.k8s == 'true' &&
      (needs.deploy-prod.result == 'failure' ||
       needs.deploy-prod.result == 'cancelled')
    runs-on: ubuntu-latest
    environment: prod
    # Same shared lock as deploy-prod / cd.yaml so the heal can never run against
    # the prod cluster at the same time as another deploy. `needs: deploy-prod`
    # also guarantees the failed deploy has released the lock before the heal
    # acquires it, so there is no self-deadlock.
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
      id-token: write # mint OIDC token for cosign keyless signing (Fulcio + Rekor)
      attestations: write # write SBOM + SLSA provenance attestations (see deploy-prod action)
    steps:
      - name: 📑 Checkout main
        # Deploy the CURRENT tip of `main` (the last state that actually landed in
        # Git), not the merge group's base_sha, so the heal can never regress prod
        # below a newer merge that landed while this group was in flight.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: 🩹 Re-deploy main to Production
        # Reuse the shared deploy composite (push → sign → attest → reconcile →
        # cluster update) against main's checkout, so the restored artifact is
        # byte-for-byte a normal main deploy (fully signed/attested) — no drift
        # from the happy path.
        uses: ./.github/actions/deploy-prod
        with:
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          kube-config: ${{ secrets.KUBE_CONFIG }}
          talos-config: ${{ secrets.TALOS_CONFIG }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          hcloud-token: ${{ secrets.HCLOUD_TOKEN }}
          wg-server-private-key: ${{ secrets.WG_SERVER_PRIVATE_KEY }}

  ci-required-checks:
    name: CI - Required Checks
    runs-on: ubuntu-latest
    needs: [changes, validate, naming, validate-talos, deploy-prod]
    if: always()
    permissions: {}
    steps:
      - name: 📊 Evaluate job results
        uses: devantler-tech/actions/aggregate-job-checks@468d652134d991e5cdd4feb1fb942c443897a17f # v10.0.1
        with:
          job-results: >-
            ${{ needs.changes.result }}
            ${{ needs.validate.result }}
            ${{ needs.naming.result }}
            ${{ needs.validate-talos.result }}
            ${{ needs.deploy-prod.result }}
