name: CI
on:
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      pull-requests: read # detect changed files
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            k8s:
              - 'k8s/**'
              - 'ksail.yaml'
              - 'ksail.prod.yaml'
              - '.sops.yaml'
              - 'talos-local/**'
              - 'talos/**'
              - 'scripts/validate-naming.py'
              - '.github/workflows/ci.yaml'

  validate:
    name: 🧪 Validate Manifests
    needs: [changes]
    # Static, no-cluster validation. The local Docker cluster is now a thin
    # manual test-bed (see AGENTS.md) rather than a full prod stand-in, so CI no
    # longer boots it; instead it schema-validates and security-scans the
    # manifests. This needs no secrets, so — unlike the old system test — it also
    # runs on fork PRs.
    if: github.event_name == 'pull_request' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        # Renovate-managed (datasource github-releases; grouped 'ksail' with the
        # deploy-prod / dr-rebuild pins). The validate step below renders
        # HelmReleases in-process (Kustomize + Helm) so the actually-applied
        # manifests are validated. This was briefly non-deterministic — a
        # buffer-aliasing data race in kubeconform's resource.FromStream (it yields
        # resources aliasing the reused bufio.Scanner buffer, parsed concurrently
        # with the producer's next Scan()) corrupted the validated stream on the
        # >4MB HelmRelease-dense overlays (ksail#5362) — and was worked around with
        # --skip-helm-render (platform PR #2270). Fixed upstream in
        # yannh/kubeconform#363 and picked up via ksail's kubeconform bump, so the
        # workaround is removed below and full-render validation is restored.
        # TRIPWIRE: if validate/scan starts swinging run-to-run again, re-add
        # --skip-helm-render and reopen ksail#5362.
        shell: bash
        env:
          # renovate: datasource=github-releases depName=devantler-tech/ksail extractVersion=^v(?<version>.+)$
          KSAIL_VERSION: "7.114.0"
        run: |
          curl -fsSL "https://github.com/devantler-tech/ksail/releases/download/v${KSAIL_VERSION}/ksail_${KSAIL_VERSION}_linux_amd64.tar.gz" -o /tmp/ksail.tar.gz
          tar -xzf /tmp/ksail.tar.gz -C /tmp
          sudo install /tmp/ksail /usr/local/bin/ksail
          ksail --version

      - name: ✅ Validate manifests (local + prod overlays)
        # Schema-aware kubeconform validation with Flux variable substitution,
        # building both cluster overlays. Fully static: no cluster, no SOPS key
        # (Secrets are skipped), no network (offline schema cache). HelmReleases
        # are rendered in-process so the actually-applied manifests are validated;
        # this is deterministic now that the kubeconform FromStream race (ksail#5362,
        # fixed via yannh/kubeconform#363) is resolved. See the Setup KSail note.
        run: |
          ksail workload validate
          ksail --config ksail.prod.yaml workload validate

      - name: 🔎 Scan manifests (Kubescape NSA) — hard gate
        # Static NSA-CISA security scan, gated on the compliance score: the job
        # FAILS if a change drops the posture below the threshold, so new
        # findings must be fixed (or justified) before merge.
        #
        # The threshold (85) is a regression FLOOR, not the live score. The
        # Kubescape compliance score is **environment-dependent** — the same
        # binary on the same manifests scores higher locally (macOS, ≈94%) than on
        # the Linux CI runner (≈87%), a gap that isn't the render, the framework
        # cache, or the merge content — and the absolute value also shifts with the
        # ksail render, so it can't be reproduced exactly offline. CI is the source
        # of truth; the gate sits a few points under the observed CI value to catch
        # real regressions without flaking on that variance. (NB the floor may need
        # re-baselining after a ksail version bump.)
        #
        # It is not higher because the residual findings are either runtime-
        # enforced (Kyverno securityContext/limits, CiliumNetworkPolicy) or
        # genuinely unfixable — notably C-0002, the KubeVirt operator's pods/exec
        # RBAC, which it needs to manage VMs and can only be excepted. Native scan
        # exceptions have now shipped (devantler-tech/ksail#5369); wiring the
        # platform's ClusterSecurityException CRs into the scan and ratcheting the
        # threshold toward 100 is tracked in #2264. Until then, ratchet up as
        # genuine gaps are fixed; never lower it.
        run: ksail workload scan --framework nsa --compliance-threshold 85

  naming:
    name: 🏷️ Validate Naming Conventions
    needs: [changes]
    # Static folder/file naming gate: kebab-case dirs, one-resource-per-file,
    # type-led filenames, and flux-kustomization disambiguation. Pure Python
    # stdlib — no cluster, no secrets, no network — so it also runs on fork PRs
    # and returns in seconds. See scripts/validate-naming.py and AGENTS.md
    # 'File and Directory Naming Conventions'.
    if: github.event_name == 'pull_request' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🏷️ Validate naming conventions
        run: python3 scripts/validate-naming.py

  deploy-prod:
    name: 🚀 Deploy to Prod
    needs: [changes]
    if: github.event_name == 'merge_group' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: prod
    # Shared with the CD workflow (cd.yaml) so a manual deploy and a
    # merge-queue deploy can never run against the prod cluster at once.
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
      id-token: write # mint OIDC token for cosign keyless signing (Fulcio + Rekor)
      attestations: write # write SBOM + SLSA provenance attestations (see deploy-prod action)
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🚀 Deploy to Production
        # Shared with cd.yaml's manual deploy via this composite action so the
        # merge-queue and manual paths can never drift. Secrets are passed as
        # inputs because composite actions cannot read `secrets` directly.
        uses: ./.github/actions/deploy-prod
        with:
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          kube-config: ${{ secrets.KUBE_CONFIG }}
          talos-config: ${{ secrets.TALOS_CONFIG }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          hcloud-token: ${{ secrets.HCLOUD_TOKEN }}

  heal-prod-on-failure:
    name: 🩹 Heal Prod (restore main on merge-group failure)
    needs: [changes, deploy-prod]
    # The deploy above runs on the SPECULATIVE merge ref, before the PR lands on
    # `main`. When it fails the merge group is ejected — but the OCI `latest` tag
    # (and the prod cluster reconciling it) is left pointing at that ejected
    # artifact, which never lands on `main`, so prod silently diverges from Git
    # until some future merge overwrites it (devantler-tech/platform#2026). This
    # failure-path-only job re-deploys the current tip of `main` via the SAME
    # composite, so the ejected artifact is immediately replaced by main's signed
    # artifact and prod reconverges with Git. It has ZERO effect on a green merge
    # (skipped) and does NOT relax the gate: deploy-prod's failure still fails
    # `CI - Required Checks` below, so the PR is still ejected. It is intentionally
    # NOT part of that aggregation — it is best-effort cleanup, not a merge gate.
    if: >-
      always() &&
      github.event_name == 'merge_group' &&
      needs.changes.outputs.k8s == 'true' &&
      needs.deploy-prod.result == 'failure'
    runs-on: ubuntu-latest
    environment: prod
    # Same shared lock as deploy-prod / cd.yaml so the heal can never run against
    # the prod cluster at the same time as another deploy. `needs: deploy-prod`
    # also guarantees the failed deploy has released the lock before the heal
    # acquires it, so there is no self-deadlock.
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
      id-token: write # mint OIDC token for cosign keyless signing (Fulcio + Rekor)
      attestations: write # write SBOM + SLSA provenance attestations (see deploy-prod action)
    steps:
      - name: 📑 Checkout main
        # Deploy the CURRENT tip of `main` (the last state that actually landed in
        # Git), not the merge group's base_sha, so the heal can never regress prod
        # below a newer merge that landed while this group was in flight.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: 🩹 Re-deploy main to Production
        # Reuse the shared deploy composite (push → sign → attest → reconcile →
        # cluster update) against main's checkout, so the restored artifact is
        # byte-for-byte a normal main deploy (fully signed/attested) — no drift
        # from the happy path.
        uses: ./.github/actions/deploy-prod
        with:
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          kube-config: ${{ secrets.KUBE_CONFIG }}
          talos-config: ${{ secrets.TALOS_CONFIG }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          hcloud-token: ${{ secrets.HCLOUD_TOKEN }}

  ci-required-checks:
    name: CI - Required Checks
    runs-on: ubuntu-latest
    needs: [changes, validate, naming, deploy-prod]
    if: always()
    permissions: {}
    steps:
      - name: 📊 Evaluate job results
        uses: devantler-tech/actions/aggregate-job-checks@6a2f24aa5a859f7d0de66f9d0bde52254adba641 # v7.1.3
        with:
          job-results: >-
            ${{ needs.changes.result }}
            ${{ needs.validate.result }}
            ${{ needs.naming.result }}
            ${{ needs.deploy-prod.result }}
