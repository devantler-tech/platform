name: CI
on:
  pull_request:
    branches: [main]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
      pull-requests: read # detect changed files
    outputs:
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 🔍 Filter paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            k8s:
              - 'k8s/**'
              - 'ksail.yaml'
              - 'ksail.prod.yaml'
              - '.sops.yaml'
              - 'talos-local/**'
              - 'talos/**'
              - '.github/workflows/ci.yaml'

  system-test:
    name: 🧪 System Test
    needs: [changes]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🧹 Free disk space
        uses: endersonmenezes/free-disk-space@7901478139cff6e9d44df5972fd8ab8fcade4db1 # v3.2.2
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: false
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"

      - name: 🧪 System Test
        uses: devantler-tech/ksail/.github/actions/ksail-cluster@2961d7c1fea92dd2885037af82b818076afffb93 # v7.65.0
        with:
          # Pin the ksail BINARY to match the action ref above. Without this the
          # action installs `latest`, which is currently 7.66.0 -- and 7.66.0 has
          # a non-deterministic race in `ksail workload validate`'s in-process
          # parallel Helm rendering that corrupts the rendered output at a random
          # point, failing with varying YAML parse errors ("mapping values are
          # not allowed in this context", "could not find expected ':'") on a
          # different kustomization each run. 7.65.0 validates deterministically
          # (97/97). Drop this pin once a ksail release fixes the race.
          ksail-version: "7.65.0"
          distribution: Talos
          provider: Docker
          init: "false"
          validate: "true"
          scan: "true"
          scan-framework: "nsa"
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          hosts-file: ${{ vars.HOSTS_FILE }}
          root-ca-cert-file: ${{ vars.ROOT_CA_CERT_FILE }}
          push: "true"
          reconcile: "true"
          delete: "false"

      - name: 💾 DR restore drill (Velero backup → delete → restore)
        # Validates the full backup → data-loss → restore cycle against the
        # in-cluster MinIO (the local R2 stand-in) on every k8s PR, so the
        # Velero code path is regression-tested before changes reach prod.
        # Reuses the cluster the System Test step just reconciled; adds ~2-3
        # minutes. See docs/dr/restore-drill.md for design + manual run.
        run: |
          set -euo pipefail

          # Resource names are fully qualified with the velero.io group
          # throughout: CNPG also defines a `backups` resource, and kubectl
          # resolves an unqualified `backup` to backups.postgresql.cnpg.io on
          # this cluster — the drill's first run polled the wrong API group
          # for its entire timeout while the actual Velero backup completed.
          dump_velero_state() {
            echo "::group::Velero state (drill failure)"
            kubectl -n velero get backupstoragelocations.velero.io,backups.velero.io,restores.velero.io -o wide || true
            kubectl -n velero describe backups.velero.io dr-drill || true
            kubectl -n velero describe restores.velero.io dr-drill || true
            kubectl -n velero logs deploy/velero --tail=200 || true
            echo "::endgroup::"
          }
          trap dump_velero_state ERR

          wait_phase() {
            # wait_phase <kind> <name> <timeout-seconds> — poll a Velero CR
            # until .status.phase is Completed; fail fast on a terminal
            # failure phase instead of burning the whole timeout.
            local kind="$1" name="$2" timeout="$3" phase=""
            local deadline=$((SECONDS + timeout))
            while [ "$SECONDS" -lt "$deadline" ]; do
              phase=$(kubectl -n velero get "$kind" "$name" -o jsonpath='{.status.phase}' 2>/dev/null || true)
              case "$phase" in
                Completed) echo "$kind/$name: Completed"; return 0 ;;
                Failed|PartiallyFailed|FailedValidation)
                  echo "::error::$kind/$name entered terminal phase $phase"
                  return 1 ;;
                *) sleep 5 ;;
              esac
            done
            echo "::error::$kind/$name did not complete within ${timeout}s (last phase: ${phase:-<none>})"
            return 1
          }

          echo "::group::Wait for BackupStorageLocation default to be Available"
          kubectl -n velero wait backupstoragelocations.velero.io/default \
            --for=jsonpath='{.status.phase}'=Available --timeout=10m
          echo "::endgroup::"

          echo "::group::Create marker namespace + ConfigMap"
          kubectl create namespace dr-drill
          kubectl -n dr-drill create configmap dr-marker \
            --from-literal=run-id="${GITHUB_RUN_ID}" \
            --from-literal=sha="${GITHUB_SHA}"
          echo "::endgroup::"

          echo "::group::Back up the marker namespace"
          kubectl -n velero create -f - <<EOF
          apiVersion: velero.io/v1
          kind: Backup
          metadata:
            name: dr-drill
            namespace: velero
          spec:
            includedNamespaces:
              - dr-drill
            storageLocation: default
            ttl: 1h0m0s
          EOF
          wait_phase backups.velero.io dr-drill 300
          echo "::endgroup::"

          echo "::group::Simulate data loss (delete the namespace)"
          kubectl delete namespace dr-drill --wait=true --timeout=2m
          if kubectl get namespace dr-drill >/dev/null 2>&1; then
            echo "::error::namespace dr-drill still exists after deletion"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::Restore from the backup"
          kubectl -n velero create -f - <<EOF
          apiVersion: velero.io/v1
          kind: Restore
          metadata:
            name: dr-drill
            namespace: velero
          spec:
            backupName: dr-drill
          EOF
          wait_phase restores.velero.io dr-drill 300
          echo "::endgroup::"

          echo "::group::Verify restored marker"
          restored=$(kubectl -n dr-drill get configmap dr-marker -o jsonpath='{.data.run-id}')
          if [ "${restored}" != "${GITHUB_RUN_ID}" ]; then
            echo "::error::restored run-id '${restored}' does not match expected '${GITHUB_RUN_ID}'"
            exit 1
          fi
          echo "✅ Restore drill passed: marker ConfigMap restored with matching run-id."
          echo "::endgroup::"

      - name: 🩺 Diagnose Flux on failure
        if: failure()
        run: |
          set +e
          echo "::group::Nodes"
          kubectl get nodes -o wide
          echo "::endgroup::"
          echo "::group::Flux Kustomizations"
          kubectl get kustomizations.kustomize.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux HelmReleases"
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Flux OCIRepositories"
          kubectl get ocirepositories.source.toolkit.fluxcd.io -A -o wide
          echo "::endgroup::"
          echo "::group::Failing Kustomizations describe"
          for k in infrastructure-controllers infrastructure apps; do
            echo "--- $k ---"
            kubectl describe kustomizations.kustomize.toolkit.fluxcd.io "$k" -n flux-system 2>&1 | tail -80
          done
          echo "::endgroup::"
          echo "::group::Flux controller pods"
          kubectl get pods -n flux-system -o wide
          echo "::endgroup::"
          echo "::group::kustomize-controller logs"
          kubectl logs -n flux-system -l app=kustomize-controller --tail=300
          echo "::endgroup::"
          echo "::group::helm-controller logs"
          kubectl logs -n flux-system -l app=helm-controller --tail=300
          echo "::endgroup::"
          echo "::group::source-controller logs"
          kubectl logs -n flux-system -l app=source-controller --tail=200
          echo "::endgroup::"
          echo "::group::All pods"
          kubectl get pods -A -o wide
          echo "::endgroup::"
          echo "::group::Recent events (warnings)"
          kubectl get events -A --field-selector type=Warning --sort-by=.lastTimestamp | tail -100
          echo "::endgroup::"
          echo "::group::Failed/CrashLooping pod logs"
          # Dump previous + current logs from any pod that's not Running OR
          # has containers in a waiting/terminated-error state. CrashLoopBackOff
          # pods stay in phase=Running with waiting.reason=CrashLoopBackOff,
          # so we must inspect containerStatuses, not just phase.
          pods_to_dump=$(kubectl get pods -A -o json 2>/dev/null | jq -r '
            .items[]
            | select(
                .status.phase != "Running" and .status.phase != "Succeeded"
                or ((.status.containerStatuses // [])[]? | (.restartCount // 0) > 0)
                or ((.status.containerStatuses // [])[]? | (.state.waiting.reason // "") | test("CrashLoopBackOff|Error|ImagePullBackOff|ErrImagePull|CreateContainerError"))
                or ((.status.containerStatuses // [])[]? | (.state.terminated.reason // "") == "Error")
              )
            | "\(.metadata.namespace)\t\(.metadata.name)"
          ' | sort -u)
          while IFS=$'\t' read -r ns name; do
            [ -z "$ns" ] && continue
            echo "--- $ns/$name (previous + current) ---"
            kubectl logs -n "$ns" "$name" --all-containers --previous --tail=200 2>&1 | sed 's/^/  /'
            echo "  --- current ---"
            kubectl logs -n "$ns" "$name" --all-containers --tail=200 2>&1 | sed 's/^/  /'
          done <<< "$pods_to_dump"
          # Also dump logs from any Job pods (these often complete then disappear from "not Running")
          while IFS=$'\t' read -r ns name; do
            [ -z "$ns" ] && continue
            echo "--- Job pod $ns/$name ---"
            kubectl logs -n "$ns" "$name" --all-containers --tail=200 2>&1 | sed 's/^/  /'
          done < <(kubectl get pods -A -l job-name -o jsonpath='{range .items[*]}{.metadata.namespace}{"\t"}{.metadata.name}{"\n"}{end}' 2>/dev/null)
          echo "::endgroup::"
          echo "::group::Failing Jobs describe"
          kubectl get jobs -A -o json 2>/dev/null | jq -r '.items[] | select(.status.failed > 0 or (.status.conditions // [])[]?.type == "Failed") | "\(.metadata.namespace)/\(.metadata.name)"' | while read -r job; do
            ns="${job%%/*}"; name="${job##*/}"
            echo "--- $ns/$name ---"
            kubectl describe job -n "$ns" "$name" 2>&1 | tail -50
          done
          echo "::endgroup::"
          echo "::group::OpenBao state"
          # The vault seeding chain (ClusterSecretStore, PushSecrets,
          # vault-config Job) all route through the openbao-active Service,
          # whose endpoints depend on OpenBao's Kubernetes service
          # registration labelling the active pod (openbao-active=true).
          # When that chain wedges, the generic dumps above miss the three
          # facts that identify the break: pod labels, Service endpoints,
          # and the OpenBao server log (2026-06-10 post-mortems had none
          # of them). Dump all three.
          kubectl get pods -n openbao --show-labels
          kubectl get svc -n openbao -o wide
          kubectl get endpointslices -n openbao -o wide
          for pod in $(kubectl get pods -n openbao -l app.kubernetes.io/name=openbao -o name); do
            echo "--- $pod server log ---"
            kubectl logs -n openbao "$pod" --tail=150 2>&1 | sed 's/^/  /'
          done
          # Label-patch probe: OpenBao's service registration updates pod
          # labels with RFC 6902 `replace` ops and on the 2026-06-10 runs the
          # apiserver rejected every update with a bare 422 (OpenBao does not
          # log the response body), freezing the labels at their startup
          # values so openbao-active never gained endpoints. Replay the same
          # operation with kubectl, which prints the apiserver's full
          # explanation of WHAT is invalid, plus a server-side dry-run apply
          # of the unmodified pod to surface latent object-validation errors.
          echo "--- label patch probe (single replace, current value) ---"
          CUR=$(kubectl get pod openbao-0 -n openbao -o jsonpath='{.metadata.labels.openbao-active}')
          kubectl patch pod openbao-0 -n openbao --type=json \
            -p "[{\"op\":\"replace\",\"path\":\"/metadata/labels/openbao-active\",\"value\":\"$CUR\"}]" 2>&1 | sed 's/^/  /'
          echo "--- label patch probe (batch replace, all openbao-* labels) ---"
          kubectl get pod openbao-0 -n openbao -o json | jq -r '
            .metadata.labels | to_entries
            | map(select(.key | startswith("openbao-")))
            | map({op: "replace", path: ("/metadata/labels/" + .key), value: .value})' \
            | kubectl patch pod openbao-0 -n openbao --type=json --patch-file=/dev/stdin 2>&1 | sed 's/^/  /'
          echo "--- pod self-validation (server-side dry-run re-apply) ---"
          kubectl get pod openbao-0 -n openbao -o json \
            | kubectl replace --dry-run=server -f - 2>&1 | tail -5 | sed 's/^/  /'
          echo "::endgroup::"

      - name: 🔥 Delete cluster
        if: always()
        run: ksail cluster delete || echo "⚠️ Cluster may not have been created"


  deploy-prod:
    name: 🚀 Deploy to Prod
    needs: [changes]
    if: github.event_name == 'merge_group' && needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    environment: prod
    # Shared with the CD workflow (cd.yaml) so a manual deploy and a
    # merge-queue deploy can never run against the prod cluster at once.
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
      id-token: write # mint OIDC token for cosign keyless signing (Fulcio + Rekor)
      attestations: write # write SBOM + SLSA provenance attestations (see deploy-prod action)
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: 🚀 Deploy to Production
        # Shared with cd.yaml's manual deploy via this composite action so the
        # merge-queue and manual paths can never drift. Secrets are passed as
        # inputs because composite actions cannot read `secrets` directly.
        uses: ./.github/actions/deploy-prod
        with:
          sops-age-key: ${{ secrets.SOPS_AGE_KEY }}
          kube-config: ${{ secrets.KUBE_CONFIG }}
          talos-config: ${{ secrets.TALOS_CONFIG }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          hcloud-token: ${{ secrets.HCLOUD_TOKEN }}

  ci-required-checks:
    name: CI - Required Checks
    runs-on: ubuntu-latest
    needs: [changes, system-test, deploy-prod]
    if: always()
    permissions: {}
    steps:
      - name: 📊 Evaluate job results
        uses: devantler-tech/actions/aggregate-job-checks@9d98cb8be059537ec1e82f71c90d75ecba321713 # v6.1.0
        with:
          job-results: >-
            ${{ needs.changes.result }}
            ${{ needs.system-test.result }}
            ${{ needs.deploy-prod.result }}
