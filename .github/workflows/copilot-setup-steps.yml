name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions: {}

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Verify tools
        run: |
          echo "--- kustomize ---"
          kustomize version
          echo "--- kubectl ---"
          kubectl version --client
          echo "--- Validate kustomize builds ---"
          kustomize build k8s/clusters/local/ > /dev/null
          kustomize build k8s/clusters/prod/ > /dev/null
          echo "All kustomize builds passed"
