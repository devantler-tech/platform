name: CD - Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        uses: devantler-tech/actions/setup-ksail-action@884a9b7321e269351d5fc006d95e0b50b2ddedf6 # v1.9.7

      - name: 🔐 Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🔐 Create SOPS Age key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt

      - name: 🔐 Create SOPS Age secret in cluster
        run: |
          kubectl create secret generic sops-age \
            --namespace=flux-system \
            --from-literal=sops.agekey="$SOPS_AGE_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: 🔄 Set root kustomization to prod
        run: sed -i 's|clusters/local|clusters/prod|' k8s/kustomization.yaml

      - name: 📦 Push manifests to GHCR
        run: ksail --config ksail.prod.yaml workload push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔁 Trigger Flux reconciliation
        run: ksail --config ksail.prod.yaml workload reconcile
