name: CD - Deploy

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        uses: devantler-tech/actions/setup-ksail-action@884a9b7321e269351d5fc006d95e0b50b2ddedf6 # v1.9.7

      - name: 🔐 Setup kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 🔐 Create SOPS Age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          echo "${SOPS_AGE_KEY}" > ~/.config/sops/age/keys.txt

      - name: 🔄 Set root kustomization to prod
        run: sed -i 's|clusters/local|clusters/prod|' k8s/kustomization.yaml

      - name: 📦 Push manifests to GHCR
        run: ksail --config ksail.prod.yaml workload push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔁 Trigger Flux reconciliation
        run: ksail --config ksail.prod.yaml workload reconcile
