name: CD

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read # checkout repository
      packages: write # push OCI artifacts to GHCR
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        uses: devantler-tech/actions/setup-ksail-action@884a9b7321e269351d5fc006d95e0b50b2ddedf6 # v1.9.7

      - name: 🔐 Setup kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG}" > ~/.kube/config
          chmod 600 ~/.kube/config
          CONTEXT=$(kubectl config current-context)
          if [[ "$CONTEXT" != "devantler-prod" ]]; then
            kubectl config rename-context "$CONTEXT" "devantler-prod"
          fi

      - name: 🔐 Create SOPS Age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          umask 077
          echo "${SOPS_AGE_KEY}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: 🔄 Create or update cluster
        run: |
          if ksail --config ksail.prod.yaml cluster info &>/dev/null; then
            ksail --config ksail.prod.yaml cluster update
          else
            ksail --config ksail.prod.yaml cluster create
          fi
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}

      - name: 📦 Push manifests to GHCR
        run: ksail --config ksail.prod.yaml workload push
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}

      - name: 🔁 Trigger Flux reconciliation
        run: ksail --config ksail.prod.yaml workload reconcile
        env:
          OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
