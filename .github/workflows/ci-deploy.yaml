name: CI - Deploy

on:
  push:
    branches-ignore:
      - gh-readonly-queue/main/pr-**
  merge_group:

permissions:
  contents: read
  packages: write

jobs:
  # TODO: Reenable dev when no longer in savings mode
  # bootstrap-dev:
  #   uses: devantler-tech/reusable-workflows/.github/workflows/cd-cluster-bootstrap.yaml@800bac1f7de14fcc6b9b9bcf62e201308eafd15b # v1.15.12
  #   with:
  #     DEPLOYMENT_ENV: dev
  #     SKIP: ${{ github.event_name != 'merge_group' }}
  #   secrets:
  #     KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  #     SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

  # deploy-dev:
  #   needs: bootstrap-dev
  #   uses: devantler-tech/reusable-workflows/.github/workflows/cd-gitops-deploy.yaml@800bac1f7de14fcc6b9b9bcf62e201308eafd15b # v1.15.12
  #   with:
  #     DEPLOYMENT_ENV: dev
  #     SKIP: ${{ github.event_name != 'merge_group' }}
  #   secrets:
  #     KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  #     SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

  ci-local:
    runs-on: ubuntu-latest
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        uses: devantler-tech/actions/setup-ksail-action@884a9b7321e269351d5fc006d95e0b50b2ddedf6 # v1.9.7

      - name: 🔐 Create SOPS Age key
        run: |
          mkdir -p ~/.config/sops/age
          echo "$SOPS_AGE_KEY" > ~/.config/sops/age/keys.txt
        env:
          SOPS_AGE_KEY: ${{ secrets.KSAIL_SOPS_KEY }}

      - name: 🚀 Create Talos+Docker cluster
        run: ksail cluster create

      - name: 🔐 Create SOPS Age secret in cluster
        run: |
          kubectl create secret generic sops-age \
            --namespace=flux-system \
            --from-literal=sops.agekey="$SOPS_AGE_KEY"
        env:
          SOPS_AGE_KEY: ${{ secrets.KSAIL_SOPS_KEY }}

      - name: 📦 Push manifests to local registry
        run: ksail workload push

      - name: 🔁 Trigger Flux reconciliation
        run: ksail workload reconcile

      - name: 🧹 Cleanup
        if: always()
        run: ksail cluster delete --force
