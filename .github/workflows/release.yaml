name: Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  release:
    uses: devantler-tech/actions/.github/workflows/create-release.yaml@8436c4a9e86ab75cd485e91530eb39bf9104bbeb # v10.1.4
    with:
      disable-issue-side-effects: true
    permissions:
      contents: write # create releases and tags
      id-token: write # provenance signing
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
