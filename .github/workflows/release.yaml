name: Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  release:
    uses: devantler-tech/reusable-workflows/.github/workflows/create-release.yaml@11f70d3be475887db4f262f415fcb19c72a1fa73 # v3.0.1
    permissions:
      contents: write # create releases and tags
      issues: write # comment on related issues
      pull-requests: write # comment on related PRs
      id-token: write # provenance signing
    secrets:
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
