name: Release
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  release:
    uses: devantler-tech/reusable-workflows/.github/workflows/create-release.yaml@7d3a08e3cc284c6fa14a056d5df7702ec0978d59 # v5.5.10
    permissions:
      contents: write # create releases and tags
      issues: write # comment on related issues
      pull-requests: write # comment on related PRs
      id-token: write # provenance signing
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
