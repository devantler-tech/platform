name: Sync labels
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  sync-labels:
    name: 🔄 Sync Labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # sync issue labels
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: 🔄 Sync labels
        uses: devantler-tech/actions/sync-github-labels@19f1f2e8c01aeafe037af8ca26d8c2dab1dee2a4 # v3.2.3
