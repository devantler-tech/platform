name: Sync labels
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  sync-labels:
    name: 🔄 Sync Labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # sync issue labels
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: 🔄 Sync labels
        uses: devantler-tech/actions/sync-github-labels@b31ec7baa4d7e9ca5b113f56cc928fe708872431 # v5.4.2
