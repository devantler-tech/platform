name: Sync labels
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  sync-labels:
    name: 🔄 Sync Labels
    runs-on: ubuntu-latest
    permissions:
      issues: write # sync issue labels
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: 🔄 Sync labels
        uses: devantler-tech/actions/sync-labels-action@6d18f29330dd5818cf03c8508fb125cc05441fad # v1.9.6
