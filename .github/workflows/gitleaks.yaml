name: Gitleaks
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly full-history sweep (Monday 06:00 UTC) catches anything that slipped
    # through a fork-merged PR that bypassed the per-PR scan.
    - cron: "0 6 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: 🔐 Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout repository
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Full history is required so the scan can walk every commit
          # introduced by this branch / push, not just the tip.
          fetch-depth: 0

      - name: ⬇️ Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: 🔍 Scan git history
        run: |
          gitleaks git . \
            --no-banner \
            --redact \
            --config=.gitleaks.toml \
            --gitleaks-ignore-path=.gitleaksignore \
            --report-format=sarif \
            --report-path=gitleaks.sarif \
            --exit-code=1

      - name: 📤 Upload SARIF
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 30
