name: Update Agent Skills
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  update-agent-skills:
    permissions:
      contents: write
      pull-requests: write
    uses: devantler-tech/reusable-workflows/.github/workflows/update-agent-skills.yaml@f974f62a8cb396130fa084d209ad1fc17e99b9fc # v5.6.1
    with:
      dir: .agents/skills
      # Create the update PR with a GitHub App token so it triggers this
      # repo's required CI (a PR opened with GITHUB_TOKEN does not), instead
      # of landing permanently blocked on missing required checks.
      use-app-token: true
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
