name: Update Copilot Skills
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  update-copilot-skills:
    permissions:
      contents: write
      pull-requests: write
    uses: devantler-tech/reusable-workflows/.github/workflows/update-copilot-skills.yaml@11f70d3be475887db4f262f415fcb19c72a1fa73 # v1.39.0+ (post skills-lock refactor)
    with:
      dir: .agents/skills
