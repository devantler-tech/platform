name: Update Copilot Skills
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

permissions: {}

jobs:
  update-copilot-skills:
    permissions:
      contents: write
      pull-requests: write
    uses: devantler-tech/reusable-workflows/.github/workflows/update-copilot-skills.yaml@ee83c5e5cbfb7107701ddda9a7754aeab87d3a0a # main @ 2026-04-19
    with:
      dir: .agents/skills
