# Lightweight deploy path for app-only changes (e.g. the OCIRepository tag
# bumps committed by Flux ImageUpdateAutomation, which use a non-releasing
# `chore(apps):` message). Republishes the manifests OCI artifact and triggers
# reconciliation WITHOUT running `ksail cluster update`, so routine image
# rollouts don't reconcile the whole Talos/Hetzner cluster. Infrastructure
# changes still go through the release-gated cd.yaml (full cluster update).
name: 🔁 Reconcile Apps

on:
  push:
    branches: [main]
    paths:
      - "k8s/bases/apps/**"
      - "k8s/providers/*/apps/**"

permissions: {}

concurrency:
  group: reconcile-apps
  cancel-in-progress: false

jobs:
  reconcile-apps:
    name: 🔁 Republish & reconcile apps
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read # checkout
      packages: write # push OCI artifact to GHCR
    steps:
      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⚙️ Setup KSail
        uses: devantler-tech/actions/setup-ksail-cli@59d3ffbe1a9437fcc39e2794fa2f221abe878310 # v3.3.0

      - name: 🔐 Create SOPS Age key
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          mkdir -p ~/.config/sops/age
          umask 077
          echo "${SOPS_AGE_KEY}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt

      - name: 🔑 Restore kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          umask 077
          printf '%s' "${KUBE_CONFIG}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: 📦 Push manifests to GHCR
        run: ksail --config ksail.prod.yaml workload push
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

      - name: 🔁 Trigger Flux reconciliation
        run: ksail --config ksail.prod.yaml workload reconcile
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
