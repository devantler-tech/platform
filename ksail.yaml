# Local Talos + Docker development cluster.
# See docs/TEMPLATING.md for the fields a fork of this repo needs to edit.
---
apiVersion: ksail.io/v1alpha1
kind: Cluster
metadata:
  name: local
spec:
  cluster:
    distributionConfig: talos-local
    connection:
      context: admin@local
      timeout: 40m
    distribution: Talos
    provider: Docker
    cni: Cilium
    csi: Enabled
    gitOpsEngine: Flux
    certManager: Enabled
    metricsServer: Enabled
    policyEngine: Kyverno
    controlPlanes: 1
    # A small single-worker cluster: this is a thin manual test-bed for trying a
    # component out before promoting it to prod, not a prod-fidelity stand-in.
    # The core component set has no hard pod anti-affinity, so one worker is
    # enough. Raise this if you opt in a component you want to see spread across
    # nodes (e.g. multi-instance CNPG, Velero node-spread).
    workers: 1
    talos:
      extraPortMappings:
        - containerPort: 80
          hostPort: 80
        - containerPort: 443
          hostPort: 443
  workload:
    sourceDirectory: k8s
    kustomizationFile: clusters/local
    validation:
      # Skip CRs whose CRD-catalog schemas kubeconform cannot resolve during
      # `ksail workload validate` (requires ksail >= 7.26.0):
      #   - Coroot (coroot.com/v1): the datreeio catalog schema is stale
      #     (additionalProperties: false, missing newer fields like
      #     nodeAgent/clickhouse), so kubeconform rejects valid manifests.
      #   - MetricTemplate / Canary (flagger.app/v1beta1): the Flagger CRDs are
      #     installed by the flagger HelmRelease at runtime and are not in the
      #     catalog, so the MetricTemplates and the onboarded Canaries (umami,
      #     homepage, opencost) can't be schema-checked offline.
      skipKinds:
        - Coroot
        - MetricTemplate
        - Canary

