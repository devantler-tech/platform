---
apiVersion: ksail.io/v1alpha1
kind: Cluster
metadata:
  name: local
spec:
  cluster:
    distributionConfig: talos-local
    connection:
      context: admin@local
      timeout: 4m
    distribution: Talos
    provider: Docker
    cni: Cilium
    gitOpsEngine: Flux
    talos:
      controlPlanes: 1
      workers: 3
      extraPortMappings:
        - containerPort: 80
          hostPort: 80
        - containerPort: 443
          hostPort: 443
  workload:
    sourceDirectory: k8s
    kustomizationFile: clusters/local
