# Container image signature verification (Talos 1.13+, ImageVerificationConfig).
#
# Verifies cosign signatures at the containerd PULL layer on every node — a
# defense-in-depth complement to the GitOps-source verification Flux already
# performs on OCI *manifest* artifacts (apps' sync.yaml verify.provider:
# cosign). This gates the actual container-image bytes containerd pulls, which
# Flux and the Kyverno admission layer never see (e.g. kubelet-managed static
# pods, a compromised registry serving a tampered image).
#
# Scope: FIRST-PARTY images (ghcr.io/devantler-tech/*). All are keyless-cosign
# signed, but by TWO different signing identities, so they need two rules:
#   1. ghcr.io/devantler-tech/ksail — the ksail-operator image — is signed by
#      ksail's OWN release pipeline (devantler-tech/ksail .github/workflows/
#      cd.yaml; see that repo's GoReleaser `docker_signs` step).
#   2. the app images (wedding-app, ascoachingogvaner, …) are signed by the
#      shared publish-app.yaml workflow — now in devantler-tech/actions
#      (moved from reusable-workflows, actions#425); both identities stay
#      accepted until every app has published a fresh actions-signed image —
#      the SAME transition alternation their Flux OCIRepository verify blocks
#      and the verify-app-images ImageValidatingPolicy already pin.
# Talos evaluates rules in order, first match wins, so the specific ksail rule
# MUST precede the ghcr.io/devantler-tech/* catch-all.
#
# FAIL-OPEN by design for everything else: an image matching NO rule is pulled
# WITHOUT verification, so third-party chart images (Cilium, Longhorn, Coroot,
# registry.k8s.io control-plane images, …) are unaffected — this is
# intentionally NOT a deny-all-unsigned control. The converse: an image that
# DOES match a rule but fails verification is blocked (ImagePullBackOff).
#
# A rule over a system registry (e.g. registry.k8s.io/*, the canonical Talos
# example) would gate control-plane/etcd image pulls — high blast radius on
# this cluster given the manual-talosctl recovery path — so it is deliberately
# omitted for now and can be added later once the first-party rules are proven.
#
# This does NOT satisfy kubescape C-0237 (see
# k8s/bases/infrastructure/security-exceptions/image-verification.yaml): that
# control scans workload image refs at the cluster layer, cannot observe Talos
# node-level verification, and still fails while unsigned third-party images run.
#
# Reference:
#   https://docs.siderolabs.com/talos/v1.13/reference/configuration/security/imageverificationconfig/
apiVersion: v1alpha1
kind: ImageVerificationConfig
rules:
  # ksail-operator image — signed by ksail's OWN release pipeline (cd.yaml),
  # a different keyless identity than publish-app.yaml. MUST precede the
  # catch-all below (first-match-wins). Requires ksail >= the first release
  # that ships the GoReleaser docker_signs cosign step (devantler-tech/ksail
  # #5165) AND the ksail-operator HelmRelease pinned to that signed image tag.
  - image: ghcr.io/devantler-tech/ksail*
    keyless:
      issuer: https://token.actions.githubusercontent.com
      subjectRegex: ^https://github\.com/devantler-tech/ksail/\.github/workflows/cd\.yaml@refs/tags/v.+$
  # Crossplane PROVIDER package images (ghcr.io/devantler-tech/provider-upjet-*)
  # are signed by each provider repo's OWN publish-provider-package.yml — a
  # different keyless identity than publish-app.yaml, because the upstream
  # crossplane-contrib publish reusable workflow can't run publish-app.yaml.
  # Mirrors the verify-app-images ImageValidatingPolicy provider-upjet-*
  # attestor (#2382). MUST precede the catch-all below (first-match-wins) or the
  # catch-all's publish-app.yaml identity rejects these (ImagePullBackOff).
  - image: ghcr.io/devantler-tech/provider-upjet-*
    keyless:
      issuer: https://token.actions.githubusercontent.com
      subjectRegex: ^https://github\.com/devantler-tech/provider-upjet-[a-z0-9-]+/\.github/workflows/publish-provider-package\.yml@.+$
  # First-party APP images signed by the shared publish-app.yaml workflow.
  # publish-app.yaml moved from devantler-tech/reusable-workflows into
  # devantler-tech/actions (actions#425): images published after the move
  # carry the actions identity, which this rule's old reusable-workflows-only
  # regex rejected at the node pull layer (ImagePullBackOff on every new app
  # release). Accept BOTH identities until every app has published a fresh
  # actions-signed image, then narrow to actions-only — the same transition
  # alternation as the apps' Flux OCIRepository verify blocks and the
  # verify-app-images ImageValidatingPolicy.
  - image: ghcr.io/devantler-tech/*
    keyless:
      issuer: https://token.actions.githubusercontent.com
      subjectRegex: ^https://github\.com/devantler-tech/(actions|reusable-workflows)/\.github/workflows/publish-app\.yaml@.+$
