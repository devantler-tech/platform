# Node-level ghcr.io registry auth for first-party image-signature verification.
#
# talos/cluster/verify-first-party-images.yaml (ImageVerificationConfig) verifies the
# cosign signature of every ghcr.io/devantler-tech/* image at the containerd
# PULL layer. That signature is a separate artifact stored in the SAME package
# as the image, and Talos fetches it using THIS RegistryAuthConfig —
# NOT the per-pod `ghcr-auth` imagePullSecret (which kubelet only hands to
# containerd for the image-layer pull). Our first-party packages are PRIVATE,
# so without working node-level ghcr.io credentials the signature fetch is
# denied → verification fails → ImagePullBackOff.
#
# It's latent: an image already cached on a node is "already present" and never
# re-verified, so it only bites a FRESH pull — a new tenant release, or an
# existing image after a node roll evicts its cache (how ascoachingogvaner
# v1.2.0 wedged on prod-worker-1 after the k8s-1.36 roll).
#
# This is pure host auth, not a mirror: it attaches a credential to ghcr.io pulls with
# no endpoint redirect. (ksail's --mirror-registry flag is the wrong tool here —
# it rewrites the endpoint to a local pull-through container that doesn't exist
# on Hetzner, and it's only ever processed at `cluster create`, never on
# `cluster update`.) It is the same credential the cluster already holds for the
# Flux manifests artifact (spec.cluster.localRegistry), so it adds no new trust.
#
# ${GHCR_TOKEN} is expanded by ksail when it loads this patch. Production
# cluster lifecycle commands inject the validated Git/SOPS pull token through
# run-ksail-prod-with-pull-auth.sh; workload push preserves the separate Actions
# write token. The separate mark-ghcr-pull-revision.yaml patch carries a
# non-secret SOPS ciphertext revision because KSail deliberately redacts
# registry credentials from config fingerprints; the marker makes token-only
# rotations update the cluster-autoscaler template used by future nodes.
# Nothing secret is committed. Prod-only by construction: local/CI uses
# talos-local/.
#
# Existing nodes are synchronized separately by refresh-flux-ghcr-auth.sh using
# this same RegistryAuthConfig shape, one node at a time (workers first), and
# each node must then pull the exact live ksail-operator image successfully.
#
# That sync REBOOTS each stale node, and must: containerd loads registry auth
# from its static config once, at process start. Writing a new credential — even
# though Talos re-renders /etc/cri/conf.d/01-registries.part immediately — does
# not reach the running containerd, and Talos refuses to restart it
# (`talosctl service cri restart` → "service 'cri' doesn't support restart
# operation via API"). So on a running node a rotated token is inert until the
# node reboots, and every ghcr.io pull keeps failing with the OLD credential.
#
# It fails SILENTLY, which is why this bit is easy to get wrong: images already
# cached on a node are never re-pulled, so running workloads stay up and the
# cluster looks green — only a FRESH pull (i.e. an upgrade) breaks, and Helm
# then times out and rolls back, deleting the evidence. (2026-07-14: the
# ksail-operator sat four releases behind for over a day this way.)
#
# Note also that a REVOKED credential is worse than none: ghcr.io answers bad
# basic-auth with 403 DENIED on the token exchange instead of falling back to
# anonymous, so a stale token breaks pulls of PUBLIC packages too.
#
# Reference:
#   https://docs.siderolabs.com/talos/v1.13/reference/configuration/cri/registryauthconfig
apiVersion: v1alpha1
kind: RegistryAuthConfig
name: ghcr.io
username: ${GHCR_USERNAME}
password: ${GHCR_TOKEN}
