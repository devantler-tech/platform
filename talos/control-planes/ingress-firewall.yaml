# Ingress firewall rules for control-plane nodes.
# Requires NetworkDefaultActionConfig (ingress: block) from cluster/.
#
# Policy summary:
#   - apid (50000) and Kubernetes API (6443): open to all (external management)
#   - kubelet (10250), trustd (50001): cluster-internal only
#   - etcd (2379-2380): cluster-internal only (Hetzner assigns IPs dynamically)
#   - Cilium VXLAN (8472), health (4240): cluster-internal only
#   - NodePort range (30000-32767): cluster-internal (Hetzner Cloud LB)
#   - Node exporter (9100): cluster-internal (Prometheus scraping)
#
# Cluster network CIDR: 10.0.0.0/16 (from ksail.prod.yaml networkCidr)
#
# Reference: https://docs.siderolabs.com/talos/v1.12/networking/ingress-firewall
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: apid-ingress
portSelector:
  ports:
    - 50000
  protocol: tcp
ingress:
  - subnet: 0.0.0.0/0
  - subnet: ::/0
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: kubernetes-api-ingress
portSelector:
  ports:
    - 6443
  protocol: tcp
ingress:
  - subnet: 0.0.0.0/0
  - subnet: ::/0
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: kubelet-ingress
portSelector:
  ports:
    - 10250
  protocol: tcp
ingress:
  - subnet: 10.0.0.0/16
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: trustd-ingress
portSelector:
  ports:
    - 50001
  protocol: tcp
ingress:
  - subnet: 10.0.0.0/16
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: etcd-ingress
portSelector:
  ports:
    - 2379-2380
  protocol: tcp
ingress:
  - subnet: 10.0.0.0/16
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: cni-vxlan-ingress
portSelector:
  ports:
    - 8472
  protocol: udp
ingress:
  - subnet: 10.0.0.0/16
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: cilium-health-ingress
portSelector:
  ports:
    - 4240
  protocol: tcp
ingress:
  - subnet: 10.0.0.0/16
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: nodeport-ingress
portSelector:
  ports:
    - 30000-32767
  protocol: tcp
ingress:
  - subnet: 10.0.0.0/16
---
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: node-exporter-ingress
portSelector:
  ports:
    - 9100
  protocol: tcp
ingress:
  - subnet: 10.0.0.0/16
