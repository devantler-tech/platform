# NodePort range (30000-32767) cluster-internal only on worker nodes — the
# Hetzner Cloud LB reaches NodePorts over the private network. Pairs with
# cluster/block-ingress-by-default.yaml.
apiVersion: v1alpha1
kind: NetworkRuleConfig
name: nodeport-ingress
portSelector:
  ports:
    - 30000-32767
  protocol: tcp
ingress:
  - subnet: 10.0.0.0/16
