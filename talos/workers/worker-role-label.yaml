# Longhorn node label for Talos workers.
#
# node.longhorn.io/create-default-disk=true must be present at registration
# time so the Longhorn DaemonSet schedules on workers immediately.
#
# All kubelet extraArgs.node-labels must be combined in this single file
# because Talos strategic merge overwrites map keys -- the last patch wins.
machine:
  kubelet:
    extraArgs:
      node-labels: "node.longhorn.io/create-default-disk=true"
