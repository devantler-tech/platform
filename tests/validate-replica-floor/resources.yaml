---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: normal-singleton
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: normal-singleton
  template:
    metadata:
      labels:
        app: normal-singleton
    spec:
      containers:
        - name: app
          image: nginx:1.29.0
